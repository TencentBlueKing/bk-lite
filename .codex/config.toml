# Project-scoped Codex configuration for BK-Lite.
# Loaded only when this repository is trusted by Codex.

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]

[mcp_servers.projectmem]
command = "/Users/mac/.local/share/uv/tools/projectmem/bin/python"
args = ["-m", "projectmem.mcp_server", "--root", "/Users/mac/Documents/codespaces/bk-lite"]
cwd = "/Users/mac/Documents/codespaces/bk-lite"
