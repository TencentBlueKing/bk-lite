<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsPilot - 记忆</title>
    <style>
        :root {
            --color-primary: #2b5bff;
            --color-primary-soft: #eaf1ff;
            --color-text-1: #1f2d3d;
            --color-text-2: #4f5f75;
            --color-text-3: #8c9bb0;
            --color-border: #dfe6ef;
            --color-page-bg: #f2f5fb;
            --shadow-card: 0 6px 16px rgba(20, 38, 70, 0.08);
            --shadow-hover: 0 10px 20px rgba(20, 38, 70, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--color-text-1);
            background: var(--color-page-bg);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-header {
            position: sticky;
            top: 0;
            z-index: 10;
            height: 56px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e5ebf4;
            background: #edf3fb;
        }

        .brand {
            min-width: 230px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #5a6880;
        }

        .brand img {
            width: 22px;
            height: 22px;
        }

        .brand .switcher {
            margin-left: 4px;
            border: 1px solid var(--color-border);
            color: #6f7f95;
            background: #f7faff;
            border-radius: 8px;
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .main-nav {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .main-nav a {
            height: 34px;
            padding: 0 12px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #4f5e73;
            font-size: 13px;
            font-weight: 500;
        }

        .main-nav a.active {
            color: var(--color-primary);
            background: #e5efff;
            font-weight: 600;
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.75;
        }

        .header-actions {
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            color: #6f7f95;
            font-size: 13px;
        }

        .icon-action {
            border: none;
            background: transparent;
            color: inherit;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .workspace {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .memory-card,
        .create-card,
        .empty-state,
        .modal {
            border: 1px solid #d8e0ec;
            border-radius: 12px;
            background: #fff;
            box-shadow: var(--shadow-card);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: nowrap;
            flex-shrink: 0;
        }

        .toolbar-title {
            font-size: 16px;
            font-weight: 700;
            color: #2b3d57;
        }

        .toolbar-sub {
            font-size: 12px;
            color: #8192aa;
        }

        .ghost-button,
        .primary-button {
            height: 32px;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .primary-button {
            background: var(--color-primary);
            color: #fff;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ghost-button {
            background: #fff;
            color: #53657f;
            border-color: var(--color-border);
        }

        .toolbar-search {
            width: 240px;
            flex: 0 0 240px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .create-card,
        .memory-card {
            height: 216px;
            transition: all 0.18s ease;
            overflow: hidden;
        }

        .create-card:hover,
        .memory-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
            border-color: #c7d4e6;
        }

        .create-card {
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
        }

        .create-kicker {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #edf3ff;
            color: #2b5bff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 300;
        }

        .create-title {
            margin: 12px 0 6px;
            font-size: 15px;
            font-weight: 700;
            color: #243853;
        }

        .create-desc {
            font-size: 12px;
            line-height: 1.7;
            color: #7a8ca6;
        }

        .memory-card {
            position: relative;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .card-cover {
            position: relative;
            flex-shrink: 0;
            height: 56px;
            border-bottom: 1px solid rgba(213, 222, 235, 0.9);
            background: linear-gradient(120deg, #d6e1f4 0%, #bed1f1 58%, #95b3ed 100%);
        }

        .card-cover.organization {
            background: linear-gradient(120deg, #1e4fff 0%, #33a0ff 100%);
        }

        .scope-pill {
            position: absolute;
            left: 12px;
            top: 12px;
            height: 24px;
            padding: 0 10px;
            border-radius: 999px;
            background: #244fcf;
            color: #fff;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(36, 79, 207, 0.18);
        }

        .scope-pill.organization {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
            backdrop-filter: blur(8px);
        }

        .card-menu {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 20px;
            height: 20px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .card-body {
            position: relative;
            padding: 14px;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            gap: 8px;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }

        .card-title-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .card-title {
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 700;
            color: #243853;
        }

        .card-desc {
            margin: 0;
            font-size: 12px;
            line-height: 1.7;
            color: #7888a0;
            min-height: 0;
            overflow: hidden;
            display: -webkit-box;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
        }

        .card-footer {
            position: absolute;
            right: 14px;
            bottom: 14px;
            max-width: calc(100% - 28px);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            font-size: 11px;
            color: #91a0b4;
        }

        .card-footer-label {
            flex-shrink: 0;
            color: #8b9ab0;
        }

        .card-footer-value {
            min-width: 0;
            color: #6f819c;
            line-height: 1.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-menu-wrap {
            position: absolute;
            right: 10px;
            top: 10px;
            z-index: 5;
        }

        .empty-state {
            display: none;
            min-height: 240px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #7f90a8;
            font-size: 13px;
        }

        .empty-state strong {
            margin-bottom: 6px;
            color: #4d5e75;
            font-size: 15px;
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(14, 25, 43, 0.34);
            z-index: 24;
            padding: 16px;
        }

        .modal-mask.open {
            display: flex;
        }

        .modal {
            width: 620px;
            max-width: 100%;
            padding: 16px;
            max-height: calc(100vh - 32px);
            overflow: auto;
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .modal-head strong {
            font-size: 16px;
            color: #2b3d57;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: #eef3fb;
            color: #4f5f75;
            font-size: 16px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .form-label {
            font-size: 12px;
            color: #4f6078;
            font-weight: 600;
        }

        .required {
            color: #ff5b57;
        }

        .field,
        .select,
        .textarea {
            width: 100%;
            border: 1px solid #d7dfeb;
            border-radius: 8px;
            background: #fff;
            padding: 0 10px;
            font-size: 12px;
            color: #2a3950;
            outline: none;
        }

        .field,
        .select {
            height: 34px;
        }

        .textarea {
            min-height: 88px;
            padding: 10px;
            resize: vertical;
            line-height: 1.65;
        }

        .field:disabled,
        .select:disabled,
        .textarea:disabled {
            background: #f5f7fb;
            color: #93a1b5;
            cursor: not-allowed;
        }

        .multi-select {
            min-height: 38px;
            border: 1px solid #d7dfeb;
            border-radius: 8px;
            background: #fff;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            cursor: pointer;
            position: relative;
        }

        .multi-select.open {
            border-color: #2b5bff;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-width: 0;
        }

        .tag-chip {
            height: 24px;
            padding: 0 8px;
            border-radius: 6px;
            background: #edf3ff;
            color: #355fda;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            white-space: nowrap;
        }

        .tag-remove {
            border: none;
            background: transparent;
            color: #7793d9;
            font-size: 12px;
            line-height: 1;
            padding: 0;
            width: 12px;
            height: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .placeholder-text,
        .multi-arrow {
            color: #9aa8bc;
            font-size: 12px;
            white-space: nowrap;
        }

        .group-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            min-width: 180px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 10px 20px rgba(20, 38, 70, 0.18);
            padding: 6px;
            display: none;
        }

        .menu-panel {
            position: fixed;
            min-width: 120px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 10px 20px rgba(20, 38, 70, 0.18);
            padding: 6px;
            display: none;
            z-index: 40;
        }

        .group-panel.open,
        .menu-panel.open {
            display: block;
        }

        .group-option,
        .menu-option {
            width: 100%;
            min-height: 30px;
            border: none;
            background: transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
            text-align: left;
            color: #41556f;
            font-size: 12px;
            cursor: pointer;
        }

        .group-option:hover,
        .menu-option:hover {
            background: #edf3ff;
            color: #2b5bff;
        }

        .group-option input {
            margin: 0;
            pointer-events: none;
        }

        .menu-option.danger {
            color: #d44848;
        }

        .menu-option.danger:hover {
            background: #fff1f1;
            color: #d44848;
        }

        .modal-foot {
            margin-top: 4px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        @media (max-width: 1380px) {
            .card-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 1140px) {
            .card-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-right {
                justify-content: stretch;
            }

            .toolbar-search {
                width: 100%;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="../_shared/unified-header.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="top-header">
            <div class="brand">
                <img src="../../../../web/public/logo-site.png" alt="BlueKing Lite">
                <strong>BlueKing Lite</strong>
                <span class="switcher">◆</span>
            </div>
            <nav class="main-nav">
                <a href="../工作台/工作台.html"><span class="nav-dot"></span>工作台</a>
                <a class="active" href="./记忆.html"><span class="nav-dot"></span>记忆</a>
                <a href="../智能体/智能体.html"><span class="nav-dot"></span>智能体</a>
                <a href="../知识库/知识库.html"><span class="nav-dot"></span>知识库</a>
                <a href="../工具/工具.html"><span class="nav-dot"></span>工具</a>
                <a href="../模型/模型.html"><span class="nav-dot"></span>模型</a>
            </nav>
            <div class="header-actions">
                <button class="icon-action" type="button">◌</button>
                <button class="icon-action" type="button">▤</button>
                <span class="avatar">A</span>
            </div>
        </header>

        <main class="workspace">
            <section class="toolbar">
                <div class="toolbar-left">
                    <div>
                        <div class="toolbar-title">记忆列表</div>
                        <div class="toolbar-sub">卡片代表一个可被工作流绑定和持续回写的记忆容器。</div>
                    </div>
                </div>
                <div class="toolbar-right">
                    <input class="field toolbar-search" id="memorySearchInput" type="text" placeholder="搜索记忆名称">
                    <button class="primary-button" id="createMemoryBtn" type="button">新建记忆</button>
                </div>
            </section>

            <section class="card-grid" id="cardGrid"></section>
            <section class="empty-state" id="emptyState">
                <strong>没有找到匹配的记忆</strong>
                <div>请调整筛选条件或关键词后重试。</div>
            </section>
        </main>
    </div>

    <div class="modal-mask" id="createModalMask">
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="createModalTitle">
            <div class="modal-head">
                <strong id="createModalTitle">创建记忆</strong>
                <button class="close-btn" id="closeCreateModal" type="button">×</button>
            </div>
            <div class="form-row">
                <label class="form-label" for="memoryName"><span class="required">*</span> 名称</label>
                <input class="field" id="memoryName" type="text" placeholder="例如：RCA 个人记忆">
            </div>
            <div class="form-row">
                <label class="form-label" for="memoryScope"><span class="required">*</span> 作用域</label>
                <select class="select" id="memoryScope">
                    <option value="personal">个人</option>
                    <option value="organization">组织</option>
                </select>
            </div>
            <div class="form-row">
                <label class="form-label"><span class="required">*</span> 组织</label>
                <div class="multi-select" id="groupSelect">
                    <div class="tag-list" id="groupTagList"></div>
                    <span class="multi-arrow">▽</span>
                    <div class="group-panel" id="groupPanel"></div>
                </div>
            </div>
            <div class="form-row">
                <label class="form-label" for="memoryDesc"><span class="required">*</span> 简介</label>
                <textarea class="textarea" id="memoryDesc" placeholder="请输入记忆简介，用于列表卡片展示。"></textarea>
            </div>
            <div class="modal-foot">
                <button class="ghost-button" id="cancelCreate" type="button">取消</button>
                <button class="primary-button" id="confirmCreate" type="button">确认</button>
            </div>
        </section>
    </div>

    <div class="menu-panel" id="cardMenuPanel">
        <button class="menu-option" id="editMemoryBtn" type="button">编辑</button>
        <button class="menu-option danger" id="deleteMemoryBtn" type="button">删除</button>
    </div>

    <script>
        const groupOptions = ['Default', 'OpsPilotGuest', 'WeOps', '产研组', '蜂眼', 'WeOps运营'];

        const memorySpaces = [
            {
                id: 'personal-rca',
                name: 'RCA 个人记忆',
                scope: 'personal',
                scopeLabel: '个人',
                strong: false,
                icon: '🧠',
                groups: ['Default', 'WeOps'],
                desc: '为每个用户维护一份长期 RCA 记忆，沉淀故障对象、根因、处置与结论，便于后续追问和月报统计。',
                rule: '仅记录与故障分析直接相关的事实、判断与结论；寒暄、无结论对话、低信息量回复不进入记忆。'
            },
            {
                id: 'org-ops',
                name: '组织运维经验记忆',
                scope: 'organization',
                scopeLabel: '组织',
                strong: true,
                icon: '🏢',
                groups: ['Default', 'OpsPilotGuest', 'WeOps', '产研组', '蜂眼', 'WeOps运营'],
                desc: '为组织维护共享故障经验。节点只能在记忆准则允许的边界内整理产出，并由管理员确认是否进入组织记忆。',
                rule: '面向组织复盘和共享，只接受可复用、可验证的 RCA 内容；必须包含影响范围、根因、处置动作和后续建议。'
            },
            {
                id: 'personal-oncall',
                name: '值班个人记忆',
                scope: 'personal',
                scopeLabel: '个人',
                strong: false,
                icon: '📓',
                groups: ['Default', 'WeOps运营'],
                desc: '沉淀值班过程中的观察结论、巡检结论和临时处理经验，用于后续接班问询与连续值守。',
                rule: '优先保留事件摘要、定位线索和最终结论；仅在内容能提升下一次处理效率时回写。'
            },
            {
                id: 'org-release',
                name: '发布故障组织记忆',
                scope: 'organization',
                scopeLabel: '组织',
                strong: true,
                icon: '📦',
                groups: ['产研组', '蜂眼', 'WeOps'],
                desc: '专门沉淀发布期故障及回滚经验，让流程编排、发布评审和月度复盘都能引用统一记忆。',
                rule: '必须与发布流程相关；需要包含触发条件、影响范围、回滚动作和经验约束，避免收纳零散对话。'
            },
            {
                id: 'personal-k8s',
                name: 'K8s 巡检个人记忆',
                scope: 'personal',
                scopeLabel: '个人',
                strong: false,
                icon: '☸',
                groups: ['Default', 'OpsPilotGuest'],
                desc: '维护个人对集群、告警和治理动作的长期观察，为后续巡检问答提供上下文。',
                rule: '只记录具有诊断价值的集群状态变化和处理动作，非问题类交互不写入。'
            }
        ];

        const state = {
            menuId: null,
            editingId: null,
            selectedGroups: ['Default', 'WeOps'],
            searchKeyword: ''
        };

        const cardGrid = document.getElementById('cardGrid');
        const emptyState = document.getElementById('emptyState');
        const createModalMask = document.getElementById('createModalMask');
        const createModalTitle = document.getElementById('createModalTitle');
        const memoryNameInput = document.getElementById('memoryName');
        const memoryScopeSelect = document.getElementById('memoryScope');
        const memoryDescInput = document.getElementById('memoryDesc');
        const groupSelect = document.getElementById('groupSelect');
        const groupPanel = document.getElementById('groupPanel');
        const groupTagList = document.getElementById('groupTagList');
        const cardMenuPanel = document.getElementById('cardMenuPanel');
        const editMemoryBtn = document.getElementById('editMemoryBtn');
        const deleteMemoryBtn = document.getElementById('deleteMemoryBtn');
        const memorySearchInput = document.getElementById('memorySearchInput');
        const createMemoryBtn = document.getElementById('createMemoryBtn');

        function getGroupSummary(groups) {
            return groups.join(',');
        }

        function renderGroupTags() {
            if (!state.selectedGroups.length) {
                groupTagList.innerHTML = '<span class="placeholder-text">请选择管理组织</span>';
                return;
            }

            groupTagList.innerHTML = state.selectedGroups.map((group) => `
                <span class="tag-chip">
                    <span>${group}</span>
                    <button class="tag-remove" type="button" data-group-remove="${group}">×</button>
                </span>
            `).join('');
        }

        function renderGroupOptions() {
            groupPanel.innerHTML = groupOptions.map((group) => `
                <button class="group-option" type="button" data-group-option="${group}">
                    <input type="checkbox" ${state.selectedGroups.includes(group) ? 'checked' : ''}>
                    <span>${group}</span>
                </button>
            `).join('');
        }

        function openModal(mode, item) {
            state.editingId = mode === 'edit' && item ? item.id : null;
            createModalTitle.textContent = mode === 'edit' ? '编辑记忆' : '创建记忆';
            memoryNameInput.value = item?.name || '';
            memoryScopeSelect.value = item?.scope || 'personal';
            memoryScopeSelect.disabled = mode === 'edit';
            memoryDescInput.value = item?.desc || '';
            state.selectedGroups = item?.groups ? [...item.groups] : ['Default', 'WeOps'];
            renderGroupTags();
            renderGroupOptions();
            createModalMask.classList.add('open');
        }

        function openCreateModal() {
            openModal('create');
        }

        function closeCreateModal() {
            createModalMask.classList.remove('open');
            groupPanel.classList.remove('open');
            groupSelect.classList.remove('open');
        }

        function getList() {
            const keyword = state.searchKeyword.trim().toLowerCase();
            if (!keyword) {
                return memorySpaces;
            }
            return memorySpaces.filter((item) => item.name.toLowerCase().includes(keyword));
        }

        function renderCard(item) {
            const coverClass = item.scope === 'organization' ? 'card-cover organization' : 'card-cover';
            const scopeClass = item.scope === 'organization' ? 'scope-pill organization' : 'scope-pill';
            return `
                <article class="memory-card" data-id="${item.id}" data-action="open-memory" title="${item.name}">
                    <div class="${coverClass}">
                        <span class="${scopeClass}">${item.scopeLabel}</span>
                        <div class="card-menu-wrap">
                            <button class="card-menu" type="button" data-action="menu" data-id="${item.id}">⋮</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="card-content">
                            <div class="card-title-row">
                                <h3 class="card-title">${item.name}</h3>
                            </div>
                            <p class="card-desc">${item.desc}</p>
                        </div>
                        <div class="card-footer">
                            <span class="card-footer-label">组织:</span>
                            <span class="card-footer-value">${getGroupSummary(item.groups || [])}</span>
                        </div>
                    </div>
                </article>
            `;
        }

        function render() {
            const list = getList();
            cardGrid.innerHTML = list.map(renderCard).join('');

            cardGrid.style.display = list.length ? 'grid' : 'none';
            emptyState.style.display = list.length ? 'none' : 'flex';
        }

        function toggleMenu(id, anchor) {
            const willOpen = state.menuId !== id;
            state.menuId = willOpen ? id : null;
            if (!willOpen) {
                cardMenuPanel.classList.remove('open');
                return;
            }

            const rect = anchor.getBoundingClientRect();
            cardMenuPanel.style.left = `${rect.right + window.scrollX - 120}px`;
            cardMenuPanel.style.top = `${rect.bottom + window.scrollY + 6}px`;
            cardMenuPanel.classList.add('open');
        }

        document.addEventListener('click', (event) => {
            const groupRemove = event.target.closest('[data-group-remove]');
            if (groupRemove) {
                event.stopPropagation();
                state.selectedGroups = state.selectedGroups.filter((group) => group !== groupRemove.dataset.groupRemove);
                renderGroupTags();
                renderGroupOptions();
                return;
            }

            const groupOption = event.target.closest('[data-group-option]');
            if (groupOption) {
                event.stopPropagation();
                const selected = groupOption.dataset.groupOption;
                if (state.selectedGroups.includes(selected)) {
                    state.selectedGroups = state.selectedGroups.filter((group) => group !== selected);
                } else {
                    state.selectedGroups = [...state.selectedGroups, selected];
                }
                renderGroupTags();
                renderGroupOptions();
                return;
            }

            if (event.target.closest('#groupSelect')) {
                const willOpen = !groupPanel.classList.contains('open');
                groupPanel.classList.toggle('open', willOpen);
                groupSelect.classList.toggle('open', willOpen);
                return;
            }

            const openCard = event.target.closest('[data-action="open-memory"]');
            if (openCard && !event.target.closest('[data-action="menu"]')) {
                const selected = memorySpaces.find((item) => item.id === openCard.dataset.id);
                if (selected) {
                    sessionStorage.setItem('selectedMemorySpace', JSON.stringify(selected));
                    window.location.href = './记忆详情.html';
                }
                return;
            }

            const menu = event.target.closest('[data-action="menu"]');
            if (menu) {
                event.stopPropagation();
                toggleMenu(menu.dataset.id, menu);
                return;
            }

            if (!event.target.closest('#cardMenuPanel')) {
                state.menuId = null;
                cardMenuPanel.classList.remove('open');
            }

            if (!event.target.closest('#groupSelect')) {
                groupPanel.classList.remove('open');
                groupSelect.classList.remove('open');
            }
        });

        editMemoryBtn.addEventListener('click', () => {
            const selected = memorySpaces.find((item) => item.id === state.menuId);
            state.menuId = null;
            cardMenuPanel.classList.remove('open');
            if (selected) {
                openModal('edit', selected);
            }
        });

        deleteMemoryBtn.addEventListener('click', () => {
            state.menuId = null;
            cardMenuPanel.classList.remove('open');
            alert('删除流程为原型占位。');
        });

        createMemoryBtn.addEventListener('click', openCreateModal);
        memorySearchInput.addEventListener('input', (event) => {
            state.searchKeyword = event.target.value;
            render();
        });

        document.getElementById('closeCreateModal').addEventListener('click', closeCreateModal);
        document.getElementById('cancelCreate').addEventListener('click', closeCreateModal);
        document.getElementById('confirmCreate').addEventListener('click', () => {
            closeCreateModal();
            alert(state.editingId ? '编辑流程为原型占位。' : '创建流程为原型占位。');
        });

        createModalMask.addEventListener('click', (event) => {
            if (event.target === createModalMask) {
                closeCreateModal();
            }
        });

        renderGroupTags();
        renderGroupOptions();
        render();
    </script>
</body>
</html>
