<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企业微信 - 集成详情</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --panel: #ffffff;
        --line: #dcdee5;
        --line-soft: #eaedf3;
        --text-1: #313238;
        --text-2: #63656e;
        --text-3: #979ba5;
        --primary: #3a84ff;
        --primary-weak: #edf4ff;
        --success: #14a568;
        --warn: #ff9c01;
        --danger: #ea3636;
        --shadow: 0 10px 28px rgba(33, 59, 99, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #e8f2ff 0%, #f4f7fb 88px, #f5f7fa 260px);
        color: var(--text-1);
      }

      .topbar {
        height: 54px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        position: relative;
      }

      .logo-area,
      .top-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-mark {
        width: 34px;
        height: 30px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        background: linear-gradient(135deg, #0052d9 0%, #3a84ff 50%, #699eff 100%);
      }

      .switch-app {
        height: 30px;
        min-width: 48px;
        border: 1px solid #dbe3ef;
        background: #f6f8fc;
        border-radius: 10px;
        color: #6a7488;
        font-size: 12px;
      }

      .main-nav {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 8px;
      }

      .nav-item {
        border: 0;
        background: transparent;
        color: #5e6679;
        border-radius: 10px;
        padding: 6px 12px;
        font-size: 14px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }

      .nav-item.active {
        color: var(--primary);
        background: var(--primary-weak);
      }

      .nav-item[disabled] {
        color: #a3adbf;
        cursor: not-allowed;
        opacity: 0.7;
      }

      .avatar {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
      }

      .container {
        padding: 12px;
      }

      .header-card,
      .content-card {
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        background: #fff;
        box-shadow: var(--shadow);
      }

      .header-card {
        margin: 10px;
        padding: 18px 20px;
      }

      .detail-top {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        flex-wrap: wrap;
      }

      .detail-main {
        display: flex;
        align-items: flex-start;
        gap: 14px;
      }

      .back {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        cursor: pointer;
      }

      .brand {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: linear-gradient(135deg, #12c287 0%, #43d36e 100%);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }

      .title {
        font-size: 24px;
        font-weight: 700;
      }

      .desc {
        margin-top: 4px;
        font-size: 13px;
        color: var(--text-3);
      }

      .type-badge {
        margin-top: 8px;
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid #dce8fb;
        background: #f0f6ff;
        color: #4e678d;
        font-size: 12px;
      }

      .overall-status {
        height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        font-weight: 600;
      }

      .overall-status.draft {
        color: #7a8699;
        background: #f2f4f8;
      }

      .overall-status.ready {
        color: #2f6fed;
        background: #edf4ff;
      }

      .overall-status.active {
        color: var(--success);
        background: #e8faf3;
      }

      .header-capability-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .capability-chip {
        height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid transparent;
      }

      .capability-chip.draft {
        color: #7a8699;
        background: #f2f4f8;
        border-color: #e5e8ef;
      }

      .capability-chip.ready {
        color: #2f6fed;
        background: #edf4ff;
        border-color: #d8e6ff;
      }

      .capability-chip.active {
        color: var(--success);
        background: #e8faf3;
        border-color: #c9ebd8;
      }

      .danger-btn,
      .ghost-btn,
      .primary-btn,
      .secondary-btn,
      .toggle-btn {
        height: 36px;
        padding: 0 16px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        cursor: pointer;
      }

      .danger-btn {
        color: var(--danger);
        border-color: #f3cbcb;
        background: #fff8f8;
      }

      .primary-btn {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      .danger-btn:disabled,
      .ghost-btn:disabled,
      .primary-btn:disabled,
      .secondary-btn:disabled,
      .toggle-btn:disabled {
        cursor: not-allowed;
        color: #a3acb9;
        background: #f5f7fa;
        border-color: #e3e7ee;
        box-shadow: none;
      }

      .secondary-btn {
        color: #4d5c72;
        border-color: #d6e0ef;
      }

      .toggle-btn.active {
        color: var(--danger);
        border-color: #f3cbcb;
        background: #fff8f8;
      }

      .tabs {
        margin: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tab {
        height: 34px;
        padding: 0 14px;
        border-radius: 10px;
        border: 1px solid #dbe3ef;
        background: #fff;
        color: #5d6a7d;
        cursor: pointer;
      }

      .tab.active {
        border-color: #bdd3f8;
        background: var(--primary-weak);
        color: var(--primary);
        font-weight: 600;
      }

      .content-card {
        margin: 10px;
        overflow: hidden;
      }

      .content-head {
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .content-copy {
        flex: 1;
        min-width: 320px;
      }

      .content-title {
        font-size: 18px;
        font-weight: 700;
      }

      .content-desc {
        margin-top: 6px;
        font-size: 12px;
        color: var(--text-3);
      }

      .content-status-wrap {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: nowrap;
        justify-content: flex-end;
      }

      .status-meta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-3);
        white-space: nowrap;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #b8bec9;
      }

      .status-dot.success {
        background: var(--success);
      }

      .status-text.success {
        color: var(--success);
        font-weight: 600;
      }

      .status-text.pending {
        color: #7f8795;
        font-weight: 600;
      }

      .content-actions-group {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: nowrap;
        justify-content: flex-end;
      }

      .content-desc-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .content-desc-link:hover {
        text-decoration: underline;
      }

      .content-action-btn {
        min-width: 88px;
      }

      .content-status-wrap.hidden {
        display: none;
      }

      .hidden {
        display: none !important;
      }

      .content-body {
        padding: 20px;
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

        .panel.stack {
          display: none;
        }

        .panel.active.stack {
          display: grid;
        }

      .status-card,
      .checklist-card,
      .mapping-card,
      .mini-form,
      .section-card {
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: #fbfcff;
      }

      .status-card,
      .mini-form,
      .section-card {
        padding: 16px;
      }

      .section-card {
        border: 0;
        border-radius: 0;
        background: transparent;
        padding: 0;
      }

      .form-section {
        display: grid;
        gap: 12px;
      }

      .section-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-2);
      }

      .section-split {
        height: 1px;
        background: var(--line-soft);
        margin: 6px 0 2px;
      }

      .ability-head {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .ability-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .ability-desc {
        font-size: 12px;
        color: var(--text-3);
        line-height: 1.7;
        max-width: 560px;
      }

      .ability-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .ability-badge {
        height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        font-size: 12px;
        font-weight: 600;
      }

      .ability-badge.draft {
        color: #7a8699;
        background: #f2f4f8;
      }

      .ability-badge.ready {
        color: #2f6fed;
        background: #edf4ff;
      }

      .ability-badge.active {
        color: var(--success);
        background: #e8faf3;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .base-form-grid {
        grid-template-columns: 1fr;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .field.hidden {
        display: none;
      }

      .label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 0 12px;
        font: inherit;
        color: var(--text-1);
        background: #fff;
      }

      .input,
      .select {
        height: 40px;
      }

      .textarea {
        min-height: 88px;
        padding-top: 10px;
        padding-bottom: 10px;
        resize: vertical;
      }

      .hint {
        margin-top: 6px;
        font-size: 12px;
        color: var(--text-3);
        line-height: 1.6;
      }

      .status-line {
        font-size: 12px;
        color: var(--text-3);
      }

      .status-line.success {
        color: var(--success);
      }

      .status-line.error {
        color: var(--danger);
      }

      .status-line.pending {
        color: var(--warn);
      }

      .checklist {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 10px;
      }

      .checklist-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line-soft);
        font-size: 13px;
      }

      .checklist-item:last-child {
        border-bottom: 0;
      }

      .check-indicator {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .checklist-item.complete .check-indicator {
        background: #e8faf3;
        color: var(--success);
      }

      .checklist-item.incomplete .check-indicator {
        background: #f2f4f8;
        color: #98a1af;
      }

      .mapping-row {
        display: grid;
        grid-template-columns: 1fr 48px 1fr;
        gap: 10px;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line-soft);
        font-size: 13px;
      }

      .mapping-row:last-child {
        border-bottom: 0;
      }

      .mapping-arrow {
        text-align: center;
        color: #8b97a8;
      }

      .record-card {
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: #fff;
        overflow: hidden;
      }

      .record-head {
        padding: 16px;
        border-bottom: 1px solid var(--line-soft);
      }

      .record-title {
        font-size: 15px;
        font-weight: 700;
      }

      .record-desc {
        margin-top: 4px;
        font-size: 12px;
        color: var(--text-3);
      }

      .record-table {
        width: 100%;
        border-collapse: collapse;
      }

      .record-table th,
      .record-table td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line-soft);
        text-align: left;
        font-size: 13px;
      }

      .record-table th {
        color: var(--text-2);
        font-weight: 600;
        background: #f8fafc;
      }

      .record-table tr:last-child td {
        border-bottom: 0;
      }

      .record-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      .inline-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .login-preview {
        height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        background: linear-gradient(135deg, #12c287 0%, #43d36e 100%);
        color: #fff;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
      }

      .login-icon {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .radio-group {
        display: grid;
        gap: 10px;
      }

      .radio-item {
        border: 1px solid var(--line-soft);
        border-radius: 12px;
        background: #fcfdff;
        padding: 12px 14px;
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }

      .actions {
        display: flex;
        gap: 10px;
        justify-content: flex-start;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      .advanced-panel {
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px dashed #d7e2f3;
        background: #fff;
      }

      .advanced-title {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .page-toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(31, 35, 41, 0.9);
        color: #fff;
        font-size: 13px;
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.2);
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .page-toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 760px) {
        .form-grid,
        .mapping-row {
          grid-template-columns: 1fr;
        }

        .content-status-wrap {
          width: 100%;
          flex-wrap: wrap;
          justify-content: flex-start;
        }

        .content-actions-group {
          flex-wrap: wrap;
        }

        .main-nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="logo-area">
        <div class="logo-mark">BK</div>
        <button class="switch-app">▦ ▼</button>
      </div>
      <nav class="main-nav" aria-label="系统管理主导航">
        <button class="nav-item" type="button" onclick="window.location.href='../用户管理/组织架构.html'">◉ 用户管理</button>
        <button class="nav-item" type="button" disabled>◉ 应用管理</button>
        <a class="nav-item" href="../通知渠道/通知渠道.html">◉ 通知渠道</a>
        <button class="nav-item active" type="button" onclick="window.location.href='./集成中心.html'">◉ 集成中心</button>
        <button class="nav-item" type="button" onclick="window.location.href='../平台设置/门户设置.html'">◉ 平台设置</button>
      </nav>
      <div class="top-right"><span class="avatar">A</span><span>admin ▼</span></div>
    </header>

    <main class="container">
      <section class="header-card">
        <div class="detail-top">
          <div class="detail-main">
            <button class="back" onclick="window.location.href='./集成中心.html'">←</button>
            <div class="brand">企微</div>
            <div>
              <div id="detailTitle" class="title">蓝鲸企业微信</div>
              <div class="type-badge">集成类型：企业微信</div>
              <div class="desc">配置项按能力拆分维护。各能力在本页完成保存与测试后，卡片会展示对应的配置完成状态。</div>
            </div>
          </div>
        </div>
      </section>

      <div class="tabs">
        <button class="tab active" onclick="showTab('base', this)">基础连接</button>
        <button class="tab" onclick="showTab('sync', this)">用户同步</button>
        <button class="tab" onclick="showTab('auth', this)">登录认证</button>
        <button class="tab" onclick="showTab('notify', this)">通知渠道</button>
      </div>

      <section class="content-card">
        <div class="content-head">
          <div class="content-copy">
            <div class="content-title" id="contentTitle">基础连接</div>
            <div class="content-desc" id="contentDesc">基础连接通过测试后，其他能力才能继续保存与测试。</div>
          </div>
          <div id="contentStatusWrap" class="content-status-wrap">
            <span id="contentTestMeta" class="status-meta">
              <span>测试状态：</span>
              <span class="status-dot success"></span>
              <span id="contentTestText" class="status-text success">测试成功</span>
            </span>
            <span id="contentActiveMeta" class="status-meta hidden">
              <span>平台状态：</span>
              <span id="contentActiveDot" class="status-dot"></span>
              <span id="contentActiveText" class="status-text pending">未启用</span>
            </span>
            <div class="content-actions-group">
              <button id="contentSaveButton" class="secondary-btn content-action-btn" type="button">保存</button>
              <button id="contentTestButton" class="ghost-btn content-action-btn" type="button">测试连接</button>
              <button id="contentEnableButton" class="primary-btn hidden" type="button" onclick="toggleCapability()">启用能力</button>
            </div>
          </div>
        </div>
        <div class="content-body">
          <div id="panel-base" class="panel active stack">
            <div class="section-card">
              <div class="form-section">
                <div class="section-label">应用凭证</div>
                <div class="form-grid base-form-grid">
                  <div class="field">
                    <label class="label" for="corpId">企业微信 CorpID</label>
                    <input id="corpId" class="input" value="wwc1a23b6d9e" />
                  </div>
                  <div class="field">
                    <label class="label" for="agentId">企业微信 AgentID</label>
                    <input id="agentId" class="input" value="1000042" />
                  </div>
                  <div class="field full">
                    <label class="label" for="secret">企业微信密钥</label>
                    <input id="secret" class="input" type="password" value="1234567890abcdef" />
                  </div>
                </div>
                <div class="section-split"></div>
                <div class="section-label">请求配置</div>
                <div class="form-grid base-form-grid">
                  <div class="field full">
                    <label class="label" for="scope">应用授权作用域</label>
                    <input id="scope" class="input" value="snsapi_privateinfo" />
                  </div>
                  <div class="field full">
                    <label class="label" for="tokenUrl">获取 access_token 的请求地址</label>
                    <input id="tokenUrl" class="input" value="https://qyapi.weixin.qq.com/cgi-bin/gettoken" />
                  </div>
                  <div class="field full">
                    <label class="label" for="proxyUrl">代理地址</label>
                    <input id="proxyUrl" class="input" placeholder="选填，例如 http://127.0.0.1:8080" />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div id="panel-sync" class="panel stack">
            <div class="section-card">

              <div class="form-section">
                <div class="section-label">同步配置</div>
                <div class="form-grid base-form-grid">
                  <div class="field">
                    <label class="label" for="syncOrgListUrl">获取组织列表</label>
                    <input id="syncOrgListUrl" class="input" placeholder="选填，未填写时使用公有企微接口" />

    <div id="pageToast" class="page-toast">已保存</div>

    <script>
      const STORAGE_KEY = 'bkLiteEnterpriseWechatConfigV2';
      const BASE_FIELDS = ['corpId', 'agentId', 'secret', 'scope', 'tokenUrl', 'proxyUrl'];
      const SYNC_FIELDS = ['syncOrgListUrl', 'syncUserInfoUrl'];
      const AUTH_FIELDS = ['authRedirectUrl', 'authUserInfoUrl', 'authUserDetailUrl', 'authMobileUrl', 'authPcUrl', 'authPcAgent', 'authUserMapping'];
      const NOTIFY_FIELDS = ['notifySendUrl', 'notifyTicketUrl', 'notifyFieldMapping'];
      const defaultState = {
        type: '企业微信',
        instanceName: '蓝鲸企业微信',
        displayName: '蓝鲸企业微信',
        corpId: 'wwc1a23b6d9e',
        agentId: '1000042',
        secret: '1234567890abcdef',
        redirectUrl: 'https://bk-lite.example.com/auth/wecom/callback',
        scope: 'snsapi_privateinfo',
        tokenUrl: 'https://qyapi.weixin.qq.com/cgi-bin/gettoken',
        proxyUrl: '',
        connectionPassed: true,
        syncUserEnabled: false,
        syncOrgListUrl: '',
        syncUserInfoUrl: '',
        syncTestPassed: false,
        authRedirectUrl: 'https://open.weixin.qq.com/connect/oauth2/authorize',
        authUserInfoUrl: 'https://qyapi.weixin.qq.com/cgi-bin/user/getuserinfo',
        authUserDetailUrl: 'https://qyapi.weixin.qq.com/cgi-bin/user/getuserdetail',
        authMobileUrl: 'https://weops.deadgay.cn:443/o/weops_saas/mobile/?im_code=qywx_mobile',
        authPcUrl: 'https://weops.deadgay.cn:443/o/weops_saas/?im_code=qywx_web',
        authPcAgent: 'wxwork',
        authUserMapping: 'telephone:mobile',
        authTestPassed: false,
        notifySendUrl: 'https://qyapi.weixin.qq.com/cgi-bin/message/send',
        notifyTicketUrl: 'https://qyapi.weixin.qq.com/cgi-bin/get_jsapi_ticket',
        notifyFieldMapping: 'userid',
        notifyTestPassed: false,
        syncActive: false,
        authActive: false,
        notifyActive: false
      };
      let state = loadState();

      function loadState() {
        try {
          const saved = window.localStorage.getItem(STORAGE_KEY);
          const nextState = saved ? { ...defaultState, ...JSON.parse(saved) } : { ...defaultState };
          return nextState;
        } catch (error) {
          return { ...defaultState };
        }
      }

      function saveState() {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function showToast(message) {
        const toast = document.getElementById('pageToast');
        toast.textContent = message;
        toast.classList.add('show');
        window.clearTimeout(window.pageToastTimer);
        window.pageToastTimer = window.setTimeout(function () {
          toast.classList.remove('show');
        }, 2200);
      }

      function markBasePendingTest() {
        state.connectionPassed = false;
        state.syncActive = false;
        state.authActive = false;
        state.notifyActive = false;
      }

      function computeStatuses() {
        const baseReady = Boolean(
          state.corpId &&
          state.agentId &&
          state.secret &&
          state.scope &&
          state.tokenUrl &&
          state.connectionPassed
        );
        const syncReady = Boolean(baseReady && state.syncTestPassed);
        const authReady = Boolean(
          baseReady &&
          state.authRedirectUrl &&
          state.authUserInfoUrl &&
          state.authUserDetailUrl &&
          state.authMobileUrl &&
          state.authPcUrl &&
          state.authPcAgent &&
          state.authUserMapping &&
          state.authTestPassed
        );
        const notifyReady = Boolean(baseReady && state.notifySendUrl && state.notifyTicketUrl && state.notifyFieldMapping && state.notifyTestPassed);
        const sync = !syncReady ? 'draft' : 'ready';
        const auth = !authReady ? 'draft' : 'ready';
        const notify = !notifyReady ? 'draft' : 'ready';
        const readyCount = [sync, auth, notify].filter(function (status) { return status === 'ready'; }).length;
        const overall = readyCount > 0 || baseReady ? 'ready' : 'draft';
        return { baseReady, syncReady, authReady, notifyReady, sync, auth, notify, overall };
      }

      function statusText(status) {
        const map = { draft: '待测试', ready: '测试成功', active: '测试成功' };
        return map[status];
      }

      function overallText(status) {
        const map = { draft: '待完善', ready: '已完成配置', active: '已完成配置' };
        return map[status];
      }

      function bindHeaderActions(name) {
        const testButton = document.getElementById('contentTestButton');
        const saveButton = document.getElementById('contentSaveButton');
        const actionMap = {
          base: {
            test: function () { testConnection(true); },
            save: saveBaseConfig,
            saveText: '保存'
          },
          sync: {
            test: function () { testSyncConfig(true); },
            save: saveSyncConfig,
            saveText: '保存配置'
          },
          auth: {
            test: function () { testAuthConfig(true); },
            save: saveAuthConfig,
            saveText: '保存配置'
          },
          notify: {
            test: function () { testNotifyConfig(true); },
            save: saveNotifyConfig,
            saveText: '保存配置'
          }
        };
        testButton.onclick = actionMap[name].test;
        saveButton.onclick = actionMap[name].save;
        saveButton.textContent = actionMap[name].saveText;
      }

      function confirmSaveWhenPending(isReady) {
        if (isReady) {
          return true;
        }
        return window.confirm('当前测试状态为待测试，建议先测试连接再保存。是否仍然保存？');
      }

      function showTab(name, target) {
        document.querySelectorAll('.tab').forEach(function (tab) {
          tab.classList.remove('active');
        });
        target.classList.add('active');
        document.querySelectorAll('.panel').forEach(function (panel) {
          panel.classList.remove('active');
        });
        document.getElementById('panel-' + name).classList.add('active');
        const content = {
          base: ['基础连接', '基础连接通过测试后，其他能力才能继续保存与测试。'],
          sync: ['用户同步', '仅维护企微用户同步的接口配置。启用能力后，还需前往<a class="content-desc-link" href="javascript:void(0)">用户同步</a>完成启动。'],
          auth: ['登录认证', '仅维护企微登录认证的接口与地址配置。启用能力后，还需前往<a class="content-desc-link" href="javascript:void(0)">认证源</a>完成启动。'],
          notify: ['通知渠道', '仅维护企微通知渠道的接口配置。启用能力后，还需前往<a class="content-desc-link" href="javascript:void(0)">通知渠道</a>完成启动。']
        };
        document.getElementById('contentTitle').textContent = content[name][0];
        document.getElementById('contentDesc').innerHTML = content[name][1];
        const wrap = document.getElementById('contentStatusWrap');
        const testMeta = document.getElementById('contentTestMeta');
        const testText = document.getElementById('contentTestText');
        const activeMeta = document.getElementById('contentActiveMeta');
        const activeDot = document.getElementById('contentActiveDot');
        const activeText = document.getElementById('contentActiveText');
        const testButton = document.getElementById('contentTestButton');
        const saveButton = document.getElementById('contentSaveButton');
        const enableButton = document.getElementById('contentEnableButton');
        wrap.classList.remove('hidden');
        testButton.classList.remove('hidden');
        saveButton.classList.remove('hidden');
        testMeta.classList.remove('hidden');
        activeMeta.classList.add('hidden');
        enableButton.classList.add('hidden');
        bindHeaderActions(name);
        const statuses = computeStatuses();
        if (name === 'base') {
          testText.className = 'status-text ' + (statuses.baseReady ? 'success' : 'pending');
          testText.textContent = statuses.baseReady ? '测试成功' : '待测试';
        }
        if (name === 'sync') {
          testText.className = 'status-text ' + (statuses.syncReady ? 'success' : 'pending');
          testText.textContent = statuses.syncReady ? '测试成功' : '待测试';
          activeMeta.classList.remove('hidden');
          activeDot.className = 'status-dot ' + (state.syncActive ? 'success' : '');
          activeText.className = 'status-text ' + (state.syncActive ? 'success' : 'pending');
          activeText.textContent = state.syncActive ? '已启用' : '未启用';
          enableButton.className = (state.syncActive ? 'toggle-btn active' : 'primary-btn') + '';
          enableButton.disabled = !statuses.syncReady;
          enableButton.textContent = state.syncActive ? '取消启用' : '启用能力';
          enableButton.classList.remove('hidden');
        }
        if (name === 'auth') {
          testText.className = 'status-text ' + (statuses.authReady ? 'success' : 'pending');
          testText.textContent = statuses.authReady ? '测试成功' : '待测试';
          activeMeta.classList.remove('hidden');
          activeDot.className = 'status-dot ' + (state.authActive ? 'success' : '');
          activeText.className = 'status-text ' + (state.authActive ? 'success' : 'pending');
          activeText.textContent = state.authActive ? '已启用' : '未启用';
          enableButton.className = (state.authActive ? 'toggle-btn active' : 'primary-btn') + '';
          enableButton.disabled = !statuses.authReady;
          enableButton.textContent = state.authActive ? '取消启用' : '启用能力';
          enableButton.classList.remove('hidden');
        }
        if (name === 'notify') {
          testText.className = 'status-text ' + (statuses.notifyReady ? 'success' : 'pending');
          testText.textContent = statuses.notifyReady ? '测试成功' : '待测试';
          activeMeta.classList.remove('hidden');
          activeDot.className = 'status-dot ' + (state.notifyActive ? 'success' : '');
          activeText.className = 'status-text ' + (state.notifyActive ? 'success' : 'pending');
          activeText.textContent = state.notifyActive ? '已启用' : '未启用';
          enableButton.className = (state.notifyActive ? 'toggle-btn active' : 'primary-btn') + '';
          enableButton.disabled = !statuses.notifyReady;
          enableButton.textContent = state.notifyActive ? '取消启用' : '启用能力';
          enableButton.classList.remove('hidden');
        }
      }

      function bindField(id, key) {
        const element = document.getElementById(id);
        element.value = state[key] || '';
        element.addEventListener('input', function () {
          state[key] = element.value;
          if (BASE_FIELDS.indexOf(key) !== -1) {
            markBasePendingTest();
          }
          if (SYNC_FIELDS.indexOf(key) !== -1) {
            state.syncTestPassed = false;
            state.syncActive = false;
          }
          if (AUTH_FIELDS.indexOf(key) !== -1) {
            state.authTestPassed = false;
            state.authActive = false;
          }
          if (NOTIFY_FIELDS.indexOf(key) !== -1) {
            state.notifyTestPassed = false;
            state.notifyActive = false;
          }
          renderStatuses();
        });
        element.addEventListener('change', function () {
          state[key] = element.value;
          if (BASE_FIELDS.indexOf(key) !== -1) {
            markBasePendingTest();
          }
          if (SYNC_FIELDS.indexOf(key) !== -1) {
            state.syncTestPassed = false;
            state.syncActive = false;
          }
          if (AUTH_FIELDS.indexOf(key) !== -1) {
            state.authTestPassed = false;
            state.authActive = false;
          }
          if (NOTIFY_FIELDS.indexOf(key) !== -1) {
            state.notifyTestPassed = false;
            state.notifyActive = false;
          }
          renderStatuses();
        });
      }

      function toggleCapability() {
        const activeTab = document.querySelector('.tab.active');
        const activeTabText = activeTab ? activeTab.textContent.trim() : '基础连接';
        const statusMap = {
          用户同步: { ready: 'syncReady', active: 'syncActive', label: '用户同步' },
          登录认证: { ready: 'authReady', active: 'authActive', label: '登录认证' },
          通知渠道: { ready: 'notifyReady', active: 'notifyActive', label: '通知渠道' }
        };
        const config = statusMap[activeTabText];
        if (!config) {
          return;
        }
        const statuses = computeStatuses();
        if (!statuses[config.ready]) {
          showToast(config.label + '尚未测试成功，暂不能启用能力');
          return;
        }
        state[config.active] = !state[config.active];
        saveState();
        renderStatuses();
        showToast(state[config.active] ? config.label + '能力已启用' : config.label + '能力已取消启用');
      }

      function saveSyncConfig() {
        const statuses = computeStatuses();
        if (!confirmSaveWhenPending(statuses.syncReady)) {
          return;
        }
        saveState();
        showToast('用户同步配置已保存');
      }

      function saveBaseConfig() {
        const statuses = computeStatuses();
        if (!confirmSaveWhenPending(statuses.baseReady)) {
          return;
        }
        saveState();
        showToast('基础连接配置已保存');
      }

      function testSyncConfig(success) {
        state.syncTestPassed = success;
        if (!success) {
          state.syncActive = false;
        }
        saveState();
        render();
        showToast(success ? '用户同步测试通过' : '用户同步测试失败');
      }

      function saveAuthConfig() {
        const statuses = computeStatuses();
        if (!confirmSaveWhenPending(statuses.authReady)) {
          return;
        }
        saveState();
        showToast('登录认证配置已保存');
      }

      function testAuthConfig(success) {
        state.authTestPassed = success;
        if (!success) {
          state.authActive = false;
        }
        saveState();
        render();
        showToast(success ? '登录认证测试通过' : '登录认证测试失败');
      }

      function saveNotifyConfig() {
        const statuses = computeStatuses();
        if (!confirmSaveWhenPending(statuses.notifyReady)) {
          return;
        }
        saveState();
        showToast('通知渠道配置已保存');
      }

      function testNotifyConfig(success) {
        state.notifyTestPassed = success;
        if (!success) {
          state.notifyActive = false;
        }
        saveState();
        render();
        showToast(success ? '通知渠道测试通过' : '通知渠道测试失败');
      }
      function testConnection(success) {
        state.connectionPassed = success;
        if (!success) {
          state.syncActive = false;
          state.authActive = false;
          state.notifyActive = false;
        }
        saveState();
        render();
        showToast(success ? '连接测试通过' : '连接测试失败');
      }

      function renderStatuses() {
        const statuses = computeStatuses();
        const contentStatusWrap = document.getElementById('contentStatusWrap');
        const contentTestButton = document.getElementById('contentTestButton');
        const contentSaveButton = document.getElementById('contentSaveButton');
        const contentEnableButton = document.getElementById('contentEnableButton');
        if (!contentStatusWrap.classList.contains('hidden')) {
          const activeTab = document.querySelector('.tab.active');
          const activeTabText = activeTab ? activeTab.textContent.trim() : '基础连接';
          const contentTestText = document.getElementById('contentTestText');
          const contentActiveMeta = document.getElementById('contentActiveMeta');
          const contentActiveDot = document.getElementById('contentActiveDot');
          const contentActiveText = document.getElementById('contentActiveText');
          contentTestButton.classList.remove('hidden');
          contentSaveButton.classList.remove('hidden');
          contentActiveMeta.classList.add('hidden');
          if (activeTabText === '基础连接') {
            contentTestText.className = 'status-text ' + (statuses.baseReady ? 'success' : 'pending');
            contentTestText.textContent = statuses.baseReady ? '测试成功' : '待测试';
            contentEnableButton.classList.add('hidden');
          }
          if (activeTabText === '用户同步') {
            contentTestText.className = 'status-text ' + (statuses.syncReady ? 'success' : 'pending');
            contentTestText.textContent = statuses.syncReady ? '测试成功' : '待测试';
            contentActiveMeta.classList.remove('hidden');
            contentActiveDot.className = 'status-dot ' + (state.syncActive ? 'success' : '');
            contentActiveText.className = 'status-text ' + (state.syncActive ? 'success' : 'pending');
            contentActiveText.textContent = state.syncActive ? '已启用' : '未启用';
            contentEnableButton.className = (state.syncActive ? 'toggle-btn active' : 'primary-btn') + '';
            contentEnableButton.disabled = !statuses.syncReady;
            contentEnableButton.textContent = state.syncActive ? '取消启用' : '启用能力';
            contentEnableButton.classList.remove('hidden');
          }
          if (activeTabText === '登录认证') {
            contentTestText.className = 'status-text ' + (statuses.authReady ? 'success' : 'pending');
            contentTestText.textContent = statuses.authReady ? '测试成功' : '待测试';
            contentActiveMeta.classList.remove('hidden');
            contentActiveDot.className = 'status-dot ' + (state.authActive ? 'success' : '');
            contentActiveText.className = 'status-text ' + (state.authActive ? 'success' : 'pending');
            contentActiveText.textContent = state.authActive ? '已启用' : '未启用';
            contentEnableButton.className = (state.authActive ? 'toggle-btn active' : 'primary-btn') + '';
            contentEnableButton.disabled = !statuses.authReady;
            contentEnableButton.textContent = state.authActive ? '取消启用' : '启用能力';
            contentEnableButton.classList.remove('hidden');
          }
          if (activeTabText === '通知渠道') {
            contentTestText.className = 'status-text ' + (statuses.notifyReady ? 'success' : 'pending');
            contentTestText.textContent = statuses.notifyReady ? '测试成功' : '待测试';
            contentActiveMeta.classList.remove('hidden');
            contentActiveDot.className = 'status-dot ' + (state.notifyActive ? 'success' : '');
            contentActiveText.className = 'status-text ' + (state.notifyActive ? 'success' : 'pending');
            contentActiveText.textContent = state.notifyActive ? '已启用' : '未启用';
            contentEnableButton.className = (state.notifyActive ? 'toggle-btn active' : 'primary-btn') + '';
            contentEnableButton.disabled = !statuses.notifyReady;
            contentEnableButton.textContent = state.notifyActive ? '取消启用' : '启用能力';
            contentEnableButton.classList.remove('hidden');
          }
        }

      }

      function render() {
        document.getElementById('detailTitle').textContent = state.displayName || state.instanceName || '企业微信';
        document.getElementById('corpId').value = state.corpId || '';
        document.getElementById('agentId').value = state.agentId || '';
        document.getElementById('secret').value = state.secret || '';
        document.getElementById('scope').value = state.scope || '';
        document.getElementById('tokenUrl').value = state.tokenUrl || '';
        document.getElementById('proxyUrl').value = state.proxyUrl || '';
        document.getElementById('syncOrgListUrl').value = state.syncOrgListUrl || '';
        document.getElementById('syncUserInfoUrl').value = state.syncUserInfoUrl || '';
        document.getElementById('authRedirectUrl').value = state.authRedirectUrl || '';
        document.getElementById('authUserInfoUrl').value = state.authUserInfoUrl || '';
        document.getElementById('authUserDetailUrl').value = state.authUserDetailUrl || '';
        document.getElementById('authMobileUrl').value = state.authMobileUrl || '';
        document.getElementById('authPcUrl').value = state.authPcUrl || '';
        document.getElementById('authPcAgent').value = state.authPcAgent || '';
        document.getElementById('authUserMapping').value = state.authUserMapping || '';
        document.getElementById('notifySendUrl').value = state.notifySendUrl || '';
        document.getElementById('notifyTicketUrl').value = state.notifyTicketUrl || '';
        document.getElementById('notifyFieldMapping').value = state.notifyFieldMapping || '';
        renderStatuses();
      }

      bindField('corpId', 'corpId');
      bindField('agentId', 'agentId');
      bindField('secret', 'secret');
      bindField('scope', 'scope');
      bindField('tokenUrl', 'tokenUrl');
      bindField('proxyUrl', 'proxyUrl');
      bindField('syncOrgListUrl', 'syncOrgListUrl');
      bindField('syncUserInfoUrl', 'syncUserInfoUrl');
      bindField('authRedirectUrl', 'authRedirectUrl');
      bindField('authUserInfoUrl', 'authUserInfoUrl');
      bindField('authUserDetailUrl', 'authUserDetailUrl');
      bindField('authMobileUrl', 'authMobileUrl');
      bindField('authPcUrl', 'authPcUrl');
      bindField('authPcAgent', 'authPcAgent');
      bindField('authUserMapping', 'authUserMapping');
