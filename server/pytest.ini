[pytest]
DJANGO_SETTINGS_MODULE = settings

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 默认测试发现路径：不带参数运行 pytest 时扫描全部 app
# 运行单个 app：uv run pytest apps/cmdb/tests
testpaths = apps

# 测试标记（marker）注册，避免 PytestUnknownMarkWarning
markers =
    unit: 纯单元测试，无 DB / 无外部 IO
    integration: 集成测试，涉及 DB 或外部依赖
    bdd: pytest-bdd 行为测试（中文 Gherkin）
    slow: 运行较慢的测试，可在 CI 快速通道中用 "-m 'not slow'" 跳过

addopts =
    -s
    -v
    --color=yes
    --log-cli-level=INFO
    --reuse-db
    --html=report.html
    --self-contained-html
    --cov=apps
    --cov-report=html:coverage_html
    --cov-report=term

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::Warning
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::RuntimeWarning

env_files =
    .env

asyncio_mode=auto
asyncio_default_fixture_loop_scope="function"