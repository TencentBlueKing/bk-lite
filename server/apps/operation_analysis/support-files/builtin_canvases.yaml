  name: 运营健康拓扑_内置
  desc: CMDB / 监控中心 / 告警中心 三中心运营健康总览拓扑
  other: {}
  view_sets:
    nodes:
    - id: ht-hub
      type: text
      name: 平台运营健康总览
      position: {x: 470, y: 20}
      zIndex: 2
      styleConfig: {fontSize: 18, fontWeight: bold, textColor: '#1f1f1f', backgroundColor: '#e6f0ff', borderColor: '#366ce4'}
    - id: ht-cmdb-hdr
      type: text
      name: CMDB 资产
      position: {x: 100, y: 150}
      zIndex: 1
      styleConfig: {fontSize: 15, fontWeight: bold, textColor: '#ffffff', backgroundColor: '#366ce4', borderColor: '#366ce4'}
    - id: ht-mon-hdr
      type: text
      name: 监控中心
      position: {x: 470, y: 150}
      zIndex: 1
      styleConfig: {fontSize: 15, fontWeight: bold, textColor: '#ffffff', backgroundColor: '#67a567', borderColor: '#67a567'}
    - id: ht-alert-hdr
      type: text
      name: 告警中心
      position: {x: 840, y: 150}
      zIndex: 1
      styleConfig: {fontSize: 15, fontWeight: bold, textColor: '#ffffff', backgroundColor: '#fd666d', borderColor: '#fd666d'}
    - id: ht-cmdb-inst
      type: single-value
      name: 实例总数
      position: {x: 30, y: 280}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 模型/实例/分类总数统计::cmdb/get_cmdb_statistics
        selectedFields: [instance_count]
      styleConfig:
        thresholdColors:
        - {color: '#366ce4', value: '0'}
    - id: ht-cmdb-model
      type: single-value
      name: 模型总数
      position: {x: 180, y: 280}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 模型/实例/分类总数统计::cmdb/get_cmdb_statistics
        selectedFields: [model_count]
      styleConfig:
        thresholdColors:
        - {color: '#366ce4', value: '0'}
    - id: ht-cmdb-cov
      type: single-value
      name: 模型覆盖率
      unit: '%'
      position: {x: 105, y: 400}
      zIndex: 1
      valueConfig:
        unit: '%'
        chartType: single
        dataSource: 模型/实例/分类总数统计::cmdb/get_cmdb_statistics
        selectedFields: [model_coverage_rate]
      styleConfig:
        thresholdColors:
        - {color: '#67a567', value: '80'}
        - {color: '#EAB839', value: '50'}
        - {color: '#fd666d', value: '0'}
    - id: ht-mon-inst
      type: single-value
      name: 监控实例
      position: {x: 400, y: 280}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 监控中心总览统计::monitor/get_monitor_statistics
        selectedFields: [monitor_instance_total]
      styleConfig:
        thresholdColors:
        - {color: '#67a567', value: '0'}
    - id: ht-mon-alert
      type: single-value
      name: 当前告警
      position: {x: 550, y: 280}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 监控中心总览统计::monitor/get_monitor_statistics
        selectedFields: [alert_current]
      styleConfig:
        thresholdColors:
        - {color: '#fd666d', value: '1'}
        - {color: '#67a567', value: '0'}
    - id: ht-mon-policy
      type: single-value
      name: 告警策略
      position: {x: 475, y: 400}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 监控中心总览统计::monitor/get_monitor_statistics
        selectedFields: [policy_total]
      styleConfig:
        thresholdColors:
        - {color: '#67a567', value: '0'}
    - id: ht-alert-active
      type: single-value
      name: 活跃告警
      position: {x: 770, y: 280}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 告警统计概览::alert/get_alert_statistics
        selectedFields: [active_count]
      styleConfig:
        thresholdColors:
        - {color: '#fd666d', value: '1'}
        - {color: '#67a567', value: '0'}
    - id: ht-alert-total
      type: single-value
      name: 告警总数
      position: {x: 920, y: 280}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 告警统计概览::alert/get_alert_statistics
        selectedFields: [total_count]
      styleConfig:
        thresholdColors:
        - {color: '#fd9c40', value: '0'}
    - id: ht-alert-event
      type: single-value
      name: 事件总数
      position: {x: 845, y: 400}
      zIndex: 1
      valueConfig:
        chartType: single
        dataSource: 告警统计概览::alert/get_alert_statistics
        selectedFields: [event_count]
      styleConfig:
        thresholdColors:
        - {color: '#9254de', value: '0'}
    edges:
    - {id: ht-e-hub-cmdb, source: ht-hub, target: ht-cmdb-hdr, lineType: common_line, arrowDirection: single}
    - {id: ht-e-hub-mon, source: ht-hub, target: ht-mon-hdr, lineType: common_line, arrowDirection: single}
    - {id: ht-e-hub-alert, source: ht-hub, target: ht-alert-hdr, lineType: common_line, arrowDirection: single}
    - {id: ht-e-cmdb-inst, source: ht-cmdb-hdr, target: ht-cmdb-inst, lineType: common_line, arrowDirection: single}
    - {id: ht-e-cmdb-model, source: ht-cmdb-hdr, target: ht-cmdb-model, lineType: common_line, arrowDirection: single}
    - {id: ht-e-cmdb-cov, source: ht-cmdb-hdr, target: ht-cmdb-cov, lineType: common_line, arrowDirection: single}
    - {id: ht-e-mon-inst, source: ht-mon-hdr, target: ht-mon-inst, lineType: common_line, arrowDirection: single}
    - {id: ht-e-mon-alert, source: ht-mon-hdr, target: ht-mon-alert, lineType: common_line, arrowDirection: single}
    - {id: ht-e-mon-policy, source: ht-mon-hdr, target: ht-mon-policy, lineType: common_line, arrowDirection: single}
    - {id: ht-e-alert-active, source: ht-alert-hdr, target: ht-alert-active, lineType: common_line, arrowDirection: single}
    - {id: ht-e-alert-total, source: ht-alert-hdr, target: ht-alert-total, lineType: common_line, arrowDirection: single}
    - {id: ht-e-alert-event, source: ht-alert-hdr, target: ht-alert-event, lineType: common_line, arrowDirection: single}
    filters: []
    viewport: {}
  refs:
    datasource_keys:
    - 模型/实例/分类总数统计::cmdb/get_cmdb_statistics
    - 监控中心总览统计::monitor/get_monitor_statistics
    - 告警统计概览::alert/get_alert_statistics
    namespace_keys:
    - 默认命名空间
