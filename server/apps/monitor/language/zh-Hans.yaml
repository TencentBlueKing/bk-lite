  Router Cradlepoint SNMP:
    name: Cradlepoint（Telegraf）
    desc: Cradlepoint 蜂窝（4G/5G）路由器专用 SNMP 采集模板（Cradlepoint 私有企业 MIB，企业号 20992）。在标准 IF-MIB 接口指标与 64 位 HC 流量计数之外，额外采集 Cradlepoint 私有标量 OID 的设备健康指标：整机 CPU 使用率、内存使用率（均为直接上报的百分比）与机内温度（℃）。此类紧凑型蜂窝路由器未以无需行级过滤的标量形式暴露风扇/电源传感器，故为 N/A。适用品牌型号——Cradlepoint NetCloud / COR / E 系列及 IBR 系列 4G/5G 企业路由器（企业号 20992）。
  Router Teltonika SNMP:
    name: Teltonika（Telegraf）
    desc: Teltonika 工业蜂窝路由器专用 SNMP 采集模板（RutOS 基于 Linux + net-snmp，HOST-RESOURCES / UCD-SNMP-MIB，企业号 48690）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 RutOS 经标准 net-snmp 暴露的设备健康指标：CPU 使用率（HOST-RESOURCES hrProcessorLoad，每核 0-100%，取整机均值）、物理内存（总量 + 空闲，KB，已用由 总量 − 空闲 推导，用量按 100×（总量−空闲）/总量 推导）。Teltonika RUT 系列蜂窝路由器为无风扇紧凑型工业设计且未以标量形式暴露温度/电源传感器，故温度/风扇/电源为 N/A。适用品牌型号——Teltonika RUT/TRB/RUTX 工业 4G/5G 蜂窝路由器（RutOS，企业号 48690）。
  Router Teldat SNMP:
    name: Teldat（Telegraf）
    desc: Teldat 企业级路由器/SD-WAN CPE 专用 SNMP 采集模板（TELDAT-MIB，企业号 2007）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Teldat 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）与主内存（总量 + 空闲，字节，用量按 (总量-空闲)/总量 推导）。Teldat 紧凑型企业路由器多为无风扇固定配置设计，其私有 MIB 未以无需行级过滤的标量形式暴露独立温度/风扇/电源传感器，故温度、风扇与电源为 N/A。适用品牌型号——Teldat 路由器/SD-WAN CPE（Atlas/Regesta/iMxx 系列，企业号 2007；与 bintec-elmeg 同源 MIB）。
  Router Viprinet SNMP:
    name: Viprinet（Telegraf）
    desc: Viprinet 多 WAN 绑定/SD-WAN 路由器专用 SNMP 采集模板（VIPRINET-MIB，企业号 35424）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Viprinet 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）与主内存（总量 + 空闲，字节，用量按 (总量-空闲)/总量 推导）。Viprinet 紧凑型多 WAN 路由器多为无风扇固定配置设计，其私有 MIB 未以无需行级过滤的标量形式暴露独立温度/风扇/电源传感器，故温度、风扇与电源为 N/A。适用品牌型号——Viprinet 多 WAN 绑定路由器（Multichannel VPN Router 系列，企业号 35424）。
  Router OneAccess SNMP:
    name: OneAccess（Telegraf）
    desc: OneAccess 企业级 CPE/SD-WAN 路由器专用 SNMP 采集模板（ONEACCESS-SYS-MIB，企业号 13191）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 OneAccess 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）与主内存（总量 + 空闲，字节，用量按 (总量-空闲)/总量 推导）。OneAccess 紧凑型企业 CPE 多为无风扇固定配置设计，其私有 MIB 未以无需行级过滤的标量形式暴露独立温度/风扇/电源传感器，故温度、风扇与电源为 N/A。适用品牌型号——OneAccess 企业路由器/SD-WAN CPE（ONE 系列，企业号 13191；现归 Ekinops）。
  Router Harbour SNMP:
    name: 港湾网络（Telegraf）
    desc: 港湾网络（Harbour Networks）路由器专用 SNMP 采集模板（企业号 8212 私有 MIB）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集港湾网络私有 OID 的设备健康指标：CPU 平均使用率（snAgGblCpuUtil1SecAvg，直接 %）与主内存（总内存 + 空闲内存，字节，用量按 (总量-空闲)/总量 推导）。温度/风扇/电源本模板未采集，故为 N/A。适用品牌型号——港湾网络（Harbour Networks）路由器（企业号 8212）。
  Router Bintec SNMP:
    name: Bintec（Telegraf）
    desc: Bintec 中小企业路由器/VPN 网关专用 SNMP 采集模板（BINTEC-MIB，企业号 272）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Bintec 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）与主内存（总量 + 空闲，字节，用量按 (总量-空闲)/总量 推导）。Bintec 紧凑型企业路由器多为无风扇固定配置设计，其私有 MIB 未以无需行级过滤的标量形式暴露独立温度/风扇/电源传感器，故温度、风扇与电源为 N/A。适用品牌型号——Bintec 路由器/VPN 网关（bintec-elmeg RS/RXL/be.IP 系列，企业号 272；与 Teldat 同源 MIB）。
  Router Digi SNMP:
    name: Digi（Telegraf）
    desc: Digi International 工业蜂窝/IoT 路由器专用 SNMP 采集模板（DIGI-MIB，企业号 332）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Digi 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，KB，用量按 已用/（已用+空闲）推导）与机箱温度（℃）。Digi TransPort/IX/Connect 系列为无风扇紧凑型工业设计且未以标量形式暴露电源传感器，故风扇/电源为 N/A。适用品牌型号——Digi International TransPort WR/IX/Connect EZ 工业蜂窝/IoT 路由器（企业号 332）。
  Router LANCOM SNMP:
    name: LANCOM（Telegraf）
    desc: LANCOM LCOS 路由器/VPN 网关专用 SNMP 采集模板（LCOS-MIB，企业号 2356）。除标准 IF-MIB 接口指标外，额外采集 LANCOM 私有硬件温度传感器（lcsStatusHardwareInfoTemperatureDegrees，℃）。LCOS os_discovery 未暴露 CPU/内存利用率或风扇/电源状态 OID，故为 N/A。适用品牌型号——LANCOM LCOS 路由器与 VPN 网关（1xxx / ic- / ISG 系列及其他 LCOS 平台，企业号 2356）。
  Router NetModule SNMP:
    name: NetModule（Telegraf）
    desc: NetModule 工业 4G/5G LTE 路由器专用 SNMP 采集模板（NB-MIB，IANA PEN 31496）。在标准 IF-MIB 接口指标之外，额外采集 NetModule 私有系统温度对象（systemTemperature，原始值带十分之一度显示提示，÷10=摄氏度）。NB-MIB 无 CPU/内存/风扇/电源对象（NB/NG 系列为无风扇工业路由器）；设备虽运行嵌入式 Linux net-snmp，但 HOST-RESOURCES / UCD 的 CPU·内存 OID 是否启用因固件而异、未经核实，故 CPU/内存/风扇/电源不采集（N/A），仅采集系统温度 + 标准 IF-MIB 接口指标。
      适用品牌型号——NetModule NB/NG 系列工业 4G/5G LTE 路由器（IANA PEN 31496）。
  Router NEC SNMP:
    name: NEC（Telegraf）
    desc: NEC UNIVERGE IX 系列路由器专用 SNMP 采集模板（NEC 私有企业 MIB，企业号 119）。除标准 IF-MIB 接口指标外，额外采集 NEC 私有标量 OID 的设备健康指标：1 分钟 CPU 使用率、内存使用率、机箱温度，均直接上报。风扇与电源状态仅以每单元 LLD 状态行（厂商私有状态码）暴露，SNMP 采集端无法规范化，故为 N/A。适用品牌型号——NEC UNIVERGE IX 系列路由器（IX2000/IX3000 及其他 UNIVERGE IX 平台，企业号 119）。
  Router DrayTek SNMP:
    name: DrayTek（Telegraf）
    desc: 居易科技 DrayTek Vigor 路由器/防火墙专用 SNMP 采集模板（DrayTek 私有 MIB，企业号 7367）。除标准 IF-MIB 接口指标外，额外采集设备内存使用率（DrayTek 私有 OID 1.3.6.1.4.1.7367.3.7.0，直接以百分比上报）与 CPU 使用率（HOST-RESOURCES hrProcessorLoad）。Vigor MIB 未暴露温度/风扇/电源，故为 N/A。适用品牌型号——DrayTek Vigor 系列路由器/防火墙（Vigor 2xxx/3xxx，如 Vigor2962/Vigor3900，企业号 7367）；CPU 需固件暴露 HOST-RESOURCES。
  Router Flow NetFlow:
    name: 路由器流量分析（NetFlow）
    desc: 使用 NetFlow 对路由器进行流量分析采集，通过资产映射补充实例信息，按设备上报或兜底采样率归一化，并提供总览、接口、协议、端口、端点和会话维度指标。
  Router Flow sFlow:
    name: 路由器流量分析（sFlow）
    desc: 使用 sFlow 对路由器进行流量分析采集，通过资产映射补充实例信息，直接消费 Telegraf 已估算的 sFlow 值，并提供总览、接口、协议、端口、端点和会话维度指标。
  ActiveMQ-JMX:
    name: ActiveMQ-JMX
    desc: 该 ActiveMQ 插件基于 JMX 采集，可获取消息队列、连接池、消息吞吐量等关键性能指标，实时监控消息处理效率与资源使用情况，助力优化系统性能，保障服务稳定。
  Tomcat:
    name: Tomcat（Telegraf）
    desc: 通过Telegraf采集器定期收集Tomcat的连接器和JVM内存的关键性能指标。
  RabbitMQ:
    name: RabbitMQ（Telegraf）
    desc: 通过Telegraf采集器定期收集RabbitMQ的运行状态、资源使用、消息流量和队列健康状况。
  ClickHouse:
    desc: 采集ClickHouse实例运行时指标，如内存、磁盘、查询事件等，用于性能监控、资源跟踪及故障诊断，保障数据库稳定运行。
    name: ClickHouse
  Apache:
    name: Apache（Telegraf）
    desc: 通过Telegraf采集器定期收集Apache的运行时间、资源使用情况、请求处理效率及带宽数据。
  Haproxy:
    name: Haproxy（Telegraf）
    desc: 基于Telegraf的haproxy采集器，定期采集HAProxy前端、后端及服务器的会话、队列、流量、HTTP响应、错误、服务器健康与延迟等运行数据。
  Hardware Server IPMI:
    name: 硬件服务器IPMI通用（Telegraf）
    desc: 通过Telegraf采集器利用IPMI协议定期收集硬件服务器的电源状态、风扇转速、温度等关键指标。
  Mysql:
    name: Mysql（Telegraf）
    desc: 通过Telegraf采集器定期收集MySQL数据库健康状况及性能等关键指标。
  Minio:
    name: MinIO（Telegraf）
    desc: 通过Telegraf采集器定期调用MinIO指标接口收集包括对象存储系统的运行状态、存储容量、使用情况、复制、节点间通信和S3请求等关键指标。
  Hardware Server SNMP General:
    name: 硬件服务器SNMP通用（Telegraf）
    desc: 通过Telegraf采集器利用SNMP协议定期收集硬件服务器各接口的流量、丢包数、错包数等IF-MIB关键指标。
  Host:
    desc: 通过Telegraf采集器收集和分析主机的性能数据，包括CPU、内存、磁盘和网络使用情况。
    name: 主机（Telegraf）
  Host Remote:
    name: 主机远程采集（Telegraf）
    desc: 通过 Telegraf 结合 Stargazer 的远程能力，以 SSH/WinRM 无 Agent 方式采集主机的 CPU、内存、磁盘和网络指标。
  Ping:
    desc: 通过Telegraf采集器定期发送ICMP回显请求（ECHO_REQUEST）来检查目标主机或网络设备的连通性和响应时间。
    name: Ping（Telegraf）
  MongoDB:
    name: MongoDB（Telegraf）
    desc: 通过Telegraf采集器定期收集MongoDB的基础信息、性能指标、操作统计和资源使用情况，帮助优化性能，保障数据库高效稳定运行。
  JVM:
    name: JVM（JMX）
    desc: 通过JVM JMX采集器定期收集JVM（Java 虚拟机）的运行状态、内存使用、线程活动、垃圾回收情况及系统资源等性能指标。
  Storage SNMP General:
    desc: 通过Telegraf采集器利用SNMP协议定期收集存储设备各接口的流量、丢包数、错包数等IF-MIB关键指标。
    name: 存储设备SNMP通用（Telegraf）
  Oracle:
    desc: 通过Oracle Exporter采集器定期采集Oracle运行时长、操作次数、事务提交回滚及各类等待时间等指标。
    name: Oracle（Exporter）
  Scanning Device SNMP General:
    name: 扫描设备通用（SNMP）
    desc: SNMP 通用插件用于通过 SNMP 监控和管理扫描设备的监控情况。管理员可以获取有关设备的关键信息，例如 接口流量、错误统计和状态信息等，从而优化网络性能和提高管理效率。
  Docker:
    name: Docker（Telegraf）
    desc: 通过Telegraf采集器定期收集Docker容器的状态、资源使用情况（CPU、内存、网络、IO）和性能指标。
  VMWare:
    desc: 通过Telegraf采集器利用Stargazer能力定期收集VMware中vCenter、ESXi、虚拟机、数据存储的关键指标。
    name: VMWare
  MSSQL:
    desc: 通过Telegraf采集器定期收集MSSQL关键指标，包括基础信息、性能指标、存储状态等。
    name: MSSQL（Telegraf）
  Kafka:
    name: Kafka（Exporter）
    desc: 通过Kafka Exporter采集器定期收集Kafka集群的主题统计、分区数量、消费者组状态等指标，帮助监控Kafka集群的健康和性能。
