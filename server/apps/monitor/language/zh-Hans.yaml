    ipmi_chassis_power_state:
      name: 电源状态
      desc: 电源状态指标，用于监测设备是否处于开机状态。其值可以表示电源开启或关闭状态。主要用于远程管理和监控设备的电源情况。
    ipmi_fan_speed_rpm:
      desc: 风扇转速指标以每分钟转数 (rpm) 表示，监测设备内风扇的工作状态。高效的风扇运作是维护设备温度的关键。有助于防止过热，确保设备长时间稳定运行。
      name: 风扇转速
    ipmi_temperature_celsius:
      desc: 温度指标以摄氏度 (Celsius) 为单位，监控设备内部温度。通过监测温度可以预防热量累积，防止设备过热。对于维持系统的稳定性和寿命非常关键。
      name: 温度
    interface_ifOperStatus:
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
      name: 接口操作状态
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
    interface_ifOutErrors:
      name: 发送错误数据包速率
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    snmp_uptime:
      desc: 该指标表示设备自上次启动以来的运行时间。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
      name: 系统运行时间
    ipmi_voltage_volts:
      name: 电压
      desc: 电压指标以伏特 (volts) 为单位，监测设备内部不同电源轨的电压情况。稳定的电压供应对于设备的可靠性至关重要。通过该指标可以快速识别电气问题，保障正常运行。
    ipmi_power_watts:
      desc: 功率指标以瓦特 (watts) 为单位，反映设备当前功耗。通过此指标可以评估设备能效和功耗趋势。便于设置节能政策和资源优化。
      name: 功率
    interface_ifSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位通常为MB每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    interface_ifOutDiscards:
      name: 发送丢包速率
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
  Loadbalance:
    device_temperature_celsius:
      name: 设备温度
      desc: 该指标报告设备硬件温度传感器读数，单位摄氏度。温度异常升高可能由风扇故障、散热不良或环境温度过高导致，严重时触发热保护或损坏硬件。
    device_fan_state:
      name: 风扇状态
      desc: 该指标报告设备散热风扇的运行状态（枚举）。非正常状态表示散热故障，可能迅速导致过热，应立即排查。
    device_psu_state:
      name: 电源状态
      desc: 该指标报告设备电源模块的运行状态（枚举）。非正常状态表示电源冗余或硬件故障；在冗余电源设备上单个故障会移除冗余，需尽快处理。
    device_memory_free:
      name: 空闲内存
      desc: 该指标报告设备当前空闲的物理内存字节数。空闲内存持续偏低可能意味着内存压力上升。
    device_cpu_usage:
      name: CPU 使用率
      desc: 该指标报告 F5 BIG-IP 负载均衡器的整体 CPU 使用率（F5-BIGIP-SYSTEM-MIB sysGlobalHostCpuUsageRatio5s，5 秒采样）。持续偏高说明流量处理或 SSL 卸载负载吃紧。
    device_memory_total:
      name: 内存总量
      desc: 该指标报告 F5 BIG-IP 的物理内存总容量（F5-BIGIP-SYSTEM-MIB sysStatMemoryTotal），单位为字节。
    device_memory_used:
      name: 已用内存
      desc: 该指标报告 F5 BIG-IP 当前已使用的内存字节数（F5-BIGIP-SYSTEM-MIB sysStatMemoryUsed）。
    device_memory_usage:
      name: 内存使用率
      desc: 该指标报告 F5 BIG-IP 整体内存使用率，按 已用/总量 计算（100*used/total）。持续偏高可能由连接表过大或内存泄漏导致。
    lb_current_connections:
      name: 当前连接数
      desc: 该指标报告 F5 BIG-IP 当前的客户端活动连接数（F5-BIGIP-SYSTEM-MIB sysStatClientCurConns）。连接数快速攀升可能意味着流量洪泛或连接表压力。
    interface_ifHCInOctets:
      name: 接口接收流量速率(HC)
      desc: 该指标表示过去 5 分钟内接收字节数的平均速率，单位为字节每秒，基于 64 位 ifHCInOctets 计数器，在高速接口上不会回绕。
    interface_ifHCOutOctets:
      name: 接口发送流量速率(HC)
      desc: 该指标表示过去 5 分钟内发送字节数的平均速率，单位为字节每秒，基于 64 位 ifHCOutOctets 计数器，在高速接口上不会回绕。
    interface_ifOutErrors:
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
      name: 发送错误数据包速率
    interface_ifOperStatus:
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
      name: 接口操作状态
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
    interface_ifAdminStatus:
      name: 接口管理状态
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
    interface_ifInDiscards:
      name: 接收丢包速率
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    interface_ifInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，转换为兆字节（MB）单位。监测字节流量有助于评估接口的负载及带宽使用情况。
    interface_ifSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位通常为KB每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    interface_ifOutUcastPkts:
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
      name: 发送单播数据包速率
    interface_ifInErrors:
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
      name: 接收错误数据包速率
    device_total_incoming_traffic:
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
      name: 设备接收总流量速率
    interface_ifOutOctets:
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为兆字节（MB）。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
      name: 接口发送流量速率
    interface_ifOutDiscards:
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
      name: 发送丢包速率
    interface_ifInUcastPkts:
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
      name: 接收单播数据包速率
    snmp_uptime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
    device_flow_bytes_rate:
      name: 设备 Flow 总流量速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总流量速率，用于观察整体带宽压力和容量趋势。
    device_flow_packets_rate:
      name: 设备 Flow 总包速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总包速率，用于观察包级负载和突增流量。
    device_flow_in_bytes_rate:
      name: 设备 Flow 入方向流量速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_bytes_rate:
      name: 设备 Flow 出方向流量速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_in_packets_rate:
      name: 设备 Flow 入方向包速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_packets_rate:
      name: 设备 Flow 出方向包速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_avg_packet_size:
      name: 设备 Flow 平均包大小
      desc: 基于 Flow 记录计算出的平均包大小或采样帧长，可辅助识别小包风暴或大包传输特征。
    device_flow_effective_sampling_rate:
      name: 设备 Flow 生效采样率
      desc: 当前 Flow 数据计算使用的生效采样率，优先取设备上报字段，缺失时使用资产兜底采样率。
    device_flow_interface_bytes_rate:
      name: 接口 Flow 流量速率
      desc: 按接口和方向聚合的 Flow 流量速率，用于定位接口维度的流量热点。
    device_flow_interface_packets_rate:
      name: 接口 Flow 包速率
      desc: 按接口和方向聚合的 Flow 包速率，用于定位接口维度的包量热点。
    device_flow_top_interfaces_by_bytes:
      name: Top 接口 Flow 流量速率
      desc: 按流量速率排序的接口 Flow 排行，用于快速发现高流量接口。
    device_flow_protocol_bytes_rate:
      name: 协议 Flow 流量速率
      desc: 按协议聚合的 Flow 流量速率，用于识别 TCP、UDP、ICMP 等协议流量占比。
    device_flow_protocol_packets_rate:
      name: 协议 Flow 包速率
      desc: 按协议聚合的 Flow 包速率，用于识别协议层面的包量异常。
    device_flow_dst_port_bytes_rate:
      name: 目的端口 Flow 流量速率
      desc: 按目的端口聚合的 Flow 流量速率，用于分析应用或服务端口流量热点。
    device_flow_dst_port_packets_rate:
      name: 目的端口 Flow 包速率
      desc: 按目的端口聚合的 Flow 包速率，用于分析应用或服务端口包量热点。
    device_flow_src_port_bytes_rate:
      name: 源端口 Flow 流量速率
      desc: 按源端口聚合的 Flow 流量速率，用于辅助分析客户端侧端口流量分布。
    device_flow_top_src_bytes_rate:
      name: Top 源地址 Flow 流量速率
      desc: 按源地址聚合并排序的 Flow 流量速率，用于发现主要流量来源。
    device_flow_top_dst_bytes_rate:
      name: Top 目的地址 Flow 流量速率
      desc: 按目的地址聚合并排序的 Flow 流量速率，用于发现主要流量去向。
    device_flow_top_src_packets_rate:
      name: Top 源地址 Flow 包速率
      desc: 按源地址聚合并排序的 Flow 包速率，用于发现包量异常来源。
    device_flow_top_dst_packets_rate:
      name: Top 目的地址 Flow 包速率
      desc: 按目的地址聚合并排序的 Flow 包速率，用于发现包量异常目标。
    device_flow_top_conversation_bytes_rate:
      name: Top 会话 Flow 流量速率
      desc: 按源地址、目的地址、协议和目的端口聚合的会话流量排行，用于定位主要通信关系。
  Jetty-JMX:
    jetty_queuedthreadpool_threads_value:
      name: 线程池中的线程数
      desc: 线程池当前管理的线程总数，包括活跃和空闲线程。
    jetty_arraybufferpool_directmemory_value:
      desc: 表示 Jetty 直接缓冲区占用的直接内存大小（MB），用于监控高性能 I/O 操作的非堆内存使用，避免内存溢出。
      name: 直接内存占用
    jetty_queuedthreadpool_utilizationrate_value:
      name: 线程池利用率
      desc: 当前线程池执行临时作业的线程利用率(线程池当前活跃线程数与最大线程数的比值),反映线程池资源使用压力。
    jvm_memory_heap_usage_max_value:
      name: 堆内存最大值
      desc: JVM 堆内存的最大值，用于评估堆内存的上限，防止内存溢出。
    jvm_memory_nonheap_usage_used_rate:
      name: 非堆内存使用量的平均变化率
      desc: 5分钟内，JVM 非堆内存使用量的平均变化率（每分钟兆字节），用于监控非堆内存的使用变化趋势。
    jetty_queuedthreadpool_maxthreads_value:
      name: 最大线程数
      desc: Jetty线程池中允许的最大线程数,即线程空闲多久后会被回收的时间阈值。
    jetty_serverconnector_idletimeout_value:
      desc: 表示 Jetty 网络连接器的连接空闲超时时间（秒），用于控制底层 TCP 连接存活周期，优化长连接资源回收。
      name: 空闲超时时间
    jetty_queuedthreadpool_idletimeout_value:
      desc: Jetty线程空闲的最大允许时间
      name: 线程空闲超时时间
    jmx_scrape_error_gauge:
      name: JMX抓取失败的监控指标
      desc: 值为0时表示监控指标抓取成功，值为1时表示抓取失败。
    jetty_bufferpool_heapmemory_value:
      name: 块缓冲堆内存占用
      desc: 表示 Jetty 缓冲区池占用的堆内存大小（MB），用于监控数据块缓存的内存使用情况，排查内存泄漏。
    jetty_httpconfiguration_maxerrordispatches_value:
      name: 最大错误处理调度次数
      desc: 表示 Jetty 处理错误时允许的最大重定向次数，用于防止错误处理循环，避免服务器资源耗尽。
    jetty_httpconfiguration_headercachesize_value:
      name: HTTP头字段缓存的最大大小
      desc: 表示 Jetty 缓存 HTTP 请求 / 响应头的最大条目数，用于减少重复解析开销，提升请求处理速度。
    jetty_arraybufferpool_directmemory_rate:
      desc: 表示过去 5 分钟直接内存的平均每秒变化速率（MB / 秒），用于分析直接内存分配 / 释放模式，排查泄漏风险。
      name: 直接内存占用变化率
    jetty_reservedthreadexecutor_available_value:
      desc: 表示 Jetty 预留线程执行器中的可用线程数，用于监控高优先级任务线程池的负载情况，避免请求处理延迟。
      name: 可用预留线程数
    jetty_queuedthreadpool_readythreads_value:
      desc: Jetty 服务器中处于就绪状态的线程数量，用于评估线程池的空闲资源。
      name: Jetty 就绪线程数
    jetty_managedselector_selectcount_value:
      name: 选择器Loop调用次数
      desc: 表示 Jetty 选择器的 select () 方法累计调用次数，用于反映 I/O 事件处理频率，评估网络流量或线程负载。
    jvm_memory_heap_usage_committed_value:
      name: 堆内存提交量
      desc: JVM 堆内存中已提交的部分，用于评估实际分配给 JVM 的堆内存大小。
    jvm_memory_nonheap_usage_max_value:
      name: 非堆内存最大值
      desc: JVM 非堆内存的最大值，用于评估非堆内存的上限。
    jetty_managedselector_selectcount_increase:
      name: 选择器 Loop 调用次数增加量
      desc: 表示过去 5 分钟选择器 select () 调用次数增量，用于消除计数器重置影响，准确衡量 I/O 操作量变化趋势。
    jvm_memory_heap_usage_used_rate:
      name: 堆内存使用量的平均变化率
      desc: 5分钟内JVM 堆内存使用量的平均变化率（每分钟兆字节），用于实时监控堆内存使用的变化趋势，及时发现内存泄漏或内存压力问题。
    jvm_memory_heap_usage_used_value:
      name: 堆内存使用量
      desc: JVM 堆内存中已使用的部分，用于评估当前堆内存的使用情况。
    jetty_bufferpool_heapmemory_rate:
      desc: 表示过去 5 分钟块缓冲堆内存的平均每秒变化速率（MB / 秒），用于识别内存占用趋势，定位异常波动。
      name: 块缓冲堆内存占用变化率
    jetty_httpconfiguration_outputbuffersize_value:
      desc: 表示 Jetty 处理 HTTP 响应时的输出缓冲区大小（KB），用于控制单次响应数据的缓冲能力，平衡性能与内存占用。
      name: HTTP输出缓冲区大小
    jetty_httpconfiguration_idletimeout_value:
      name: HTTP空闲超时时间
      desc: 表示 HTTP 连接无数据传输时的最长保持时间（秒），用于释放空闲连接资源，避免资源浪费和恶意连接占用。
  Firewall:
    device_temperature_celsius:
      name: 设备温度
      desc: 该指标报告设备硬件温度传感器读数，单位摄氏度。温度异常升高可能由风扇故障、散热不良或环境温度过高导致，严重时触发热保护或损坏硬件。
    device_psu_state:
      name: 电源状态
      desc: 该指标报告设备电源模块的运行状态（枚举）。非正常状态表示电源冗余或硬件故障；在冗余电源设备上单个故障会移除冗余，需尽快处理。
    firewall_pf_states:
      name: pf 状态表条目数
      desc: 该指标报告 pfSense 防火墙 pf 状态表中的当前条目数（BEGEMOT-PF-MIB pfStateTableCount），约等于活动连接数。条目数快速攀升可能意味着连接洪泛或状态表逼近上限。
    firewall_active_connections:
      name: 活动连接数
      desc: 该指标报告 WatchGuard 防火墙当前活动的连接数（WATCHGUARD-SYSTEM-STATISTICS-MIB wgSystemCurrActiveConns）。连接数快速上升可能意味着连接洪泛或连接表压力。
    firewall_current_connections:
      name: 当前连接数
      desc: 该指标报告 SonicWall 防火墙当前连接缓存中的连接数（SONICWALL-FIREWALL-IP-STATISTICS-MIB sonicCurrentConnCacheEntries）。连接数快速上升可能意味着连接洪泛或连接表压力。
    firewall_max_connections:
      name: 最大连接数
      desc: 该指标报告 SonicWall 防火墙连接缓存支持的最大连接数（SONICWALL-FIREWALL-IP-STATISTICS-MIB sonicMaxConnCacheEntries）。结合当前连接数可评估连接表余量。
    firewall_nat_translations:
      name: NAT 转换数
      desc: 该指标报告 SonicWall 防火墙当前活动的 NAT 转换条目数（SONICWALL-FIREWALL-IP-STATISTICS-MIB sonicNatTranslationCount）。转换数异常增长可能意味着 NAT 资源压力或异常流量。
    firewall_session_utilization:
      name: 会话利用率
      desc: 该指标报告 Palo Alto 防火墙会话表的使用率（PAN-COMMON-MIB panSessionUtilization），即当前活动会话数占最大会话容量的百分比。接近 100% 意味着会话表即将耗尽，可能丢弃新连接。
    firewall_max_sessions:
      name: 最大会话数
      desc: 该指标报告 Palo Alto 防火墙支持的最大并发会话容量（PAN-COMMON-MIB panSessionMax）。结合活动会话数可评估会话表余量。
    firewall_active_sessions_tcp:
      name: TCP 活动会话数
      desc: 该指标报告 Palo Alto 防火墙当前活动的 TCP 会话数（PAN-COMMON-MIB panSessionActiveTcp）。可用于分析会话构成与 TCP 负载。
    firewall_active_sessions_udp:
      name: UDP 活动会话数
      desc: 该指标报告 Palo Alto 防火墙当前活动的 UDP 会话数（PAN-COMMON-MIB panSessionActiveUdp）。可用于分析会话构成与 UDP 负载。
    firewall_active_sessions_icmp:
      name: ICMP 活动会话数
      desc: 该指标报告 Palo Alto 防火墙当前活动的 ICMP 会话数（PAN-COMMON-MIB panSessionActiveICMP）。ICMP 会话异常升高可能意味着扫描或攻击活动。
    firewall_tcp_connections:
      name: ASQ TCP 连接数
      desc: 该指标报告 Stormshield 防火墙 ASQ 引擎当前的 TCP 连接数（STORMSHIELD-SNS-MIB）。连接数快速上升可能意味着连接洪泛或会话表压力。
    firewall_udp_connections:
      name: ASQ UDP 连接数
      desc: 该指标报告 Stormshield 防火墙 ASQ 引擎当前的 UDP 连接数（STORMSHIELD-SNS-MIB）。可结合 TCP 连接数评估整体会话负载与异常。
    device_memory_free:
      name: 空闲内存
      desc: 该指标报告防火墙当前空闲的物理内存字节数（Check Point CHECKPOINT-MIB memTotalReal64 减去 memActiveReal64）。空闲内存持续偏低可能意味着内存压力上升。
    device_memory_used:
      name: 已用内存
      desc: 该指标报告防火墙当前已使用的物理内存字节数（由内存总量减去空闲内存计算得到）。用于评估绝对内存消耗与压力。
    firewall_vpn_encrypted_pps:
      name: VPN 加密包速率
      desc: 该指标报告防火墙 VPN 加密数据包的速率，单位为包每秒（Check Point CHECKPOINT-MIB encpktsPersec）。可用于观察 VPN 加密流量负载与异常波动。
    firewall_vpn_decrypted_pps:
      name: VPN 解密包速率
      desc: 该指标报告防火墙 VPN 解密数据包的速率，单位为包每秒（Check Point CHECKPOINT-MIB decpktsPersec）。可用于观察 VPN 解密流量负载与异常波动。
    device_cpu_usage:
      name: CPU 使用率
      desc: 该指标报告 FortiGate 防火墙整体 CPU 使用率（FORTINET-FORTIGATE-MIB fgSysCpuUsage）。持续高 CPU 可能意味着流量检测负载过重、攻击活动或控制平面瓶颈。
    device_memory_usage:
      name: 内存使用率
      desc: 该指标报告 FortiGate 防火墙整体内存使用率（FORTINET-FORTIGATE-MIB fgSysMemUsage，直接以百分比上报）。内存压力过高时设备可能进入保护模式并丢弃新会话。
    device_memory_total:
      name: 内存总容量
      desc: 该指标报告 FortiGate 防火墙的物理内存总容量（FORTINET-FORTIGATE-MIB fgSysMemCapacity，原始单位 KB，已换算为字节）。
    firewall_active_sessions:
      name: IPv4 活动会话数
      desc: 该指标报告 FortiGate 防火墙当前跟踪的 IPv4 活动会话数（FORTINET-FORTIGATE-MIB fgSysSesCount）。会话数快速上升可能意味着连接洪泛或会话表耗尽风险。
    firewall_vpn_tunnels:
      name: 活动 IPsec VPN 隧道数
      desc: 该指标报告 FortiGate 防火墙当前活动的 IPsec VPN 隧道数量（FORTINET-FORTIGATE-MIB fgVpnTunnelUpCount）。数量骤降可能意味着 VPN 中断，影响站点间互联。
    firewall_ha_mode:
      name: 高可用模式
      desc: 该指标报告 FortiGate 防火墙的高可用模式（FORTINET-FORTIGATE-MIB fgHaSystemMode）：独立、双活或主备。可用于确认设备是否处于预期的 HA 拓扑。
    interface_ifHCInOctets:
      name: 接口接收流量速率(HC)
      desc: 该指标表示过去 5 分钟内接收字节数的平均速率，单位为字节每秒，基于 64 位 ifHCInOctets 计数器，在高速接口上不会回绕。
    interface_ifHCOutOctets:
      name: 接口发送流量速率(HC)
      desc: 该指标表示过去 5 分钟内发送字节数的平均速率，单位为字节每秒，基于 64 位 ifHCOutOctets 计数器，在高速接口上不会回绕。
    snmp_uptime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
    interface_ifAdminStatus:
      name: 接口管理状态
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
    interface_ifOperStatus:
      name: 接口操作状态
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
    interface_ifSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位为比特每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    interface_ifInErrors:
      name: 接收错误数据包速率
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为包每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
    interface_ifOutErrors:
      name: 发送错误数据包速率
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为包每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    interface_ifInDiscards:
      name: 接收丢包速率
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为包每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    interface_ifOutDiscards:
      name: 发送丢包速率
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为包每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    interface_ifInUcastPkts:
      name: 接收单播数据包速率
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为包每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
    interface_ifOutUcastPkts:
      name: 发送单播数据包速率
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为包每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
    interface_ifInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，单位为字节每秒。监测字节流量有助于评估接口的负载及带宽使用情况。
    interface_ifOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为字节每秒。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
    device_total_incoming_traffic:
      name: 设备接收总流量速率
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为字节每秒。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为字节每秒。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
    device_flow_bytes_rate:
      name: 设备 Flow 总流量速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总流量速率，用于观察整体带宽压力和容量趋势。
    device_flow_packets_rate:
      name: 设备 Flow 总包速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总包速率，用于观察包级负载和突增流量。
    device_flow_in_bytes_rate:
      name: 设备 Flow 入方向流量速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_bytes_rate:
      name: 设备 Flow 出方向流量速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_in_packets_rate:
      name: 设备 Flow 入方向包速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_packets_rate:
      name: 设备 Flow 出方向包速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_avg_packet_size:
      name: 设备 Flow 平均包大小
      desc: 基于 Flow 记录计算出的平均包大小或采样帧长，可辅助识别小包风暴或大包传输特征。
    device_flow_effective_sampling_rate:
      name: 设备 Flow 生效采样率
      desc: 当前 Flow 数据计算使用的生效采样率，优先取设备上报字段，缺失时使用资产兜底采样率。
    device_flow_interface_bytes_rate:
      name: 接口 Flow 流量速率
      desc: 按接口和方向聚合的 Flow 流量速率，用于定位接口维度的流量热点。
    device_flow_interface_packets_rate:
      name: 接口 Flow 包速率
      desc: 按接口和方向聚合的 Flow 包速率，用于定位接口维度的包量热点。
    device_flow_top_interfaces_by_bytes:
      name: Top 接口 Flow 流量速率
      desc: 按流量速率排序的接口 Flow 排行，用于快速发现高流量接口。
    device_flow_protocol_bytes_rate:
      name: 协议 Flow 流量速率
      desc: 按协议聚合的 Flow 流量速率，用于识别 TCP、UDP、ICMP 等协议流量占比。
    device_flow_protocol_packets_rate:
      name: 协议 Flow 包速率
      desc: 按协议聚合的 Flow 包速率，用于识别协议层面的包量异常。
    device_flow_dst_port_bytes_rate:
      name: 目的端口 Flow 流量速率
      desc: 按目的端口聚合的 Flow 流量速率，用于分析应用或服务端口流量热点。
    device_flow_dst_port_packets_rate:
      name: 目的端口 Flow 包速率
      desc: 按目的端口聚合的 Flow 包速率，用于分析应用或服务端口包量热点。
    device_flow_src_port_bytes_rate:
      name: 源端口 Flow 流量速率
      desc: 按源端口聚合的 Flow 流量速率，用于辅助分析客户端侧端口流量分布。
    device_flow_top_src_bytes_rate:
      name: Top 源地址 Flow 流量速率
      desc: 按源地址聚合并排序的 Flow 流量速率，用于发现主要流量来源。
    device_flow_top_dst_bytes_rate:
      name: Top 目的地址 Flow 流量速率
      desc: 按目的地址聚合并排序的 Flow 流量速率，用于发现主要流量去向。
    device_flow_top_src_packets_rate:
      name: Top 源地址 Flow 包速率
      desc: 按源地址聚合并排序的 Flow 包速率，用于发现包量异常来源。
    device_flow_top_dst_packets_rate:
      name: Top 目的地址 Flow 包速率
      desc: 按目的地址聚合并排序的 Flow 包速率，用于发现包量异常目标。
    device_flow_top_conversation_bytes_rate:
      name: Top 会话 Flow 流量速率
      desc: 按源地址、目的地址、协议和目的端口聚合的会话流量排行，用于定位主要通信关系。
  ActiveMQ:
    activemq_topics_consumer_count:
      name: 主题消费者数量
      desc: 指定主题的当前消费者连接数量，反映主题的消息消费能力
    activemq_topics_dequeue_count:
      name: 主题出队消息数
      desc: 从指定主题出队的消息总数，反映主题已处理的消息量
    activemq_topics_enqueue_count:
      name: 主题入队消息数
      desc: 进入指定主题的消息总数，反映主题接收的消息量
    activemq_topics_size:
      name: 主题当前消息数
      desc: 指定主题当前存储的消息数量，反映主题积压情况
  Postgres:
    postgresql_numbackends:
      name: 当前活跃数据库连接数
      desc: 监控数据库活跃会话数量，用于评估并发负载和连接池使用情况
    postgresql_xact_commit_rate:
      name: 事务提交速率
      desc: 反映数据库写入操作频率，用于衡量业务活动水平
    postgresql_xact_rollback_rate:
      name: 事务回滚速率
      desc: 跟踪事务失败或冲突导致的回滚情况
    postgresql_tup_returned_rate:
      name: 查询返回行速率
      desc: 统计查询结果集中返回的数据行数量
    postgresql_tup_fetched_rate:
      name: 查询读取行速率
      desc: 监控查询从存储层读取的数据行数量
    postgresql_tup_inserted_rate:
      name: 数据插入行速率
      desc: 跟踪插入操作频率，评估数据增长和写入负载
    postgresql_tup_updated_rate:
      name: 数据更新行速率
      desc: 反映数据修改活动和并发更新压力
    postgresql_tup_deleted_rate:
      name: 数据删除行速率
      desc: 监控数据清理活动和空间回收情况
    postgresql_blks_hit_rate:
      name: 缓冲区缓存命中速率
      desc: 反映共享缓冲区缓存的命中效率
    postgresql_blks_read_rate:
      name: 磁盘数据块读取速率
      desc: 评估磁盘 I/O 负载及缓存不足情况
    postgresql_deadlocks_rate:
      name: 死锁发生速率
      desc: 检测事务间死锁发生频率
    postgresql_conflicts_rate:
      name: 并发冲突速率
      desc: 跟踪并发操作引发的冲突情况
    postgresql_temp_files_rate:
      name: 临时文件创建速率
      desc: 反映复杂查询对临时文件的依赖程度
    postgresql_temp_bytes_rate:
      name: 临时文件写入速率
      desc: 评估排序、哈希等操作的磁盘资源消耗
    postgresql_checkpoints_timed_rate:
      name: 定时检查点速率
      desc: 监控系统周期性检查点执行情况
    postgresql_checkpoints_req_rate:
      name: 请求检查点速率
      desc: 反映 WAL 写入压力和配置合理性
    postgresql_buffers_alloc_rate:
      name: 缓冲区分配速率
      desc: 反映共享缓冲区内存使用趋势
    postgresql_buffers_backend_rate:
      name: 后端缓冲区写入速率
      desc: 表示客户端驱动的直接写入活动
    postgresql_buffers_checkpoint_rate:
      name: 检查点缓冲区写入速率
      desc: 反映检查点对磁盘 I/O 的影响
    postgresql_maxwritten_clean_rate:
      name: 后台干净页写入速率
      desc: 表示写入压力过高导致的提前清理
    postgresql_blk_write_time:
      name: 磁盘块写入耗时速率
      desc: 累计数据块写入耗时（pg_stat_database.blk_write_time）的速率，表示每秒累积的写入耗时（毫秒/秒）。数值偏高表明磁盘 I/O 写入压力大或存储存在瓶颈
    postgresql_active_time:
      name: SQL 活跃执行耗时速率
      desc: 累计 SQL 语句执行耗时（pg_stat_database.active_time）的速率，表示每秒累积的活跃执行耗时（毫秒/秒）。持续偏高表明存在异常长事务或高并发语句执行
    postgresql_sessions_killed:
      name: 会话异常终止速率
      desc: 因管理员命令、空闲会话超时、死锁处理等致命错误被终止的会话速率（pg_stat_database.sessions_killed，个/秒）。速率上升表明连接不稳定
  RabbitMQ:
    rabbitmq_node_uptime:
      name: 节点运行时间
      desc: RabbitMQ 节点自启动以来的运行时间，反映节点稳定性
    rabbitmq_node_running:
      name: 节点运行状态
      desc: RabbitMQ 节点是否处于运行状态，1 表示运行中，0 表示已停止
    rabbitmq_overview_connections:
      name: 连接数
      desc: 活动的客户端连接数量，反映系统负载
    rabbitmq_overview_channels:
      name: 通道数
      desc: 打开的通道数量，反映消息流控制能力
    rabbitmq_overview_consumers:
      name: 消费者数量
      desc: 活动的消费者数量，反映消息消费能力
    rabbitmq_overview_queues:
      name: 队列数量
      desc: 已定义的队列数量，反映消息存储结构
    rabbitmq_overview_messages:
      name: 总消息数
      desc: 所有队列中的总消息数，反映消息积压情况
    rabbitmq_overview_messages_ready:
      name: 就绪消息数
      desc: 队列中待投递的就绪消息数量，反映待处理消息
    rabbitmq_overview_messages_unacked:
      name: 未确认消息数
      desc: 已投递但未确认的消息数量，反映消息处理延迟
    rabbitmq_overview_messages_published_rate:
      name: 消息发布速率
      desc: 向 RabbitMQ 发布消息的速率，反映消息生产量
    rabbitmq_node_run_queue:
      name: 运行队列长度
      desc: Erlang 运行队列长度，反映系统 CPU 负载和调度延迟
    rabbitmq_node_mnesia_disk_tx_count_rate:
      name: Mnesia 磁盘事务速率
      desc: Mnesia 数据库磁盘事务速率，反映数据持久化活动强度
    rabbitmq_node_mem_used:
      name: 已用内存
      desc: RabbitMQ 节点当前使用的内存，反映内存资源消耗
    rabbitmq_node_mem_limit:
      name: 内存限制
      desc: RabbitMQ 节点的内存限制，用于计算内存使用率
    rabbitmq_node_mem_alarm:
      name: 内存告警
      desc: 内存使用是否触发告警，1 表示告警，0 表示正常
    rabbitmq_node_disk_free:
      name: 可用磁盘空间
      desc: RabbitMQ 节点的可用磁盘剩余空间，反映存储容量
    rabbitmq_node_disk_free_alarm:
      name: 磁盘空间告警
      desc: 磁盘空间使用是否触发告警，1 表示告警，0 表示正常
    rabbitmq_node_fd_used:
      name: 已用文件描述符
      desc: RabbitMQ 节点当前使用的文件描述符数量，反映系统资源使用
    rabbitmq_node_sockets_used:
      name: 已用套接字数
      desc: RabbitMQ 节点当前使用的套接字数量，反映网络连接状况
    rabbitmq_node_proc_used:
      name: 已用进程数
      desc: RabbitMQ 节点当前使用的 Erlang 进程数量，反映系统进程负载
  MongoDB:
    mongodb_uptime_ns:
      name: 运行时长
      desc: MongoDB实例已连续运行的时间长度，反映服务稳定性
    mongodb_connections_current:
      name: 当前连接数
      desc: 当前活动的客户端连接数量，反映数据库并发访问负载
    mongodb_connections_available:
      name: 可用连接数
      desc: 可用的连接槽位数量，反映连接池资源余量
    mongodb_open_connections:
      name: 打开连接数
      desc: 当前打开的连接总数，包括活动和空闲连接
    mongodb_active_reads:
      name: 活跃读操作数
      desc: 当前正在执行的读取操作数量，反映实时读取负载
    mongodb_active_writes:
      name: 活跃写操作数
      desc: 当前正在执行的写入操作数量，反映实时写入负载
    mongodb_queued_reads:
      name: 排队读操作数
      desc: 等待执行的读取操作数量，反映读取队列积压情况
    mongodb_queued_writes:
      name: 排队写操作数
      desc: 等待执行的写入操作数量，反映写入队列积压情况
    mongodb_page_faults_rate:
      name: 缺页中断频率
      desc: 缺页中断发生的频率，反映内存压力和工作集大小是否合适
    mongodb_latency_commands_avg:
      name: 平均命令延迟
      desc: 命令操作的平均延迟时间，反映数据库响应性能
    mongodb_latency_reads_avg:
      name: 平均读取延迟
      desc: 读取操作的平均延迟时间，反映数据库读取性能
    mongodb_commands_rate:
      name: 命令操作频率
      desc: 命令类型操作执行的频率，反映数据库整体处理负载
    mongodb_queries_rate:
      name: 查询操作频率
      desc: 查询类型操作执行的频率，反映数据库查询处理负载
    mongodb_inserts_rate:
      name: 插入操作频率
      desc: 插入类型操作执行的频率，反映数据写入负载
    mongodb_updates_rate:
      name: 更新操作频率
      desc: 更新类型操作执行的频率，反映数据更新负载
    mongodb_deletes_rate:
      name: 删除操作频率
      desc: 删除类型操作执行的频率，反映数据删除负载
    mongodb_document_inserted_rate:
      name: 文档插入频率
      desc: 文档插入操作的频率，反映数据增长速率
    mongodb_document_updated_rate:
      name: 文档更新频率
      desc: 文档更新操作的频率，反映数据变更活跃度
    mongodb_document_deleted_rate:
      name: 文档删除频率
      desc: 文档删除操作的频率，反映数据清理活跃度
    mongodb_assert_user:
      name: 用户断言次数
      desc: 用户断言的累计触发次数，反映应用程序逻辑或数据异常
    mongodb_cursor_timed_out_count:
      name: 超时游标数
      desc: 超时的游标累计数量，反映查询执行时间过长或资源管理问题
    mongodb_resident_megabytes:
      name: 常驻内存大小
      desc: MongoDB进程使用的物理内存大小，反映内存资源使用情况
    mongodb_vsize_megabytes:
      name: 虚拟内存大小
      desc: MongoDB进程使用的虚拟内存大小，反映内存资源分配情况
    mongodb_tcmalloc_current_allocated_bytes:
      name: 当前分配内存
      desc: 通过tcmalloc内存分配器当前分配的内存大小，反映内存使用效率
    mongodb_wtcache_current_bytes:
      name: WiredTiger缓存大小
      desc: WiredTiger存储引擎缓存当前使用的大小，反映缓存利用率
    mongodb_wtcache_max_bytes_configured:
      name: WiredTiger缓存最大配置
      desc: WiredTiger存储引擎缓存的最大配置大小，反映缓存容量上限
    mongodb_wtcache_tracked_dirty_bytes:
      name: 跟踪的脏数据大小
      desc: WiredTiger缓存中已修改但未写入磁盘的数据大小，反映数据持久化延迟
    mongodb_net_in_bytes_count_rate:
      name: 网络输入频率
      desc: 网络数据接收的频率，反映数据库输入流量负载
    mongodb_net_out_bytes_count_rate:
      name: 网络输出频率
      desc: 网络数据发送的频率，反映数据库输出流量负载
  Tomcat:
    tomcat_connector_request_count:
      name: 请求处理总数
      desc: 连接器处理的HTTP请求累计总数，反映连接器的总工作负载
    tomcat_connector_error_count:
      name: 错误请求总数
      desc: 连接器处理过程中发生的错误请求累计总数，反映服务可靠性问题
    tomcat_connector_bytes_received:
      name: 接收字节总数
      desc: 连接器从客户端接收的字节数据累计总量，反映网络输入流量
    tomcat_connector_bytes_sent:
      name: 发送字节总数
      desc: 连接器向客户端发送的字节数据累计总量，反映网络输出流量
    tomcat_connector_processing_time:
      name: 总处理时间
      desc: 连接器处理所有请求花费的时间累计总量，反映处理性能
    tomcat_connector_max_time:
      name: 最长请求处理时间
      desc: 连接器处理单个请求的最长时间记录，反映极端性能情况
    tomcat_connector_current_thread_count:
      name: 当前线程总数
      desc: 连接器当前管理的线程池中的线程总数，反映资源分配情况
    tomcat_connector_current_threads_busy:
      name: 忙碌线程数
      desc: 连接器当前正在处理请求的线程数量，反映实时负载情况
    tomcat_connector_max_threads:
      name: 最大线程数
      desc: 连接器线程池允许的最大线程数量，反映并发处理能力上限
    tomcat_jvm_memory_free:
      name: 空闲内存大小
      desc: JVM堆内存当前空闲的空间大小，反映内存可用余量
    tomcat_jvm_memory_total:
      name: 总分配内存大小
      desc: JVM堆内存当前分配的总空间大小，反映内存使用规模
    tomcat_jvm_memory_max:
      name: 最大可用内存大小
      desc: JVM堆内存配置的最大可用空间大小，反映内存容量限制
    tomcat_jvm_memorypool_used:
      name: 内存池使用量
      desc: JVM特定内存池当前已使用的内存大小，反映详细内存分配情况
    tomcat_jvm_memorypool_committed:
      name: 内存池提交量
      desc: JVM特定内存池已提交给操作系统的内存大小，反映内存预留情况
    tomcat_jvm_memorypool_max:
      name: 内存池最大值
      desc: JVM特定内存池允许的最大内存大小，反映内存池容量限制
    tomcat_jvm_memorypool_init:
      name: 内存池初始值
      desc: JVM特定内存池初始分配的内存大小，反映启动时内存配置
    tomcat_connector_request_count_rate:
      name: 请求处理速率
      desc: 基于5分钟时间窗口计算的每秒请求处理速率，反映实时吞吐量
    tomcat_connector_error_count_rate:
      name: 错误请求速率
      desc: 基于5分钟时间窗口计算的每秒错误请求速率，反映服务稳定性趋势
    tomcat_connector_bytes_sent_rate:
      name: 数据发送速率
      desc: 基于5分钟时间窗口计算的每秒数据发送速率，反映网络输出流量趋势
    tomcat_connector_current_thread_utilization:
      name: 线程池利用率
      desc: 当前忙碌线程数占最大线程数的百分比，反映线程资源使用效率
  Website:
    http_response_result_code:
      name: 拨测结果
      desc: 根据 Telegraf http_response 的 result_code 字段识别拨测结果，0 表示成功，非 0 表示响应内容不匹配、响应体读取失败、连接失败、超时、DNS 错误或响应状态码不匹配等异常。
    http_node_success_rate:
      name: 单点成功率
      desc: 统计每个拨测节点5分钟的拨测成功率，用于反映特定地域或网络环境下的访问情况。
    http_response_response_time:
      name: HTTP响应时间
      desc: 从发起HTTP请求到接收到HTTP响应的总时间。用于评估Web服务的性能，尤其是在处理用户请求时。
    http_response_http_response_code:
      name: HTTP 响应状态码
      desc: 该指标用于表示HTTP请求的响应状态码。它记录了HTTP响应状态码的值，例如200（成功）、404（未找到）、500（服务器错误）等。
    http_response_content_length:
      name: HTTP内容长度
      desc: 该指标表示HTTP响应的内容长度。较大的内容长度可能导致数据传输时间过长，并消耗更多带宽。
  Scanning Device:
    iftotalInOctets:
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
      name: 设备每秒接收总流量
    iftotalOutOctets:
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
      name: 设备每秒发送总流量
    sysUpTime:
      desc: 该指标表示设备自上次启动以来的运行时间，单位为天。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
      name: 系统运行时间
    ifOperStatus:
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
      name: 接口操作状态
    ifOutUcastPkts:
      name: 每秒发送单播数据包数
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
    ifAdminStatus:
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
      name: 接口管理状态
    ifInOctets:
      name: 接口每秒接收流量
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，转换为兆字节（MB）单位。监测字节流量有助于评估接口的负载及带宽使用情况。
    ifInUcastPkts:
      name: 每秒接收单播数据包数
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
    ifHighSpeed:
      desc: 该指标表示网络接口支持的最高数据传输速度，单位通常为KB每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
      name: 接口带宽
    ifOutDiscards:
      name: 每秒发送丢包数
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    ifOutErrors:
      name: 每秒发送错误数据包数
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    ifInErrors:
      name: 每秒接收错误数据包数
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
    ifInDiscards:
      name: 每秒接收丢包数
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    ifOutOctets:
      name: 接口每秒发送流量
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为兆字节（MB）。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
  Storage:
    ipmi_power_watts:
      name: 功率
      desc: 功率指标以瓦特 (watts) 为单位，反映设备当前功耗。通过此指标可以评估设备能效和功耗趋势。便于设置节能政策和资源优化。
    ifOutErrors:
      name: 每秒发送错误数据包数
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    ifInDiscards:
      name: 每秒接收丢包数
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    ifAdminStatus:
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
      name: 接口管理状态
    ifOutOctets:
      name: 接口每秒发送流量
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为兆字节（MB）。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
    ipmi_temperature_celsius:
      name: 温度
      desc: 温度指标以摄氏度 (Celsius) 为单位，监控设备内部温度。通过监测温度可以预防热量累积，防止设备过热。对于维持系统的稳定性和寿命非常关键。
    ifOutUcastPkts:
      name: 每秒发送单播数据包数
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
    ipmi_voltage_volts:
      desc: 电压指标以伏特 (volts) 为单位，监测设备内部不同电源轨的电压情况。稳定的电压供应对于设备的可靠性至关重要。通过该指标可以快速识别电气问题，保障正常运行。
      name: 电压
    ipmi_chassis_power_state:
      desc: 电源状态指标，用于监测设备是否处于开机状态。其值可以表示电源开启或关闭状态。主要用于远程管理和监控设备的电源情况。
      name: 电源状态
    iftotalInOctets:
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
      name: 设备每秒接收总流量
    ifInUcastPkts:
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
      name: 每秒接收单播数据包数
    ifInErrors:
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
      name: 每秒接收错误数据包数
    ifHighSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位通常为KB每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    ifOutDiscards:
      name: 每秒发送丢包数
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    sysUpTime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间，单位为天。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
    ifOperStatus:
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
      name: 接口操作状态
    ifInOctets:
      name: 接口每秒接收流量
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，转换为兆字节（MB）单位。监测字节流量有助于评估接口的负载及带宽使用情况。
    ipmi_fan_speed_rpm:
      name: 风扇转速
      desc: 风扇转速指标以每分钟转数 (rpm) 表示，监测设备内风扇的工作状态。高效的风扇运作是维护设备温度的关键。有助于防止过热，确保设备长时间稳定运行。
    iftotalOutOctets:
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
      name: 设备每秒发送总流量
    oceanstor_pool_count:
      name: 存储池数量
      desc: OceanStor系统中存储池的总数量
    oceanstor_drive_count:
