  Firewall Fortinet SNMP:
    name: Fortinet（Telegraf）
    desc: 面向 FortiGate 防火墙的 Fortinet 专用 SNMP 采集模板。在标准 IF-MIB 接口指标与 64 位 HC 流量计数之外，额外采集 FORTINET-FORTIGATE-MIB 私有 OID 的设备健康（CPU、内存使用率、总内存）与防火墙特有状态（IPv4 活动会话数、活动 IPsec VPN 隧道数、HA 模式）。内存为设备直接上报的使用率百分比。
      适用品牌型号——Fortinet FortiGate 防火墙（FortiOS）。
  Firewall Hillstone SNMP:
    name: Hillstone（Telegraf）
    desc: 山石网科（Hillstone，StoneOS）防火墙专用 SNMP 采集模板（HILLSTONE-SYSTEM/TEMPERATURE/POWER-MIB，企业号 28557）。在标准 IF-MIB 接口指标之外，额外采集 Hillstone 私有 OID 的设备健康指标：CPU 使用率（sysCPU）、系统内存（sysMemTotal/sysMemUsed，单位 KB，利用率按 used/total 计算）、机箱温度（专用每传感器表）与电源状态。电源原始码（fine/absent/warning/fail/unsupport）已归一化为 1=正常/2=异常。风扇与会话数 OID 无确认的数字形式，故为 N/A。适用品牌型号——山石网科 SG-6000 / E 系列 / A 系列下一代防火墙（StoneOS，企业号 28557）。
  Firewall Sophos XG SNMP:
    name: Sophos XG（Telegraf）
    desc: Sophos XG / SFOS 防火墙专用 SNMP 采集模板（SFOS-FIREWALL-MIB，企业号 21067）。在标准 IF-MIB 接口指标之外，额外采集 Sophos 私有 OID 的设备健康指标：CPU 使用率（cpuPercentUsage）与主内存使用率（memoryPercentUsage），均以百分比直接上报。Sophos 暴露在线认证用户数与磁盘使用率而非标准会话/连接表，故会话数与温度/风扇/电源为 N/A。适用品牌型号——Sophos XG / XGS 防火墙及 SFOS 系列设备（Sophos Firewall OS，企业号 21067），以及 Cyberoam UTM 设备（CYBEROAM-MIB，同企业号 21067、健康 OID 完全一致——Sophos 收购 Cyberoam 后 SFOS 沿用其 MIB）。
  Firewall Forcepoint SNMP:
    name: Forcepoint（Telegraf）
    desc: Forcepoint NGFW（原 Stonesoft/McAfee NGFW）专用 SNMP 采集模板（STONESOFT-FIREWALL-MIB，企业号 1369）。除标准 IF-MIB 接口指标外，额外采集 Forcepoint 私有 OID 的设备健康指标：每核 CPU 使用率（fwCpuTotal，取均值）与内存（fwMemBytesTotal/fwMemBytesUsed，字节，用量按 已用/总量 推导）。Stonesoft MIB 未暴露标量会话计数与温度/风扇/电源，故为 N/A。适用品牌型号——Forcepoint NGFW / Stonesoft / McAfee NGFW 硬件及虚拟引擎（企业号 1369）。
  Firewall ScreenOS SNMP:
    name: Juniper ScreenOS（Telegraf）
    desc: Juniper ScreenOS（NetScreen）防火墙专用 SNMP 采集模板（NETSCREEN-RESOURCE-MIB，企业号 3224）。除标准 IF-MIB 接口指标外，额外采集 ScreenOS 私有 OID 的设备健康指标：近 5 分钟 CPU 使用率（nsResCpuLast5Min）与内存（nsResMemAllocate 已用 + nsResMemLeft 空闲，用量按 已用/(已用+空闲) 推导）。会话计数与温度/风扇/电源本模板未采集，故为 N/A。适用品牌型号——运行 ScreenOS 的 Juniper NetScreen / SSG 防火墙（企业号 3224）。
  Firewall Neteye SNMP:
    name: 网御星云（Telegraf）
