  Docker Container:
    docker_container_status:
      name: 容器状态
      desc: 表示容器当前的运行状态，例如是否正在运行、停止或暂停
    docker_container_status_restart_count:
      name: 重启次数
      desc: 容器已重启的次数，即自上次启动以来容器已执行的重启次数
    docker_container_cpu_usage_percent:
      name: CPU使用率
      desc: 容器使用的CPU资源占可用资源的百分比，用于监测性能和负载
    docker_container_mem_usage_percent:
      name: 内存使用率
      desc: 容器使用的内存占设定限制的百分比，帮助了解内存资源的使用情况
    docker_container_mem_usage:
      name: 内存使用量
      desc: 容器使用的内存量，显示容器实际占用的物理内存量
    docker_container_blkio_io_service_bytes_recursive_total_rate:
      name: 总块I/O字节速率
      desc: 在容器中块设备读写操作传输的总字节速率，包括所有读取和写入操作
    docker_container_blkio_io_service_bytes_recursive_read_rate:
      name: 块设备读取字节速率
      desc: 从块设备中读取的字节速率，反映读取操作的负载和存储性能
    docker_container_blkio_io_service_bytes_recursive_write_rate:
      name: 块设备写入字节速率
      desc: 向块设备写入的字节速率，表示写入操作的负载和存储性能
    docker_container_net_rx_bytes_rate:
      name: 接收网络字节速率
      desc: 容器通过网络接口接收到的字节速率，用于监测容器的网络流入流量
    docker_container_net_tx_bytes_rate:
      name: 发送网络字节速率
      desc: 容器通过网络接口发送出去的字节速率，用于监测容器的网络流出流量
    docker_container_net_rx_errors_rate:
      name: 网络接收错误速率
      desc: 容器在接收数据包时遇到的错误速率，可用于诊断网络问题
    docker_container_net_tx_errors_rate:
      name: 网络发送错误速率
      desc: 容器在发送数据包时遇到的错误速率，帮助识别网络发送问题
    docker_container_net_rx_packets_rate:
      name: 接收数据包速率
      desc: 容器接收到的数据包速率，显示网络流入的活跃度
    docker_container_net_tx_packets_rate:
      name: 发送数据包速率
      desc: 容器发送的数据包速率，反映网络流出的活跃度
  Oracle:
    oracledb_up_gauge:
      name: 运行状态
      desc: 当前Oracle数据库运行状态，0为正常运行，1为运行异常
    oracledb_uptime_seconds_gauge:
      name: 实例已运行时间
      desc: Oracle数据库已运行时长
    oracledb_activity_execute_count_gauge_rate:
      name: 执行速率
      desc: 监控一段时间内（如过去5分钟）SQL执行的速率，反映数据库负载的变化趋势
    oracledb_activity_parse_count_total_gauge_rate:
      name: 解析速率
      desc: 监控一段时间内（如过去5分钟）SQL解析的速率，帮助发现频繁解析情况
    oracledb_activity_user_commits_gauge_rate:
      name: 用户提交速率
      desc: 监控一段时间内（如过去5分钟）用户事务提交的速率，反映数据库事务活动情况
    oracledb_activity_user_rollbacks_gauge_rate:
      name: 用户回滚速率
      desc: 监控一段时间内（如过去5分钟）用户事务回滚的速率，帮助发现异常事务
    oracledb_wait_time_application_gauge:
      name: 应用类等待时间
      desc: 数据库客户端应用程序与数据库的通信等待时间
    oracledb_wait_time_commit_gauge:
      name: 提交等待时间
      desc: 等待事务提交完成的时间
    oracledb_wait_time_concurrency_gauge:
      name: 并发等待时间
      desc: 由于数据库资源争用而导致的等待时间，例如等待锁
    oracledb_wait_time_configuration_gauge:
      name: 配置等待时间
      desc: 等待系统资源配置的时间，例如等待参数更改生效的时间
    oracledb_wait_time_network_gauge:
      name: 网络等待时间
      desc: 等待网络传输的时间，例如等待数据从客户端发送到服务器
    oracledb_wait_time_other_gauge:
      name: 其他等待时间
      desc: 无法归类到其他等待时间中的等待时间
    oracledb_wait_time_system_io_gauge:
      name: 系统I/O等待时间
      desc: 等待系统进行I/O操作的时间，例如等待从磁盘读取数据的时间
    oracledb_wait_time_user_io_gauge:
      name: 用户I/O等待时间
      desc: 等待用户I/O操作完成的时间
    oracledb_resource_utilization_rate:
      name: 资源使用率
      desc: 当前Oracle数据库实例中某种资源的使用率，可以反映会话、进程、内存等资源对其资源限定值的使用百分比
    oracledb_process_count_gauge:
      name: 进程数
      desc: 当前活动的数据库进程数
    oracledb_sessions_value_gauge:
      name: 会话数
      desc: 数据库当前打开的会话数
    oracledb_sga_total_gauge:
      name: SGA总大小
      desc: SGA是Oracle数据库实例在内存中分配的一块共享内存区域，用于存储全局数据和信息
    oracledb_sga_free_gauge:
      name: SGA可用大小
      desc: 表示Oracle数据库SGA当前可用的内存大小，反映SGA中未被使用的空闲资源量
    oracledb_sga_used_percent_gauge:
      name: SGA使用率
      desc: 表示Oracle数据库SGA的内存使用率，用于评估SGA资源的利用效率
    oracledb_pga_total_gauge:
      name: PGA总大小
      desc: PGA是Oracle数据库实例中每个用户进程或服务器进程独立分配的内存区域
    oracledb_pga_used_gauge:
      name: PGA已使用大小
      desc: 表示Oracle数据库PGA当前已使用的内存大小，反映PGA资源的实际消耗情况
    oracledb_pga_used_percent_gauge:
      name: PGA使用率
      desc: 表示Oracle数据库PGA的内存使用率，用于衡量PGA资源的利用效率
    oracledb_tablespace_bytes_gauge:
      name: 表已使用容量大小
      desc: 指定表空间中已使用的磁盘空间的总大小
    oracledb_tablespace_max_bytes_gauge:
      name: 表最大容量限制
      desc: 指定表空间的最大磁盘空间限制
    oracledb_tablespace_free_gauge:
      name: 表可用容量大小
      desc: 指定表空间中剩余的磁盘空间的大小
    oracledb_tablespace_used_percent_gauge:
      name: 表空间使用率
      desc: 指定表空间已使用容量的百分比
    oracledb_rac_node_gauge:
      name: RAC节点数量
      desc: 当前Oracle数据库集群节点数量
    process_cpu_seconds_total_counter:
      name: 监控探针进程CPU秒数总计
      desc: Oracle数据库监控探针进程已使用的CPU时间总量
    process_max_fds_gauge:
      name: 监控探针进程最大文件描述符数
      desc: Oracle数据库监控探针进程能够打开的最大文件描述符数
    process_open_fds_gauge:
      name: 监控探针进程打开文件描述符数
      desc: Oracle数据库监控探针进程当前打开的文件描述符数
    process_resident_memory_bytes_gauge:
      name: 监控探针进程常驻内存大小
      desc: Oracle数据库监控探针进程当前常驻内存的大小
    process_virtual_memory_bytes_gauge:
      name: 监控探针进程虚拟内存大小
      desc: Oracle数据库监控探针进程当前虚拟内存的大小
    oracledb_exporter_last_scrape_duration_seconds_gauge:
      name: 监控探针最近一次抓取时长
      desc: 最近一次从Oracle数据库抓取指标所花费的时间
    oracledb_exporter_last_scrape_error_gauge:
      name: 监控探针最近一次抓取状态
      desc: OracleDB监控探针在最近一次抓取指标时是否出现错误
    oracledb_exporter_scrapes_total_counter:
      name: 监控探针抓取指标总数
      desc: 从OracleDB监控探针启动以来抓取指标的总次数，若进程重启将重新计算
  Mysql:
    mysql_threads_connected:
      name: 当前连接数
      desc: 当前打开的连接数；接近 max_connections 时会拒绝新连接
    mysql_threads_running:
      name: 活跃线程数
      desc: 当前正在执行的线程数；反映数据库并发处理能力
    mysql_threads_cached:
      name: 缓存线程数
      desc: 可复用的缓存线程数量；反映连接复用能力
    mysql_process_list_threads_idle:
      name: 空闲进程列表线程数
      desc: 进程列表中处于空闲状态的线程数量；用于识别空闲连接堆积情况
    mysql_process_list_threads_executing:
      name: 执行中进程列表线程数
      desc: 进程列表中当前正在执行查询的线程数量；用于评估活跃查询并发
    mysql_process_list_threads_sending_data:
      name: 发送数据进程列表线程数
      desc: 进程列表中处于 Sending data 状态的线程数量；通常与大扫描或慢结果处理有关
    mysql_process_list_threads_waiting_for_lock:
      name: 等待锁进程列表线程数
      desc: 进程列表中正在等待锁的线程数量；用于识别阻塞和锁竞争
    mysql_variables_max_connections:
      name: 最大连接配置值
      desc: max_connections 的配置值；用于表示实例真实连接容量上限
    mysql_max_used_connections:
      name: 历史最大连接数
      desc: MySQL 启动以来使用过的峰值连接数；用于评估连接池水位
    mysql_aborted_connects:
      name: 中断连接数
      desc: 连接尝试失败的次数；突增反映权限 / 网络配置问题
    mysql_aborted_connects_rate:
      name: 中断连接速率
      desc: 连接尝试失败的速率；用于发现认证、网络或配置异常
    mysql_aborted_clients:
      name: 客户端异常断开数
      desc: 客户端非正常断开连接的次数；常与网络抖动或超时有关
    mysql_aborted_clients_rate:
      name: 客户端异常断开速率
      desc: 客户端非正常断开连接的速率；用于识别网络抖动、超时或连接池问题
    mysql_connection_errors_internal:
      name: 内部连接错误数
      desc: 由 MySQL 内部错误导致的连接失败次数
    mysql_connection_errors_max_connections:
      name: 连接数上限错误数
      desc: 因达到 max_connections 限制而被拒绝的连接次数
    mysql_connection_errors_max_connections_rate:
      name: 连接数上限错误速率
      desc: 因达到 max_connections 限制而被拒绝连接的速率；反映连接饱和对业务的即时影响
    mysql_connection_errors_peer_address:
      name: 对端地址连接错误数
      desc: 因对端地址非法或被拒绝导致的连接失败次数
    mysql_connection_errors_select:
      name: 轮询连接错误数
      desc: 在 socket select 处理阶段发生的连接失败次数
    mysql_connection_errors_tcpwrap:
      name: 访问控制连接错误数
      desc: 因 TCP Wrapper 访问控制导致的连接失败次数
    mysql_connection_utilization:
      name: 连接使用率
      desc: 当前连接数相对 max_connections 配置值的占比；用于估算连接容量压力
    mysql_uptime:
      name: MySQL 运行时长
      desc: MySQL 实例自上次启动以来的持续运行时间；用于观察实例重启频率与运行稳定性
    mysql_slave_seconds_behind_master:
      name: 复制延迟
      desc: 从库相对主库落后的秒数；用于评估复制延迟
    mysql_slave_io_running:
      name: 复制 IO 线程状态
      desc: 从库复制 IO 线程状态；通常 1 为运行，0 为异常
    mysql_slave_sql_running:
      name: 复制 SQL 线程状态
      desc: 从库复制 SQL 线程状态；通常 1 为运行，0 为异常
    mysql_variables_read_only:
      name: 只读配置状态
      desc: MySQL read_only 配置状态；常与复制信号结合用于判断实例角色
    mysql_variables_super_read_only:
      name: 超级只读配置状态
      desc: MySQL super_read_only 配置状态；通常在从库上启用以避免误写入
    mysql_variables_log_bin:
      name: 二进制日志启用状态
      desc: 是否启用二进制日志；用于识别主库或具备复制能力的实例
    mysql_variables_log_slave_updates:
      name: 复制更新写入二进制日志状态
      desc: 重放的复制变更是否写入二进制日志；用于分析级联复制角色
    mysql_slow_queries_rate:
      name: 慢查询请求触发速率
      desc: 慢查询请求数量，反映慢查询发生的频率
    mysql_queries_rate:
      name: QPS（查询速率）
      desc: 整体查询吞吐速率；反映数据库总体访问压力
    mysql_questions_rate:
      name: Questions 请求速率
      desc: 客户端发送到 MySQL 的语句速率；反映前端请求压力
    mysql_com_select_rate:
      name: SELECT 查询速率
      desc: SELECT 查询数，反映读取负载趋势
    mysql_com_insert_rate:
      name: INSERT 写入速率
      desc: INSERT 查询数，反映写入负载趋势
    mysql_com_update_rate:
      name: UPDATE 更新速率
      desc: UPDATE 操作数，反映数据更新频率
    mysql_com_delete_rate:
      name: DELETE 删除速率
      desc: DELETE 操作数；激增时需检查数据清理合理性
    mysql_innodb_row_lock_time_avg:
      name: 平均行锁等待时间
      desc: 平均行锁等待时间；>50ms 表示锁竞争严重
    mysql_innodb_row_lock_waits_rate:
      name: InnoDB 行锁等待次数速率
      desc: InnoDB 引擎发生行锁等待的次数
    mysql_innodb_data_reads_rate:
      name: InnoDB 数据读速率
      desc: InnoDB 发起的物理读操作速率；反映存储读取压力
    mysql_innodb_data_writes_rate:
      name: InnoDB 数据写速率
      desc: InnoDB 发起的物理写操作速率；反映写入与刷盘压力
    mysql_innodb_data_fsyncs_rate:
      name: InnoDB 数据文件 Fsync 速率
      desc: InnoDB 数据文件执行 fsync 的速率；用于评估数据文件刷盘压力
    mysql_innodb_os_log_fsyncs_rate:
      name: InnoDB 日志 Fsync 速率
      desc: Redo 日志 fsync 速率；反映事务提交刷盘压力
    mysql_innodb_buffer_pool_read_requests_rate:
      name: 缓冲池读取请求速率
      desc: 缓冲池读取请求，反映数据库读取负载
    mysql_innodb_buffer_pool_reads_rate:
      name: 缓冲池磁盘读取速率
      desc: 缓冲池物理磁盘读取数；过高表示内存不足
    mysql_innodb_buffer_pool_pages_free:
      name: 缓冲池空闲页数
      desc: 缓冲池中尚未被使用的页数；用于评估缓存剩余空间
    mysql_innodb_buffer_pool_pages_dirty:
      name: 脏页数量
      desc: 缓冲池中已修改未写入磁盘的页数；反映内存使用效率
    mysql_innodb_buffer_pool_pages_total:
      name: 缓冲池总页数
      desc: 缓冲池中的总页数；用于计算缓冲池利用率
    mysql_buffer_pool_hit_ratio:
      name: Buffer Pool 命中率
      desc: 逻辑读请求直接命中 Buffer Pool 的比率；越高越好
    mysql_buffer_pool_dirty_ratio:
      name: Buffer Pool 脏页占比
      desc: 脏页在 Buffer Pool 总页数中的占比；过高可能意味着刷盘压力上升
    mysql_buffer_pool_used_ratio:
      name: Buffer Pool 使用率
      desc: 已使用的 Buffer Pool 页在总页数中的占比；用于评估缓存负载
    mysql_bytes_received_rate:
      name: 数据接收速率
      desc: 接收的数据量，反映数据库输入流量
    mysql_bytes_sent_rate:
      name: 数据发送速率
      desc: 发送的数据量，反映数据库输出流量
    mysql_open_tables:
      name: 当前打开表数
      desc: 当前处于打开状态的表句柄数
    mysql_opened_tables_rate:
      name: 打开表速率
      desc: 表被重新打开的速率；较高可能表示表缓存不足
    mysql_open_files:
      name: 当前打开文件数
      desc: MySQL 当前占用的文件句柄数量
    mysql_open_files_utilization:
      name: 文件句柄使用率
      desc: 当前打开文件数相对 open_files_limit 配置值的占比；用于评估文件句柄压力
    mysql_table_open_cache_utilization:
      name: 表缓存使用率
      desc: 当前打开表数相对 table_open_cache 配置值的占比；用于评估表缓存容量压力
    mysql_variables_table_open_cache:
      name: 表缓存配置值
      desc: table_open_cache 的配置值；用于衡量表句柄容量上限
    mysql_variables_open_files_limit:
      name: 文件句柄上限配置值
      desc: open_files_limit 的配置值；用于衡量文件句柄容量上限
    mysql_table_open_cache_hits_rate:
      name: 表缓存命中率
      desc: 表缓存命中率；<95% 需调整 table_open_cache 配置
    mysql_table_open_cache_misses_rate:
      name: 表缓存未命中请求速率
      desc: 表缓存未命中的请求次数，反映表缓存的命中情况
    mysql_key_reads_rate:
      name: Key Cache 磁盘读取速率
      desc: MyISAM 键块从磁盘读取的速率
    mysql_key_read_requests_rate:
      name: Key Cache 请求速率
      desc: MyISAM 键块逻辑读取请求速率
    mysql_key_cache_hit_ratio:
      name: Key Cache 命中率
      desc: MyISAM 键缓存命中率；越高说明键缓存效果越好
    mysql_created_tmp_disk_tables_rate:
      name: 磁盘临时表创建速率
      desc: 创建的磁盘临时表数量
    mysql_created_tmp_tables_rate:
      name: 总临时表创建速率
      desc: 创建的临时表总数（内存 + 磁盘）
    mysql_created_tmp_memory_tables_rate:
      name: 内存临时表创建速率
      desc: 内存中创建的临时表估算速率，由总临时表数减去磁盘临时表数得到
    mysql_tmp_disk_table_ratio:
      name: 磁盘临时表占比
      desc: 临时表中落盘到磁盘的比例；过高通常需要优化 SQL 或调大临时表内存
    mysql_variables_tmp_table_size:
      name: 临时表内存阈值
      desc: tmp_table_size 的配置值；用于评估临时表内存上限
    mysql_variables_max_heap_table_size:
      name: 堆临时表内存阈值
      desc: max_heap_table_size 的配置值；用于评估内存临时表容量上限
    mysql_variables_innodb_buffer_pool_size:
      name: Buffer Pool 配置大小
      desc: innodb_buffer_pool_size 的配置值；用于衡量缓存容量基线
  ActiveMQ-JMX:
    activemq_topic_producer_flow_control_value:
      desc: 显示指定目标主题的生产者是否启用了流量控制，1 表示启用，0 表示未启用，用于防止生产者发送过多消息导致系统过载。
      name: 生产者流量控制状态
    activemq_topic_memory_percent_usage_value:
      name: 内存使用百分比
      desc: 显示内存消耗百分比，监控该指标可以及时优化资源分配，避免性能下降。
    activemq_consumer_total_counter:
      desc: 显示当前连接到 ActiveMQ 代理的消费者总数，用于了解系统的消费者负载和消息处理能力。
      name: 消费者总数
    activemq_topic_blocked_sends_value:
      name: 被流控阻塞的消息数量
      desc: 显示因流量控制而被阻塞的消息数量，用于评估系统的流量控制状态和消息发送的顺畅性。
    activemq_topic_memory_usage_byte_count_value:
      desc: 当前未交付消息占用的内存量。通过此指标可以衡量代理的内存消耗及其管理策略。
      name: 未投递消息的内存使用量
    jvm_memory_nonheap_usage_used_rate:
      desc: 5分钟内，JVM 非堆内存使用量的平均变化率（每分钟兆字节），用于监控非堆内存的使用变化趋势。
      name: 非堆内存使用量的平均变化率
    activemq_topic_enqueue_rate:
      name: 发送速率
      desc: 单位时间内发送到队列的消息数量，用于实时监控系统的负载和消息处理能力。
    activemq_producer_total_counter:
      desc: 显示当前连接到 ActiveMQ 代理的生产者总数，用于了解系统的生产者负载和消息发送的活跃程度。
      name: 生产者总数
    activemq_connections_total_rate:
      name: 连接速率
      desc: 5分钟内连接速率，用于监控连接建立频率。
    jvm_memory_heap_usage_used_value:
      name: 堆内存使用量
      desc: JVM 堆内存中已使用的部分，用于评估当前堆内存的使用情况。
    activemq_connections_total_counter:
      desc: 当前连接到ActiveMQ代理的总连接数。监控此指标有助于检测代理的负载和连接管理效率。
      name: 连接总数
    jmx_scrape_error_gauge:
      name: JMX抓取状态
      desc: 值为0时表示监控指标抓取成功，值为1时表示抓取失败。
    activemq_topic_expired_count_value:
      name: 已过期的消息数量
      desc: 显示已过期的消息数量，用于检测消息处理延迟或消费者处理能力不足的问题。
    activemq_connections_gauge:
      name: 当前连接数
      desc: ActiveMQ代理当前活跃的连接数。通过监控此指标，可以识别代理的实时连接状态及其可能的瓶颈情况。
    activemq_store_usage_ratio_gauge:
      name: 存储使用率
      desc: 持久存储的使用百分比。监控此指标助于优化存储管理和资源分配。
    activemq_memory_usage_ratio_gauge:
      name: 内存使用率
      desc: 当前系统使用的内存限制百分比。监控此指标有助管理和优化内存使用。
    activemq_enqueue_total_counter:
      name: 入队消息总数
      desc: 总共发送到代理的消息数量，反映系统的负载和通信频繁程度。
    jvm_memory_heap_usage_max_value:
      desc: JVM 堆内存的最大值，用于评估堆内存的上限，防止内存溢出。
      name: 堆内存最大值
    activemq_message_total_rate:
      name: 未确认消息增长速率
      desc: 5分钟内未确认消息数量的增长速率，用于监控消息积压情况。如果增长速率持续较高，可能表示系统存在处理瓶颈或消息积压问题
    activemq_topic_enqueue_count_value:
      name: 发送到目标的消息数量
      desc: 当前目标接收到的消息数量，帮助监控通信流量及流量控制措施。
    activemq_topic_queue_size_value:
      desc: 还未消费的消息总量，通过监控此指标可以确定代理的工作负载和处理能力。
      name: 队列大小
    activemq_dequeue_total_counter:
      name: 出队消息总数
      desc: 代理上确认处理的消息总数。通过此指标可以了解整体的处理情况和效率。
    activemq_message_total_counter:
      name: 未确认消息总数
      desc: 系统中未确认的消息总计。此指标帮助识别可能的消息积压问题。
  VM:
    cpu_usage_average_gauge:
      name: CPU使用率
      desc: 表示系统在特定时间段内的CPU使用率，通常以百分比表示。这个指标帮助了解CPU的负载情况，以便进行性能优化和容量规划
    mem_usage_average_gauge:
      name: 内存使用率
      desc: 表示系统在特定时间段内的内存使用率，通常以百分比表示。这个指标帮助了解内存的负载情况，有助于优化内存使用和进行容量规划
    mem_consumed_average_gauge:
      name: 活动内存
      desc: 表示系统在特定时间段内的活动内存，通常以字节为单位。这个指标用于衡量系统实际消耗的内存资源，帮助分析内存使用情况
    disk_io_usage_gauge:
      name: 磁盘I/O使用率
      desc: 表示虚拟机磁盘的I/O使用率，即磁盘在特定时间段内的繁忙程度。值越高，表示磁盘负载越高
    disk_read_average_gauge:
      name: 磁盘读取吞吐量
      desc: 表示虚拟机磁盘在特定时间段内的平均读取速率。值越高，表示读取性能越好
    disk_used_average_gauge:
      name: 磁盘使用率
      desc: 表示虚拟机磁盘的平均使用率，即磁盘已使用的空间比例。值越高，表示磁盘空间越紧张
    disk_numberRead_summation_gauge_rate:
      name: 磁盘读IO速率
      desc: 表示每秒完成的磁盘读操作次数，是衡量磁盘读请求频率的重要指标。值越高，表示磁盘读请求越频繁
    disk_numberWrite_summation_gauge_rate:
      name: 磁盘写IO速率
      desc: 表示每秒完成的磁盘写操作次数，是衡量磁盘写请求频率的重要指标。值越高，表示磁盘写请求越频繁
    disk_write_average_gauge:
      name: 磁盘写入吞吐量
      desc: 表示虚拟机磁盘在特定时间段内的平均写入速率。值越高，表示写入性能越好
    net_bytesRx_average_gauge:
      name: 网络接收速率
      desc: 表示系统在特定时间段内的网络接收速率，通常以字节每秒为单位。这个指标用于衡量网络的接收性能，帮助分析网络流量和带宽使用情况
    net_bytesTx_average_gauge:
      name: 网络发送速率
      desc: 表示系统在特定时间段内的网络发送速率，通常以字节每秒为单位。这个指标用于衡量网络的发送性能，帮助分析网络流量和带宽使用情况
    power_state_gauge:
      name: 电源状态
      desc: 表示虚拟机（VM）当前的电源状态，用于监控VM是处于开机还是关机状态。该指标对于监测VM可用性、优化资源分配和自动化运维具有重要作用
  ClickHouse:
    clickhouse_asynchronous_metrics_os_memory_available:
      name: 可用内存
      desc: 系统当前可以用于进程的物理内存总量，反映资源利用率情况。
    clickhouse_metrics_parts_active:
      name: 活跃分片数
      desc: 显示 MergeTree 表当前的活跃分片数量，用于监控表的碎片管理情况及状态。
    clickhouse_asynchronous_metrics_disk_total_default:
      desc: 默认磁盘的总容量，用于评估可用存储容量以及集群规划。
      name: 磁盘总容量（默认盘）
    clickhouse_asynchronous_metrics_load_average1:
      name: 系统负载（1分钟）
      desc: 系统在最近 1 分钟的负载平均值，展示资源消耗和任务压力。
    clickhouse_asynchronous_metrics_disk_used_default:
      desc: 当前已使用的磁盘存储空间，用于评估存储容量和扩展需求。
      name: 磁盘使用量（默认盘）
    clickhouse_metrics_parts_outdated:
      desc: 表示 MergeTree 表中的过期分片数量，用于监控分片清理及磁盘回收状态。
      name: 过期分片数
    clickhouse_metrics_memory_tracking:
      desc: ClickHouse 当前进程消耗的内存，用于监控内存使用增长趋势。
      name: 内存使用量
    clickhouse_events_query:
      desc: ClickHouse 每秒处理的查询数量，展示系统的处理性能能力。
      name: 查询速率
    clickhouse_events_compressed_read_buffer_bytes:
      desc: ClickHouse 系统读取的压缩数据速率，展示 IO 性能和数据读取效率。
      name: 压缩数据读取速率
    clickhouse_events_select_query:
      name: 查询行速率
      desc: 最近五分钟内处理的 SELECT 查询的速率，衡量查询性能。
    clickhouse_asynchronous_metrics_uptime:
      name: 系统运行时间
      desc: ClickHouse 运行的时间，以分钟为单位，反映实例的稳定性和重启频率。
    clickhouse_events_inserted_rows:
      name: 插入行速率
      desc: 最近五分钟内插入的行数速率，衡量数据写入性能。
  Tomcat-JMX:
    tomcat_threadpool_running_gauge:
      name: 线程池运行线程数
      desc: 线程池中正在运行的线程数，反映实际工作线程负载。若数值过高，可能表示线程池负载过重，需要优化线程池配置。
    tomcat_threadpool_currentthreadsbusy_gauge:
      desc: 繁忙状态的线程数量，用于判断处理能力瓶颈。若数值过高，可能表示处理能力不足，需要优化线程池配置。
      name: 线程池繁忙线程数
    tomcat_session_expiredsessions_total_counter:
      name: 过期会话总数
      desc: 特定主机下的过期会话总数，用于检测会话超时情况。若数值过高，可能表示会话超时频繁，需要检查会话配置或资源限制。
    tomcat_errorcount_increase:
      desc: 过去5分钟内错误次数的增长量，反映错误发生频率变化。若数值过高，可能表明系统存在较多问题，需要及时排查。
      name: 全局错误增长数
    tomcat_threadpool_utilization:
      name: 线程池利用率
      desc: 线程池的利用率，反映线程池的使用情况。若数值过高，可能表示线程池接近饱和，需要增加线程池容量或优化应用性能。
    tomcat_session_rejectionrate:
      name: 会话拒绝率
      desc: 会话拒绝率，反映会话创建失败的比例。若数值过高，可能表示会话管理存在问题，需要检查会话配置或资源限制。
    tomcat_bytessent_increase:
      desc: 过去5分钟内发送流量的增长量（以kibibytes为单位），反映网络输出速率。若数值过高，可能表示网络输出流量大，需要关注网络带宽。
      name: 全局发送流量增长数
    jmx_scrape_error_gauge:
      desc: 值为0时表示监控指标抓取成功，值为1时表示抓取失败。
      name: JMX抓取失败的监控指标
    tomcat_bytesreceived_increase:
      name: 全局接收流量增长数
      desc: 过去5分钟内接收流量的增长量（以kibibytes为单位），反映网络输入速率。若数值持续增长，可能表明网络输入流量增加，需要关注网络带宽。
    tomcat_threadpool_currentthreadcount_gauge:
      name: 线程池当前线程数
      desc: 当前线程池中的线程数量，实时监控并发负载。若数值过高，可能表示线程池负载过重，需要优化线程池配置。
    tomcat_session_sessioncounter_total_counter:
      name: 会话总数
      desc: 特定主机下的活跃会话总数，用于监控会话资源占用。若数值过高，可能表示会话资源占用过多，需要优化会话管理。
    tomcat_maxtime_total_counter:
      name: 全局最大处理时长
      desc: 特定端口和协议下的最大请求处理时长（以秒为单位），用于定位慢请求。若数值过高，可能表示存在性能瓶颈，需要优化应用性能。
    tomcat_processingtime_increase:
      name: 全局处理时长增长量
      desc: 过去5分钟内处理请求的总时间增长量（以秒为单位），用于评估整体处理效率的变化趋势。若数值持续增加，可能表示系统处理请求的时间在增长，需要进一步分析是否存在性能瓶颈。
    tomcat_session_processingtime_avg:
      desc: 过去5分钟内，每秒的平均会话处理时间（以毫秒为单位）。这个指标反映了系统在处理会话时的平均效率。较低的值表示系统处理会话的速度较快，效率高；较高的值可能表示系统在处理会话时存在性能瓶颈。
      name: 平均会话处理时间
    tomcat_requestcount_increase:
      name: 全局请求增长数
      desc: 过去5分钟内请求数的增长量，反映流量变化趋势。若数值持续增长，可能表示流量增加，需要关注系统负载。
  Detection Device:
    iftotalOutOctets:
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
      name: 设备每秒发送总流量
    ifInDiscards:
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
      name: 每秒接收丢包数
    sysUpTime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间，单位为天。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
    ifInOctets:
      name: 接口每秒接收流量
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，转换为兆字节每秒（MB/s）单位。监测字节流量有助于评估接口的负载及带宽使用情况。
    ifAdminStatus:
      name: 接口管理状态
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
    ifOperStatus:
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
      name: 接口操作状态
    ifInErrors:
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为数据包每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
      name: 每秒接收错误数据包数
    ifInUcastPkts:
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为数据包每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
      name: 每秒接收单播数据包数
    ifOutOctets:
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为兆字节每秒（MB/s）。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
      name: 接口每秒发送流量
    ifOutUcastPkts:
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
      name: 每秒发送单播数据包数
    iftotalInOctets:
      name: 设备每秒接收总流量
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
    ifOutDiscards:
      name: 每秒发送丢包数
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为数据包每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    ifOutErrors:
      name: 每秒发送错误数据包数
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为数据包每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    ifHighSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位通常为千比特每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
  Switch:
    device_voltage_volts:
      name: 输入电压
      desc: 该指标报告设备输入电压读数，单位伏特。电压偏离额定范围可能意味着供电不稳，存在硬件风险。
    device_optical_rx_power:
      name: 光模块接收功率
      desc: 该指标报告光模块（SFP/SFP+）接收光功率读数。接收功率过低可能意味着链路衰减、光纤污染或对端发送异常，可能导致丢包或链路中断。
    device_optical_tx_power:
      name: 光模块发送功率
      desc: 该指标报告光模块（SFP/SFP+）发送光功率读数。发送功率异常可能意味着光模块老化或故障。
    snmp_uptime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
    interface_ifAdminStatus:
      name: 接口管理状态
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
    interface_ifOperStatus:
      name: 接口操作状态
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
    interface_ifSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位为比特每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    interface_ifInErrors:
      name: 接收错误数据包速率
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为包每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
    interface_ifOutErrors:
      name: 发送错误数据包速率
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为包每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    interface_ifInDiscards:
      name: 接收丢包速率
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为包每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    interface_ifOutDiscards:
      name: 发送丢包速率
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为包每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    interface_ifInUcastPkts:
      name: 接收单播数据包速率
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为包每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
    interface_ifOutUcastPkts:
      name: 发送单播数据包速率
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为包每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
    interface_ifInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，单位为字节每秒。监测字节流量有助于评估接口的负载及带宽使用情况。
    interface_ifOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为字节每秒。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
    interface_ifHCInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率（来自 64 位 IF-MIB ifHCInOctets 计数器），单位为字节每秒。64 位计数器可避免 32 位 ifInOctets 在高速口上快速回绕，使流量速率更准确。
    interface_ifHCOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率（来自 64 位 IF-MIB ifHCOutOctets 计数器），单位为字节每秒。64 位计数器可避免 32 位 ifOutOctets 在高速口上快速回绕，使流量速率更准确。
    device_total_incoming_traffic:
      name: 设备接收总流量速率
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为字节每秒。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为字节每秒。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
    device_cpu_usage:
      name: CPU 使用率
      desc: 该指标表示设备控制平面的 CPU 使用率（通常为 5 分钟平均值），单位为百分比。CPU 持续偏高可能意味着控制平面过载、路由震荡或异常流量，会导致管理响应变慢或转发延迟。数据来源于各品牌私有 SNMP OID，并归一化为 0-100 的百分比。
    device_memory_usage:
      name: 内存使用率
      desc: 该指标表示设备整体内存使用率，按 已用/(已用+空闲)*100 在所有内存池上汇总计算，单位为百分比。内存偏高可能由内存泄漏、路由/MAC/ARP 表项过大或容量不足导致，可能引发不稳定或分配失败。
    device_memory_used:
      name: 内存已用量
      desc: 该指标表示设备各内存池当前已使用的字节数。它帮助管理员了解每个内存池（如 Processor、I/O 池）的绝对内存消耗，并定位承压的内存池。
    device_memory_free:
      name: 内存空闲量
      desc: 该指标表示设备各内存池当前空闲可用的字节数。它与已用量一起决定整体内存使用率；空闲量持续偏低说明该内存池存在内存压力。
    device_memory_total:
      name: 内存总量
      desc: 该指标表示设备的内存总容量。它是计算内存使用率的分母（部分厂商按 (总量-空闲)/总量 计算），与空闲量一起反映整体内存压力。
    device_temperature_celsius:
      name: 温度
      desc: 该指标表示设备各硬件温度传感器的读数，单位为摄氏度。温度异常升高可能意味着风扇故障、散热受阻或环境过热，若不处理可能触发热保护或损坏硬件。
    device_fan_state:
      name: 风扇状态
      desc: 该指标表示设备各散热风扇的运行状态。非正常状态（告警、严重、关闭或故障）表示散热故障，可能迅速导致过热，应立即排查。
    device_psu_state:
      name: 电源状态
      desc: 该指标表示设备各电源模块的运行状态。非正常状态表示电源冗余缺失或硬件故障；在具备冗余电源的设备上，单个故障可能不会立即中断业务，但会失去冗余，需尽快修复。
    device_fan_speed:
      name: 风扇转速
      desc: 该指标表示设备风扇的转速（RPM），取各风扇的最大值。转速异常偏低或为 0 表示风扇卡转或故障、设备面临过热风险；转速异常偏高可能是设备在为高温加速散热。对于仅提供转速、无风扇状态枚举的设备，转速是判断风扇健康的唯一依据。
    device_flow_bytes_rate:
      name: 设备 Flow 总流量速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总流量速率，用于观察整体带宽压力和容量趋势。
    device_flow_packets_rate:
      name: 设备 Flow 总包速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总包速率，用于观察包级负载和突增流量。
    device_flow_in_bytes_rate:
      name: 设备 Flow 入方向流量速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_bytes_rate:
      name: 设备 Flow 出方向流量速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_in_packets_rate:
      name: 设备 Flow 入方向包速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_packets_rate:
      name: 设备 Flow 出方向包速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_avg_packet_size:
      name: 设备 Flow 平均包大小
      desc: 基于 Flow 记录计算出的平均包大小或采样帧长，可辅助识别小包风暴或大包传输特征。
    device_flow_effective_sampling_rate:
      name: 设备 Flow 生效采样率
      desc: 当前 Flow 数据计算使用的生效采样率，优先取设备上报字段，缺失时使用资产兜底采样率。
    device_flow_interface_bytes_rate:
      name: 接口 Flow 流量速率
      desc: 按接口和方向聚合的 Flow 流量速率，用于定位接口维度的流量热点。
    device_flow_interface_packets_rate:
      name: 接口 Flow 包速率
      desc: 按接口和方向聚合的 Flow 包速率，用于定位接口维度的包量热点。
    device_flow_top_interfaces_by_bytes:
      name: Top 接口 Flow 流量速率
      desc: 按流量速率排序的接口 Flow 排行，用于快速发现高流量接口。
    device_flow_protocol_bytes_rate:
      name: 协议 Flow 流量速率
      desc: 按协议聚合的 Flow 流量速率，用于识别 TCP、UDP、ICMP 等协议流量占比。
    device_flow_protocol_packets_rate:
      name: 协议 Flow 包速率
      desc: 按协议聚合的 Flow 包速率，用于识别协议层面的包量异常。
    device_flow_dst_port_bytes_rate:
      name: 目的端口 Flow 流量速率
      desc: 按目的端口聚合的 Flow 流量速率，用于分析应用或服务端口流量热点。
    device_flow_dst_port_packets_rate:
      name: 目的端口 Flow 包速率
      desc: 按目的端口聚合的 Flow 包速率，用于分析应用或服务端口包量热点。
    device_flow_src_port_bytes_rate:
      name: 源端口 Flow 流量速率
      desc: 按源端口聚合的 Flow 流量速率，用于辅助分析客户端侧端口流量分布。
    device_flow_top_src_bytes_rate:
      name: Top 源地址 Flow 流量速率
      desc: 按源地址聚合并排序的 Flow 流量速率，用于发现主要流量来源。
    device_flow_top_dst_bytes_rate:
      name: Top 目的地址 Flow 流量速率
      desc: 按目的地址聚合并排序的 Flow 流量速率，用于发现主要流量去向。
    device_flow_top_src_packets_rate:
      name: Top 源地址 Flow 包速率
      desc: 按源地址聚合并排序的 Flow 包速率，用于发现包量异常来源。
    device_flow_top_dst_packets_rate:
      name: Top 目的地址 Flow 包速率
      desc: 按目的地址聚合并排序的 Flow 包速率，用于发现包量异常目标。
    device_flow_top_conversation_bytes_rate:
      name: Top 会话 Flow 流量速率
      desc: 按源地址、目的地址、协议和目的端口聚合的会话流量排行，用于定位主要通信关系。
  Router:
    device_temperature_celsius:
      name: 设备温度
      desc: 该指标报告设备硬件温度传感器读数，单位摄氏度。温度异常升高可能由风扇故障、散热不良或环境温度过高导致，严重时触发热保护或损坏硬件。
    device_fan_state:
      name: 风扇状态
      desc: 该指标报告设备散热风扇的运行状态（枚举）。非正常状态表示散热故障，可能迅速导致过热，应立即排查。
    device_psu_state:
      name: 电源状态
      desc: 该指标报告设备电源模块的运行状态（枚举）。非正常状态表示电源冗余或硬件故障；在冗余电源设备上单个故障会移除冗余，需尽快处理。
    device_memory_total:
      name: 内存总量
      desc: 该指标报告路由器的物理内存总容量（UCD-SNMP-MIB memTotalReal，原始单位 KB，已换算为字节）。
    device_memory_free:
      name: 空闲内存
      desc: 该指标报告路由器当前空闲的物理内存字节数（UCD-SNMP-MIB memAvailReal，原始单位 KB，已换算为字节）。空闲内存持续偏低可能意味着内存压力上升。
    device_memory_used:
      name: 已用内存
      desc: 该指标报告路由器当前已使用的物理内存字节数（由内存总量减去空闲内存计算得到）。用于评估绝对内存消耗与压力。
    device_cpu_usage:
      name: CPU 使用率
      desc: 该指标报告 Juniper MX 路由器各运行实体的 CPU 使用率均值（JUNIPER-MIB jnxOperatingCPU，按 instance_id 聚合）。持续偏高说明转发/控制平面负载吃紧。
    device_memory_usage:
      name: 内存使用率
      desc: 该指标报告 Juniper MX 路由器各运行实体的内存使用率均值（JUNIPER-MIB jnxOperatingBuffer，直接以百分比上报）。持续偏高可能由路由表过大或内存泄漏导致。
    interface_ifHCInOctets:
      name: 接口接收流量速率(HC)
      desc: 该指标表示过去 5 分钟内接收字节数的平均速率，单位为字节每秒，基于 64 位 ifHCInOctets 计数器，在高速接口上不会回绕。
    interface_ifHCOutOctets:
      name: 接口发送流量速率(HC)
      desc: 该指标表示过去 5 分钟内发送字节数的平均速率，单位为字节每秒，基于 64 位 ifHCOutOctets 计数器，在高速接口上不会回绕。
    snmp_uptime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
    interface_ifAdminStatus:
      name: 接口管理状态
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
    interface_ifOperStatus:
      name: 接口操作状态
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
    interface_ifSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位为比特每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    interface_ifInErrors:
      name: 接收错误数据包速率
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为包每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
    interface_ifOutErrors:
      name: 发送错误数据包速率
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为包每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    interface_ifInDiscards:
      name: 接收丢包速率
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为包每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    interface_ifOutDiscards:
      name: 发送丢包速率
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为包每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    interface_ifInUcastPkts:
      name: 接收单播数据包速率
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为包每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
    interface_ifOutUcastPkts:
      name: 发送单播数据包速率
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为包每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
    interface_ifInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，单位为字节每秒。监测字节流量有助于评估接口的负载及带宽使用情况。
    interface_ifOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为字节每秒。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
    device_total_incoming_traffic:
      name: 设备接收总流量速率
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为字节每秒。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为字节每秒。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
    device_flow_bytes_rate:
      name: 设备 Flow 总流量速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总流量速率，用于观察整体带宽压力和容量趋势。
    device_flow_packets_rate:
      name: 设备 Flow 总包速率
      desc: 按当前协议指标契约从 Flow 记录估算出的设备总包速率，用于观察包级负载和突增流量。
    device_flow_in_bytes_rate:
      name: 设备 Flow 入方向流量速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_bytes_rate:
      name: 设备 Flow 出方向流量速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的流量速率；具体协议的接口方向请以接口指标为准。
    device_flow_in_packets_rate:
      name: 设备 Flow 入方向包速率
      desc: 基于 Flow 记录换算并归属到输入侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_out_packets_rate:
      name: 设备 Flow 出方向包速率
      desc: 基于 Flow 记录换算并归属到输出侧数据的包速率；具体协议的接口方向请以接口指标为准。
    device_flow_avg_packet_size:
      name: 设备 Flow 平均包大小
      desc: 基于 Flow 记录计算出的平均包大小或采样帧长，可辅助识别小包风暴或大包传输特征。
    device_flow_effective_sampling_rate:
      name: 设备 Flow 生效采样率
      desc: 当前 Flow 数据计算使用的生效采样率，优先取设备上报字段，缺失时使用资产兜底采样率。
    device_flow_interface_bytes_rate:
      name: 接口 Flow 流量速率
      desc: 按接口和方向聚合的 Flow 流量速率，用于定位接口维度的流量热点。
    device_flow_interface_packets_rate:
      name: 接口 Flow 包速率
      desc: 按接口和方向聚合的 Flow 包速率，用于定位接口维度的包量热点。
    device_flow_top_interfaces_by_bytes:
      name: Top 接口 Flow 流量速率
      desc: 按流量速率排序的接口 Flow 排行，用于快速发现高流量接口。
    device_flow_protocol_bytes_rate:
      name: 协议 Flow 流量速率
      desc: 按协议聚合的 Flow 流量速率，用于识别 TCP、UDP、ICMP 等协议流量占比。
    device_flow_protocol_packets_rate:
      name: 协议 Flow 包速率
      desc: 按协议聚合的 Flow 包速率，用于识别协议层面的包量异常。
    device_flow_dst_port_bytes_rate:
      name: 目的端口 Flow 流量速率
      desc: 按目的端口聚合的 Flow 流量速率，用于分析应用或服务端口流量热点。
    device_flow_dst_port_packets_rate:
      name: 目的端口 Flow 包速率
      desc: 按目的端口聚合的 Flow 包速率，用于分析应用或服务端口包量热点。
    device_flow_src_port_bytes_rate:
      name: 源端口 Flow 流量速率
      desc: 按源端口聚合的 Flow 流量速率，用于辅助分析客户端侧端口流量分布。
    device_flow_top_src_bytes_rate:
      name: Top 源地址 Flow 流量速率
      desc: 按源地址聚合并排序的 Flow 流量速率，用于发现主要流量来源。
    device_flow_top_dst_bytes_rate:
      name: Top 目的地址 Flow 流量速率
      desc: 按目的地址聚合并排序的 Flow 流量速率，用于发现主要流量去向。
    device_flow_top_src_packets_rate:
      name: Top 源地址 Flow 包速率
      desc: 按源地址聚合并排序的 Flow 包速率，用于发现包量异常来源。
    device_flow_top_dst_packets_rate:
      name: Top 目的地址 Flow 包速率
      desc: 按目的地址聚合并排序的 Flow 包速率，用于发现包量异常目标。
    device_flow_top_conversation_bytes_rate:
      name: Top 会话 Flow 流量速率
      desc: 按源地址、目的地址、协议和目的端口聚合的会话流量排行，用于定位主要通信关系。
  Consul:
    consul_health_checks_passing:
      name: 健康检查通过数
      desc: Consul节点上健康检查结果为通过状态的数量，值为1表示检查通过，0表示未通过
    consul_health_checks_critical:
      name: 健康检查危险数
      desc: Consul节点上健康检查结果为危险状态的数量，值为1表示检查处于危险状态，0表示正常
    consul_health_checks_warning:
      name: 健康检查警告数
      desc: Consul节点上健康检查结果为警告状态的数量，值为1表示检查处于警告状态，0表示正常
    consul_health_checks_status:
      name: 健康检查状态
      desc: Consul节点上健康检查的当前状态值，通常用于表示检查的具体状态代码
    consul_health_checks_check_name:
      name: 检查名称标识
      desc: 健康检查的名称标识符，用于区分不同类型的检查（如serfHealth表示Serf集群健康检查）
    consul_health_checks_service_id:
      name: 服务ID标识
      desc: 健康检查关联的服务ID标识符，值为0表示节点级检查，非0表示关联特定服务
  Ping:
    ping_average_response_ms:
      name: 平均响应时间
      desc: ICMP 请求的平均响应时间，反映网络延迟的平均水平
    ping_maximum_response_ms:
      name: 最大响应时间
      desc: ICMP 请求的最大响应时间，反映网络延迟的峰值情况
    ping_minimum_response_ms:
      name: 最小响应时间
      desc: ICMP 请求的最小响应时间，反映网络延迟的最佳情况
    ping_percent_packet_loss:
      name: 数据包丢失率
      desc: ICMP数据包丢失百分比，反映网络连接的稳定性
    ping_result_code:
      name: Ping结果代码
      desc: Ping测试的结果代码，表示Ping操作的成功或失败状态
    ping_ttl:
      name: 生存时间(TTL)
      desc: 接收到的ICMP响应包的生存时间值，反映数据包经过的网络跳数
  Nginx:
    nginx_active:
      name: 活跃连接数
      desc: 当前活跃的客户端连接数，反映并发负载
    nginx_reading:
      name: 读取连接数
      desc: 正在读取请求头的连接数，反映请求处理状态
    nginx_writing:
      name: 写入连接数
      desc: 正在写入响应的连接数，反映响应处理状态
    nginx_waiting:
      name: 等待连接数
      desc: 等待请求的空闲连接数，反映连接池使用情况
    nginx_requests_rate:
      name: 请求速率
      desc: Nginx处理的请求速率，反映实时负载
    nginx_accepts_rate:
      name: 连接接受速率
      desc: Nginx接受新连接的速率，反映连接建立频率
    nginx_handled_rate:
      name: 连接处理速率
      desc: Nginx处理连接的速率，反映连接处理能力
  WebLogic-JMX:
    weblogic_jms_jmsservers_current_count_value:
      name: JMS 服务器当前数量
      desc: 当前正在运行的 JMS 服务器实例数量。数量的增减可能影响消息传递的性能和可靠性。
    weblogic_application_healthstatejmx_is_critical_value:
      desc: 应用是否处于严重异常状态的标志，直接反映业务可用性。当该指标为1时，表示应用出现严重问题，需要立即排查和修复。
      name: 应用健康严重状态
    jmx_scrape_error_gauge:
      desc: 值为0时表示监控指标抓取成功，值为1时表示抓取失败。
      name: JMX抓取失败的监控指标
    weblogic_persistentstore_read_count_value:
      desc: 持久化存储执行的读操作次数，反映读取负载。频繁的读取操作可能影响存储性能，需要优化读取策略。
      name: 持久化存储读取次数
    weblogic_threadpool_pending_user_request_count_value:
      name: 待处理用户请求数
      desc: 等待线程池处理的用户请求队列长度，持续增长可能导致响应延迟。如果该指标持续增加，说明线程池处理请求的速度跟不上请求到达的速度，可能会导致用户体验下降。
    weblogic_threadpool_load_ratio:
      name: 线程池负载比
      desc: 评估线程池负载压力，值 > 1 表示请求超过处理能力，80%时应严重警告。该指标可以帮助判断线程池是否处于过载状态，以便及时采取措施避免系统崩溃。
    weblogic_threadpool_stuck_thread_count_value:
      desc: 长时间运行未完成的线程数量，可能表示存在死锁或慢查询。当该指标大于0时，需要排查是否存在代码逻辑问题或数据库查询性能问题。
      name: 停滞线程数
    weblogic_workmanager_stuck_thread_count_value:
      name: 全局工作管理器停滞线程数
      desc: 全局工作管理器中停滞的线程数量，用于系统级线程问题排查。当该指标大于0时，需要检查系统是否存在线程阻塞或资源竞争问题。
    weblogic_jms_connections_current_count_value:
      desc: 当前已建立的 JMS 连接数。过多的连接可能导致资源紧张，过少则可能影响消息传递效率。
      name: JMS 当前连接数
    weblogic_threadpool_throughput_value:
      name: 线程池吞吐量
      desc: 线程池每秒处理的请求数量，反映处理能力。该指标越高，表明线程池处理请求的能力越强。当吞吐量显著下降时，可能表示线程池存在性能瓶颈或资源不足。
    weblogic_application_overallhealthstatejmx_is_critical_value:
      name: 应用整体健康严重状态
      desc: 综合多个指标评估的应用整体健康状态是否严重异常。当该指标为1时，说明应用的整体健康状况不佳，可能影响业务的正常运行。
    weblogic_persistentstore_total_io_rate_value:
      name: 持久化存储总 I/O 频率
      desc: 表示持久化存储每秒的总 I/O 操作次数，包括读和写。过高的 I/O 频率可能导致存储性能瓶颈，需要关注存储系统的性能指标。
    weblogic_jms_connections_high_count_value:
      name: JMS 连接数峰值
      desc: JMS 连接数的历史最高记录，用于评估连接池配置合理性。如果当前连接数接近峰值，可能需要调整连接池大小。
    weblogic_workmanager_pending_requests_value:
      desc: 全局工作管理器中等待处理的请求数量。如果该指标持续增加，可能会影响系统的响应速度。
      name: 全局工作管理器待处理请求数
    weblogic_persistentstore_physical_write_count_value:
      name: 持久化存储物理写入频率
      desc: 表示持久化存储每秒的物理写入次数，反映写入负载。过高的写入频率可能导致存储性能下降。
    weblogic_persistentstore_object_count_value:
      desc: 持久化存储中当前保存的对象数量（如消息、事务日志）。过多的对象可能导致存储空间不足，需要定期清理。
      name: 持久化存储对象数
    weblogic_threadpool_average_utilization:
      desc: 反映线程池在一段时间内的平均利用率。利用率过高可能导致线程池过载，过低则可能表示资源浪费。一般建议保持在60%-80%之间。
      name: 线程平均利用率
    weblogic_threadpool_queue_length_value:
      desc: 线程池请求队列中的任务数量，反映请求积压情况。队列长度过长意味着大量请求等待处理，可能需要增加线程池资源或优化请求处理逻辑。
      name: 线程池队列长度
  TCP:
    ConnectStatus:
      name: 连接状态
      desc: 该指标反映云平台 API 的可访问性、账号凭证有效性以及采集链路的整体健康状况
  CVM:
    CPUUsage_gauge:
      name: CPU 利用率
      desc: 机器运行期间实时占用的 CPU 百分比
    MemUsed_gauge:
      name: 内存使用量
      desc: 用户实际使用的内存量，不包括缓冲区与系统缓存占用的内存。计算方式为：总内存 - (可用内存，含 buffers 与 cached)
    MemUsage_gauge:
      name: 内存利用率
      desc: 用户实际内存使用率，不包括缓冲区与系统缓存占用的内存。为用户实际使用内存与总内存之比
    CvmDiskUsage_gauge:
      name: 磁盘利用率
      desc: 所有磁盘的已使用容量占总容量的百分比
    LanOuttraffic_gauge:
      name: 内网出流量
      desc: 内网网卡的平均出流量速率
    LanIntraffic_gauge:
      name: 内网入流量
      desc: 内网网卡的平均入流量速率
    LanOutpkg_gauge:
      name: 内网出包率
      desc: 内网网卡的平均出包速率
    LanInpkg_gauge:
      name: 内网入包率
      desc: 内网网卡的平均入包速率
    WanOuttraffic_gauge:
      name: 外网出流量
      desc: 外网平均出流量速率（EIP+CLB+CVM 外网出带宽总和）。最小统计粒度为10秒平均值
    WanIntraffic_gauge:
      name: 外网入流量
      desc: 外网平均入流量速率（EIP+CLB+CVM 外网入带宽总和）。最小统计粒度为10秒平均值
    WanOutpkg_gauge:
      name: 外网出包率
      desc: 外网网卡的平均出包速率
    WanInpkg_gauge:
      name: 外网入包率
      desc: 外网网卡的平均入包速率
  ESXI:
    cpu_usage_average_gauge:
      name: CPU使用率
      desc: 表示系统或应用程序的CPU使用率，是衡量CPU负载和性能的关键指标
    mem_usage_average_gauge:
      name: 内存使用率
      desc: 内存使用率，表示内存的使用情况，用于评估系统或应用程序的内存负载
    mem_consumed_average_gauge:
      name: 活动内存
      desc: 活动内存，表示系统或应用程序实际使用的内存量，是内存消耗的关键指标
    disk_read_average_gauge:
      name: 磁盘读速率
      desc: 磁盘读速率，表示每秒钟从磁盘读取的数据量，是衡量磁盘读性能的重要指标
    disk_write_average_gauge:
      name: 磁盘写速率
      desc: 磁盘写速率，表示每秒钟向磁盘写入的数据量，是衡量磁盘写性能的重要指标
    disk_numberRead_summation_gauge_rate:
      name: 磁盘读IO速率
      desc: 表示每秒完成的磁盘读操作次数，是衡量磁盘读请求频率的重要指标。值越高，表示磁盘读请求越频繁
    disk_numberWrite_summation_gauge_rate:
      name: 磁盘写IO速率
      desc: 表示每秒完成的磁盘写操作次数，是衡量磁盘写请求频率的重要指标。值越高，表示磁盘写请求越频繁
    net_bytesRx_average_gauge:
      name: 网络接收速率
      desc: 网络接收速率，表示每秒钟接收到的数据量，是网络流量的重要衡量标准
    net_bytesTx_average_gauge:
      name: 网络发送速率
      desc: 网络发送速率，表示每秒钟发送出去的数据量，是网络流量的重要衡量标准
  Cluster:
    cluster_pod_count:
      name: 集群Pod总数
      desc: 统计当前 Kubernetes 集群中的 Pod 总数。该指标基于 kube_pod_info 进行统计，返回在当前筛选条件下（如集群、命名空间等）存在的 Pod 数量，覆盖所有命名空间
    cluster_node_count:
      name: 集群节点数
      desc: 统计当前 Kubernetes 集群中的节点（Node）总数。该指标反映集群中已注册的节点数量，可用于评估集群规模及基础资源容量
    cluster_memory_utilization:
      name: 集群总内存使用率
      desc: 表示当前 Kubernetes 集群中所有节点已使用内存与内存总量之间的比例，以百分比形式展示。该指标用于整体评估集群内存资源的使用情况和压力水平
    cluster_disk_utilization:
      name: 集群总磁盘使用率
      desc: 表示 Kubernetes 集群中所有节点磁盘的整体使用率
  Apache:
    apache_ServerUptimeSeconds:
      name: 服务运行时间
      desc: 服务器自最近一次启动以来的持续运行时长，反映服务的稳定性与可用性
    apache_ParentServerConfigGeneration:
      name: 父服务器配置生成
      desc: 父服务器配置重新加载的次数，每次配置重载该值会增加
    apache_TotalAccesses:
      name: 总访问次数
      desc: 累计处理的HTTP请求总数，用于衡量服务器的总体工作负载和处理能力
    apache_ReqPerSec:
      name: 请求处理速率
      desc: 当前时刻服务器处理请求的速率，直接反映服务器的实时处理性能
    apache_BytesPerSec:
      name: 数据传输速率
      desc: 服务器每秒发送的数据量，反映网络带宽使用情况和数据吞吐能力
    apache_BusyWorkers:
      name: 忙碌工作进程数
      desc: 当前正在处理客户端请求的工作进程数量，数值过高可能表明服务器负载过大
    apache_IdleWorkers:
      name: 空闲工作进程数
      desc: 当前处于空闲状态等待请求的工作进程数量，反映服务器的处理能力余量
    apache_CPULoad:
      name: CPU负载
      desc: 进程占用的CPU资源百分比，用于监控CPU使用率和识别资源瓶颈
    apache_Load1:
      name: 1分钟系统负载
      desc: 过去1分钟内系统的平均负载，反映短期内的系统资源压力
    apache_Load5:
      name: 5分钟系统负载
      desc: 过去5分钟内系统的平均负载，反映中期系统资源压力趋势
    apache_Load15:
      name: 15分钟系统负载
      desc: 过去15分钟内系统的平均负载，反映长期系统资源压力趋势
    apache_TotalAccesses_rate:
      name: 请求速率变化率
      desc: 基于5分钟时间窗口计算的每秒请求数变化率，反映请求流量的趋势和波动
    apache_scboard_open:
      name: 打开连接数
      desc: 记分板中当前处于打开状态的连接总数，反映当前的并发连接数量
    apache_scboard_waiting:
      name: 等待连接数
      desc: 记分板中等待空闲工作进程的连接数量，数值过高可能表示服务器资源不足
    apache_scboard_reading:
      name: 读取连接数
      desc: 记分板中正在读取客户端请求头的连接数量，反映请求接收阶段的状态
    apache_scboard_sending:
      name: 发送连接数
      desc: 记分板中正在向客户端发送响应的连接数量，反映响应发送阶段的状态
    apache_scboard_open_rate:
      name: 连接打开变化率
      desc: 基于5分钟时间窗口计算的每秒连接打开数变化率，反映连接建立的趋势和速率
    apache_CacheCurrentEntries:
      name: 当前缓存条目数
      desc: 缓存模块当前存储的缓存条目数量，反映缓存使用情况和内存占用
    apache_CacheRetrieveHitCount:
      name: 缓存命中次数
      desc: 缓存检索中成功命中的次数，高命中率表明缓存效率良好，减轻了后端负载
  Haproxy:
    haproxy_scur:
      name: 当前会话数
      desc: 该前端/后端/服务器当前正在处理的活跃会话数，反映实时并发量
    haproxy_smax:
      name: 最大会话数
      desc: 启动以来观测到的最大并发会话数，可用于容量规划
    haproxy_slim:
      name: 会话上限
      desc: 配置的会话上限；当前会话接近该值时存在拒绝新连接的风险
    haproxy_stot:
      name: 累计会话数
      desc: 启动以来累计处理的会话总数，单调递增计数器，衡量总体负载
    haproxy_rate:
      name: 会话建立速率
      desc: 最近1秒内每秒新建会话数，反映实时连接压力
    haproxy_rate_max:
      name: 最大会话速率
      desc: 启动以来观测到的每秒最大会话建立速率，反映峰值负载
    haproxy_qcur:
      name: 当前排队请求数
      desc: 当前等待空闲后端服务器的排队请求数，持续偏高表明后端饱和
    haproxy_qmax:
      name: 最大排队请求数
      desc: 启动以来观测到的最大排队请求数，反映后端峰值压力
    haproxy_bin:
      name: 入站字节数
      desc: 启动以来从客户端接收的累计字节数，衡量入站流量
    haproxy_bout:
      name: 出站字节数
      desc: 启动以来发送给客户端的累计字节数，衡量出站流量
    haproxy_req_rate:
      name: HTTP请求速率
      desc: 最近1秒内每秒接收的HTTP请求数，反映实时请求吞吐
    haproxy_req_rate_max:
      name: 最大HTTP请求速率
      desc: 启动以来观测到的每秒最大HTTP请求速率，反映峰值请求压力
    haproxy_req_tot:
      name: 累计HTTP请求数
      desc: 启动以来累计接收的HTTP请求总数，计数器，衡量总体请求负载
    haproxy_hrsp_2xx:
      name: 2xx响应数
      desc: 累计返回的HTTP 2xx（成功）响应数，反映正常处理的请求
    haproxy_hrsp_3xx:
      name: 3xx响应数
      desc: 累计返回的HTTP 3xx（重定向）响应数
    haproxy_hrsp_4xx:
      name: 4xx响应数
      desc: 累计返回的HTTP 4xx（客户端错误）响应数，持续增长可能表明客户端或鉴权问题
    haproxy_hrsp_5xx:
      name: 5xx响应数
      desc: 累计返回的HTTP 5xx（服务端错误）响应数，增长通常表明后端服务故障
    haproxy_ereq:
      name: 请求错误数
      desc: 启动以来累计的请求错误数（如非法请求、请求前客户端超时）
    haproxy_econ:
      name: 连接错误数
      desc: 启动以来连接后端服务器的累计错误数，增长表明后端连通性问题
    haproxy_eresp:
      name: 响应错误数
      desc: 启动以来后端响应的累计错误数，包含中断和异常响应
    haproxy_dreq:
      name: 拒绝请求数
      desc: 启动以来被安全ACL规则拒绝的累计请求数
    haproxy_dresp:
      name: 拒绝响应数
      desc: 启动以来被安全ACL规则拒绝的累计响应数
    haproxy_wretr:
      name: 连接重试数
      desc: 启动以来连接后端服务器的累计重试次数，偏高表明后端不稳定
    haproxy_wredis:
      name: 请求重分发数
      desc: 启动以来请求被重新分发到其他后端服务器的累计次数
    haproxy_act:
      name: 活跃服务器数
      desc: 该后端中当前在线的活跃（非备份）服务器数量，反映可用服务能力
    haproxy_bck:
      name: 备份服务器数
      desc: 该后端中当前在线的备份服务器数量，用于故障切换
    haproxy_chkfail:
      name: 健康检查失败数
      desc: 启动以来累计的健康检查失败次数，增长表明服务器不稳定或故障
    haproxy_chkdown:
      name: 下线切换次数
      desc: 启动以来UP到DOWN的累计切换次数，反映服务器变为不可用的频率
    haproxy_downtime:
      name: 累计停机时长
      desc: 启动以来累计的停机秒数，反映服务器累计不可用时长
    haproxy_qtime:
      name: 平均排队时间
      desc: 最近1024个请求的平均排队等待时间（毫秒）
    haproxy_ctime:
      name: 平均连接时间
      desc: 最近1024个请求建立后端连接的平均时间（毫秒）
    haproxy_rtime:
      name: 平均响应时间
      desc: 最近1024个请求的后端平均响应时间（毫秒），偏高表明后端缓慢
    haproxy_ttime:
      name: 平均总时间
      desc: 最近1024个请求端到端的平均会话总时间（毫秒）
  Node:
    node_status_condition:
      name: Node状态
      desc: 表示 Kubernetes 节点的当前状态条件，包括 Ready（就绪）、MemoryPressure（内存压力）、DiskPressure（磁盘压力）等，用于判断节点是否可正常调度 Pod
    node_cpu_utilization:
      name: CPU使用率
      desc: 反映节点总体 CPU 资源的使用程度，计算方式为 (总量 - 空闲) / 总量。可用于识别 CPU 瓶颈及优化资源分配
    node_cpu_idle_rate:
      name: CPU空闲率
      desc: 表示节点 CPU 的空闲资源比例，数值越高说明系统负载越低，可用于评估系统是否处于过载状态
    node_cpu_iowait_rate:
      name: 等待IO百分比
      desc: 表示 CPU 因等待 I/O 操作完成而处于空闲状态的时间占比，通常反映磁盘或网络子系统的瓶颈程度
    node_cpu_system_rate:
      name: 系统使用率
      desc: 表示内核态进程占用 CPU 的比例，用于评估系统调用和内核活动的开销
    node_cpu_user_rate:
      name: 用户使用率
      desc: 表示用户态进程占用 CPU 的比例，主要反映应用程序和服务的计算资源消耗
    node_memory_utilization:
      name: 内存使用率
      desc: 表示节点内存资源的整体使用程度，计算方式为 (总量 - 可用) / 总量。用于评估内存压力及是否需要扩容
    node_memory_usage:
      name: 内存使用量
      desc: 表示节点当前已使用的内存总量（单位：字节），用于分析实际内存占用情况
    node_memory_available:
      name: 可用内存
      desc: 表示节点当前可供新进程或缓存使用的内存总量（单位：字节），是判断内存是否充足的核心指标
    node_memory_swap_free:
      name: 空闲Swap
      desc: 表示交换空间（Swap）中空闲可用的大小（单位：字节）。当 Swap 接近耗尽时，可能导致 OOM 风险增加
    node_memory_cached:
      name: 缓存内存
      desc: 表示被操作系统用于文件系统缓存的内存大小（单位：字节），可在内存紧张时被释放
    node_memory_shared:
      name: 共享内存
      desc: 表示被多个进程共享使用的内存大小（单位：字节），常见于 IPC（进程间通信）场景
    node_memory_buffered:
      name: 缓冲区内存
      desc: 表示用于内核缓冲区（Buffer）的内存大小（单位：字节），主要用于加速块设备 I/O
    node_disk_usage_rate:
      name: 磁盘使用率
      desc: 表示节点磁盘空间的使用比例，计算方式为已用空间 / 总空间。用于预警磁盘即将耗尽的情况
    node_disk_used:
      name: 磁盘使用量
      desc: 表示节点磁盘空间的实际使用量（单位：字节），用于分析当前存储资源消耗
    node_disk_free:
      name: 磁盘剩余量
      desc: 表示节点磁盘空间的剩余可用量（单位：字节），是评估存储容量是否充足的关键指标
    node_disk_inodes_used_percent:
      name: Inode使用率
      desc: 表示文件系统 inode 的使用比例。inode 耗尽会导致无法创建新文件，即使磁盘空间充足
    node_diskio_io_util:
      name: 磁盘I/O使用率
      desc: 表示磁盘处理 I/O 请求所占用的时间比例，反映磁盘的繁忙程度。接近 100% 表示磁盘已达性能瓶颈
    node_diskio_write_bytes_rate:
      name: 磁盘写入速率
      desc: 表示每秒写入磁盘的数据量（单位：字节/秒），反映磁盘写入负载情况
    node_diskio_read_bytes_rate:
      name: 磁盘读取速率
      desc: 表示每秒从磁盘读取的数据量（单位：字节/秒），反映磁盘读取负载情况
    node_disk_write_latency:
      name: 磁盘写入延迟
      desc: 表示磁盘写操作的平均响应时间（单位：毫秒），高延迟可能表明存储性能瓶颈
    node_disk_read_latency:
      name: 磁盘读取延迟
      desc: 表示磁盘读操作的平均响应时间（单位：毫秒），高延迟会影响应用读取数据的性能
    node_net_packets_recv_rate:
      name: 网卡接收包速率
      desc: 表示每秒通过网络接口接收的数据包数量，用于分析网络流量和检测异常流量
    node_net_packets_sent_rate:
      name: 网卡发送包速率
      desc: 表示每秒通过网络接口发送的数据包数量，用于评估网络出口流量情况
    node_net_bytes_recv_rate:
      name: 网卡入流量速率
      desc: 表示每秒通过网络接口接收的数据量（单位：字节/秒），用于评估网络带宽使用情况
    node_net_bytes_sent_rate:
      name: 网卡出流量速率
      desc: 表示每秒通过网络接口发送的数据量（单位：字节/秒），用于分析出口带宽占用情况
    node_cpu_load1:
      name: 1分钟平均负载
      desc: 表示过去 1 分钟内系统的平均负载值，反映短期内的 CPU 及 I/O 压力情况
    node_cpu_load5:
      name: 5分钟平均负载
      desc: 表示过去 5 分钟内系统的平均负载值，用于判断中期系统负载趋势
    node_cpu_load15:
      name: 15分钟平均负载
      desc: 表示过去 15 分钟内系统的平均负载值，反映较长时间段内的系统负载稳定性
  ElasticSearch:
    elasticsearch_cluster_health_status_code:
      name: 集群健康状态
      desc: 集群健康核心度量，通过状态值反映集群健康程度：1 对应正常（green）、2 对应副本缺失、3 对应主分片缺失（故障）；red 状态会直接影响数据可用性
    elasticsearch_cluster_health_active_primary_shards:
      name: 活跃主分片数
      desc: 数据可用性核心指标，代表主分片的活跃数量；若主分片缺失，对应数据将无法读写，需确保其与预期数量一致
    elasticsearch_cluster_health_unassigned_shards:
      name: 未分配分片数
      desc: 集群异常核心标志，代表未分配分片的数量；该值大于 0 时需及时排查，长期存在会降低数据冗余度与系统可用性
    elasticsearch_jvm_mem_heap_used_percent:
      name: JVM 堆使用率
      desc: JVM 内存压力核心指标，反映 JVM 内存的占用情况；内存占用过高易引发 Full GC，进而导致集群运行卡顿
    elasticsearch_jvm_gc_collectors_young_collection_time_in_millis_rate:
      name: 年轻代 GC 每秒耗时
      desc: GC 效率监控指标，反映 GC 操作的耗时情况；该值持续偏高表示 GC 占用大量 CPU 资源，会对业务性能造成影响
    elasticsearch_fs_data_0_available_in_bytes:
      name: 节点可用磁盘空间
      desc: 节点存储可用性指标，反映节点磁盘的剩余空间情况；磁盘空间耗尽会导致节点离线
    elasticsearch_process_cpu_percent:
      name: 进程 CPU 使用率
      desc: 进程计算负载指标，反映进程的 CPU 负载情况；高负载会导致集群的读写性能下降
    elasticsearch_process_open_file_descriptors:
      name: 打开文件描述符数
      desc: 文件资源监控指标，反映文件描述符的使用情况；当使用量接近系统上限时，会影响分片的可用性
    elasticsearch_breakers_fielddata_tripped_rate:
      name: Fielddata 内存断路器触发速率
      desc: 内存保护机制监控，反映内存保护断路器的触发情况；该值大于 0 表示近期存在内存不足的情况
    elasticsearch_breakers_request_tripped_rate:
      name: HTTP 请求断路器触发速率
      desc: 请求级内存保护监控，反映请求级内存保护断路器的触发情况；该值大于 0 表示近期存在请求内存过载的情况
    elasticsearch_http_current_open:
      name: HTTP 当前连接数
      desc: HTTP 服务可用性指标，反映 HTTP 服务的连接使用情况；当连接数接近上限时，会影响新请求的接收
    elasticsearch_http_total_opened_rate:
      name: HTTP 每秒新建连接数
      desc: HTTP 服务流量指标，反映近期业务请求的流量变化情况，可辅助排查流量峰值相关问题
    elasticsearch_thread_pool_write_queue:
      name: 写入线程池队列长度
      desc: 批量写入性能预警指标，反映批量(bulk)写入请求队列的长度情况；队列长度持续增长表示批量数据处理能力不足，会影响数据摄入吞吐量，导致数据同步延迟
    elasticsearch_thread_pool_search_queue:
      name: 搜索线程池队列长度
      desc: 查询性能预警指标，反映查询请求队列的长度情况；队列长度持续增长表示查询处理能力不足，会影响业务使用体验
  Redis:
    redis_uptime:
      name: 服务运行时长
      desc: Redis服务持续运行的时间长度，反映服务的稳定性与可用性，持续为正值表示服务正常运行
    redis_used_memory:
      name: 内存使用量
      desc: Redis实例当前占用的内存总量，包括数据存储和内部数据结构，监控该指标可防止内存溢出导致的服务中断
    redis_maxmemory:
      name: 内存限制配置
      desc: Redis实例配置的最大内存使用上限，与内存使用量结合可计算内存使用率，指导容量规划与扩容决策
    redis_mem_fragmentation_ratio:
      name: 内存碎片率
      desc: 内存分配器已分配内存与操作系统报告内存的比值，反映内存碎片化程度，高比值可能影响内存分配效率
    redis_instantaneous_ops_per_sec:
      name: 实时操作频率
      desc: Redis实例处理命令操作的实时频率，直接反映当前服务负载水平，用于识别流量峰值与异常波动
    redis_total_commands_processed_rate:
      name: 命令处理速率
      desc: Redis实例处理命令的平均速率，衡量服务处理能力，速率下降可能表示性能瓶颈或资源不足
    redis_keyspace_hits_rate:
      name: 键命中频率
      desc: 键空间成功命中的操作频率，反映缓存命中效率，高频率表明缓存策略有效，数据访问效率高
    redis_keyspace_misses_rate:
      name: 键未命中频率
      desc: 键空间未能命中的操作频率，反映缓存未命中情况，高频率可能需优化缓存策略或增加缓存容量
    redis_keyspace_hitrate:
      name: 缓存命中率
      desc: 键空间命中操作占总操作的比例，核心性能指标，高命中率表明缓存系统高效运行，数据访问性能良好
    redis_total_net_input_bytes_rate:
      name: 网络流入速率
      desc: Redis实例接收网络数据的平均速率，监控输入流量变化，异常增长可能表示攻击或业务逻辑变化
    redis_total_net_output_bytes_rate:
      name: 网络流出速率
      desc: Redis实例发送网络数据的平均速率，监控输出流量变化，结合业务指标分析响应数据量变化趋势
    redis_clients:
      name: 客户端连接数
      desc: 当前活跃的客户端连接数量，反映服务并发处理能力，接近最大连接数配置时可能影响新连接建立
    redis_blocked_clients:
      name: 阻塞客户端数
      desc: 处于阻塞等待状态的客户端数量，非零值表示存在性能瓶颈或资源竞争，需进一步排查原因
    redis_expired_keys_rate:
      name: 键过期频率
      desc: 因过期时间到达而被自动删除的键操作频率，反映数据生命周期管理情况，异常频率需关注
    redis_evicted_keys_rate:
      name: 键驱逐频率
      desc: 因内存限制而被主动驱逐的键操作频率，反映内存压力情况，非零频率表示内存使用已达上限
    redis_rejected_connections_rate:
      name: 连接拒绝频率
      desc: 因达到最大连接数而被拒绝的连接请求频率，反映连接资源紧张程度，非零频率需考虑扩容
  Docker:
    docker_n_containers_running:
      name: 正在运行的容器数
      desc: 该指标表示 Docker 主机上正在运行的容器数量
    docker_n_containers:
      name: 容器总数
      desc: 该指标表示 Docker 主机上的容器总数量
    docker_n_containers_stopped:
      name: 停止的容器数
      desc: 该指标表示 Docker 主机上停止的容器数量
  Pod:
    pod_status_phase:
      name: Pod状态
      desc: 表示 Kubernetes Pod 当前的生命周期阶段，包括 Pending、Running、Succeeded、Failed、Unknown 等状态
    pod_container_restarts_total:
      name: 容器重启总次数
      desc: 表示 Pod 中所有容器的累计重启次数，频繁重启可能表明存在应用崩溃、健康检查失败或资源不足等问题
    pod_cpu_utilization:
      name: CPU使用率
      desc: 表示 Pod 当前 CPU 实际使用量与请求量（request）之间的比例，用于评估 Pod 的计算资源使用效率
    pod_memory_utilization:
      name: 内存使用率
      desc: 表示 Pod 当前内存实际使用量与请求量（request）之间的比例，用于评估 Pod 的内存资源使用效率
    pod_io_writes_rate:
      name: I/O写速率
      desc: 表示 Pod 中容器每秒的磁盘写入字节数，反映应用对存储子系统的写入负载情况
    pod_io_reads_rate:
      name: I/O读速率
      desc: 表示 Pod 中容器每秒的磁盘读取字节数，反映应用对存储子系统的读取负载情况
    pod_network_in_rate:
      name: 网络入流量速率
      desc: 表示 Pod 每秒通过网络接收的数据量（单位：字节/秒），用于分析入站网络流量
    pod_network_out_rate:
      name: 网络出流量速率
      desc: 表示 Pod 每秒通过网络发送的数据量（单位：字节/秒），用于分析出站网络流量
  vCenter:
    vmware_esxi_count:
      name: ESXI数量
      desc: 该指标用于统计VMware环境中ESXi主机的数量，帮助管理员了解当前的物理主机资源情况
    vmware_datastore_count:
      name: 数据存储数量
      desc: 该指标统计VMware环境中数据存储的数量，便于监控存储资源的分配和使用情况
    vmware_vm_count:
      name: 虚拟机数量
      desc: 该指标统计VMware环境中虚拟机的数量，用于评估虚拟化资源的使用情况
  DataStorage:
    disk_used_average_gauge:
      name: 磁盘使用率
      desc: 磁盘使用率，表示磁盘空间的使用情况，是衡量磁盘存储利用率的指标
    disk_free_average_gauge:
      name: 磁盘剩余量
      desc: 磁盘剩余量，表示磁盘中未使用的空间量，是评估磁盘容量的关键指标
    store_accessible_gauge:
      name: 存储连接状态
      desc: 存储连接状态，表示存储设备的可连接性，是评估存储系统健康状态的指标
  MSSQL:
    sqlserver_cpu_sqlserver_process_cpu_avg:
      name: MSSQL进程CPU使用率
      desc: SQL Server数据库进程的CPU使用率，直接反映数据库计算负载。持续高值可能表示查询需要优化或存在资源瓶颈。
    sqlserver_cpu_system_idle_cpu_avg:
      name: 系统空闲CPU
      desc: 整个操作系统空闲的CPU百分比，反映服务器整体CPU资源利用率。低值表示CPU资源紧张，可能影响系统稳定性。
    sqlserver_server_properties_uptime:
      name: 运行时长
      desc: SQL Server实例自上次启动以来的持续运行时间，用于监控实例稳定性。长时间运行后可能需要重启以释放内存和清理资源。
    sqlserver_database_io_read_latency_ms:
      name: 数据库读取延迟
      desc: 数据库文件读取操作的平均延迟时间，反映存储子系统性能。高延迟可能表明存储瓶颈、网络问题或硬件性能不足。
    sqlserver_database_io_write_latency_ms:
      name: 数据库写入延迟
      desc: 数据库文件写入操作的平均延迟时间，直接影响事务性能和应用程序响应时间。高延迟可能影响数据写入速度和系统吞吐量。
    sqlserver_database_io_reads_rate:
      name: 数据库读取速率
      desc: 数据库文件读取操作的速率，反映数据读取负载强度和工作集访问模式。高读取速率可能表明查询频繁或缓存效率低。
    sqlserver_database_io_writes_rate:
      name: 数据库写入速率
      desc: 数据库文件写入操作的速率，反映数据写入负载强度和事务活动级别。高写入速率可能表示大量数据更新或插入操作。
    sqlserver_memory_clerks_size_kb:
      name: 内存Clerk大小
      desc: SQL Server内部内存分配器当前占用的内存大小，用于分析内存使用分布和识别潜在内存泄漏。不同clerk代表不同的内存使用用途。
    sqlserver_performance_value_rate:
      name: 批处理请求速率
      desc: SQL Server批处理请求的速率，衡量数据库整体吞吐量和负载压力。高请求率表示数据库处理大量查询。
    sqlserver_page_life_expectancy:
      name: 页生命周期期望
      desc: 数据页在缓冲池中的平均停留时间，反映内存压力。值过低表明内存不足，可能导致频繁的物理IO，影响性能。
    sqlserver_buffer_cache_hit_ratio:
      name: 缓冲区缓存命中率
      desc: 从缓冲池中读取数据页的百分比，反映内存效率。高命中率表明大部分数据请求由内存满足，性能良好。低命中率可能表明需要更多内存。
    sqlserver_user_connections_rate:
      name: 用户连接数
      desc: 当前连接到SQL Server实例的用户数量，反映数据库的并发负载和连接池使用情况。连接数过多可能导致资源争用。
    sqlserver_lock_wait_time_rate:
      name: 锁等待时间
      desc: 锁等待时间的速率，反映数据库的并发争用情况。高值可能表明存在阻塞或锁竞争问题，需要优化事务设计。
    sqlserver_requests_cpu_time_ms_rate:
      name: 请求CPU时间速率
      desc: 请求消耗CPU时间的速率，用于识别高CPU消耗的查询和语句，帮助进行性能优化和资源分配决策。
    sqlserver_requests_logical_reads_rate:
      name: 请求逻辑读取速率
      desc: 请求执行逻辑读取操作的速率，反映查询数据访问模式和工作集大小。高逻辑读取可能表明查询缺少索引或需要优化。
    sqlserver_requests_total_elapsed_time_ms_rate:
      name: 请求运行时间速率
      desc: 请求总运行时间的速率，监控查询执行效率和响应时间。高运行时间可能表明查询复杂、数据量大或存在性能问题。
    sqlserver_requests_wait_time_ms_rate:
      name: 请求等待时间速率
      desc: 请求等待时间的速率，反映查询在资源上的等待情况。高等待时间可能表明存在资源瓶颈或锁竞争。
    sqlserver_schedulers_active_workers_count:
      name: 调度器活动工作线程数
      desc: 调度器上当前正在执行任务的活动工作线程数量，反映CPU调度负载。过高可能表示CPU压力大或存在并行查询争用。
    sqlserver_schedulers_runnable_tasks_count:
      name: 调度器可运行任务数
      desc: 调度器上准备就绪等待CPU执行的任务数量，反映CPU队列长度。高值表示CPU资源不足或存在大量并发请求。
    sqlserver_waitstats_resource_wait_ms:
      name: 资源等待时间速率
      desc: 等待外部资源（如磁盘、网络、内存）的时间速率，反映真正的资源瓶颈。帮助识别IO、内存或网络等硬件限制。
    sqlserver_waitstats_signal_wait_time_ms_rate:
      name: 信号等待时间速率
      desc: 等待CPU调度的时间速率，反映CPU压力。高信号等待时间表明CPU资源紧张或存在并行查询争用，需要优化查询或增加CPU资源。
    sqlserver_waitstats_wait_time_ms_rate:
      name: 等待时间速率
      desc: SQL Server中各种等待类型的累计等待时间的速率，是性能调优的关键指标，帮助识别系统瓶颈。
    sqlserver_waitstats_waiting_tasks_count:
      name: 等待任务数
      desc: 当前正在等待的SQL Server任务数量，反映系统的并发等待情况。高等待任务数可能表明系统存在资源争用。
    sqlserver_volume_space_available_space_bytes:
      name: 卷可用空间
      desc: 存储卷的可用空间大小，监控磁盘空间使用情况。空间不足可能导致数据库操作失败或性能下降。
    sqlserver_volume_space_total_space_bytes:
      name: 卷总空间
      desc: 存储卷的总空间大小，用于计算磁盘使用率，规划存储扩容。
    sqlserver_volume_space_used_space_bytes:
      name: 卷已用空间
      desc: 存储卷的已用空间大小，结合总空间可计算使用率，监控存储增长趋势。
  Zookeeper:
    zookeeper_version:
      name: 版本信息
      desc: Zookeeper服务的运行版本标识，用于识别软件版本与兼容性。
    zookeeper_num_alive_connections:
      name: 活跃连接数
      desc: 当前活跃的客户端连接数量，是衡量服务实时负载和并发压力的关键指标。
    zookeeper_outstanding_requests:
      name: 待处理请求数
      desc: 当前排队等待处理的请求数量，值持续偏高表明服务处理能力可能出现瓶颈。
    zookeeper_avg_latency:
      name: 平均延迟
      desc: 处理客户端请求的平均响应时间，是评估Zookeeper核心性能的主要指标。
    zookeeper_max_latency:
      name: 最大延迟
      desc: 处理单个请求所记录的最大响应时间，反映极端情况下的性能瓶颈。
    zookeeper_min_latency:
      name: 最小延迟
      desc: 处理请求的最小响应时间，代表服务在理想条件下的最佳性能表现。
    zookeeper_packets_received:
      name: 接收数据包数
      desc: 服务器累计接收的网络数据包总数，用于衡量网络输入流量。
    zookeeper_packets_sent:
      name: 发送数据包数
      desc: 服务器累计发送的网络数据包总数，用于衡量网络输出流量。
    zookeeper_watch_count:
      name: Watch监控数
      desc: 当前在ZNode上注册的监听器数量，反映客户端对数据变更的关注度。
    zookeeper_ephemerals_count:
      name: 临时节点数
      desc: 当前数据树中临时节点的数量，通常与会话生命周期关联。
    zookeeper_znode_count:
      name: ZNode总数
      desc: Zookeeper数据树中所有节点的总数，反映数据结构的规模和复杂度。
    zookeeper_approximate_data_size:
      name: 数据大小
      desc: 存储的所有ZNode数据的近似内存占用大小，用于容量规划。
    zookeeper_open_file_descriptor_count:
      name: 打开文件描述符
      desc: 当前进程打开的文件描述符数量，接近系统上限时可能影响服务。
    zookeeper_max_file_descriptor_count:
      name: 最大文件描述符
      desc: 操作系统允许该进程打开的最大文件描述符数量，是资源限制的配置项。
    zookeeper_fsync_threshold_exceed_count:
      name: Fsync超限计数
      desc: 事务日志同步到磁盘的耗时超过阈值的次数，反映磁盘I/O性能问题。
    zookeeper_packets_received_rate:
      name: 数据包接收速率
      desc: 过去5分钟内的平均数据包接收速率，反映实时的网络输入负载。
    zookeeper_packets_sent_rate:
      name: 数据包发送速率
      desc: 过去5分钟内的平均数据包发送速率，反映实时的网络输出负载。
    zookeeper_fsync_threshold_exceed_rate:
      name: Fsync超限速率
      desc: 过去5分钟内Fsync操作超限的频率，用于监控磁盘性能的恶化趋势。
    zookeeper_avg_latency_avg:
      name: 平均延迟趋势
      desc: 过去5分钟内平均延迟的滑动平均值，平滑瞬时波动以观察稳定趋势。
    zookeeper_max_latency_max:
      name: 最大延迟峰值
      desc: 过去5分钟内记录的最大延迟值，用于识别时间段内的最严重性能事件。
  Kafka:
    kafka_up_gauge:
      name: 监控探针状态
      desc: 监控探针的运行状态。0代表连接服务不正常，1代表连接服务正常。需要注意无数据的情况可能是连接不存在。
    kafka_brokers_gauge:
      name: Broker数量
      desc: Kafka集群中的 Broker 数量。
    kafka_broker_info_gauge:
      name: 节点信息
      desc: Kafka节点的信息，包含节点地址和节点ID。
    kafka_topic_partition_count:
      name: 主题分区数
      desc: 主题的分区数量。
    kafka_topic_partition_current_offset:
      name: 分区当前偏移量
      desc: 指定主题和分区的当前偏移量。
    kafka_topic_partition_oldest_offset:
      name: 分区最早偏移量
      desc: 指定主题和分区的最早偏移量。
    kafka_topic_partition_in_sync_replica:
      name: 分区同步副本数
      desc: 指定主题和分区的同步副本数量。
    kafka_topic_partition_leader_is_preferred:
      name: 分区首选领导者状态
      desc: 若主题/分区正在使用首选 Broker节点，则值为 1，否则为 0。
    kafka_topic_partition_replicas:
      name: 分区副本数
      desc: 指定主题和分区的副本数量。
    kafka_topic_partition_under_replicated_partition:
      name: 分区副本不足状态
      desc: 若主题/分区处于副本不足状态，则值为 1，否则为 0。
    kafka_consumergroup_current_offset:
      name: 消费者组当前偏移量
      desc: 指定消费者组在指定主题和分区的当前偏移量。
    kafka_consumergroup_lag:
      name: 消费者组滞后偏移量
      desc: 指定消费者组在指定主题和分区的当前近似滞后偏移量。
    up_gauge:
      name: 监控探针状态
      desc: 监控探针的运行状态。0代表连接服务不正常，1代表连接服务正常。需要注意无数据的情况可能是连接不存在。
    brokers_gauge:
      name: Broker数量
      desc: Kafka集群中的 Broker 数量。
    broker_info_gauge:
      name: 节点信息
      desc: Kafka节点的信息，包含节点地址和节点ID。
    topic_partition_count:
      name: 主题分区数
      desc: 主题的分区数量。
    topic_partition_current_offset:
      name: 分区当前偏移量
      desc: 指定主题和分区的当前偏移量。
    topic_partition_oldest_offset:
      name: 分区最早偏移量
      desc: 指定主题和分区的最早偏移量。
    topic_partition_in_sync_replica:
      name: 分区同步副本数
      desc: 指定主题和分区的同步副本数量。
    topic_partition_leader_is_preferred:
      name: 分区首选领导者状态
      desc: 若主题/分区正在使用首选 Broker节点，则值为 1，否则为 0。
    topic_partition_replicas:
      name: 分区副本数
      desc: 指定主题和分区的副本数量。
    topic_partition_under_replicated_partition:
      name: 分区副本不足状态
      desc: 若主题/分区处于副本不足状态，则值为 1，否则为 0。
    consumergroup_current_offset:
      name: 消费者组当前偏移量
      desc: 指定消费者组在指定主题和分区的当前偏移量。
    consumergroup_lag:
      name: 消费者组滞后偏移量
      desc: 指定消费者组在指定主题和分区的当前近似滞后偏移量。
    process_cpu_seconds_total:
      name: 探针进程CPU总时间
      desc: 监控探针进程已使用的CPU时间总量。
    process_max_fds_gauge:
      name: 探针进程最大文件描述符数
      desc: 监控探针进程能够打开的最大文件描述符数。
    process_open_fds_gauge:
      name: 探针进程打开文件描述符数
      desc: 监控探针进程当前打开的文件描述符数。
    process_resident_memory_bytes_gauge:
      name: 探针进程常驻内存大小
      desc: 监控探针进程当前常驻内存的大小。
    process_virtual_memory_bytes_gauge:
      name: 探针进程虚拟内存大小
      desc: 监控探针进程当前虚拟内存的大小。
  Etcd:
    etcd_server_has_leader_gauge:
      name: 集群是否有主节点
      desc: 当前成员是否能感知到集群主节点。
    etcd_server_is_leader_gauge:
      name: 当前角色
