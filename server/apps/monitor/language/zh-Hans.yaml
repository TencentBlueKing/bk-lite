monitor_object_plugin:
  IBM-MQ-Exporter:
    name: IBM MQ（Exporter）
    desc: 通过 IBM MQ Exporter 采集器以 MQI 客户端方式连接队列管理器，定期采集队列管理器、队列、主题与订阅的状态、积压及资源使用等指标，帮助监控消息队列的可用性与性能。需在节点预装 IBM MQ redistributable client（/opt/mqm）。
  IBMMQ:
    name: IBM MQ（Exporter）
    desc: 通过 IBM MQ Exporter 采集器以 MQI 客户端方式连接队列管理器，定期采集队列管理器、队列、主题与订阅的状态、积压及资源使用等指标，帮助监控消息队列的可用性与性能。需在节点预装 IBM MQ redistributable client（/opt/mqm）。
  Wireless Cambium SNMP:
    name: Cambium (Telegraf)
    desc: 无线设备 SNMP 采集基线模板（接口流量 + 运行时长）。采集 IF-MIB 64 位 HC 接口流量计数器（ifHCInOctets/ifHCOutOctets，ifXTable）速率与设备运行时长（sysUpTime）。无线信号强度/SNR/关联客户端数等健康指标因 Cambium 私有 MIB 采用 per-row 索引表（按射频单元/SSID/客户端逐行）并需行级过滤（skip_values），而 telegraf inputs.snmp 不支持行级过滤，故为 N/A，不伪造。适用品牌型号——Cambium Networks 无线设备（cnPilot/ePMP/PMP 系列，企业号 17713）及其他遵循 IF-MIB 标准的无线 AP/网桥。
  Wireless Proxim SNMP:
    name: Proxim (Telegraf)
    desc: 无线设备 SNMP 采集基线模板（接口流量 + 运行时长）。采集 IF-MIB 64 位 HC 接口流量计数器（ifHCInOctets/ifHCOutOctets，ifXTable）速率与设备运行时长（sysUpTime）。无线信号强度/SNR/远端订户单元等健康指标因 Proxim ORiNOCO/Tsunami 私有 MIB 采用 per-row 索引表（按射频单元/订户单元逐行）并需行级过滤（skip_values），而 telegraf inputs.snmp 不支持行级过滤；LibreNMS 亦无 Proxim 的 processors/mempools/sensors 发现定义，仅有 ORiNOCO-MIB 用于 OS 识别，故无线健康为 N/A，不伪造。适用品牌型号——Proxim Wireless 无线设备（ORiNOCO AP 系列接入点、Tsunami MP 点对多点回传基站/订户单元，企业号 841）及其他遵循 IF-MIB 标准的无线 AP/回传网桥。
  Wireless EnGenius SNMP:
    name: EnGenius（Telegraf）
    desc: EnGenius 无线设备 SNMP 采集基线模板（接口流量 + 运行时长，Senao 企业号 14125）。采集 IF-MIB 64 位 HC 接口流量计数器（ifHCInOctets/ifHCOutOctets，ifXTable）速率与设备运行时长（sysUpTime）。EnGenius 私有 MIB 以配置为主——ENGENIUS-PRIVATE-MIB 无 CPU/温度/内存对象；仅旧版 mesh 固件的 ENGENIUS-MESH-MIB 暴露空闲内存百分比与字符串型运行时长，且云管 ECW/EWS 机型无该私有树；关联客户端数无标量计数（须对客户端表逐行计数且各列为文本，无法可靠 gauge 化）；信道利用率无对象。为跨机型（含云管）稳定可采，CPU/内存/温度/客户端数/信道利用率不采集（N/A），不伪造。适用品牌型号——EnGenius 企业无线 AP（ECW/EWS 云管系列、ENH/ENS 接入点，企业号 14125）及其他遵循 IF-MIB 标准的无线 AP。
  Transmission Ciena SNMP:
    name: Ciena (Telegraf)
    desc: 采 IF-MIB 64位 HC 接口流量（ifHCInOctets/ifHCOutOctets）+ 运行时长；Ciena SAOS 传输设备的温度/光模块光功率/激光偏置电流等健康指标因 MIB 为 per-row 索引表带行级过滤（skip_values），telegraf inputs.snmp 不能行级过滤，故为 N/A。适用品牌型号——Ciena SAOS 传输/分组光设备（3000/5000/6500 系列，企业号 1271）及其他 IF-MIB 标准传输设备。
  Access BDCOM SNMP:
    name: BDCOM (Telegraf)
    desc: BDCOM 接入设备专用 SNMP 采集模板。仅采集标准 IF-MIB 64 位 HC 接口流量（ifHCInOctets/ifHCOutOctets，ifXTable）与设备运行时长（sysUpTime），并据此汇总设备入向/出向总流量速率。BDCOM 接入设备（OLT/交换机）的光功率、PON 口、温度等健康指标因其 MIB 为 per-row 索引表并带行级过滤（skip_values），而 inputs.snmp 不支持行级过滤，故为 N/A。适用品牌型号——BDCOM 接入设备/OLT（GP/EP 系列，企业号 3320）及其他 IF-MIB 标准接入交换机/OLT。
  ConsoleServer Opengear SNMP:
    name: Opengear (Telegraf)
    desc: Opengear 控制台服务器专用 SNMP 采集模板。采集标准 IF-MIB 接口流量(64 位 ifHCInOctets/ifHCOutOctets,自动展开各接口)与设备运行时长(uptime),作为该控制台服务器对象的基础监控能力。Opengear 私有健康指标多为 per-row 索引表(行级过滤),telegraf 采集端暂不支持,后续按官方 MIB 补充。适用品牌型号——Opengear 控制台服务器系列。
  NetworkService Infoblox SNMP:
    name: Infoblox (Telegraf)
    desc: Infoblox NIOS 网络服务设备专用 SNMP 采集模板。采 IF-MIB 64 位 HC 接口流量（ifHCInOctets/ifHCOutOctets，ifXTable）+ 运行时长（sysUpTime）。Infoblox NIOS 的 DNS/DHCP 服务统计、节点 CPU/内存为 per-row 索引表 / 服务计数带行级过滤（skip_values），inputs.snmp 不能行级过滤，故为 N/A。适用品牌型号——Infoblox NIOS 网络服务设备 (DNS/DHCP/IPAM 一体机，企业号 7779) 及其他 IF-MIB 标准网络服务设备。
  NetworkService Gigamon SNMP:
    name: Gigamon（Telegraf）
    desc: Gigamon GigaVUE 流量可视化/分流器（packet broker）专用 SNMP 采集模板（GIGAMON-SNMP-MIB，企业号 26866）。在标准 IF-MIB 64 位 HC 接口流量（ifHCInOctets/ifHCOutOctets，ifXTable）与运行时长（sysUpTime）之外，额外采集 Gigamon 私有标量 OID 的机箱健康指标：整机 CPU 使用率与内存使用率，均为设备直接上报的百分比。温度/风扇/电源传感器仅以带行级过滤的 per-row 组件表暴露，inputs.snmp 无法规范化，故为 N/A。适用品牌型号——Gigamon GigaVUE HC / TA / G 系列可视化节点与分流器（企业号 26866）。
  VoiceGateway AudioCodes SNMP:
    name: AudioCodes (Telegraf)
    desc: AudioCodes 语音网关SBC专用 SNMP 采集模板。采集标准 IF-MIB 接口流量(64 位 ifHCInOctets/ifHCOutOctets,自动展开各接口)与设备运行时长(uptime),作为该语音网关SBC对象的基础监控能力。AudioCodes 私有健康指标多为 per-row 索引表(行级过滤),telegraf 采集端暂不支持,后续按官方 MIB 补充。适用品牌型号——AudioCodes 语音网关SBC系列。
  DM-Exporter:
    name: 达梦数据库监控探针
    desc: 通过 DM-Exporter 下发达梦数据库监控探针，采集会话、锁、表空间、内存、慢查询等核心监控指标，帮助快速掌握数据库运行状态与性能变化。
  Detection Device SNMP General:
    name: 检测设备通用（SNMP）
    desc: SNMP 通用插件用于通过 SNMP 监控和管理检测设备的监控情况。管理员可以获取有关设备的关键信息，例如 接口流量、错误统计和状态信息等，从而优化网络性能和提高管理效率。
  Storage IPMI:
    desc: 通过Telegraf采集器利用IPMI协议定期收集存储设备的电源状态、风扇转速、温度等关键指标。
    name: 存储设备IPMI通用（Telegraf）
  OceanStor:
    name: OceanStor存储（Telegraf）
    desc: 通过Telegraf采集器利用DeviceManager REST API定期收集华为OceanStor存储池、硬盘、LUN卷的IOPS、吞吐量和响应时间等性能指标。
  Tencent Cloud:
    name: 腾讯云
    desc: 实时采集腾讯云各类监控指标数据，涵盖计算资源、网络性能、存储使用等维度，助力用户深入了解资源状态，精准定位异常，高效完成运维管理与成本优化。
  Tomcat-JMX:
    desc: 通过 JMX 采集 Tomcat 线程池、HTTP 连接、JVM 内存、请求耗时等关键性能指标，监控运行状态与资源效率，辅助优化性能及排查故障。
    name: Tomcat-JMX
  Postgres:
    name: Postgres（Telegraf）
    desc: 通过Telegraf采集器定期收集PostgreSQL的会话管理、事务指标和 I/O性能相关数据。
  ActiveMQ:
    desc: 通过Telegraf采集器定期收集ActiveMQ的主题相关指标，包括实时监控消费者数量、入队/出队速率，以及主题消息堆积情况等。
    name: ActiveMQ（Telegraf）
  Redis:
    name: Redis（Telegraf）
    desc: 通过Telegraf采集器定期收集Redis性能及资源使用情况的关键指标。
  Switch SNMP General:
    name: 交换机通用（Telegraf）
    desc: 通过Telegraf采集器利用SNMP协议定期收集交换机各接口的流量、丢包数、错包数等IF-MIB关键指标。
  Switch Cisco SNMP:
    name: 思科（Telegraf）
    desc: 思科交换机专用 SNMP 采集模板。在标准 IF-MIB 接口指标之外，额外采集思科私有 OID 的设备健康指标：CPU 使用率、内存池、温度传感器、风扇与电源状态。
      适用品牌型号——Cisco Catalyst 园区交换机（2960/3650/3850/9200/9300/9500 等）及运行 IOS/IOS-XE 的交换机；Nexus(NX-OS) 部分指标兼容。
  Switch Huawei SNMP:
    name: 华为（Telegraf）
    desc: 华为交换机专用 SNMP 采集模板。在标准 IF-MIB 接口指标之外，额外采集华为私有 OID（HUAWEI-ENTITY-EXTENT-MIB）的设备健康指标：CPU 使用率、内存使用率、温度传感器与风扇状态。华为以利用率百分比直接上报内存，且该模板未提供电源状态 OID。
      适用品牌型号——华为 S 系列园区交换机（S5700/S6700/S7700/S9300 等）及 CloudEngine CE 系列。
  Switch Aruba SNMP:
    name: Aruba（Telegraf）
    desc: Aruba 交换机专用 SNMP 采集模板（ArubaOS-CX）。在标准 IF-MIB 接口指标之外，额外采集 ARUBAWIRED 私有 OID 的设备健康指标：各模块 CPU 与内存使用率、温度传感器、风扇与电源状态。Aruba 以利用率百分比直接上报内存；风扇/电源状态已归一化为统一的 1=正常 约定。
      适用品牌型号——Aruba / HPE ArubaOS-CX 与 ArubaOS-Switch（部分原 HP ProCurve，2530/2930/3810/5400/6300/8300 等）。
  Switch Juniper SNMP:
    name: Juniper（Telegraf）
    desc: Juniper 交换机专用 SNMP 采集模板（Junos）。在标准 IF-MIB 接口指标之外，额外采集 JUNIPER-MIB jnxOperating 私有 OID 的设备健康指标：CPU 与内存缓冲使用率、温度传感器、风扇与电源状态。Juniper 以利用率百分比直接上报内存；风扇/电源的 jnxOperatingState 已归一化为统一的 1=正常 约定。
      适用品牌型号——Juniper EX 系列园区交换机（EX2300/3400/4300/4600 等，Junos）。
  Switch Extreme SNMP:
    name: Extreme（Telegraf）
    desc: Extreme Networks 交换机专用 SNMP 采集模板（EXOS）。在标准 IF-MIB 接口指标之外，额外采集 EXTREME-SYSTEM-MIB 私有 OID 的设备健康指标：CPU 使用率、系统内存（总量/空闲）、温度、风扇与电源状态。内存使用率按 (总量-空闲)/总量 计算；风扇/电源状态已归一化为统一的 1=正常 约定。
      适用品牌型号——Extreme Networks ExtremeXOS(EXOS) 交换机（X440/X460/X670/X690 等）。
  Switch Brocade SNMP:
    name: Brocade（Telegraf）
    desc: Brocade/Foundry 交换机专用 SNMP 采集模板（FastIron/NetIron）。在标准 IF-MIB 接口指标之外，额外采集 FOUNDRY-SN-AGENT-MIB 私有 OID 的设备健康指标：1 分钟平均 CPU 使用率、动态内存使用率、机箱温度传感器、风扇与电源状态。Brocade 以利用率百分比直接上报 CPU 与内存；风扇/电源状态已归一化为统一的 1=正常 约定。
      适用品牌型号——Brocade ICX/FCX/NetIron、Ruckus ICX（原 Brocade ICX，运行 FastIron）、Foundry/IronWare 交换机——均使用同一套 FOUNDRY-SN-AGENT-MIB（企业号 1991）；Ruckus ICX 用户直接选用本模板即可监控。
  Switch Alcatel-Lucent SNMP:
    name: Alcatel-Lucent（Telegraf）
    desc: Alcatel-Lucent (Nokia) TiMOS 交换机专用 SNMP 采集模板。在标准 IF-MIB 接口指标之外，额外采集 TIMETRA-CHASSIS-MIB 私有 OID 的设备健康指标：CPU 使用率、系统内存池（已用/空闲字节）、硬件温度传感器、风扇与电源状态。内存使用率按 used/(used+free) 计算；风扇/电源状态（TmnxDeviceState）已归一化为统一的 1=正常 约定。适用品牌型号——Nokia/Alcatel-Lucent 7750 SR、7450 ESS、7950 XRS 及 Nokia SR Linux 数据中心交换机（SR-OS/TiMOS/SR Linux，均暴露 TIMETRA MIB，企业号 6527）；不含 Alcatel OmniSwitch（企业号 6486）。
      适用品牌型号——Alcatel-Lucent / Nokia 业务路由器 7750 SR、7450 ESS、7950 XRS 等（SR-OS/TiMOS，企业号 6527）；不适用于 Alcatel OmniSwitch（企业号 6486，OID 不同）。
  Switch MikroTik SNMP:
    name: MikroTik（Telegraf）
    desc: MikroTik (RouterOS) 交换机专用 SNMP 采集模板（当前挂载于交换机对象）。在标准 IF-MIB 接口指标之外，额外采集 HOST-RESOURCES 与 MIKROTIK-MIB 的设备健康指标：每核 CPU 使用率、系统内存（已用/总量）、板载温度。MikroTik 风扇以原始 RPM 上报（非状态）、且电源无标准化状态 OID，故风扇/电源健康不采集（N/A）。内存使用率按 used/total 计算。
      适用品牌型号——MikroTik RouterOS 设备（CRS/CCR/RB 系列）。
  Switch D-Link SNMP:
    name: D-Link（Telegraf）
    desc: D-Link DES/DGS 交换机专用 SNMP 采集模板（EQUIPMENT-MIB，企业号 171）。在标准 IF-MIB 接口指标之外，额外采集 D-Link 私有 OID 的设备健康指标：CPU 使用率、内存使用率、温度传感器、风扇与电源状态。D-Link 以利用率百分比直接上报 CPU 与内存；风扇状态原生 1=正常，电源状态已归一化为统一的 1=正常 约定。
      适用品牌型号——D-Link DES / DGS 系列及 DES-7200（均为 D-Link 企业号 171；具体健康 OID 因型号略异，以现网为准）。
  Switch Netgear SNMP:
    name: Netgear（Telegraf）
    desc: Netgear (FASTPATH) 交换机专用 SNMP 采集模板。在标准 IF-MIB 接口指标之外，额外采集 FASTPATH-BOXSERVICES 私有 OID 的设备健康指标：CPU 使用率、系统内存（总量/空闲）、温度传感器、风扇与电源状态。内存使用率按 (总量-空闲)/总量 计算；风扇与电源状态原生 1=正常。
      适用品牌型号——NETGEAR 智能/全网管交换机（GS/M 系列等）。
  Switch TP-Link SNMP:
    name: TP-Link（Telegraf）
    desc: TP-Link (JetStream) 交换机专用 SNMP 采集模板（TPLINK 私有 MIB，企业号 11863）。在标准 IF-MIB 接口指标之外，额外采集 TP-Link 私有 OID 的设备健康指标：CPU 与内存使用率，均以利用率百分比直接上报。TP-Link 中小企业交换机无温度/风扇/电源传感器 OID，故此类健康项不采集（N/A）。
      适用品牌型号——TP-Link JetStream 网管交换机（T1500/T1600/T2600 系列等）。
  Switch Zyxel SNMP:
    name: Zyxel（Telegraf）
    desc: Zyxel 交换机专用 SNMP 采集模板（ZYXEL 私有 MIB，企业号 890）。在标准 IF-MIB 接口指标之外，额外采集 Zyxel 私有 OID 的设备健康指标：CPU 使用率（百分比直报）与硬件温度传感器。Zyxel 风扇以原始 RPM 上报（非状态）、且该交换机线无内存利用率与电源状态 OID，故此类健康项不采集（N/A）。
      适用品牌型号——Zyxel GS/XGS/XS 系列网管交换机。
  Switch QTech SNMP:
    name: QTech（Telegraf）
    desc: QTech (QSW) 交换机专用 SNMP 采集模板（QTECH-MIB，企业号 27514）。在标准 IF-MIB 接口指标之外，额外采集 QTech 私有 OID 的设备健康指标：CPU 使用率、系统内存（已用/总量）、温度、风扇与电源状态。内存使用率按 used/total 计算；风扇/电源状态（原生 0=正常）已归一化为统一的 1=正常 约定。
      适用品牌型号——QTech QSW 系列交换机。
  Switch Dell Force10 SNMP:
    name: Dell Force10（Telegraf）
    desc: Dell Force10 (S-Series) 交换机专用 SNMP 采集模板（F10-S-SERIES-CHASSIS-MIB，企业号 6027）。在标准 IF-MIB 接口指标之外，额外采集 Dell Force10 私有 OID 的设备健康指标：每处理器 CPU 与内存使用率、每堆叠单元温度、风扇托盘与电源状态。CPU 与内存以利用率百分比直接上报；风扇/电源状态已归一化为统一的 1=正常 约定。
      适用品牌型号——Dell Networking / Force10（PowerSwitch S/Z 系列，FTOS/OS9，企业号 6027）。
  Switch HP ProCurve SNMP:
    name: HP ProCurve（Telegraf）
    desc: HP ProCurve / HP Networking 交换机专用 SNMP 采集模板（HP-ICF MIB）。在标准 IF-MIB 接口指标之外，额外采集 HP 私有 OID 的设备健康指标：CPU 使用率与系统内存（已用/总量）。温度与风扇/电源状态位于 HP 的 ENTITY-SENSOR / hpicfSensorTable 混合表、需按行类型/类过滤（telegraf inputs.snmp 无法实现），故不采集（N/A）。内存使用率按 used/total 计算。
      适用品牌型号——HP / HPE ProCurve 交换机（2500/2600/2900/2920/3500/5400 ProCurve 系列等，企业号 11）。
  Switch Datacom SNMP:
    name: Datacom（Telegraf）
    desc: Datacom DmOS 交换机专用 SNMP 采集模板（DMOS-SYSMON-MIB，IANA PEN 3709）。在标准 IF-MIB 接口指标之外，额外采集 Datacom 私有 OID 的设备健康指标：各 slot CPU 负载（cpuLoadOneMinuteActive）与系统内存（已用/总量，字节）。DmOS SYSMON MIB 仅含 CPU 与内存子树；温度/风扇/电源对象只在旧 DMswitch-MIB（与 DmOS 不兼容）中存在，故不采集（N/A）。CPU 使用率按各 slot 平均，内存使用率按 used/total 计算。
      适用品牌型号——Datacom DmOS 交换机（DM4xxx 系列）。
  Switch Eltex SNMP:
    name: Eltex（Telegraf）
    desc: Eltex MES 系列交换机专用 SNMP 采集模板（基于 RADLAN/Marvell MIB + ELTEX 私有 OID，IANA PEN 89/35265）。在标准 IF-MIB 接口指标之外，额外采集 Eltex 私有 OID 的设备健康指标：CPU 使用率（rlCpuUtilDuringLast5Minutes）、系统内存（总量/空闲）、机箱温度（rlPhdUnitEnvParamTempSensorValue 专用温度列）、风扇状态（rlEnvMonFanState）与电源状态（rlPhdUnitEnvParamMainPSStatus）。风扇/电源原始码经 telegraf processors.enum 归一为 1=正常/2=异常。内存使用率按 (total-free)/total 计算。这是首个采集真实温度/风扇/电源的交换机品牌（Eltex 以专用值列暴露，无需行级类型过滤）。
      适用品牌型号——Eltex MES 系列交换机。
  Switch SNR SNMP:
    name: SNR（Telegraf）
    desc: SNR（НАГ/NAG）交换机专用 SNMP 采集模板（NAG-MIB，IANA PEN 40418）。在标准 IF-MIB 接口指标之外，额外采集 SNR 私有 OID 的设备健康指标：各 slot CPU 使用率（sysCpuUsage）、系统内存（总量/已用）、机箱温度（sysTemperature 专用温度列）与风扇状态（sysFanStatus）。风扇原始码（0=正常/1=异常）经 telegraf processors.enum 归一为 1=正常/2=异常。内存使用率按 used/total 计算。NAG-MIB 无独立电源（PSU）状态对象，故电源不采集（N/A）。
      适用品牌型号——SNR（NAG）网管交换机。
  Switch Intelbras SNMP:
    name: Intelbras（Telegraf）
    desc: Intelbras（英特布拉斯，巴西）管理型交换机专用 SNMP 采集模板（S/SG 企业系列，如 S2328G-PB，运行 INTELBRAS OS / Comware 衍生平台，IANA PEN 26138）。在标准 IF-MIB 接口指标之外，额外采集 Intelbras 私有 OID 的设备健康指标（取自 ibEntityExt 状态表）：各实体控制平面 CPU 使用率（ibEntityExtCpuUsage）与系统内存总量字节及利用率（ibEntityExtMemSize / ibEntityExtMemUsage）。CPU 与内存按 ENTITY-MIB entPhysicalIndex 走表，真值落在管理实体行、其余组件行为 0，故共享盘 max() 取真值。ibEntityExt 温度列在非传感器行回填 65535 哨兵值（telegraf 无法行级过滤），风扇/电源健康需配合 ENTITY-MIB entPhysicalClass 行级类型 join 才能区分（telegraf 不支持），故温度/风扇/电源不采集（N/A）。
      适用品牌型号——Intelbras S/SG 管理型企业交换机（Comware 平台管理型产线）；低端 web-smart/非管理型仅暴露 MIB-II + IF-MIB。
  Switch Nexans SNMP:
    name: Nexans（Telegraf）
    desc: Nexans（耐克森）高级网络解决方案（Nexans ANS）工业管理型交换机专用 SNMP 采集模板（NEXANS-BM-MIB，IANA PEN 266）。在标准 IF-MIB 接口指标之外，额外采集 Nexans 私有 OID 的设备健康指标：机箱温度（bmSwitchInfo infoTemperature，专用标量，直采摄氏度）与一项工业告警继电器状态（infoAlarmStateM1，用作电源健康代理）。告警继电器原始码（1=notSupported / 2=alarmOff 即正常 / 3、7、8、9 及更高=告警触发，含电源 S1/S2 故障）经 telegraf processors.enum 归一为 1=正常/2=异常（notSupported 视为正常）。Nexans GigaSwitch/DualSwitch 为无风扇工业交换机，无 CPU、无内存、无风扇 OID，故不采集（N/A）。
      适用品牌型号——Nexans ANS GigaSwitch / DualSwitch 工业管理型交换机。
  Switch Pica8 SNMP:
    name: Pica8（Telegraf）
    desc: Pica8 PicOS 白盒交换机专用 SNMP 采集模板（PICA-PRIVATE-MIB，IANA PEN 35098）。PicOS 仅暴露公共 IF-MIB 加自有私有 MIB（不使用 NET-SNMP UCD 或 HOST-RESOURCES MIB）。在标准 IF-MIB 接口指标之外，额外采集 Pica8 私有控制平面 CPU 使用率（cpuUsage），为干净的整数百分比标量。内存（totalPhyMemory/usedPhyMemory/freePhyMemory）与温度（switchTemperature）在私有 MIB 中仅以 DisplayString 文本暴露、非数值 gauge，风扇仅为转速字符串加 trap、无可轮询的风扇状态枚举，冗余电源表的状态枚举码无公开文档，故内存/温度/风扇/电源不采集（N/A），以免上报无法解析或未经核实的脏值。
      适用品牌型号——运行 PicOS 的 Pica8 白盒交换机。
  Switch Advantech SNMP:
    name: Advantech（Telegraf）
    desc: Advantech（研华）EKI 工业管理型交换机专用 SNMP 采集模板（ADVANTECH-EKI-PRONEER-MIB，IANA PEN 10297）。在标准 IF-MIB 接口指标之外，额外采集 Advantech 私有冗余电源 LED 状态对象（ledStatus 组下的 ledPWR1Status），用作电源健康指标。LED 原始码（0=notSupported / 1=up 即电源在位正常 / 2=down 即电源输入丢失）经 telegraf processors.enum 归一为 1=正常/2=异常（notSupported 视为正常）。EKI 为无风扇工业交换机，ProView MIB 无 CPU、无内存、无数值温度、无风扇对象（仅离散 LED 状态枚举），故 CPU/内存/温度/风扇不采集（N/A）。
      适用品牌型号——Advantech EKI 管理型工业以太网交换机。
  Switch EtherWAN SNMP:
    name: EtherWAN（Telegraf）
    desc: EtherWAN EX 系列工业管理型交换机专用 SNMP 采集模板（IANA PEN 2736）。在标准 IF-MIB 接口指标之外，额外采集 EtherWAN 私有设备健康 OID——机箱温度（ewnSensorTempValue，专用标量，原始值÷10=摄氏度）与双路电源输入状态表（ewnPowerSupplyTable ewnPowerSupplyStatus，每路一行，行名 Power1/Power2）。电源原始码（0=up 即正常 / 1=down 即失电或缺省）经 telegraf processors.enum 归一为 1=正常/2=异常，并按设备取最差一路电源。EX 系列为无风扇导热式散热，无 CPU、无内存、无风扇对象，故 CPU/内存/风扇不采集（N/A）。
      适用品牌型号——EtherWAN EX 系列加固型工业以太网交换机。
  Switch Red Lion SNMP:
    name: Red Lion（Telegraf）
    desc: Red Lion / N-Tron 工业以太网交换机专用 SNMP 采集模板（NTRON714FX6-MIB，IANA PEN 28381）。在标准 IF-MIB 接口指标之外，额外采集 N-Tron 私有双路电源输入状态对象（ntronPowerFault）。原始码（1=faultNone 即双路均正常 / 2=faultPower1 即电源1失电 / 3=faultPower2 即电源2失电）经 telegraf processors.enum 归一为 1=正常/2=异常。N-Tron MIB 仅暴露 RAM/Flash 总量（无 used/free，无法算内存使用率），无 CPU 对象，无可轮询数值温度（板载温度仅 Web UI / N-View 暴露，不走 SNMP），无风扇对象（N-Tron 为无风扇对流散热），故 CPU/内存/温度/风扇不采集（N/A）。电源故障对象因固件而异，无私有响应时插件退回干净的 IF-MIB 基线。
      适用品牌型号——Red Lion / N-Tron 工业以太网交换机（714FX6 及 N-Tron 系列，IANA PEN 28381）。
  Switch BDCOM SNMP:
    name: BDCOM（Telegraf）
    desc: BDCOM（上海博达数据通信）交换机专用 SNMP 采集模板（BDCOM 私有 MIB，IANA PEN 3320）。在标准 IF-MIB 接口指标之外，额外采集 BDCOM 私有 OID 的设备健康指标：最近 5 分钟控制平面 CPU 使用率（NMS-PROCESS-MIB cpmCPUTotal5min）、系统内存池已用/空闲字节（NMS-MEMORY-POOL-MIB，镜像 Cisco 风格内存池表）与各板卡温度（BDCOM-SYS nmscardTemperature 专用温度列）。内存使用率按 used/(used+free) 计算。BDCOM 交换机 MIB 无独立风扇/电源（PSU）状态对象，故风扇与电源不采集（N/A）。
      适用品牌型号——BDCOM 网管以太网交换机及 OLT 线卡。
  Switch Parks SNMP:
    name: Parks（Telegraf）
    desc: Parks PK700 系列交换机专用 SNMP 采集模板（PARKS-PK700 MIB，IANA PEN 50224）。在标准 IF-MIB 接口指标之外，额外采集 Parks 私有 OID 的设备健康指标：CPU 使用率（cpuUsage）、内存使用率（直接百分比标量）与机箱主芯片温度（mainChipTemperature）。PARKS-PK700 MIB 无独立风扇/电源状态对象，故不采集（N/A）；SFP 光功率/模块温度属端口级诊断、非设备级健康，本插件亦不采。
      适用品牌型号——Parks PK 系列交换机。
  Switch Ubiquiti SNMP:
    name: Ubiquiti（Telegraf）
    desc: Ubiquiti EdgeSwitch 专用 SNMP 采集模板（EdgeSwitch-SWITCHING-MIB + EdgeSwitch-BOXSERVICES-PRIVATE-MIB，IANA PEN 4413，Broadcom FASTPATH）。在标准 IF-MIB 接口指标之外，额外采集 EdgeSwitch 私有 OID 的设备健康指标：系统内存（可用/空闲，KB）、机箱温度（boxServicesTempSensorTemperature）与风扇状态（boxServicesFanItemState）。风扇原始码经 telegraf processors.enum 归一为 1=正常/2=异常。内存使用率按 (total-free)/total 计算。CPU 仅以逐进程表（agentSwitchCpuProcessTable）暴露、无设备级聚合标量，telegraf inputs.snmp 无法归约，故不采集（N/A）；BOXSERVICES MIB 无电源（PSU）状态对象，故电源亦 N/A。适用于 EdgeSwitch/UniFi 有线交换机；airOS/UniFi 无线 AP 属另一对象、超出范围。
      适用品牌型号——Ubiquiti EdgeSwitch（ES 系列）。
  Switch Ruijie SNMP:
    name: 锐捷 Ruijie（Telegraf）
    desc: 锐捷 Ruijie 交换机专用 SNMP 采集模板（RUIJIE-PROCESS/MEMORY/SYSTEM MIB，IANA PEN 4881）。在标准 IF-MIB 接口指标之外，额外采集锐捷私有 OID 的全套设备健康指标：CPU 使用率（ruijieNodeCPUTotal5min）、系统内存（容量/已用，KB）、机箱温度（ruijieSystemMultipleTemperatureCurrent）、风扇状态（ruijieSystemFanStatus）与电源状态（ruijieSystemElectricalInformationStatus）。风扇/电源原始码经 telegraf processors.enum 归一为 1=正常/2=异常。内存使用率按 used/total 计算。
      适用品牌型号——锐捷网络（Ruijie）RG 系列交换机。
  Switch ZTE SNMP:
    name: 中兴 ZTE（Telegraf）
    desc: 中兴 ZTE ZXR10 系列交换机专用 SNMP 采集模板（ZXR10-MIB，IANA PEN 3902）。在标准 IF-MIB 接口指标之外，额外采集中兴私有 OID 的设备健康指标：各 unit CPU 使用率（zxr10SystemCpuUtility5m）与内存使用率（zxr10SystemMemUsed，直接百分比）。ZXR10-MIB 系统表无温度/风扇/电源传感器（这些在面向接入网 OLT 的 ZTE-AN-ENVMON-MIB 中、非 ZXR10 交换机），故不采集（N/A）。
      适用品牌型号——中兴（ZTE）ZXR10 系列交换机。
  Switch Alcatel OmniSwitch SNMP:
    name: Alcatel OmniSwitch（Telegraf）
    desc: Alcatel-Lucent Enterprise OmniSwitch (AOS) 交换机专用 SNMP 采集模板（ALCATEL-IND1-HEALTH-MIB，企业号 6486）。在标准 IF-MIB 接口指标之外，额外采集 OmniSwitch 私有 OID 的设备健康指标：1 分钟平均 CPU 使用率（healthDeviceCpu1MinAvg）与内存使用率（healthDeviceMemoryLatest），均以百分比直接上报。温度在机箱硬件表、风扇/电源在 chasEntPhysical 实体表需按实体类型行级过滤（telegraf inputs.snmp 不支持），故为 N/A。适用品牌型号——Alcatel-Lucent Enterprise OmniSwitch（OS6xxx/OS9xxx，AOS6/AOS8，企业号 6486）；区别于「Switch Alcatel-Lucent SNMP」（覆盖 Nokia/ALU 7750 SR 业务路由器）。
  Switch Yamaha SNMP:
    name: Yamaha（Telegraf）
    desc: 雅马哈（Yamaha）SWX 系列交换机专用 SNMP 采集模板（YAMAHA-SWHUB-MIB，企业号 1182）。在标准 IF-MIB 接口指标之外，额外采集 Yamaha 私有 OID 的设备健康指标：1 分钟平均 CPU 使用率（yshCpuUtil1min）与内存使用率（yshMemoryUtil），均以百分比直接上报。SWX 系列未暴露温度/风扇/电源 SNMP 传感器，故为 N/A。适用品牌型号——Yamaha SWX 系列 L2/L2+ 交换机（SWX2200 / SWX2300 / SWX3100 等，企业号 1182）；不覆盖 Yamaha RTX 路由器（无公开 SNMP 健康模板）。
  Switch Arista SNMP:
    name: Arista（Telegraf）
    desc: Arista EOS 交换机专用 SNMP 采集模板。除标准 IF-MIB 接口指标外，额外通过 HOST-RESOURCES hrProcessorLoad 采集设备 CPU 使用率（按核取均值）——这是通用 SNMP 交换机插件不具备的。Arista 的内存仅通过多行 hrStorage 表暴露（RAM 行索引不固定）、温度/风扇/电源仅通过 ENTITY-SENSOR 表暴露（多种传感器混在同表按类型列区分），SNMP 采集端无法按行/类型过滤，故内存/温度/风扇/电源为 N/A。适用品牌型号——Arista Networks EOS 数据中心交换机（7050/7060/7280/7300/7500 系列及其他 EOS 平台）。
  Switch Mellanox SNMP:
    name: Mellanox（Telegraf）
    desc: Mellanox（NVIDIA）Spectrum 以太网交换机专用 SNMP 采集模板（Onyx / MLNX-OS）。除标准 IF-MIB 接口指标外，额外通过 HOST-RESOURCES hrProcessorLoad 采集设备 CPU 使用率（按核取均值）——这是通用 SNMP 交换机插件不具备的。内存仅通过多行 hrStorage 表暴露、温度/风扇/电源仅通过 ENTITY-SENSOR 表暴露（多种传感器混在同表按类型列区分），SNMP 采集端无法按行/类型过滤，故为 N/A。适用品牌型号——Mellanox/NVIDIA Spectrum 以太网交换机（运行 Onyx 或 MLNX-OS 的 SN2000/SN3000/SN4000 系列）；纯 InfiniBand 组网不在范围。
  Switch Allied Telesis SNMP:
    name: Allied Telesis（Telegraf）
    desc: Allied Telesis AlliedWare Plus（AW+）交换机专用 SNMP 采集模板（AT-SYSINFO-MIB / AT-ENVMONv2-MIB，企业号 207）。除标准 IF-MIB 接口指标外，额外采集 Allied Telesis 私有 OID 的设备健康指标：每栈成员 CPU 使用率（cpuUtilisationStackAvgLastMinute，取均值）、机箱温度传感器（atEnvMonv2TemperatureCurrent，取最高），以及风扇与电源状态（归一为 1=正常/2=异常）。AlliedWare Plus 未暴露标准内存使用率 OID，故内存为 N/A。适用品牌型号——Allied Telesis AlliedWare Plus 交换机（x 系列/IE 工业系列/SwitchBlade，运行 AW+，企业号 207）。
  Switch Dell OS10 SNMP:
    name: Dell OS10（Telegraf）
    desc: Dell EMC OS10（SmartFabric OS10）交换机专用 SNMP 采集模板（DELLEMC-OS10-CHASSIS-MIB，企业号 674）。除标准 IF-MIB 接口指标外，额外采集设备健康指标：CPU 使用率（HOST-RESOURCES hrProcessorLoad，取均值）、板卡温度传感器（os10CardTemp，取最高），以及风扇与电源运行状态（os10FanOperStatus / os10PowerSupplyOperStatus，原生 1=正常/2=异常）。内存仅通过多行 hrStorage 表暴露（物理内存行索引不固定），故为 N/A。与 Force10/FTOS 插件相互独立。适用品牌型号——运行 OS10/SmartFabric OS10 的 Dell EMC PowerSwitch（S 系列/Z 系列，企业号 674）。
  Switch Lenovo CNOS SNMP:
    name: Lenovo CNOS（Telegraf）
    desc: 联想 CNOS（Cloud Network OS）交换机专用 SNMP 采集模板（LENOVO-ENV-MIB，企业号 19046）。除标准 IF-MIB 接口指标外，额外采集设备健康指标：温度传感器（lenovoEnvMibTempSensorTemperature，取最高）、风扇状态（lenovoEnvMibFanState）与电源状态（lenovoEnvMibPowerSupplyState，归一为 1=正常/2=异常），以及在平台暴露时通过 HOST-RESOURCES hrProcessorLoad 采集 CPU 使用率。内存无可用私有 OID，故为 N/A。适用品牌型号——运行 CNOS 的联想 ThinkSystem/RackSwitch 交换机（NE 系列，如 NE1032/NE2572/NE10032，企业号 19046）。
  Switch Westermo SNMP:
    name: Westermo（Telegraf）
    desc: Westermo 工业以太网交换机专用 SNMP 采集模板（WESTERMO-SW6-MIB，企业号 16177）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Westermo WeOS 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，KB，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与电源状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。Westermo 工业交换机为无风扇被动散热设计，故风扇为 N/A。适用品牌型号——Westermo WeOS 工业网管交换机（Lynx/Falcon/RedFox/Viper 系列，企业号 16177）。
  Switch RuggedCOM SNMP:
    name: RuggedCOM（Telegraf）
    desc: RuggedCOM（西门子）工业以太网交换机专用 SNMP 采集模板（RUGGEDCOM-SYS-MIB，企业号 15004）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 RuggedCOM ROS 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，字节，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与冗余电源状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。RuggedCOM 工业交换机为无风扇导热式被动散热设计，故风扇为 N/A。适用品牌型号——西门子 RuggedCOM ROS 工业网管交换机（RS/RSG/RST 系列，企业号 15004）。
  Switch Scalance SNMP:
    name: Scalance（Telegraf）
    desc: Siemens SCALANCE X 工业以太网交换机专用 SNMP 采集模板（Siemens AUTOMATION-SMI，企业号 4329）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 SCALANCE 私有 OID 的设备健康指标：机箱温度（℃）与双路电源线状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。SCALANCE X 基于网管桥 ASIC，多为无风扇导热式被动散热设计，私有 MIB 未以标量形式暴露 CPU 与内存负载，故 CPU、内存与风扇为 N/A。适用品牌型号——西门子 SCALANCE X 系列工业网管交换机（X200/X300/X400/XB/XC/XR 系列，企业号 4329）。
  Switch Microsens SNMP:
    name: Microsens（Telegraf）
    desc: MICROSENS（德国）工业光纤以太网交换机专用 SNMP 采集模板（MICROSENS-G6-MIB，企业号 3181）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 MICROSENS G6 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，字节，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与冗余电源状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。MICROSENS Profi Line 紧凑工业光纤交换机为无风扇导热式被动散热设计，故风扇为 N/A。适用品牌型号——MICROSENS G6 / Profi Line 工业光纤网管交换机（企业号 3181）。
  Switch Moxa SNMP:
    name: Moxa（Telegraf）
    desc: Moxa 工业以太网交换机专用 SNMP 采集模板（MOXA-MIB，企业号 8691）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Moxa 私有 OID 的设备健康指标：机箱温度（℃）以及双路电源输入状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。Moxa 工业交换机多为无风扇被动散热设计且私有 MIB 未以无需行级过滤的标量形式暴露 CPU/内存负载，故 CPU/内存/风扇为 N/A。适用品牌型号——Moxa 工业网管交换机（EDS/IKS/ICS/SDS 系列，企业号 8691）。
  Switch Korenix SNMP:
    name: Korenix（Telegraf）
    desc: Korenix JetNet 工业以太网交换机专用 SNMP 采集模板（企业号 24062）。本模板基于标准 MIB-II / IF-MIB 采集设备运行时长与 64 位 HC 接口流量、接口收发错包与丢包速率、接口管理/操作状态与带宽，并按设备汇总收发总流量速率。Korenix JetNet 为无风扇导热式被动散热的工业网管交换机，其温度、双路电源输入与继电器告警等环境量由厂商私有 MIB（企业号 24062）承载，未在本基线模板中采集，故 CPU、内存、温度、风扇、电源为 N/A。适用品牌型号——Korenix JetNet 工业以太网交换机（JetNet 4508/5210G/5310G/6524G 等系列，企业号 24062）。
  Switch GarretCom SNMP:
    name: GarretCom（Telegraf）
    desc: GarretCom（Belden 旗下）工业以太网交换机专用 SNMP 采集模板（MAGNUM-MIB，企业号 14778）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 GarretCom Magnum 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，KB，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与电源状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。GarretCom 工业交换机为无风扇被动散热设计，故风扇为 N/A。适用品牌型号——GarretCom Magnum 工业网管交换机（6K/10K/DX 系列，企业号 14778）。
  Switch PLANET SNMP:
    name: PLANET（Telegraf）
    desc: PLANET Technology 管理型以太网交换机专用 SNMP 采集模板（PLANET-MIB，企业号 10456）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 PLANET 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，字节，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与电源状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。PLANET 紧凑机型多为无风扇被动散热设计，故风扇为 N/A。适用品牌型号——PLANET Technology 管理型交换机（GS-/SGS-/WGS- 系列，企业号 10456）。
  Switch Edgecore SNMP:
    name: Edgecore（Telegraf）
    desc: Edgecore Networks（Accton）开放/白盒管理型以太网交换机专用 SNMP 采集模板（ECS 系列私有 MIB，企业号 259）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Edgecore 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，字节，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与电源状态（经 telegraf processors.enum 归一为 1=正常/2=异常）。Edgecore 紧凑接入机型多为无风扇被动散热设计，故风扇为 N/A。适用品牌型号——Edgecore Networks 管理型交换机（ECS2000/ECS4000 系列，基于 Accton 平台，企业号 259）。
  Switch Pluribus SNMP:
    name: Pluribus（Telegraf）
    desc: Pluribus Networks Netvisor ONE 白盒/开放网络交换机专用 SNMP 采集模板（Netvisor ONE 为 Linux 基 NOS，SNMP 子代理经 AgentX 暴露标准 NET-SNMP，含 HOST-RESOURCES-MIB / UCD-SNMP-MIB / LM-SENSORS-MIB，企业号 47269）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Netvisor ONE 健康指标：CPU 使用率（HOST-RESOURCES hrProcessorLoad 多核均值）、主内存（总量 + 空闲，字节，用量按 (总量-空闲)/总量 推导）与机箱温度（LM-SENSORS 温度传感器，℃）。Netvisor ONE 以软件 NOS 运行于白盒交换机硬件，标准 NET-SNMP 未以无需行级过滤的标量形式暴露独立风扇与电源状态 OID，故风扇与电源为 N/A。适用品牌型号——Pluribus Networks 白盒交换机（Netvisor ONE NOS / Adaptive Cloud Fabric，企业号 47269）。
  Router Yamaha SNMP:
    name: Yamaha（Telegraf）
    desc: Yamaha RTX 系列企业路由器专用 SNMP 采集模板（YAMAHA-RT-MIB，企业号 1182）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Yamaha 私有 OID 的设备健康指标：CPU 使用率（直接以百分比上报）、主内存（已用 + 空闲，字节，用量按 已用/（已用+空闲）推导）与机箱温度（℃）。Yamaha RTX 为紧凑型固定配置路由器，采用无风扇或单一固定供电设计，其私有 MIB 未以无需行级过滤的标量形式暴露独立风扇/电源传感器，故风扇与电源为 N/A。适用品牌型号——Yamaha RTX 系列路由器（RTX830/RTX1210/RTX1300 等，企业号 1182）。
  Switch Cumulus SNMP:
    name: Cumulus（Telegraf）
    desc: NVIDIA Cumulus Linux 开放网络交换机专用 SNMP 采集模板（基于标准 NET-SNMP，含 HOST-RESOURCES-MIB / UCD-SNMP-MIB / LM-SENSORS-MIB）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Cumulus Linux 健康指标：CPU 使用率（HOST-RESOURCES hrProcessorLoad 多核均值）、主内存（总量 + 空闲，字节，用量按 (总量-空闲)/总量 推导）与机箱温度（LM-SENSORS 温度传感器，℃）。Cumulus Linux 以软件 NOS 运行于白盒交换机硬件，标准 NET-SNMP 未以无需行级过滤的标量形式暴露独立风扇与电源状态 OID，故风扇与电源为 N/A。适用品牌型号——NVIDIA / Cumulus Linux 白盒交换机（Cumulus Linux NOS，基于标准 NET-SNMP）。
  Router Versa SNMP:
    name: Versa（Telegraf）
    desc: Versa Networks SD-WAN 路由器（FlexVNF / VOS）专用 SNMP 采集模板（VERSA-MIB，企业号 42359）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Versa 私有 OID 的设备健康指标：CPU 使用率与内存使用率（均为设备直接上报的百分比）。Versa SD-WAN 以软件型/虚拟化网络功能（VNF）运行于通用计算或白盒 CPE 之上，其私有 MIB 未以无需行级过滤的标量形式暴露温度/风扇/电源传感器，故为 N/A。适用品牌型号——Versa Networks SD-WAN（FlexVNF / Versa Operating System，企业号 42359）。
  Switch Enterasys SNMP:
    name: Enterasys（Telegraf）
    desc: Enterasys（现 Extreme Networks 旗下）企业级交换机专用 SNMP 采集模板（ENTERASYS-MIB，企业号 5624）。除标准 IF-MIB 64 位 HC 接口流量外，额外采集 Enterasys 私有 OID 的设备健康指标：CPU 使用率（etsysResourceCpuLoad，直接以百分比上报）、主内存（已用 + 空闲，KB，用量按 已用/（已用+空闲）推导）、机箱温度（℃）与电源状态（etsysChassisPowerSupplyState，经 telegraf processors.enum 归一为 1=正常/2=异常）。适用品牌型号——Enterasys SecureStack / S-Series / Matrix 企业网管交换机（企业号 5624，legacy 设备现并入 Extreme）。
  Switch Hirschmann SNMP:
    name: Hirschmann（Telegraf）
    desc: Hirschmann 工业交换机专用 SNMP 采集模板（HMPRIV-MGMT-SNMP-MIB，企业号 248）。除标准 IF-MIB 接口指标外，额外采集 Hirschmann 私有 OID 的设备健康指标：CPU 使用率（hmCpuUtilization，直接以百分比上报）、主内存（hmMemoryAllocated 已用 + hmMemoryFree 空闲，KB，用量按 已用/（已用+空闲）推导）、机箱温度（hmTemperature，℃）与电源状态（hmPSState，经 telegraf processors.enum 归一为 1=正常/2=异常）。未暴露独立风扇状态 OID，故风扇为 N/A。适用品牌型号——Hirschmann（Belden）工业网管交换机（RS20/RS30/RS40、MACH/MICE/GREYHOUND/EAGLE 系列，企业号 248）。
  Switch 3Com SNMP:
    name: 3Com（Telegraf）
    desc: 3Com 交换机专用 SNMP 采集模板（A3COM-HUAWEI-LswDEVM-MIB，企业号 43）。除标准 IF-MIB 接口指标外，额外采集 3Com 私有 OID 的设备健康指标：CPU 使用率（hwCpuCostRatePer1Min，近 1 分钟占用率%，按板卡表取平均）与内存（hwMemoryUsedSize 已用 + hwMemorySize 总量，字节，用量按 已用/总量 推导）。该 MIB（企业号 43.45）与已支持的 H3C（企业号 25506 HH3C-ENTITY-EXT）不同，故单独支持。未暴露温度/风扇/电源专用 OID，故为 N/A。适用品牌型号——3Com 网管交换机（Switch 4200/4500/5500 等 A3COM-HUAWEI 平台，企业号 43）。
  Switch FortiSwitch SNMP:
    name: FortiSwitch（Telegraf）
    desc: Fortinet FortiSwitch 交换机专用 SNMP 采集模板（FORTINET-FORTISWITCH-MIB，企业号 12356）。除标准 IF-MIB 接口指标外，额外采集 FortiSwitch 私有 OID 的设备健康指标：CPU 使用率（fsSysCpuUsage，直接以百分比上报）与内存（fsSysMemUsage 已用 + fsSysMemCapacity 总量，KB，用量按 已用/总量 推导）。温度/风扇/电源仅通过类型混合的 ENTITY-SENSOR 表暴露，SNMP 采集端无法按行过滤，故为 N/A。适用品牌型号——Fortinet FortiSwitch 网管交换机（FortiSwitch 100/200/400/500/1000 系列，企业号 12356）。
  Switch FiberHome SNMP:
    name: 烽火 FiberHome（Telegraf）
    desc: 烽火 FiberHome 交换机专用 SNMP 采集模板（WRI-CPU/MEMORY/TEMPERATURE/POWER MIB，IANA PEN 3807）。在标准 IF-MIB 接口指标之外，额外采集烽火私有 OID 的设备健康指标：CPU 使用率（cpuUsage，精度100）、系统内存（已分配/总量，字节）、机箱温度（temperatureValue）与电源状态（powerState，0=正常）。风扇仅提供转速（RPM）无状态枚举，故风扇状态不采集（N/A）；风扇转速与电压为后续增补的新指标候选。电源原始码经 telegraf processors.enum 归一为 1=正常/2=异常。内存使用率按 used/total 计算。
      适用品牌型号——烽火通信（FiberHome）交换机。
  Switch H3C SNMP:
    name: H3C（Telegraf）
    desc: H3C / HPE Comware 交换机专用 SNMP 采集模板（HH3C-ENTITY-EXT-MIB，企业号 25506）。在标准 IF-MIB 接口指标之外，额外采集 H3C 私有 OID 的设备健康指标：按物理实体的 CPU 使用率（hh3cEntityExtCpuUsage）与内存使用率（hh3cEntityExtMemUsage）。二者按物理实体上报，多数实体为 0、仅承载 CPU/内存的板卡为真实值，故设备级 CPU/内存取各实体的最大值。温度不采集（Comware 上各实体的 hh3cEntityExtTemperature 均报 0）；风扇与电源状态在 ENTITY-MIB 中需按 entPhysicalClass 行级过滤，telegraf inputs.snmp 无法支持，故为 N/A。适用品牌型号——H3C S 系列 Comware 交换机（S5100/S5500/S5800 等）。
  Switch DCN SNMP:
    name: 神州数码 DCN（Telegraf）
    desc: 神州数码（DCN）交换机专用 SNMP 采集模板（DCN-MIB，企业号 6339）。除标准 IF-MIB 接口指标外，额外采集 DCN 私有 OID 的设备健康指标：CPU 使用率（switchCpuUsage，直接百分比）与系统内存（switchMemorySize 总量 / switchMemoryBusy 已用，字节，用量按 已用/总量 推导）。DCN-MIB 的 switchInfo 系统表仅含 CPU 与内存标量，无温度/风扇/电源传感器，故为 N/A。适用品牌型号——神州数码 DCN DCS/DCRS/CS 系列园区交换机（企业号 6339）。
  Switch FS SNMP:
    name: FS.com（Telegraf）
    desc: FS.com 交换机专用 SNMP 采集模板（FS-PROCESS/MEMORY/SYSTEM-MIB，企业号 52642）。除标准 IF-MIB 接口指标外，额外采集 FS 私有 OID 的全套设备健康指标：CPU 使用率（fsNodeCPUTotal5min）、系统内存（容量/已用，KB）、机箱温度（fsSystemMultipleTemperatureCurrent）、风扇状态（fsSystemFanStatus）与电源状态（fsSystemElectricalInformationStatus）。风扇/电源原始码经 telegraf processors.enum 归一为 1=正常/2=异常。内存使用率按 已用/总量 计算。适用品牌型号——FS.com S 系列数据中心/园区交换机（S5810/S5800/N8560 等，企业号 52642）。
  Switch Netonix SNMP:
    name: Netonix（Telegraf）
    desc: Netonix WISP 交换机专用 SNMP 采集模板（NETONIX-SWITCH-MIB，企业号 46242）。除标准 IF-MIB 接口指标外，额外采集 Netonix 私有 OID 的机箱温度（temp，专用温度表，℃）。NETONIX-SWITCH-MIB 不提供 CPU/内存 OID；风扇为转速（RPM）而非状态枚举、PoE 为端口级状态，均非设备级健康状态，故仅采集温度（其余 N/A）。适用品牌型号——Netonix WISP Switch 系列 PoE 交换机（企业号 46242）。
  Switch Flow NetFlow:
    name: 交换机流量分析（NetFlow）
    desc: 使用 NetFlow 对交换机进行流量分析采集，通过资产映射补充实例信息，按设备上报或兜底采样率归一化，并提供总览、接口、协议、端口、端点和会话维度指标。
  Switch Flow sFlow:
    name: 交换机流量分析（sFlow）
    desc: 使用 sFlow 对交换机进行流量分析采集，通过资产映射补充实例信息，直接消费 Telegraf 已估算的 sFlow 值，并提供总览、接口、协议、端口、端点和会话维度指标。
  WebLogic-JMX:
    name: WebLogic（JMX）
    desc: 通过WebLogic-JMX采集器定期收集WebLogic关键指标，包括线程池、连接池、内存、EJB、Servlet、JMS 性能及 Web 服务响应时间等。
  K8S:
    name: K8s
    desc: 利用K8s主动上报监控数据的能力，收集Kubernetes集群的状态和健康，包括节点、容器和pod的性能指标。
  Consul:
    name: Consul（Telegraf）
    desc: 通过Telegraf采集器定期收集Consul的服务健康状态，采集状态检查结果，分析通过、警告和关键性指标。
  Website:
    desc: 通过Telegraf采集器定期拨测HTTP/HTTPS连接的可用性和性能。
    name: 网站拨测（Telegraf）
  Nginx:
    desc: 通过Telegraf采集器定期收集Nginx的请求、连接状态及处理效率等指标，帮助监控和优化网站的性能与稳定性。
    name: Nginx（Telegraf）
  Loadbalance SNMP General:
    desc: 通过Telegraf采集器利用SNMP协议定期收集负载均衡各接口的流量、丢包数、错包数等IF-MIB关键指标。
    name: 负载均衡设备通用（Telegraf）
  Loadbalance F5 SNMP:
    name: F5（Telegraf）
    desc: 面向 F5 BIG-IP 负载均衡的 F5 专用 SNMP 采集模板。在标准 IF-MIB 接口指标与 64 位 HC 流量计数之外，额外采集 F5-BIGIP-SYSTEM-MIB 私有 OID 的设备健康（主机 CPU 使用率、主机内存 总量/已用及推算使用率）与负载均衡特有状态（当前客户端连接数）。内存使用率按 已用/总量 推算。
      适用品牌型号——F5 BIG-IP（LTM/GTM/DNS，含 iSeries / VIPRION / VE 虚拟版）。
  Loadbalance Citrix NetScaler SNMP:
    name: Citrix NetScaler（Telegraf）
    desc: Citrix NetScaler（NetScaler ADC，原 Citrix ADC）负载均衡专用 SNMP 采集模板（NS-ROOT-MIB，企业号 5951）。在标准 IF-MIB 接口指标之外，额外采集 NetScaler 私有 OID 的设备健康指标：跨管理与数据包处理 CPU 平均的 CPU 使用率（resCpuUsage）、直接以百分比上报的系统内存使用率（resMemUsage）、当前客户端连接数（tcpCurClientConn）。温度/电压传感器在 nsSysHealth 表中按传感器名（CPU0Temperature/Voltage 等）字符串混合索引、需行级名称过滤（telegraf inputs.snmp 不支持），故温度/风扇/电源为 N/A。适用品牌型号——Citrix / NetScaler ADC（MPX / SDX / VPX / CPX，NetScaler OS，企业号 5951）。
  Loadbalance A10 Thunder SNMP:
    name: A10 Thunder（Telegraf）
    desc: A10 Networks Thunder / AX（ACOS）应用交付控制器（ADC）专用 SNMP 采集模板（A10-AX-MIB，企业号 22610）。在标准 IF-MIB 接口指标之外，额外采集 A10 私有 OID 的设备健康指标：跨控制与数据平面 CPU 平均的 CPU 使用率（axSysCpuUsage）、系统内存（axSysMemoryTotal/axSysMemoryUsage，单位 KB，利用率按 used/total 计算）。当前连接数与温度/风扇/电源在 ACOS 上无免行级过滤的 OID 形式，故为 N/A。适用品牌型号——A10 Networks Thunder ADC / AX 系列（ACOS，含实体与 vThunder，企业号 22610）。
  Loadbalance FortiADC SNMP:
    name: FortiADC（Telegraf）
    desc: Fortinet FortiADC 应用交付控制器/负载均衡器专用 SNMP 采集模板（FORTINET-FORTIADC-MIB，企业号 12356）。除标准 IF-MIB 接口指标外，额外采集 FortiADC 私有 OID 的设备健康与负载指标：系统 CPU 使用率（fadcSysCpuUsage）、内存使用率（fadcSysMemUsage，均直接以百分比上报），以及当前并发客户端连接数（fadcConcurrentClientConnections）。FortiADC MIB 未暴露温度/风扇/电源，故为 N/A。适用品牌型号——Fortinet FortiADC 硬件与虚拟设备（FortiADC D/E/F 系列，企业号 12356）。
  Loadbalance Kemp LoadMaster SNMP:
    name: Kemp LoadMaster（Telegraf）
    desc: Kemp LoadMaster 应用交付控制器/负载均衡器专用 SNMP 采集模板（B-100-MIB / ONE4NET，企业号 12196）。除标准 IF-MIB 接口指标外，额外采集 Kemp 私有 OID 的设备健康与负载指标：整机 CPU 使用率（cpuTotal）、系统内存使用率（memUsedPercent，均直接以百分比上报），以及 LoadMaster 当前活动连接总数（connectionTotal）。LoadMaster MIB 未以无需行过滤的标量形式暴露温度/风扇/电源传感器，故为 N/A。适用品牌型号——Kemp LoadMaster ADC（硬件 LM-X、虚拟 VLM 及云版本，企业号 12196）。
  Loadbalance Superiority SNMP:
    name: 超数（Telegraf）
    desc: 超数（Superiority）负载均衡专用 SNMP 采集模板（Foundry/Brocade 兼容私有 MIB，企业号 1991）。除标准 IF-MIB 接口指标外，额外采集 1991 私有 OID 的设备健康指标：CPU 平均使用率（1991.1.1.2.1.50，snAgGblCpuUtil1SecAvg，直接 %）与内存使用率（1991.1.1.2.1.53，snAgGblDynMemUtil，直接 %，无 used/free 字节）。当前连接数/温度/风扇/电源 1991 私有树未声明，故为 N/A。适用品牌型号——超数（Superiority）负载均衡设备，OID 体系沿用 Foundry/Brocade 1991 贴牌。
  Loadbalance Radware Alteon SNMP:
    name: Radware Alteon（Telegraf）
    desc: Radware Alteon 应用交换机/负载均衡器专用 SNMP 采集模板（ALTEON-CHEETAH-SWITCH-MIB，企业号 1872）。除标准 IF-MIB 接口指标外，额外采集 Alteon 私有 OID 的设备健康指标：管理处理器 CPU 使用率（mpCpuStatsUtil1Second，直接以百分比上报）与主内存（mpMemStatsTotal/mpMemStatsFree，字节，用量按 (总量-空闲)/总量 推导）。CHEETAH MIB 未暴露标量连接/会话数与温度/风扇/电源，故为 N/A。适用品牌型号——运行 AlteonOS 的 Radware Alteon ADC/应用交换机（Alteon 4408/5208/6420/8420/9800 及 VA 虚拟设备，企业号 1872）。
  Loadbalance Flow NetFlow:
    name: 负载均衡流量分析（NetFlow）
    desc: 使用 NetFlow 对负载均衡进行流量分析采集，通过资产映射补充实例信息，按设备上报或兜底采样率归一化，并提供总览、接口、协议、端口、端点和会话维度指标。
  Loadbalance Flow sFlow:
    name: 负载均衡流量分析（sFlow）
    desc: 使用 sFlow 对负载均衡进行流量分析采集，通过资产映射补充实例信息，直接消费 Telegraf 已估算的 sFlow 值，并提供总览、接口、协议、端口、端点和会话维度指标。
  Bastion Host SNMP General:
    desc: SNMP 通用插件用于通过 SNMP 监控和管理堡垒机的监控情况。管理员可以获取有关设备的关键信息，例如 接口流量、错误统计和状态信息等，从而优化网络性能和提高管理效率。
    name: 堡垒机通用（SNMP）
  Jetty-JMX:
    desc: 通过Jetty JMX采集器定期收集Jetty的任务处理、线程池、网络连接、HTTP 配置以及JMX自监控等关键性能指标。
    name: Jetty（JMX）
  ElasticSearch:
    desc: 通过Telegraf采集器定期收集Elasticsearch的文件系统、HTTP 请求、IO 统计、文档统计、查询缓存和截断器的相关指标，帮助用户监控集群健康状态和性能表现。
    name: ElasticSearch（Telegraf）
  Zookeeper:
    name: Zookeeper（Telegraf）
    desc: 通过Telegraf采集器定期收集Zookeeper的运行时的性能数据和稳定性指标，如运行时长、平均延迟、读写比例等。
