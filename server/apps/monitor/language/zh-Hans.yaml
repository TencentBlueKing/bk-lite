  guideIntroDesc: 请按以下指引完成设备侧配置，导出流量后再执行检测。
  protocol: 协议
  endpoint: 接入端点
  normalizationRule: 归一化与采样规则
  deviceGuide: 设备侧指引
  detectHintTitle: 接入检测
  detectHintDesc: 完成设备配置后，请执行检测，确认平台已收到最近时间窗内的 Flow 数据。
  detectAccess: 检测接入状态
  detectSuccess: 接入成功
  detectSuccessDesc: 已收到该资产的最新 Flow 数据，向导将自动进入下一步。
  detectFailed: 未检测到数据
  detectFailedDesc: 暂未检测到最近的 Flow 数据，请检查导出地址、协议类型和源 IP 后重试。
  lastSeenAt: 最近上报时间
  effectiveSamplingRate: 生效采样率
  samplingRateSource: 采样率来源
