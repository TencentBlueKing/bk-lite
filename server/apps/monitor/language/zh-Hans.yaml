flow_onboarding_ui:
  accessAsset: 接入资产
  accessGuide: 接入指引
  accessComplete: 接入完成
  accessCompleteTitle: 接入完成
  accessCompleteDesc: Flow 资产已准备就绪，平台将为该资产持续接收并处理 Flow 流量。
  accessCompleteSubDesc: 您可以查看资产列表、继续接入新的资产，或返回模板列表。
  newAsset: 新建资产
  existingAsset: 选择已有资产
  accessAssetDesc: 选择“新建资产”将创建新的 Flow 监控资产；选择“选择已有资产”会将当前协议绑定到已有资产。
  selectExistingAsset: 请选择已有 Flow 资产
