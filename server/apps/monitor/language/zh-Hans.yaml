  cloudRegion: 云区域
  selectCloudRegion: 请选择云区域
  cloudRegionDesc: 请选择资产所属云区域，Flow 监听地址将使用该区域的接入端点。
  assetIp: 资产 IP
  assetIpDesc: 请输入发送 Flow 数据的设备源 IP，并确保与导出器源地址保持一致。
  assetName: 资产名称
  assetNameDesc: 请使用便于识别的资产名称，例如“核心交换机-北京”。
  organization: 所属组织
  organizationDesc: 只有所选组织的成员才能查看和管理该 Flow 资产。
  fallbackSamplingRate: 回退采样率
  fallbackSamplingRateDesc: 默认值为 1000。当导出数据在归一化后仍未提供有效采样率时，系统会回退到该值。
  assetTipTitle: Flow 接入前提示
  assetTipDesc: 请先创建或选择监控资产，并保持资产 IP 与导出器源地址一致，平台才能正确匹配 Flow 数据。
