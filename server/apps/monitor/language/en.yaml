  Consul:
    consul_health_checks_passing:
      name: Health Checks Passing
      desc: Number of health checks in passing state on Consul node; 1 indicates check passed, 0 indicates not passed
    consul_health_checks_critical:
      name: Health Checks Critical
      desc: Number of health checks in critical state on Consul node; 1 indicates check is critical, 0 indicates normal
    consul_health_checks_warning:
      name: Health Checks Warning
      desc: Number of health checks in warning state on Consul node; 1 indicates check is warning, 0 indicates normal
    consul_health_checks_status:
      name: Health Checks Status
      desc: Current status value of health checks on Consul node, typically indicating specific status codes
    consul_health_checks_check_name:
      name: Check Name Identifier
      desc: Name identifier of health check, distinguishing different types (e.g., serfHealth for Serf cluster health check)
    consul_health_checks_service_id:
      name: Service ID Identifier
      desc: Service ID identifier associated with health check; 0 indicates node-level check, non-zero indicates service-specific check
  Ping:
    ping_average_response_ms:
      name: Average Response Time
      desc: Average response time of ICMP Ping requests, reflecting average network latency
    ping_maximum_response_ms:
      name: Maximum Response Time
      desc: Maximum response time of ICMP Ping requests, reflecting peak network latency
    ping_minimum_response_ms:
      name: Minimum Response Time
      desc: Minimum response time of ICMP Ping requests, reflecting best-case network latency
    ping_percent_packet_loss:
      name: Packet Loss Percentage
      desc: Percentage of ICMP packet loss, reflecting network connection stability
    ping_result_code:
      name: Result Code
      desc: Result code of Ping test, indicating success or failure status of Ping operation
    ping_ttl:
      name: Time To Live
      desc: Time To Live value of received ICMP response packets, reflecting number of network hops
  TCPPort:
    net_response_response_time:
      name: Response Time
      desc: TCP connection round-trip time in milliseconds. net_response emits seconds; the query multiplies by 1000 for display. Higher values indicate slower connections or higher network latency.
    net_response_result_code:
      name: Result Code
      desc: TCP probe result code. 0 success, 1 connection timeout, 2 connection failed, 3 read failed, 4 response string mismatch. Any non-zero value indicates a probe failure.
    net_response_string_found:
      name: String Found
      desc: Whether the expected string was matched in the response. Reported only when an expect string is configured; 1 means found, 0 means not found.
  Nginx:
    nginx_active:
      name: Active Connections
      desc: Number of active client connections, reflecting concurrent load
    nginx_reading:
      name: Reading Connections
      desc: Number of connections reading request headers, reflecting request processing status
    nginx_writing:
      name: Writing Connections
      desc: Number of connections writing responses, reflecting response processing status
    nginx_waiting:
      name: Waiting Connections
      desc: Number of idle connections waiting for requests, reflecting connection pool usage
    nginx_requests_rate:
      name: Request Rate
      desc: Rate of requests handled by Nginx, reflecting real-time load
    nginx_accepts_rate:
      name: Connection Acceptance Rate
      desc: Rate of new connections accepted by Nginx, reflecting connection establishment frequency
    nginx_handled_rate:
      name: Connection Handling Rate
      desc: Rate of connections handled by Nginx, reflecting connection processing capacity
  WebLogic-JMX:
    weblogic_jms_jmsservers_current_count_value:
      name: JMS Servers Current Count
      desc: The current number of running JMS server instances. Changes in the number may affect the performance and reliability of message delivery.
    weblogic_application_healthstatejmx_is_critical_value:
      desc: Flag indicating whether the application is in a critical abnormal state, directly reflecting business availability. When this metric is 1, it indicates that the application has a serious problem that needs to be investigated and repaired immediately.
      name: Application Health Critical State
    jmx_scrape_error_gauge:
      desc: 'JMX scrape status: 0 for success, 1 for failure.'
      name: JMX Metric Scrape Failure
    weblogic_persistentstore_read_count_value:
      desc: The number of read operations performed by the persistent store, reflecting read load. Frequent read operations may affect storage performance, and it is necessary to optimize read strategies.
      name: Persistent Store Read Count
    weblogic_threadpool_pending_user_request_count_value:
      name: Pending User Requests
      desc: The length of the user request queue waiting to be processed by the thread pool. Continuous growth may lead to response delays. If this metric keeps increasing, it indicates that the thread pool cannot process requests as fast as they arrive, which may degrade user experience.
    weblogic_threadpool_load_ratio:
      name: Thread Pool Load Ratio
      desc: Evaluate the load pressure of the thread pool. A value greater than 1 indicates that the request exceeds the processing capacity, and a value of 80% should trigger a severe warning. This metric helps determine whether the thread pool is overloaded, so that measures can be taken in time to prevent system crashes.
    weblogic_threadpool_stuck_thread_count_value:
      desc: The number of threads that have been running for a long time without completing, possibly indicating deadlocks or slow queries. When this metric is greater than 0, it is necessary to investigate whether there are code logic issues or database query performance problems.
      name: Stuck Thread Count
    weblogic_workmanager_stuck_thread_count_value:
      name: Global WorkManager Stuck Threads
      desc: The number of stuck threads in the global work manager, used for system-level thread issue troubleshooting. When this metric is greater than 0, it is necessary to check whether there are thread blocking or resource contention issues in the system.
    weblogic_jms_connections_current_count_value:
      desc: The current number of established JMS connections. Too many connections may lead to resource tension, while too few may affect the efficiency of message delivery.
      name: JMS Current Connections
    weblogic_threadpool_throughput_value:
      name: Thread Pool Throughput
      desc: The number of requests processed per second by the thread pool, reflecting processing capacity. A higher value indicates stronger request processing capability. A significant drop in throughput may indicate performance bottlenecks or insufficient resources in the thread pool.
    weblogic_application_overallhealthstatejmx_is_critical_value:
      name: Application Overall Health Critical State
      desc: Flag indicating whether the overall health state of the application, evaluated based on multiple metrics, is critically abnormal. When this metric is 1, it indicates that the overall health of the application is poor, which may affect the normal operation of the business.
    weblogic_persistentstore_total_io_rate_value:
      name: Persistent Store Total I/O Rate
      desc: Indicates the total number of I/O operations per second in the persistent store, including reads and writes. A high I/O frequency may lead to storage performance bottlenecks, and it is necessary to pay attention to the performance metrics of the storage system.
    weblogic_jms_connections_high_count_value:
      name: JMS Peak Connection Count
      desc: The historical highest record of JMS connections, used to evaluate the rationality of connection pool configuration. If the current number of connections is close to the peak value, it may be necessary to adjust the size of the connection pool.
    weblogic_workmanager_pending_requests_value:
      desc: The number of requests waiting to be processed in the global work manager. If this metric keeps increasing, it may affect the system's response speed.
      name: Global WorkManager Pending Requests
    weblogic_persistentstore_physical_write_count_value:
      name: Persistent Store Physical Rate
      desc: Indicates the number of physical writes per second in the persistent store, reflecting write load. A high write frequency may lead to a decline in storage performance.
    weblogic_persistentstore_object_count_value:
      desc: The current number of objects (such as messages, transaction logs) stored in the persistent store. Too many objects may lead to insufficient storage space, which requires regular cleanup.
      name: Persistent Store Object Count
    weblogic_threadpool_average_utilization:
      desc: Reflect the average utilization rate of the thread pool over a period of time. High utilization may lead to thread pool overload, while low utilization may indicate resource waste. It is generally recommended to maintain it between 60% and 80%.
      name: Thread Pool Utilization (Average)
    weblogic_threadpool_queue_length_value:
      desc: The number of tasks in the thread pool request queue, reflecting request backlog. A long queue length means many requests are waiting to be processed, which may require increasing thread pool resources or optimizing request processing logic.
      name: Thread Pool Queue Length
  TCP:
    ConnectStatus:
      name: Connect Status
      desc: This metric reflects the availability of cloud APIs, the validity of account credentials, and the overall health of the data collection pipeline.
  CVM:
    CPUUsage_gauge:
      name: CPU Utilization
      desc: The real-time percentage of CPU occupied during machine operation.
    MemUsed_gauge:
      name: Memory Usage
      desc: The actual memory used by the user, excluding memory occupied by buffers and system cache. Calculated as Total Memory - Available Memory (including buffers and cached).
    MemUsage_gauge:
      name: Memory Utilization
      desc: The actual memory utilization rate by the user, excluding memory occupied by buffers and system cache. It is the ratio of actual user memory usage to total memory.
    CvmDiskUsage_gauge:
      name: Disk Utilization
      desc: The percentage of used disk capacity relative to total capacity (all disks).
    LanOuttraffic_gauge:
      name: Internal Outbound Traffic
      desc: Average outbound traffic rate on the internal network interface card.
    LanIntraffic_gauge:
      name: Internal Inbound Traffic
      desc: Average inbound traffic rate on the internal network interface card.
    LanOutpkg_gauge:
      name: Internal Outbound Packet Rate
      desc: Average outbound packet rate on the internal network interface card.
    LanInpkg_gauge:
      name: Internal Inbound Packet Rate
      desc: Average inbound packet rate on the internal network interface card.
    WanOuttraffic_gauge:
      name: External Outbound Traffic
      desc: Average outbound traffic rate on the external network (sum of EIP, CLB, and CVM outbound bandwidth). The minimum granularity is a 10-second average.
    WanIntraffic_gauge:
      name: External Inbound Traffic
      desc: Average inbound traffic rate on the external network (sum of EIP, CLB, and CVM inbound bandwidth). The minimum granularity is a 10-second average.
    WanOutpkg_gauge:
      name: External Outbound Packet Rate
      desc: Average outbound packet rate on the external network interface card.
    WanInpkg_gauge:
      name: External Inbound Packet Rate
      desc: Average inbound packet rate on the external network interface card.
  ESXI:
    cpu_usage_average_gauge:
      name: CPU usage
      desc: It represents the CPU utilization rate of the system or application program, which is a key indicator for measuring CPU load and performance
    mem_usage_average_gauge:
      name: Memory utilization rate
      desc: The memory utilization rate indicates the usage situation of the memory and is used to evaluate the memory load of the system or application program
    mem_consumed_average_gauge:
      name: Active memory
      desc: The active memory represents the actual amount of memory used by the system or application program and is a key indicator of memory consumption
    disk_read_average_gauge:
      name: Disk read rate
      desc: The disk read rate represents the amount of data read from the disk per second and is an important indicator for measuring the disk read performance
    disk_write_average_gauge:
      name: Disk write rate
      desc: The disk write rate represents the amount of data written to the disk per second and is an important indicator for measuring the disk write performance
    disk_numberRead_summation_gauge_rate:
      name: Disk read I/O Rate
      desc: Represents the number of disk read operations completed per second, an important metric for measuring the frequency of disk read requests. Higher values indicate more frequent read requests
    disk_numberWrite_summation_gauge_rate:
      name: Disk write I/O Rate
      desc: Represents the number of disk write operations completed per second, an important metric for measuring the frequency of disk write requests. Higher values indicate more frequent write requests
    net_bytesRx_average_gauge:
      name: Network receive rate
      desc: The network receive rate represents the amount of data received per second and is an important criterion for measuring network traffic
    net_bytesTx_average_gauge:
      name: Network transmit rate
      desc: The network transmit rate represents the amount of data sent out per second and is an important criterion for measuring network traffic
  Cluster:
    cluster_pod_count:
      name: Cluster Pod Count
      desc: Total number of Pods in the current Kubernetes cluster. This metric is based on kube_pod_info and returns the count of existing Pods under the current filter conditions (e.g., cluster, namespace), covering all namespaces
    cluster_node_count:
      name: Cluster Node Count
      desc: Total number of nodes in the current Kubernetes cluster. This metric reflects the count of registered nodes in the cluster and can be used to evaluate cluster scale and infrastructure capacity
    cluster_memory_utilization:
      name: Cluster Memory Utilization
      desc: The ratio of used memory to total memory across all nodes in the Kubernetes cluster, expressed as a percentage. Used to assess overall cluster memory usage and pressure level
    cluster_disk_utilization:
      name: Cluster Disk Utilization
      desc: Overall disk utilization across all nodes in the Kubernetes cluster
  Apache:
    apache_ServerUptimeSeconds:
