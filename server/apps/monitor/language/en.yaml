  Docker Container:
    docker_container_status:
      name: Container Status
      desc: Reflects the current running state of the container, such as running, stopped, or paused
    docker_container_status_restart_count:
      name: Restart Count
      desc: The number of times the container has restarted, i.e., how many resets have occurred since its last start
    docker_container_cpu_usage_percent:
      name: CPU Usage Percent
      desc: Percentage of CPU resources used by the container relative to the available resources, used to monitor performance and load
    docker_container_mem_usage_percent:
      name: Memory Usage Percent
      desc: Percentage of memory used by the container relative to the memory limit set, helps understand memory usage
    docker_container_mem_usage:
      name: Memory Usage
      desc: Amount of memory used by the container, indicating the actual physical memory consumption
    docker_container_blkio_io_service_bytes_recursive_total_rate:
      name: Total Block I/O Bytes Rate
      desc: Total number of bytes transferred per second during block I/O operations in the container, including all read and write operations
    docker_container_blkio_io_service_bytes_recursive_read_rate:
      name: Block Device Read Bytes Rate
      desc: Number of bytes read per second from block devices, reflecting the load of read operations and storage performance
    docker_container_blkio_io_service_bytes_recursive_write_rate:
      name: Block Device Write Bytes Rate
      desc: Number of bytes written per second to block devices, indicating the load of write operations and storage performance
    docker_container_net_rx_bytes_rate:
