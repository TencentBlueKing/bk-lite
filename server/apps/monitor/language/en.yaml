monitor_object_plugin:
  Wireless Cambium SNMP:
    name: Wireless Cambium SNMP
    desc: Baseline SNMP collection template for wireless devices (interface traffic + uptime). Collects IF-MIB 64-bit HC interface counters (ifHCInOctets/ifHCOutOctets, ifXTable) rates and device uptime (sysUpTime). Wireless health metrics (signal strength/SNR/associated clients) use Cambium private per-row indexed MIBs requiring row-level filtering not supported by telegraf inputs.snmp, so they are N/A. Applicable to Cambium Networks wireless devices (cnPilot/ePMP/PMP, enterprise OID 17713) and other IF-MIB compliant wireless AP/bridges.
  Switch WAGO SNMP:
    name: WAGO (Telegraf)
    desc: Baseline SNMP template for WAGO industrial managed Ethernet switches (enterprise PEN 13576). It collects IF-MIB 64-bit HC interface counters (ifHCInOctets/ifHCOutOctets, ifXTable) rates and device uptime (sysUpTime). Only WAGO 852 series SNMP management support and enterprise identity are confirmed here; stable row-filter-free private CPU, memory, temperature, fan or power-supply health OIDs are not confirmed, so those health metrics are N/A and not faked. Applicable to WAGO 852 industrial managed switches and other IF-MIB compliant WAGO switches.
  Switch Weidmuller SNMP:
    name: Weidmuller (Telegraf)
    desc: Baseline SNMP child template for Weidmuller industrial managed Ethernet switches under enterprise PEN 38187. The available state confirms the Weidmuller enterprise root, industrial Ethernet product surface, and official support center, but no verified public vendor MIB package or device walk confirms row-filter-free scalar CPU, memory, temperature, fan or power-supply health OIDs. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the Weidmuller collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — Weidmuller industrial managed Ethernet switches and other IF-MIB compliant Weidmuller switches.
  Wireless Proxim SNMP:
    name: Wireless Proxim SNMP
    desc: Baseline SNMP collection template for wireless devices (interface traffic + uptime). Collects IF-MIB 64-bit HC interface counters (ifHCInOctets/ifHCOutOctets, ifXTable) rates and device uptime (sysUpTime). Wireless health metrics (signal strength/SNR/subscriber units) use Proxim ORiNOCO/Tsunami private per-row indexed MIBs requiring row-level filtering not supported by telegraf inputs.snmp; LibreNMS also has no Proxim processors/mempools/sensors discovery (only ORiNOCO-MIB for OS detection), so wireless health is N/A. Applicable to Proxim Wireless devices (ORiNOCO AP access points, Tsunami MP point-to-multipoint backhaul base stations/subscriber units, enterprise OID 841) and other IF-MIB compliant wireless AP/backhaul bridges.
  Wireless ASCOM SNMP:
    name: Ascom (Telegraf)
    desc: Baseline SNMP collection template for Ascom IP-DECT wireless communication systems (enterprise PEN 27614). Collects IF-MIB 64-bit HC interface counters (ifHCInOctets/ifHCOutOctets, ifXTable) rates on the base-station Ethernet uplink and device uptime (sysUpTime). The ASCOM-IPDECT-MIB exposes only fault-log and alarm-log entry tables (ipDectFaultLogTable / ipDectActiveAlarmsTable) and per-entry error codes, with no CPU/memory/temperature scalar objects, and active-call/handset counts are not published as pollable scalars. CPU/memory/temperature/fan/power/call-count are therefore N/A and not faked. Applicable to Ascom IP-DECT base stations and IP-DECT gateways managed over SNMP (enterprise PEN 27614) and other IF-MIB compliant wireless devices.
  Wireless Albentia SNMP:
    name: Albentia (Telegraf)
    desc: Albentia Systems WiMAX / AerDOCSIS wireless SNMP child template (ALBENTIA-AS-MIB, enterprise PEN 28087). The source queue confirms private Albentia telemetry for sector temperature, clients, frequency, distance and power, but the exact raw MIB object list is not present in this worktree; without row-filter-free OIDs, those private temperature/client/radio/link health metrics are N/A and not faked. This child declares no vendor-specific metric deltas in metrics.json; the shared Wireless SNMP floor supplies uptime, IF-MIB interface metrics and aggregate traffic through the generic snmp/wireless metric model while this plugin provides the Albentia collect_type, UI and Telegraf child template. Applicable to Albentia wireless base stations / access devices and other IF-MIB compliant wireless devices.
  Wireless LigoWave SNMP:
    name: LigoWave (Telegraf)
    desc: LigoWave wireless AP and backhaul SNMP child template, enterprise PEN 32750. The confirmed LigoWave MIB set exposes wireless interface, remote-node, signal, noise, SNR, Tx power and byte-counter telemetry, but this pass has not confirmed stable row-filter-free CPU, memory, temperature, fan or power-supply device-health OIDs. Those device-health metrics are therefore N/A and wireless link counters are not promoted into shared health metrics. This child declares no vendor-specific metric deltas in metrics.json; the shared Wireless SNMP floor supplies uptime, IF-MIB interface metrics and aggregate traffic through the generic snmp/wireless metric model while this plugin provides the LigoWave collect_type, UI and Telegraf child template. Applicable to LigoWave wireless APs, bridges, backhaul devices and other IF-MIB compliant wireless devices.
  Wireless Radwin SNMP:
    name: Radwin (Telegraf)
    desc: Radwin wireless broadband PtP and PtMP SNMP child template, enterprise PEN 4458. The current state facts confirm RADWIN-MIB-WINLINK1000 and the Radwin enterprise number, but this pass has not confirmed stable row-filter-free CPU, memory, temperature, fan or power-supply device-health OIDs. Those device-health metrics are therefore N/A and wireless link counters are not promoted into shared health metrics. This child declares no vendor-specific metric deltas in metrics.json; the shared Wireless SNMP floor supplies uptime, IF-MIB interface metrics and aggregate traffic through the generic snmp/wireless metric model while this plugin provides the Radwin collect_type, UI and Telegraf child template. Applicable to Radwin 5000 and other Radwin wireless broadband PtP or PtMP devices plus IF-MIB compliant wireless devices.
  Wireless Mimosa SNMP:
    name: Mimosa (Telegraf)
    desc: Mimosa wireless PtP and PtMP backhaul SNMP child template, enterprise PEN 43356. This child collects the confirmed internal temperature scalar, reported as tenths of a degree Celsius and converted to Celsius in the query. CPU, memory, fan and power-supply health objects are currently N/A because no stable shared OIDs are confirmed for them, and wireless link or subscriber counters are not promoted into shared health metrics. The shared Wireless SNMP floor supplies uptime, IF-MIB interface metrics and aggregate traffic while this plugin provides the Mimosa collect_type, UI and Telegraf child template. Applicable to Mimosa B5, B11 and other Mimosa wireless PtP or PtMP backhaul devices plus IF-MIB compliant wireless devices.
  Wireless Airspan SNMP:
    name: Airspan (Telegraf)
    desc: Airspan 4G and 5G wireless access SNMP baseline child template for devices under Airspan PEN 1803. This child template relies on the shared Wireless SNMP floor for MIB-II uptime and IF-MIB 64-bit HC interface traffic. Current public facts confirm the wireless access product surface and enterprise root only, but do not prove stable shared CPU, memory, temperature, fan, power or RF-health leaf OIDs, so private wireless business objects are not promoted into shared device-health metrics.
  Wireless ACKSYS SNMP:
    name: ACKSYS (Telegraf)
    desc: ACKSYS AirLink and WaveOS industrial wireless SNMP baseline child template. This child template relies on the shared Wireless SNMP floor for MIB-II uptime and IF-MIB 64-bit HC interface traffic. Current public facts confirm the AirLink industrial wireless product surface, SNMP v1/v2c/v3 management and an official MIB download surface, but do not prove stable shared CPU, memory, temperature, fan, power or RF-health leaf OIDs, so private wireless business objects are not promoted into shared device-health metrics.
  Wireless Xirrus SNMP:
    name: Xirrus (Telegraf)
    desc: Xirrus enterprise Wi-Fi array SNMP baseline child template for devices under Xirrus PEN 21013. This child template relies on the shared Wireless SNMP floor for MIB-II uptime and IF-MIB 64-bit HC interface traffic. LibreNMS lists XirrusAos as an official OS class with a public XIRRUS-MIB raw file, and the Xirrus enterprise root PEN 21013 with oid-base products subtree 1.3.6.1.4.1.21013.1 is confirmed. This workspace has not added stable shared CPU, memory, temperature, fan, power or RF-health leaf OIDs, so private wireless business objects are not promoted into shared device-health metrics.
  Wireless ProSoft Technology SNMP:
    name: ProSoft Technology (Telegraf)
    desc: ProSoft Technology RadioLinx / RLX industrial wireless and ICX cellular gateway SNMP baseline child template. This child template relies on the shared Wireless SNMP floor for MIB-II uptime and IF-MIB 64-bit HC interface traffic. Current public facts confirm the industrial wireless product surface and official MIB download surface, but do not prove stable shared CPU, memory, temperature, fan, power or RF-health leaf OIDs, so private wireless business objects are not promoted into shared device-health metrics.
  Wireless Grandstream SNMP:
    name: Grandstream (Telegraf)
    desc: Baseline SNMP collection template for Grandstream GWN wireless devices (interface traffic + uptime, enterprise PEN 42397). Collects IF-MIB 64-bit HC interface counters (ifHCInOctets/ifHCOutOctets, ifXTable) rates and device uptime (sysUpTime). The GRANDSTREAM-GWN-MIB is oriented to wireless radio statistics and per-client information, exposing only gwnDeviceUptime as a scalar system object with no CPU/memory/temperature objects, while associated clients appear only as the per-MAC gwnClientTable with no scalar count that telegraf inputs.snmp cannot aggregate row-wise. CPU/memory/temperature/client-count/channel-utilization are therefore N/A and not faked. Applicable to Grandstream GWN76xx/GWN78xx Wi-Fi access points and controllers (enterprise PEN 42397) and other IF-MIB compliant wireless AP devices.
  Wireless Aerohive SNMP:
    name: Aerohive (Telegraf)
    desc: Aerohive / Extreme Networks HiveAP access-point and controller SNMP collection template (AH-SYSTEM-MIB, enterprise PEN 26928). In addition to IF-MIB 64-bit HC interface traffic and uptime, it collects the HiveOS platform health scalars — CPU utilization (ahCpuUtilization, OID 26928.1.2.3) and memory utilization (ahMemUtilization, OID 26928.1.2.4) both reported directly as 0-100 percentages, and chassis temperature (ahEnvirmentTemp, OID 26928.1.2.10) read directly in degrees Celsius (only models with a temperature sensor return a real value, fanless APs return 0). The fan object (ahEnvirmentFan) is an RPM speed reading rather than a normalized up/down state and most APs are fanless, so fan and power-supply status are N/A. Applicable to Aerohive / Extreme HiveAP access points and HiveManager-managed wireless devices running HiveOS (enterprise PEN 26928).
  Wireless EnGenius SNMP:
    name: EnGenius (Telegraf)
    desc: Baseline SNMP collection template for EnGenius wireless devices (interface traffic + uptime, Senao enterprise OID 14125). Collects IF-MIB 64-bit HC interface counters (ifHCInOctets/ifHCOutOctets, ifXTable) rates and device uptime (sysUpTime). EnGenius private MIBs are config-oriented—ENGENIUS-PRIVATE-MIB exposes no CPU, temperature or memory objects; only legacy mesh-firmware ENGENIUS-MESH-MIB exposes a free-memory percentage and a string uptime, and cloud-managed ECW/EWS models lack that private tree; there is no scalar associated-client count (the client table is text-typed and not reliably gaugeable) and no channel-utilization object. To stay reliably collectable across models including cloud-managed ones, CPU, memory, temperature, client count and channel utilization are not collected (N/A). Supported brands/models — EnGenius enterprise wireless APs (ECW/EWS cloud-managed series, ENH/ENS access points, enterprise OID 14125).
