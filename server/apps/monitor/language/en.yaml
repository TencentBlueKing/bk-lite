    device_cpu_usage:
      name: CPU Usage
      desc: CPU utilization of the transmission device reported directly as a 0-100 percentage. Sustained high CPU usage can indicate wireless backhaul traffic pressure, control-plane load or abnormal traffic.
    device_memory_usage:
      name: Memory Usage
      desc: Memory utilization of the transmission device reported directly as a 0-100 percentage. Sustained high memory usage may indicate control-plane resource pressure or unstable device services.
    device_temperature_celsius:
      name: Temperature
      desc: CPU or chassis temperature of the transmission device in degrees Celsius. High values may indicate cooling problems, high ambient temperature or overloaded hardware.
    device_fan_state:
      name: Fan Status
      desc: Operational state of each transmission device fan or fan controller. A non-normal state indicates a cooling module fault, offline module, or communication failure and may lead to overheating.
    device_psu_state:
      name: Power Supply Status
      desc: Operational state of each transmission device power supply. A non-normal state indicates offline power, missing input, over-temperature, hardware fault, or alert condition that should be investigated.
