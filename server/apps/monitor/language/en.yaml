  Website:
    http_response_result_code:
      name: Probe Result
      desc: Identifies the probe result from the Telegraf http_response result_code field. 0 means success, while non-zero values represent response string mismatch, body read error, connection failure, timeout, DNS error, or response status code mismatch.
    http_node_success_rate:
      name: Node Success Rate
      desc: Calculate the 5-minute probe success rate for each probing node, reflecting the access experience in a specific region or network environment.
    http_response_response_time:
      name: Response Time
      desc: Represents the total time taken from initiating an HTTP request to receiving the HTTP response. It is used to assess the performance of web services, especially when handling user requests.
    http_response_http_response_code:
      name: HTTP Code
      desc: This metric represents the HTTP response status code for an HTTP request. It captures the value of the HTTP response status codes, such as 200 (OK), 404 (Not Found), 500 (Internal Server Error), etc.
    http_response_content_length:
      name: HTTP Content Length
      desc: This metric indicates the length of the HTTP. Larger content lengths can result in extended data transfer times and consume more bandwidth.
  Scanning Device:
    iftotalInOctets:
      desc: This metric indicates the average rate of total bytes received by the entire device over the past 5 minutes, measured in megabytes per second (MB/s). By summing the incoming byte counts from multiple interfaces, this metric helps administrators obtain an overview of the device's incoming traffic, supporting overall traffic monitoring and capacity planning.
      name: Device Total Incoming Traffic (per second)
    iftotalOutOctets:
      desc: This metric represents the average rate of total bytes sent by the entire device over the past 5 minutes, measured in megabytes per second (MB/s). By summing the outgoing byte counts from multiple interfaces, this metric allows administrators to comprehensively assess the sending performance of the entire system, enabling more effective traffic management and optimization.
      name: Device Total Outgoing Traffic (per second)
    sysUpTime:
      desc: This metric indicates the uptime of the device since the last restart, measured in days. By monitoring the uptime, network administrators can understand the stability and reliability of the device and identify potential reboot or failure issues.
      name: System Uptime
    ifOperStatus:
      desc: This metric reflects the actual operational status of the network switch interface, indicating whether the interface is operational. Unlike the administrative status, the operational status shows whether the interface can successfully receive and send traffic, which is crucial for monitoring network health.
      name: Interface Operational Status
    ifOutUcastPkts:
      name: Outgoing Unicast Packets Rate
      desc: This metric calculates the average rate of outgoing unicast packets over the past 5 minutes, measured in packets per second. By monitoring the number of unicast packets, administrators can assess the transmission performance of the interface and the usage of traffic.
    ifAdminStatus:
      desc: This metric indicates the administrative status of the network switch interface. It serves to indicate whether the interface is enabled (up) or disabled (down) by an administrator, along with other states such as testing or not present. This information is vital for network management and troubleshooting.
      name: Interface Administrative Status
    ifInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, converted to megabytes (MB). Monitoring byte traffic helps evaluate the load on the interface and bandwidth usage.
    ifInUcastPkts:
      name: 'Incoming Unicast Packets Rate '
      desc: This metric indicates the average rate of incoming unicast packets over the past 5 minutes, measured in packets per second. Monitoring unicast packets is crucial for assessing interface utilization and traffic load.
    ifHighSpeed:
      desc: This metric indicates the maximum data transmission speed supported by the network interface, usually measured in Kbps. Understanding the maximum speed of the interface helps administrators optimize traffic and utilize network resources effectively.
      name: Interface Bandwidth
    ifOutDiscards:
      name: Outgoing Discards Rate
      desc: This metric calculates the average rate of outgoing discarded packets over the past 5 minutes, measured in packets per second. Monitoring outgoing discards can help identify network transmission issues and misconfigurations.
    ifOutErrors:
      name: Outgoing Errors Rate
      desc: This metric calculates the average rate of outgoing error packets over the past 5 minutes, measured in packets per second. Monitoring outgoing errors is essential for identifying transmission issues and ensuring data integrity.
    ifInErrors:
      name: Incoming Errors Rate
      desc: This metric calculates the average rate of incoming error packets over the past 5 minutes, measured in packets per second. Monitoring incoming errors allows administrators to detect potential issues, such as physical connection faults or configuration errors, in a timely manner.
    ifInDiscards:
      name: Incoming Discards Rate
      desc: This metric represents the average rate of incoming discarded packets over the past 5 minutes, measured in packets per second. Packet discards may indicate network congestion or resource shortages, and monitoring this metric can help administrators optimize network performance.
    ifOutOctets:
      name: Interface Outgoing Traffic Rate
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, measured in megabytes (MB). Monitoring outgoing traffic is crucial for ensuring data transmission quality and optimizing network performance.
  Storage:
    device_cpu_usage:
      name: CPU Utilization
      desc: This metric reports the controller CPU utilization of the storage device as a percentage, sourced from the vendor private SNMP OID and normalized to 0-100. Sustained high CPU usage can indicate controller overload, heavy IO processing, or a background array rebuild and may slow down host IO response.
    device_memory_usage:
      name: Memory Utilization
      desc: This metric reports the controller memory utilization of the storage device as a percentage, sourced from the vendor private SNMP OID and normalized to 0-100. Sustained high memory usage can indicate cache pressure or a memory leak and may degrade IO performance or trigger controller failover.
    device_disk_state:
      name: Disk Health State
      desc: This metric reports the physical disk health of the storage device, normalized by the worst disk to 1=healthy and 2=fault. A degraded or failed disk carries a risk of data loss and should be replaced immediately.
    device_temperature_celsius:
      name: Temperature
      desc: This metric reports the chassis temperature sensor reading of the storage device in degrees Celsius, sourced from the vendor private SNMP OID (read directly, no scaling). An abnormal temperature rise can indicate fan failure, blocked airflow, or an overheating environment and, if left unaddressed, may trigger thermal protection or damage the disks and hardware.
    device_fan_state:
      name: Fan State
      desc: This metric reports the operational state of the storage device cooling fan, normalized to 1=healthy and 2=fault. A non-healthy state indicates a cooling failure that can rapidly overheat the device and should be investigated immediately.
    device_psu_state:
      name: Power Supply State
      desc: This metric reports the operational state of the storage device power supply, normalized to 1=healthy and 2=fault. A non-healthy state indicates loss of power redundancy or a hardware fault and should be repaired as soon as possible.
    device_raid_state:
      name: RAID State
      desc: This metric reports the operational state of the storage device RAID/volume array, normalized by the worst array to 1=healthy and 2=fault. A degraded or crashed array carries a risk of data loss and should be investigated immediately.
    interface_ifHCInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past 5 minutes (from the 64-bit IF-MIB ifHCInOctets counter), measured in bytes per second. The 64-bit counter avoids the rapid wrap of the 32-bit ifInOctets on high-speed storage uplinks, keeping the rate accurate.
    interface_ifHCOutOctets:
      name: Interface Outgoing Traffic Rate
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes (from the 64-bit IF-MIB ifHCOutOctets counter), measured in bytes per second. The 64-bit counter avoids the rapid wrap of the 32-bit ifOutOctets on high-speed storage uplinks, keeping the rate accurate.
