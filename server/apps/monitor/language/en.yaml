      name: Read Only Setting
      desc: MySQL read_only setting, commonly used with replication signals to infer instance role
    mysql_variables_super_read_only:
      name: Super Read Only Setting
      desc: MySQL super_read_only setting, commonly enabled on replicas to prevent accidental writes
    mysql_variables_log_bin:
      name: Binary Log Enabled
      desc: Whether binary logging is enabled, used to identify primary or replication-capable instances
    mysql_variables_log_slave_updates:
      name: Log Replica Updates Enabled
      desc: Whether replayed replication changes are written to binary logs, useful for chained replication role analysis
    mysql_slow_queries_rate:
      name: Slow Query Request Trigger Rate
      desc: Number of slow query requests, reflecting the frequency of slow queries
    mysql_queries_rate:
      name: QPS (Queries)
      desc: Overall query throughput, reflecting total database access pressure
    mysql_questions_rate:
      name: Questions Rate
      desc: Rate of client statements sent to MySQL, reflecting front-end request pressure
    mysql_com_select_rate:
      name: SELECT Query Rate
      desc: SELECT queries, reflecting read load trends
    mysql_com_insert_rate:
      name: INSERT Write Rate
      desc: INSERT queries, reflecting write load trends
    mysql_com_update_rate:
      name: UPDATE Update Rate
      desc: UPDATE operations, reflecting data update frequency
    mysql_com_delete_rate:
      name: DELETE Delete Rate
      desc: DELETE operations; a spike requires checking data cleanup rationality
    mysql_innodb_row_lock_time_avg:
      name: Avg Row Lock Wait Time
      desc: Average row lock wait time; >50ms indicates severe lock contention
    mysql_innodb_row_lock_waits_rate:
      name: Row Lock Waits Rate
      desc: Number of InnoDB row lock waits
    mysql_innodb_data_reads_rate:
      name: InnoDB Data Reads Rate
      desc: Rate of physical read operations issued by InnoDB
    mysql_innodb_data_writes_rate:
      name: InnoDB Data Writes Rate
      desc: Rate of physical write operations issued by InnoDB
    mysql_innodb_data_fsyncs_rate:
      name: InnoDB Data Fsyncs Rate
      desc: Rate of fsync operations issued for InnoDB data files, reflecting data file flush pressure
    mysql_innodb_os_log_fsyncs_rate:
      name: InnoDB Log Fsyncs Rate
      desc: Redo log fsync rate, reflecting transaction flush pressure
    mysql_innodb_buffer_pool_read_requests_rate:
      name: Buffer Pool Read Requests Rate
      desc: Buffer pool read requests, reflecting database read load
    mysql_innodb_buffer_pool_reads_rate:
      name: Buffer Pool Disk Reads Rate
      desc: Buffer pool disk reads; high values indicate insufficient memory
    mysql_innodb_buffer_pool_pages_free:
      name: Free Buffer Pool Pages
      desc: Number of free pages in the buffer pool, used to estimate cache headroom
    mysql_innodb_buffer_pool_pages_dirty:
      name: Dirty Pages
      desc: Number of dirty pages in buffer pool (not yet written to disk); indicates buffer pool utilization
    mysql_innodb_buffer_pool_pages_total:
      name: Total Buffer Pool Pages
      desc: Total pages in buffer pool; used to calculate buffer pool utilization
    mysql_buffer_pool_hit_ratio:
      name: Buffer Pool Hit Ratio
      desc: Ratio of logical reads served from buffer pool instead of disk
    mysql_buffer_pool_dirty_ratio:
      name: Dirty Pages Ratio
      desc: Ratio of dirty pages in total buffer pool pages
    mysql_buffer_pool_used_ratio:
      name: Buffer Pool Used Ratio
      desc: Ratio of used pages in total buffer pool pages
    mysql_bytes_received_rate:
      name: Data Received Rate
      desc: Data received, reflecting database input traffic
    mysql_bytes_sent_rate:
      name: Data Sent Rate
      desc: Data sent, reflecting database output traffic
    mysql_open_tables:
      name: Open Tables
      desc: Number of currently open table handles
    mysql_opened_tables_rate:
      name: Opened Tables Rate
      desc: Rate of table openings; sustained elevation may indicate insufficient table cache
    mysql_open_files:
      name: Open Files
      desc: Number of open file handles used by MySQL
    mysql_open_files_utilization:
      name: Open Files Utilization
      desc: Ratio of current open files to configured open_files_limit, used to assess file descriptor pressure
    mysql_table_open_cache_utilization:
      name: Table Open Cache Utilization
      desc: Ratio of current open tables to configured table_open_cache, used to assess table cache capacity pressure
    mysql_variables_table_open_cache:
      name: Table Open Cache Setting
      desc: Configured table_open_cache value used to assess table handle capacity
    mysql_variables_open_files_limit:
      name: Open Files Limit Setting
      desc: Configured open_files_limit value used as the file descriptor capacity baseline
    mysql_table_open_cache_hits_rate:
      name: Table Cache Hits Ratio
      desc: Table cache hit rate; <95% requires adjusting table_open_cache configuration
    mysql_table_open_cache_misses_rate:
      name: Table Cache Misses Rate
      desc: Number of table open cache miss requests, reflecting table cache hit status
    mysql_key_reads_rate:
      name: Key Reads Rate
      desc: Rate of MyISAM key block reads from disk
    mysql_key_read_requests_rate:
      name: Key Read Requests Rate
      desc: Rate of logical MyISAM key read requests
    mysql_key_cache_hit_ratio:
      name: Key Cache Hit Ratio
      desc: Ratio of MyISAM key reads served from cache
    mysql_created_tmp_disk_tables_rate:
      name: Disk Temporary Tables Create Rate
      desc: Number of disk temporary tables created
    mysql_created_tmp_tables_rate:
      name: Total Temporary Tables Create Rate
      desc: Total number of temporary tables (memory + disk) created
    mysql_created_tmp_memory_tables_rate:
      name: Memory Temporary Tables Create Rate
      desc: Estimated rate of temporary tables created in memory, derived from total temporary tables minus disk temporary tables
    mysql_tmp_disk_table_ratio:
      name: Disk Temp Table Ratio
      desc: Ratio of temporary tables created on disk; high values usually indicate SQL or memory tuning issues
    mysql_variables_tmp_table_size:
      name: Tmp Table Size Setting
      desc: Configured tmp_table_size threshold used to assess temporary table memory headroom
    mysql_variables_max_heap_table_size:
      name: Max Heap Table Size Setting
      desc: Configured max_heap_table_size threshold used to assess in-memory temp table limits
    mysql_variables_innodb_buffer_pool_size:
      name: InnoDB Buffer Pool Size Setting
      desc: Configured innodb_buffer_pool_size used as the cache capacity baseline
  ActiveMQ-JMX:
    activemq_topic_producer_flow_control_value:
      desc: Indicates whether flow control is enabled for producers on the specified topic, with 1 for enabled and 0 for disabled, to prevent producers from overwhelming the system with too many messages.
      name: Producer Flow Control Status
    activemq_topic_memory_percent_usage_value:
      name: Memory Percent Usage
      desc: Shows the percentage of memory consumption, which helps in optimizing resource allocation to prevent performance degradation.
    activemq_consumer_total_counter:
      desc: Shows the total number of consumers currently connected to the ActiveMQ broker, helping to understand consumer load and message processing capability.
      name: Total Consumers
    activemq_topic_blocked_sends_value:
      name: Blocked Sends Count
      desc: Shows the number of messages blocked due to flow control, helping to assess the system's flow control state and message sending smoothness.
    activemq_topic_memory_usage_byte_count_value:
      desc: The memory occupied by undelivered messages, which helps assess the broker's memory consumption and management strategy.
      name: Memory Usage Byte Count
    jvm_memory_nonheap_usage_used_rate:
      desc: The average rate of change in JVM non-heap memory usage over 5 minutes (in MB per minute), used to monitor memory usage trends.
      name: Non-Heap Memory Usage Change Rate
    activemq_topic_enqueue_rate:
      name: Enqueue Rate
      desc: The number of messages enqueued per unit of time, used for real-time monitoring of system load and message processing capabilities.
    activemq_producer_total_counter:
      desc: Shows the total number of producers currently connected to the ActiveMQ broker, helping to understand producer load and message sending activity.
      name: Total Producers
    activemq_connections_total_rate:
      name: Connection Rate
      desc: Connection rate over 5 minutes, used to monitor connection establishment frequency.
    jvm_memory_heap_usage_used_value:
      name: Heap Memory Usage (Used)
      desc: The portion of JVM heap memory that is currently in use, used to assess the current heap memory usage.
    activemq_connections_total_counter:
      desc: The total number of connections to the ActiveMQ broker. Monitoring this can help detect broker load and connection management efficiency.
      name: Total Connections
    jmx_scrape_error_gauge:
      name: JMX Scrape Error
      desc: 'Indicates the result of JMX metric collection: 0 for success, 1 for failure.'
    activemq_topic_expired_count_value:
      name: Expired Messages Count
      desc: Shows the number of expired messages, indicating potential message processing delays or insufficient consumer processing capabilities.
    activemq_connections_gauge:
      name: Current Connections
      desc: The number of active connections to the ActiveMQ broker. This helps to understand real-time connection status and potential bottlenecks.
    activemq_store_usage_ratio_gauge:
      name: Store Usage
      desc: The percentage of persistent store usage, helping to optimize storage management and resource allocation.
    activemq_memory_usage_ratio_gauge:
      name: Memory Usage Ratio
      desc: The percentage of the memory limit currently in use, useful for managing and optimizing memory utilization.
    activemq_enqueue_total_counter:
      name: Total Enqueues
      desc: Total number of messages sent to the broker, reflecting the system's load and communication frequency.
    jvm_memory_heap_usage_max_value:
      desc: The maximum amount of heap memory available to the JVM, used to assess the upper limit of heap memory to prevent memory overflow.
      name: Heap Memory Usage (Max)
    activemq_message_total_rate:
      name: Unacknowledged Message Growth Rate
      desc: The growth rate of unacknowledged messages over 5 minutes, used to monitor message backlog. If the growth rate remains high, it may indicate processing bottlenecks or message backlog issues in the system.
    activemq_topic_enqueue_count_value:
      name: Enqueue Count
      desc: Number of messages received by the target, essential for monitoring communication traffic and flow control measures.
    activemq_topic_queue_size_value:
      desc: The total amount of messages yet to be consumed, indicating the broker's workload and processing capacity.
      name: Queue Size
    activemq_dequeue_total_counter:
      name: Total Dequeues
      desc: Total number of messages confirmed and processed in the broker, which helps understand overall performance and efficiency.
    activemq_message_total_counter:
      name: Unacknowledged Messages
      desc: Total number of unacknowledged messages in the system, helping to identify potential message backlog issues.
  VM:
    cpu_usage_average_gauge:
      name: CPU utilization rate
      desc: It represents the CPU utilization rate of the system within a specific time period, usually expressed as a percentage. This indicator helps to understand the CPU load situation, so as to carry out performance optimization and capacity planning
    mem_usage_average_gauge:
      name: Memory utilization rate
      desc: It represents the memory utilization rate of the system within a specific time period, usually expressed as a percentage. This indicator helps to understand the memory load situation, which is helpful for optimizing memory usage and conducting capacity planning
    mem_consumed_average_gauge:
      name: Active memory
      desc: It represents the active memory of the system within a specific time period, usually measured in bytes. This indicator is used to measure the actual memory resources consumed by the system and helps to analyze the memory usage situation
    disk_io_usage_gauge:
      name: Disk I/O Usage
      desc: Indicates the I/O usage of the VM's disk, i.e., the busyness of the disk over a period of time. Higher values indicate higher disk load
    disk_read_average_gauge:
      name: Disk Read Throughput
      desc: Represents the average read throughput of the VM's disk over a period of time. Higher values indicate better read performance
    disk_used_average_gauge:
      name: Disk Usage
      desc: Represents the average usage of the VM's disk, i.e., the proportion of disk space used. Higher values indicate tighter disk space
    disk_numberRead_summation_gauge_rate:
      name: Disk read I/O Rate
      desc: Represents the number of disk read operations completed per second, an important metric for measuring the frequency of disk read requests. Higher values indicate more frequent read requests
    disk_numberWrite_summation_gauge_rate:
      name: Disk write I/O Rate
      desc: Represents the number of disk write operations completed per second, an important metric for measuring the frequency of disk write requests. Higher values indicate more frequent write requests
    disk_write_average_gauge:
      name: Disk Write Throughput
      desc: Represents the average write throughput of the VM's disk over a period of time. Higher values indicate better write performance
    net_bytesRx_average_gauge:
      name: Network receive rate
      desc: It represents the network receive rate of the system within a specific time period, usually measured in bytes per second. This indicator is used to measure the network receiving performance and helps to analyze network traffic and bandwidth usage
    net_bytesTx_average_gauge:
      name: Network transmit rate
      desc: It represents the network transmit rate of the system within a specific time period, usually measured in bytes per second. This indicator is used to measure the network transmitting performance and helps to analyze network traffic and bandwidth usage
    power_state_gauge:
      name: Power state
      desc: It indicates the current power status of a virtual machine (VM). This metric helps administrators monitor whether a VM is powered on or off.This metric is essential for tracking VM availability, optimizing resource allocation, and automating workflows in VMware environments
  ClickHouse:
    clickhouse_asynchronous_metrics_os_memory_available:
      name: Available Memory
      desc: Indicates the total physical memory available for processes.
    clickhouse_metrics_parts_active:
      name: Active Parts Count
      desc: Displays the number of active parts in the MergeTree tables.
    clickhouse_asynchronous_metrics_disk_total_default:
      desc: Displays the total capacity of the default disk.
      name: Total Disk Capacity (Default)
    clickhouse_asynchronous_metrics_load_average1:
      name: Load Average (1m)
      desc: Indicates the average system load over the last 1 minute.
    clickhouse_asynchronous_metrics_disk_used_default:
      desc: Represents the amount of disk space currently used on the default disk.
      name: Disk Usage (Default)
    clickhouse_metrics_parts_outdated:
      desc: Shows the count of outdated parts in the MergeTree tables.
      name: Old Parts Count
    clickhouse_metrics_memory_tracking:
      desc: Indicates the current memory usage by the ClickHouse process.
      name: Memory Usage
    clickhouse_events_query:
      desc: Displays the number of queries processed per second by ClickHouse.
      name: Queries Per Second (QPS)
    clickhouse_events_compressed_read_buffer_bytes:
      desc: Displays the rate of compressed data read by ClickHouse system, indicating IO performance.
      name: Compressed Data Read Rate
    clickhouse_events_select_query:
      name: Select Query Rate
      desc: Represents the rate of SELECT queries processed during the last 5 minutes.
    clickhouse_asynchronous_metrics_uptime:
      name: Uptime
      desc: Represents the uptime of the ClickHouse system.
    clickhouse_events_inserted_rows:
      name: Inserted Rows Rate
