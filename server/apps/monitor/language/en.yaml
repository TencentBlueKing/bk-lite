  Switch Cisco SNMP:
    name: Cisco (Telegraf)
    desc: Cisco-specific SNMP collection template for switches. In addition to standard IF-MIB interface metrics, it collects Cisco private OIDs for device health including CPU utilization, memory pools, temperature sensors, fan and power-supply status. Supported brands/models — Cisco Catalyst campus switches (2960/3650/3850/9200/9300/9500, etc.) and IOS/IOS-XE switches; Nexus (NX-OS) partially compatible.
  Switch Huawei SNMP:
    name: Huawei (Telegraf)
    desc: Huawei-specific SNMP collection template for switches. In addition to standard IF-MIB interface metrics, it collects Huawei private OIDs (HUAWEI-ENTITY-EXTENT-MIB) for device health including CPU utilization, memory utilization, temperature sensors and fan status. Huawei reports memory as a utilization percentage directly and this template exposes no power-supply state OID. Supported brands/models — Huawei S-series campus switches (S5700/S6700/S7700/S9300, etc.) and CloudEngine CE series.
  Switch Aruba SNMP:
    name: Aruba (Telegraf)
    desc: Aruba-specific SNMP collection template for switches (ArubaOS-CX). In addition to standard IF-MIB interface metrics, it collects ARUBAWIRED private OIDs for device health including per-module CPU and memory utilization, temperature sensors, fan and power-supply status. Aruba reports memory as a utilization percentage directly; fan/psu states are normalized to the unified 1=normal convention. Supported brands/models — Aruba / HPE ArubaOS-CX and ArubaOS-Switch (some formerly HP ProCurve; 2530/2930/3810/5400/6300/8300, etc.).
  Switch Juniper SNMP:
    name: Juniper (Telegraf)
    desc: Juniper-specific SNMP collection template for switches (Junos). In addition to standard IF-MIB interface metrics, it collects JUNIPER-MIB jnxOperating private OIDs for device health including CPU and memory-buffer utilization, temperature sensors, fan and power-supply status. Juniper reports memory as a utilization percentage directly; the jnxOperatingState of fans/psus is normalized to the unified 1=normal convention. Supported brands/models — Juniper EX-series campus switches (EX2300/3400/4300/4600, etc., Junos).
  Switch Extreme SNMP:
    name: Extreme (Telegraf)
    desc: Extreme Networks-specific SNMP collection template for switches (EXOS). In addition to standard IF-MIB interface metrics, it collects EXTREME-SYSTEM-MIB private OIDs for device health including CPU utilization, system memory (total/free), temperature, fan and power-supply status. Memory utilization is computed as (total - free) / total; fan/psu states are normalized to the unified 1=normal convention. Supported brands/models — Extreme Networks ExtremeXOS (EXOS) switches (X440/X460/X670/X690, etc.).
  Switch Brocade SNMP:
    name: Brocade (Telegraf)
    desc: Brocade/Foundry-specific SNMP collection template for switches (FastIron/NetIron). In addition to standard IF-MIB interface metrics, it collects FOUNDRY-SN-AGENT-MIB private OIDs for device health including 1-minute average CPU utilization, dynamic memory utilization, chassis temperature sensors, fan and power-supply status. Brocade reports CPU and memory as utilization percentages directly; fan/psu states are normalized to the unified 1=normal convention. Supported brands/models — Brocade ICX/FCX/NetIron, Ruckus ICX (formerly Brocade ICX, running FastIron), and Foundry/IronWare switches — all share FOUNDRY-SN-AGENT-MIB (enterprise 1991); Ruckus ICX users can select this template directly.
  Switch Alcatel-Lucent SNMP:
    name: Alcatel-Lucent (Telegraf)
    desc: Alcatel-Lucent (Nokia) TiMOS-specific SNMP collection template for Supported brands/models — Nokia/Alcatel-Lucent 7750 SR, 7450 ESS, 7950 XRS and Nokia SR Linux data-center switches (SR-OS / TiMOS / SR Linux, all exposing the TIMETRA MIB; enterprise 6527); excludes Alcatel OmniSwitch (enterprise 6486). switches. In addition to standard IF-MIB interface metrics, it collects TIMETRA-CHASSIS-MIB private OIDs for device health including CPU utilization, system memory pool (used/free bytes), hardware temperature sensors, fan and power-supply status. Memory utilization is computed from used/(used+free); fan/psu states (TmnxDeviceState) are normalized to the unified 1=normal convention. Supported brands/models — Alcatel-Lucent / Nokia service routers 7750 SR, 7450 ESS, 7950 XRS (SR-OS/TiMOS, enterprise 6527); NOT for Alcatel OmniSwitch (enterprise 6486, different OIDs).
  Switch MikroTik SNMP:
    name: MikroTik (Telegraf)
    desc: MikroTik (RouterOS)-specific SNMP collection template for switches (currently mounted under the Switch object). In addition to standard IF-MIB interface metrics, it collects HOST-RESOURCES and MIKROTIK-MIB OIDs for device health including per-core CPU utilization, system memory (used/total), and board temperature. MikroTik exposes fan as raw RPM and lacks a standardized power-supply state, so fan/psu health is not collected (N/A). Memory utilization is computed from used/total. Supported brands/models — MikroTik RouterOS devices (CRS/CCR/RB series).
  Switch D-Link SNMP:
    name: D-Link (Telegraf)
    desc: D-Link DES/DGS-specific SNMP collection template for switches (EQUIPMENT-MIB, enterprise 171). In addition to standard IF-MIB interface metrics, it collects D-Link private OIDs for device health including CPU utilization, memory utilization, temperature sensors, fan and power-supply status. D-Link reports CPU and memory as utilization percentages directly; fan status is natively 1=normal and power-supply status is normalized to the unified 1=normal convention. Supported brands/models — D-Link DES / DGS series and DES-7200 (all D-Link enterprise 171; specific health OIDs vary by model).
  Switch Netgear SNMP:
    name: Netgear (Telegraf)
    desc: Netgear (FASTPATH)-specific SNMP collection template for switches. In addition to standard IF-MIB interface metrics, it collects FASTPATH-BOXSERVICES private OIDs for device health including CPU utilization, system memory (total/free), temperature sensors, fan and power-supply status. Memory utilization is computed as (total - free) / total; fan and power-supply states are natively 1=normal. Supported brands/models — NETGEAR smart / managed switches (GS/M series, etc.).
  Switch TP-Link SNMP:
    name: TP-Link (Telegraf)
    desc: TP-Link (JetStream)-specific SNMP collection template for switches (TPLINK private MIB, enterprise 11863). In addition to standard IF-MIB interface metrics, it collects TP-Link private OIDs for device health including CPU and memory utilization, both reported directly as percentages. TP-Link SMB switches expose no temperature/fan/power-supply sensors, so those health items are not collected (N/A). Supported brands/models — TP-Link JetStream managed switches (T1500/T1600/T2600 series, etc.).
  Switch Zyxel SNMP:
    name: Zyxel (Telegraf)
    desc: Zyxel-specific SNMP collection template for switches (ZYXEL private MIB, enterprise 890). In addition to standard IF-MIB interface metrics, it collects Zyxel private OIDs for device health including CPU utilization (direct percentage) and hardware temperature sensors. Zyxel exposes fan as raw RPM (not a state) and this switch line has no memory-utilization or power-supply-state OID, so those health items are not collected (N/A). Supported brands/models — Zyxel GS/XGS/XS-series managed switches.
  Switch QTech SNMP:
    name: QTech (Telegraf)
    desc: QTech (QSW)-specific SNMP collection template for switches (QTECH-MIB, enterprise 27514). In addition to standard IF-MIB interface metrics, it collects QTech private OIDs for device health including CPU utilization, system memory (used/total), temperature, fan and power-supply status. Memory utilization is computed from used/total; fan/psu states (native 0=normal) are normalized to the unified 1=normal convention. Supported brands/models — QTech QSW-series switches.
  Switch Dell Force10 SNMP:
    name: Dell Force10 (Telegraf)
    desc: Dell Force10 (S-Series)-specific SNMP collection template for switches (F10-S-SERIES-CHASSIS-MIB, enterprise 6027). In addition to standard IF-MIB interface metrics, it collects Dell Force10 private OIDs for device health including per-processor CPU and memory utilization, per-stack-unit temperature, fan-tray and power-supply status. CPU and memory are reported directly as percentages; fan/psu states are normalized to the unified 1=normal convention. Supported brands/models — Dell Networking / Force10 (PowerSwitch S/Z series, FTOS/OS9, enterprise 6027).
  Switch HP ProCurve SNMP:
    name: HP ProCurve (Telegraf)
    desc: HP ProCurve / HP Networking-specific SNMP collection template for switches (HP-ICF MIBs). In addition to standard IF-MIB interface metrics, it collects HP private OIDs for device health including CPU utilization and system memory (used/total). Temperature and fan/power-supply state live in HP's shared ENTITY-SENSOR / hpicfSensorTable that requires per-row type/class filtering, which telegraf inputs.snmp cannot do, so those are not collected (N/A). Memory utilization is computed from used/total. Supported brands/models — HP / HPE ProCurve switches (2500/2600/2900/2920/3500/5400 ProCurve series, etc., enterprise 11).
  Switch Datacom SNMP:
    name: Datacom (Telegraf)
    desc: Datacom DmOS-specific SNMP collection template for switches (DMOS-SYSMON-MIB, IANA PEN 3709). In addition to standard IF-MIB interface metrics, it collects Datacom private OIDs for device health including per-slot CPU load (cpuLoadOneMinuteActive) and system memory (used/total bytes). The DmOS SYSMON MIB only models CPU and memory subtrees; temperature/fan/power-supply objects exist only in the legacy DMswitch-MIB (incompatible with DmOS) and are not collected here (N/A). CPU utilization is averaged across slots; memory utilization is computed from used/total. Supported brands/models — Datacom DmOS switches (DM4xxx series).
  Switch Eltex SNMP:
    name: Eltex (Telegraf)
    desc: Eltex MES-series switch-specific SNMP collection template (RADLAN/Marvell-based MIBs plus ELTEX private OIDs, IANA PEN 89/35265). In addition to standard IF-MIB interface metrics, it collects Eltex private OIDs for device health including CPU utilization (rlCpuUtilDuringLast5Minutes), system memory (total/free), chassis temperature (rlPhdUnitEnvParamTempSensorValue, a dedicated typed column), fan state (rlEnvMonFanState) and power-supply state (rlPhdUnitEnvParamMainPSStatus). Fan/PSU raw codes are normalized via telegraf processors.enum to 1=healthy / 2=fault. Memory utilization is computed from (total-free)/total. This is the first switch brand exposing real temperature/fan/PSU because Eltex provides them as typed value columns (no per-row type filtering needed). Supported brands/models — Eltex MES-series switches.
  Switch SNR SNMP:
    name: SNR (Telegraf)
    desc: SNR (NAG) switch-specific SNMP collection template (NAG-MIB, IANA PEN 40418). In addition to standard IF-MIB interface metrics, it collects SNR private OIDs for device health including per-slot CPU utilization (sysCpuUsage), system memory (total/used), chassis temperature (sysTemperature, a dedicated typed column) and fan state (sysFanStatus). Fan raw codes (0=Normal / 1=Abnormal) are normalized via telegraf processors.enum to 1=healthy / 2=fault. Memory utilization is computed from used/total. NAG-MIB exposes no dedicated power-supply (PSU) state object, so PSU is not collected (N/A). Supported brands/models — SNR (NAG) managed switches.
  Switch APRESIA SNMP:
    name: APRESIA (Telegraf)
    desc: APRESIA managed switch-specific SNMP collection template for the APRESIA NP series (AEOS-NP platform such as ApresiaNP3000/NP4000/NP7000, IANA PEN 278). In addition to standard IF-MIB interface metrics, it collects APRESIA-NP-HW private OIDs for device health — control-plane CPU utilization (npCpuUtilizationValue, the master device CPU usage as a 0-100 percentage), chassis temperature in degrees Celsius (npTemperatureCurrent, read directly with no scaling), per-fan status (npFanStatus) and per-power-supply status (npPowerStatus). The CPU utilization table carries three fixed rows for the same master CPU averaged over the past 5 seconds, 1 minute and 5 minutes; since telegraf cannot filter rows, the metric is aggregated with max() per device. Fan and power-supply raw codes are normalized via telegraf processors.enum to 1=healthy / 2=fault (power-supply empty(3) means an unpopulated slot and is treated as healthy), taking the worst component per device. The private tree only exposes memory through npMemoryUtilizationFailureStatusCode, an OCTET STRING valid only when trap-bound and not a pollable gauge, so memory utilization is not collected (N/A). Supported brands/models — APRESIA NP series (ApresiaNP2000/NP2100/NP2500/NP3000/NP4000/NP5000/NP7000) running AEOS-NP firmware.
  Switch Intelbras SNMP:
    name: Intelbras (Telegraf)
    desc: Intelbras managed switch-specific SNMP collection template (S/SG enterprise line such as the S2328G-PB, which runs an INTELBRAS OS / Comware-derived platform, IANA PEN 26138). In addition to standard IF-MIB interface metrics, it collects Intelbras private OIDs for device health from the ibEntityExt state table — per-entity control-plane CPU utilization (ibEntityExtCpuUsage) and system memory total bytes plus utilization (ibEntityExtMemSize / ibEntityExtMemUsage). CPU and memory are read from the ibEntityExt table indexed by ENTITY-MIB entPhysicalIndex; the real value lives on the management entity row while other component rows report zero, so the metrics are aggregated with max() to surface the real reading. The ibEntityExt temperature column carries a 65535 not-applicable sentinel on non-sensor rows that telegraf cannot filter out, and fan/power-supply state is only distinguishable by joining ENTITY-MIB entPhysicalClass (per-row filtering telegraf does not support), so temperature, fan and power supply are not collected (N/A). Supported brands/models — Intelbras S/SG managed enterprise switches (Comware-based managed line); lower-end web-smart/unmanaged models expose only MIB-II + IF-MIB.
  Switch Nexans SNMP:
    name: Nexans (Telegraf)
    desc: Nexans Advanced Networking Solutions (Nexans ANS) industrial managed switch-specific SNMP collection template (NEXANS-BM-MIB, IANA PEN 266). In addition to standard IF-MIB interface metrics, it collects Nexans private OIDs for device health — chassis temperature (bmSwitchInfo infoTemperature, a dedicated scalar in degrees Celsius) and an industrial alarm-relay state used as a power-supply health proxy (infoAlarmStateM1). The alarm-relay raw codes (1=notSupported, 2=alarmOff meaning OK, 3/7/8/9 and higher=alarm asserted, including explicit power-supply S1/S2 faults) are normalized via telegraf processors.enum to 1=healthy / 2=fault, with notSupported treated as healthy. Nexans GigaSwitch/DualSwitch devices are fanless and expose no CPU, memory or fan OIDs, so those are not collected (N/A). Supported brands/models — Nexans ANS GigaSwitch / DualSwitch industrial switches.
  Switch Pica8 SNMP:
    name: Pica8 (Telegraf)
    desc: Pica8 PicOS white-box switch-specific SNMP collection template (PICA-PRIVATE-MIB, IANA PEN 35098). PicOS exposes public IF-MIB plus its private MIB only (it does not use NET-SNMP UCD or HOST-RESOURCES MIBs). In addition to standard IF-MIB interface metrics, it collects the Pica8 private control-plane CPU utilization (cpuUsage), a clean integer percentage scalar. Memory (totalPhyMemory/usedPhyMemory/freePhyMemory) and temperature (switchTemperature) are exposed only as DisplayString text rather than numeric gauges, fan health is a speed string plus traps with no pollable fan-state enum, and the redundant power-supply table has no publicly documented status enum, so memory, temperature, fan and power supply are not collected (N/A) to avoid reporting unparseable or unverified values. Supported brands/models — Pica8 white-box switches running PicOS.
  Switch Advantech SNMP:
    name: Advantech (Telegraf)
    desc: Advantech EKI industrial managed switch-specific SNMP collection template (ADVANTECH-EKI-PRONEER-MIB, IANA PEN 10297). In addition to standard IF-MIB interface metrics, it collects the Advantech private redundant-power LED-state object (ledPWR1Status under the ledStatus group) used as a power-supply health indicator. The LED raw codes (0=notSupported, 1=up meaning power present/OK, 2=down meaning power input lost) are normalized via telegraf processors.enum to 1=healthy / 2=fault, with notSupported treated as healthy. EKI switches are fanless and the ProView MIB exposes no CPU, memory, numeric temperature or fan objects (only discrete LED-state enums), so CPU, memory, temperature and fan are not collected (N/A). Supported brands/models — Advantech EKI managed industrial Ethernet switches.
  Switch EtherWAN SNMP:
    name: EtherWAN (Telegraf)
    desc: EtherWAN EX-series industrial managed switch-specific SNMP collection template (IANA PEN 2736). In addition to standard IF-MIB interface metrics, it collects EtherWAN private OIDs for device health—chassis temperature (ewnSensorTempValue, a dedicated scalar whose raw value divided by 10 gives degrees Celsius) and the dual power-input status table (ewnPowerSupplyTable ewnPowerSupplyStatus, one row per input named Power1/Power2). The power raw codes (0=up meaning OK, 1=down meaning input lost or absent) are normalized via telegraf processors.enum to 1=healthy / 2=fault, and the worst power input is taken per device. EX-series switches are fanless and expose no CPU, memory or fan objects, so CPU, memory and fan are not collected (N/A). Supported brands/models — EtherWAN EX-series hardened industrial Ethernet switches.
  Switch Red Lion SNMP:
    name: Red Lion (Telegraf)
    desc: Red Lion / N-Tron industrial Ethernet switch-specific SNMP collection template (NTRON714FX6-MIB, IANA PEN 28381). In addition to standard IF-MIB interface metrics, it collects the N-Tron private dual power-input status object (ntronPowerFault). The raw codes (1=faultNone meaning both inputs OK, 2=faultPower1 meaning input 1 lost, 3=faultPower2 meaning input 2 lost) are normalized via telegraf processors.enum to 1=healthy / 2=fault. The N-Tron MIB exposes only RAM/Flash totals (no used or free, so memory utilization cannot be computed), no CPU object, no pollable numeric temperature (the onboard sensor is exposed only via the web UI / N-View, not SNMP) and no fan object (these switches are fanless and convection-cooled), so CPU, memory, temperature and fan are not collected (N/A). The power-fault object is firmware-dependent; on firmware that does not return it the plugin degrades to a clean IF-MIB baseline. Supported brands/models — Red Lion / N-Tron industrial Ethernet switches (714FX6 and N-Tron series, IANA PEN 28381).
  Switch Alaxala SNMP:
    name: Alaxala (Telegraf)
    desc: Alaxala Networks switch-specific SNMP collection template (AlaxalA-MIB, IANA PEN 21839). In addition to standard IF-MIB interface metrics, it collects Alaxala private OIDs for device health from the per-chassis-member box-management table — control-plane CPU load over the last minute (axsCpuLoad1m) and system memory used and free bytes (axsMemoryUsedSize / axsMemoryFreeSize). The columns are indexed per stack/chassis member, with the real value on the active member and standby rows reporting zero, so CPU and the memory counters are aggregated with max() to surface the real reading; memory utilization is derived from used/(used+free). The AX box management table exposes only a discrete temperature status enum (axsTemperatureStatusNumber), not a pollable numeric Celsius value, and no dedicated fan-state or power-supply state numeric object, so temperature, fan and PSU are not collected (N/A). Supported brands/models — Alaxala AX2430S managed enterprise switches; other AX families place the same counters under model-specific subtrees and degrade to a clean IF-MIB baseline.
  Switch Transition Networks SNMP:
    name: Transition Networks (Telegraf)
    desc: Transition Networks (now Lantronix) switch / managed media-converter SNMP collection template (IANA PEN 868). The TRANSITION-SMI private tree (chassis/card/slot module tables) exposes inventory and per-port module objects rather than no-row-level-filter scalar device-health gauges, and the ION/SISPM platform is managed primarily through standard public MIBs, so this is a clean MIB-II + IF-MIB baseline template — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic. CPU, memory, temperature, fan and power-supply state are not collected (N/A) because they are not exposed as pollable scalar OIDs across the product line. Supported brands/models — Transition Networks SISPM/SM hardened managed switches and ION/IONMM managed media converters.
  Switch Waystream SNMP:
    name: Waystream (Telegraf)
    desc: Waystream ASR / FTTH switch SNMP child template (IANA PEN 9303). The verified WAYSTREAM-SMI and WAYSTREAM-RPM-MIB private tree is focused on enterprise identity and RPM/IPTV QoS objects, and no row-filter-free scalar device-health gauges were confirmed in the available state. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the Waystream collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — Waystream ASR and FTTH access switches.
  Switch Antaira SNMP:
    name: Antaira (Telegraf)
    desc: Baseline SNMP child template for Antaira industrial managed Ethernet switches (enterprise PEN 38477). The available state confirms Antaira managed switch SNMP v1/v2c/v3 support and enterprise identity, but no verified public vendor MIB package or device walk confirms row-filter-free scalar CPU, memory, temperature, fan or power-supply health OIDs. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the Antaira collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — Antaira industrial managed Ethernet switches such as LMX series.
  Switch XikeStor SNMP:
    name: XikeStor (Telegraf)
    desc: Baseline SNMP child template for XikeStor managed Ethernet switches under enterprise PEN 242853. The available state confirms the XikeStor switch product surface, a public enterprise root and an official support/download surface, but no verified public vendor MIB package or device walk confirms row-filter-free scalar CPU, memory, temperature, fan or power-supply health OIDs. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the XikeStor collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — XikeStor managed Ethernet switches such as SKS8300 series.
  Switch RubyTech SNMP:
    name: RubyTech (Telegraf)
    desc: Baseline SNMP child template for RubyTech managed Ethernet and industrial switches (enterprise PEN 5205). The available state confirms RubyTech managed switch product families and public switch product subtrees, but no verified public vendor MIB package or device walk confirms row-filter-free scalar CPU, memory, temperature, fan or power-supply health OIDs. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the RubyTech collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — RubyTech IGS/IPGS industrial switches and related L2/L3 managed switch families.
  Switch Kyland SNMP:
    name: Kyland (Telegraf)
    desc: Baseline SNMP child template for Kyland industrial managed Ethernet switches under enterprise PEN 26067. The available state confirms the Kyland enterprise root, SICOM and KIEN industrial managed switch product surface, and an official MIB entry page, but no verified public vendor MIB package or device walk confirms row-filter-free scalar CPU, memory, temperature, fan or power-supply health OIDs. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the Kyland collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — Kyland SICOM, KIEN and related industrial managed Ethernet switches.
  Switch Lantech SNMP:
    name: Lantech (Telegraf)
    desc: Baseline SNMP child template for Lantech industrial managed Ethernet switches under enterprise PEN 148305. The available state confirms the Lantech enterprise root, industrial switch product surface, and official SNMP/MIB capability statements, but no verified public vendor MIB package or device walk confirms row-filter-free scalar CPU, memory, temperature, fan or power-supply health OIDs. This brand metrics.json declares no vendor-specific metric deltas; system uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. This template only provides the Lantech collect_type, UI form and Telegraf child collection config. CPU, memory, temperature, fan and power-supply state are not collected (N/A). Supported brands/models — Lantech OS5, industrial managed Ethernet switches, and tram or rail switching devices.
  Switch TsnTec SNMP:
    name: TsnTec (Telegraf)
    desc: TsnTec 8148SC switch-specific SNMP collection template (IANA PEN 65531). Beyond the shared Switch SNMP floor, it collects TsnTec private OIDs for device health including control-plane CPU utilization, memory utilization, CPU temperature, fan state and power-supply state. CPU and memory are direct 0-100 percentages, and temperature is read directly in degrees Celsius. Fan and PSU raw states are normalized through telegraf processors.enum to 1=healthy / 2=fault. System uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. Supported brands/models — TsnTec 8148SC ultra-low-latency switches.
  Switch Wi-Tek SNMP:
    name: Wi-Tek (Telegraf)
    desc: Wi-Tek managed switch-specific SNMP collection template (IANA PEN 12284). Beyond the shared Switch SNMP floor, it collects Wi-Tek private OIDs from SYSINFO-MIB and IMIMGMT-MIB for device health including control-plane CPU utilization, memory used/free/usage, system temperature, fan state and power-supply state. CPU is read from taskInformation.total as a direct percentage. Memory usage is derived from allocated and free bytes. Temperature is read directly in degrees Celsius from systemTemperature. Fan and PSU raw states are normalized through telegraf processors.enum to 1=healthy / 2=fault. System uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Switch SNMP floor. Industry temperature/power and SFP DDM objects are DisplayString or port-level diagnostics, so they are not collected as device-level health metrics.
  Switch BDCOM SNMP:
    name: BDCOM (Telegraf)
    desc: BDCOM (Shanghai Baud Data Communication) switch-specific SNMP collection template (BDCOM private MIBs, IANA PEN 3320). In addition to standard IF-MIB interface metrics, it collects BDCOM private OIDs for device health including control-plane CPU utilization over the last 5 minutes (NMS-PROCESS-MIB cpmCPUTotal5min), system memory pool used and free bytes (NMS-MEMORY-POOL-MIB, mirroring the Cisco-style memory pool table) and per-card temperature (BDCOM-SYS nmscardTemperature, a dedicated typed column). Memory utilization is computed from used/(used+free). BDCOM switch MIBs expose no dedicated fan-state or power-supply (PSU) state object, so fan and PSU are not collected (N/A). Supported brands/models — BDCOM managed Ethernet switches and OLT line cards.
  Switch Parks SNMP:
    name: Parks (Telegraf)
    desc: Parks PK700-series switch-specific SNMP collection template (PARKS-PK700 MIB, IANA PEN 50224). In addition to standard IF-MIB interface metrics, it collects Parks private OIDs for device health including CPU utilization (cpuUsage), memory utilization (a direct percent-used scalar) and chassis chip temperature (mainChipTemperature). The PARKS-PK700 MIB exposes no fan or power-supply state object, so those are not collected (N/A); per-SFP optical power/temperature are port-level diagnostics, not device health, and are also omitted. Supported brands/models — Parks PK-series switches.
  Switch Ubiquiti SNMP:
    name: Ubiquiti (Telegraf)
    desc: Ubiquiti EdgeSwitch-specific SNMP collection template (EdgeSwitch-SWITCHING-MIB plus EdgeSwitch-BOXSERVICES-PRIVATE-MIB, IANA PEN 4413, Broadcom FASTPATH). In addition to standard IF-MIB interface metrics, it collects EdgeSwitch private OIDs for device health including system memory (available/free, KB), chassis temperature (boxServicesTempSensorTemperature) and fan state (boxServicesFanItemState). Fan raw codes are normalized via telegraf processors.enum to 1=healthy / 2=fault. Memory utilization is computed from (total-free)/total. CPU is exposed only as a per-process table with no aggregate device-CPU scalar that telegraf inputs.snmp can reduce, so CPU is not collected (N/A); the BOXSERVICES MIB has no power-supply state object, so PSU is also N/A. Applies to EdgeSwitch/UniFi wired switches; airOS/UniFi wireless APs are a different object and out of scope. Supported brands/models — Ubiquiti EdgeSwitch (ES series).
  Switch Ruijie SNMP:
    name: Ruijie (Telegraf)
    desc: Ruijie switch-specific SNMP collection template (RUIJIE-PROCESS/MEMORY/SYSTEM MIBs, IANA PEN 4881). In addition to standard IF-MIB interface metrics, it collects Ruijie private OIDs for the full device-health set including CPU utilization (ruijieNodeCPUTotal5min), system memory (size/used, KB), chassis temperature (ruijieSystemMultipleTemperatureCurrent), fan state (ruijieSystemFanStatus) and power-supply state (ruijieSystemElectricalInformationStatus). Fan/PSU raw codes are normalized via telegraf processors.enum to 1=healthy / 2=fault. Memory utilization is computed from used/total. Supported brands/models — Ruijie Networks RG-series switches.
  Switch ZTE SNMP:
    name: ZTE (Telegraf)
    desc: ZTE ZXR10-series switch-specific SNMP collection template (ZXR10-MIB, IANA PEN 3902). In addition to standard IF-MIB interface metrics, it collects ZTE private OIDs for device health including per-unit CPU utilization (zxr10SystemCpuUtility5m) and memory utilization (zxr10SystemMemUsed, a direct percent-used value). The ZXR10-MIB system table exposes no temperature/fan/power sensors (those live in ZTE-AN-ENVMON-MIB for the access-node/OLT line, not the ZXR10 switch), so those are not collected (N/A). Supported brands/models — ZTE ZXR10-series switches.
  Switch Alcatel OmniSwitch SNMP:
    name: Alcatel OmniSwitch (Telegraf)
    desc: Alcatel-Lucent Enterprise OmniSwitch (AOS) switch-specific SNMP collection (ALCATEL-IND1-HEALTH-MIB, IANA PEN 6486). In addition to standard IF-MIB interface metrics, it collects OmniSwitch private OIDs for device health including 1-minute average CPU utilization (healthDeviceCpu1MinAvg) and memory utilization (healthDeviceMemoryLatest), both reported directly as percentages. Temperature lives in the chassis hardware table and fan/power-supply state in the chasEntPhysical entity table with per-entity-type row filtering that telegraf inputs.snmp cannot do, so those are N/A. Supported brands/models — Alcatel-Lucent Enterprise OmniSwitch (OS6xxx/OS9xxx, AOS6/AOS8; enterprise 6486); distinct from Switch Alcatel-Lucent SNMP which covers Nokia/ALU 7750 SR service routers.
  Switch Yamaha SNMP:
    name: Yamaha (Telegraf)
    desc: Yamaha SWX-series switch SNMP collection (YAMAHA-SWHUB-MIB, IANA PEN 1182). In addition to standard IF-MIB interface metrics, it collects Yamaha private OIDs for device health including 1-minute average CPU utilization (yshCpuUtil1min) and memory utilization (yshMemoryUtil), both reported directly as percentages. The SWX-series exposes no temperature/fan/power SNMP sensors, so those are N/A. Supported brands/models — Yamaha SWX-series L2/L2+ switches (SWX2200 / SWX2300 / SWX3100, etc.; enterprise 1182). Yamaha RTX routers are not covered (no public SNMP health template).
  Switch Arista SNMP:
    name: Arista (Telegraf)
    desc: Arista EOS switch SNMP collection. Beyond standard IF-MIB interface metrics, it adds device CPU utilization via HOST-RESOURCES hrProcessorLoad (averaged across cores), which the generic SNMP switch plugin does not provide. Arista exposes memory only through the multi-row hrStorage table (RAM row index not fixed) and temperature/fan/power only through the ENTITY-SENSOR table (sensor types mixed in one table), neither row/type-filterable by the SNMP input, so those are N/A. Supported brands/models — Arista Networks EOS data-center switches (7050 / 7060 / 7280 / 7300 / 7500 series and other EOS platforms).
  Switch Mellanox SNMP:
    name: Mellanox (Telegraf)
    desc: Mellanox (NVIDIA) Spectrum Ethernet switch SNMP collection (Onyx / MLNX-OS). Beyond standard IF-MIB interface metrics, it adds device CPU utilization via HOST-RESOURCES hrProcessorLoad (averaged across cores), which the generic SNMP switch plugin does not provide. Memory is exposed only through the multi-row hrStorage table and temperature/fan/power only through the ENTITY-SENSOR table (sensor types mixed in one table), neither row/type-filterable by the SNMP input, so those are N/A. Supported brands/models — Mellanox/NVIDIA Spectrum Ethernet switches running Onyx or MLNX-OS (SN2000 / SN3000 / SN4000 series). InfiniBand-only fabrics are out of scope.
  Switch Allied Telesis SNMP:
    name: Allied Telesis (Telegraf)
    desc: Allied Telesis AlliedWare Plus (AW+) switch SNMP collection (AT-SYSINFO-MIB / AT-ENVMONv2-MIB, IANA PEN 207). Beyond standard IF-MIB interface metrics, it collects Allied Telesis private OIDs for device health including per-stack-member CPU utilisation (cpuUtilisationStackAvgLastMinute, averaged), chassis temperature sensors (atEnvMonv2TemperatureCurrent, max) and fan and power-supply status, normalised to 1=normal / 2=abnormal. AlliedWare Plus does not expose a standard memory-utilisation OID, so memory is N/A. Supported brands/models — Allied Telesis AlliedWare Plus switches (x-series / IE industrial series / SwitchBlade running AW+; enterprise 207).
  Switch Dell OS10 SNMP:
    name: Dell OS10 (Telegraf)
    desc: Dell EMC OS10 (SmartFabric OS10) switch SNMP collection (DELLEMC-OS10-CHASSIS-MIB, IANA PEN 674). Beyond standard IF-MIB interface metrics, it collects device health including CPU utilisation (HOST-RESOURCES hrProcessorLoad, averaged), card temperature sensors (os10CardTemp, max), and fan and power-supply operational status (os10FanOperStatus / os10PowerSupplyOperStatus, natively 1=normal / 2=abnormal). Memory is exposed only through the multi-row hrStorage table (RAM row index not fixed), so it is N/A. Distinct from the Force10/FTOS plugin. Supported brands/models — Dell EMC PowerSwitch running OS10 / SmartFabric OS10 (S-series / Z-series; enterprise 674).
  Switch Lenovo CNOS SNMP:
    name: Lenovo CNOS (Telegraf)
    desc: Lenovo CNOS (Cloud Network OS) switch SNMP collection (LENOVO-ENV-MIB, IANA PEN 19046). Beyond standard IF-MIB interface metrics, it collects device health including temperature sensors (lenovoEnvMibTempSensorTemperature, max), fan state (lenovoEnvMibFanState) and power-supply state (lenovoEnvMibPowerSupplyState), normalised to 1=normal / 2=abnormal, plus CPU utilisation via HOST-RESOURCES hrProcessorLoad where the platform exposes it. Memory is not exposed via a usable private OID, so it is N/A. Supported brands/models — Lenovo ThinkSystem / RackSwitch switches running CNOS (NE-series, e.g. NE1032 / NE2572 / NE10032; enterprise 19046).
  Switch Westermo SNMP:
    name: Westermo (Telegraf)
    desc: Westermo industrial Ethernet switch SNMP collection (WESTERMO-SW6-MIB, IANA PEN 16177). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Westermo WeOS private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in KB, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and power-supply state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). Westermo industrial switches use fanless passive cooling, so fan is N/A. Supported brands/models — Westermo WeOS industrial managed switches (Lynx / Falcon / RedFox / Viper series; enterprise 16177).
  Switch RuggedCOM SNMP:
    name: RuggedCOM (Telegraf)
    desc: RuggedCOM (Siemens) industrial Ethernet switch SNMP collection (RUGGEDCOM-SYS-MIB, IANA PEN 15004). Beyond standard IF-MIB 64-bit HC interface traffic, it collects RuggedCOM ROS private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in bytes, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and redundant power-supply state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). RuggedCOM industrial switches use fanless conduction-cooled passive cooling, so fan is N/A. Supported brands/models — Siemens RuggedCOM ROS industrial managed switches (RS / RSG / RST series; enterprise 15004).
  Switch Scalance SNMP:
    name: Scalance (Telegraf)
    desc: Siemens SCALANCE X industrial Ethernet switch SNMP collection (Siemens AUTOMATION-SMI, IANA PEN 4329). Beyond standard IF-MIB 64-bit HC interface traffic, it collects SCALANCE private OIDs for device health including chassis temperature (in degrees Celsius) and dual power-supply line state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). SCALANCE X switches are managed-bridge ASIC devices, mostly fanless conduction-cooled, and their private MIB does not expose CPU or memory load as scalars, so CPU, memory and fan are N/A. Supported brands/models — Siemens SCALANCE X industrial managed switches (X200 / X300 / X400 / XB / XC / XR series; enterprise 4329).
  Switch Microsens SNMP:
    name: Microsens (Telegraf)
    desc: MICROSENS (Germany) industrial fibre Ethernet switch SNMP collection (MICROSENS-G6-MIB, IANA PEN 3181). Beyond standard IF-MIB 64-bit HC interface traffic, it collects MICROSENS G6 private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in bytes, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and redundant power-supply state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). MICROSENS Profi Line compact industrial fibre switches use fanless conduction-cooled passive cooling, so fan is N/A. Supported brands/models — MICROSENS G6 / Profi Line industrial fibre managed switches (enterprise 3181).
  Switch Maipu SNMP:
    name: Maipu (Telegraf)
    desc: Maipu (China) enterprise Ethernet switch SNMP collection (MAIPU-SMI, IANA PEN 5651). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Maipu private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in bytes, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and power-supply state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). Maipu compact enterprise access switches use fanless passive cooling, so fan is N/A. Supported brands/models — Maipu MyPower S series enterprise switches (enterprise 5651).
  Switch Moxa SNMP:
    name: Moxa (Telegraf)
    desc: Moxa industrial Ethernet switch SNMP collection (MOXA-MIB, IANA PEN 8691). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Moxa private OIDs for device health including chassis temperature (in degrees Celsius) and dual power-input state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). Moxa industrial switches are commonly fanless passively cooled and the private MIB does not expose CPU/memory load in a row-filter-free scalar form, so CPU/memory/fan are N/A. Supported brands/models — Moxa industrial managed switches (EDS / IKS / ICS / SDS series; enterprise 8691).
  Switch ALLNET SNMP:
    name: ALLNET (Telegraf)
    desc: ALLNET enterprise/SMB Ethernet switch SNMP collection (enterprise 19935). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic, per-interface incoming/outgoing error and discard rates, interface admin/oper status and bandwidth, plus device-aggregated total incoming/outgoing traffic rates. ALLNET managed switches (ALL-SG series and similar) expose health mainly through standard public MIBs, while their vendor private tree (enterprise 19935) is largely device-generated sensor objects rather than row-filter-free stable scalar CPU/memory/temperature/power objects, so CPU, memory, temperature, fan and power are N/A. Supported brands/models — ALLNET enterprise/SMB Ethernet switches (ALL-SG series; enterprise 19935).
  Switch Sixnet SNMP:
    name: Sixnet (Telegraf)
    desc: Sixnet SLX industrial Ethernet switch SNMP collection (enterprise 20540). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic, per-interface incoming/outgoing error and discard rates, interface admin/oper status and bandwidth, plus device-aggregated total incoming/outgoing traffic rates. Sixnet SLX units are fanless passively cooled industrial managed switches whose temperature, dual redundant power inputs and alarm relay are exposed mainly over Modbus/TCP and LED/alarm-relay rather than as row-filter-free private SNMP scalars, so CPU, memory, temperature, fan and power are N/A. Supported brands/models — Sixnet SLX / SL SlimLine industrial Ethernet switches (SLX-5MS / 8MS / 10MG / 16MS series; enterprise 20540).
  Switch AsterFusion SNMP:
    name: AsterFusion (Telegraf)
    desc: AsterFusion open-network switch SNMP baseline collection (enterprise 55955). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic. Current public facts confirm AsterNOS SNMP v1/v2c/v3 support and private-node entry points for RoCE, BGP and RIB data, but they do not prove stable shared CPU, memory, temperature, fan or power health scalars with conservative status semantics, so service or fabric indicators are not promoted into device-health metrics. Supported brands/models — AsterFusion AsterNOS open-network switches.
  Switch ATOP SNMP:
    name: ATOP (Telegraf)
    desc: ATOP industrial Ethernet switch SNMP baseline collection (enterprise 3755). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic. Current public facts confirm ATOP managed switch products, the ATOP enterprise root, and official SNMP-based management tooling, but they do not expose stable shared CPU, memory, temperature, fan or power health leaf OIDs with conservative status semantics, so vendor health metrics are not promoted into device-health metrics. Supported brands/models — ATOP industrial managed switches.
  Switch Comtrol RocketLinx SNMP:
    name: Comtrol RocketLinx (Telegraf)
    desc: Comtrol RocketLinx industrial Ethernet switch SNMP baseline collection (enterprise 11545). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic. Current public facts confirm RocketLinx managed switch products, the Pepperl+Fuchs Comtrol enterprise root, and an official SNMP MIB file download, but they do not expose stable shared CPU, memory, temperature, fan or power health leaf OIDs with conservative status semantics, so vendor health metrics are not promoted into device-health metrics. Supported brands/models — Comtrol RocketLinx industrial managed switches.
  Switch WoMaster SNMP:
    name: WoMaster (Telegraf)
    desc: WoMaster industrial Ethernet switch SNMP baseline collection. This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic. Current public facts confirm WoMaster industrial managed switch products and official switch MIB downloads, but they do not expose stable shared CPU, memory, temperature, fan or power health leaf OIDs with conservative status semantics, so vendor health metrics are not promoted into device-health metrics. Supported brands/models — WoMaster industrial managed switches.
  Switch Murrelektronik SNMP:
    name: Murrelektronik (Telegraf)
    desc: Murrelektronik industrial Ethernet switch SNMP baseline collection (enterprise 47330). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic. Current public facts confirm Murrelektronik industrial managed switch products, SNMPv1/v2c/v3 support, RMON support, and the enterprise root, but they do not expose stable shared CPU, memory, temperature, fan or power health leaf OIDs with conservative status semantics, so vendor health metrics are not promoted into device-health metrics. Supported brands/models — Murrelektronik industrial managed switches.
  Switch InHand Networks SNMP:
    name: InHand Networks (Telegraf)
    desc: InHand Networks industrial Ethernet switch SNMP baseline collection (enterprise 144629). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic. Current public facts confirm InHand Networks industrial managed switch products, SNMPv1/v2c/v3, MIB-II, SMIv2, RMON, Ping MIB support, and the enterprise root, but they do not expose stable shared CPU, memory, temperature, fan or power health leaf OIDs with conservative status semantics, so vendor health metrics are not promoted into device-health metrics. Supported brands/models — InHand Networks industrial managed switches.
  Switch Phoenix Contact SNMP:
    name: Phoenix Contact (Telegraf)
    desc: Baseline SNMP collection template for Phoenix Contact FL SWITCH industrial Ethernet switches (enterprise PEN 4346). Based on standard MIB-II / IF-MIB, it collects device uptime and 64-bit HC interface traffic, per-interface incoming/outgoing error and discard rates, interface admin/oper status and bandwidth, plus device-aggregated total incoming/outgoing traffic rates. The FL SWITCH temperature, redundant power-supply inputs (P1/P2) and alarm-contact objects live in product-family-specific private MIBs (PEN 4346) shipped inside the firmware package and are not exposed as row-filter-free pollable scalars across the GHS/MM/SMN/SMCS/EP74/2000 ranges, so CPU, memory, temperature, fan and power are N/A and not faked. Supported brands/models — Phoenix Contact FL SWITCH industrial Ethernet switches (FL SWITCH GHS/MM/SMN/SMCS/EP74/2000 families; enterprise PEN 4346).
  Switch Korenix SNMP:
    name: Korenix (Telegraf)
    desc: Korenix JetNet industrial Ethernet switch SNMP collection (enterprise 24062). This template uses standard MIB-II / IF-MIB to collect device uptime and 64-bit HC interface traffic, per-interface incoming/outgoing error and discard rates, interface admin/oper status and bandwidth, plus device-aggregated total incoming/outgoing traffic rates. Korenix JetNet units are fanless passively cooled industrial managed switches whose temperature, dual power-input and relay-alarm environmental objects live in the vendor private MIB (enterprise 24062) and are not collected by this baseline template, so CPU, memory, temperature, fan and power are N/A. Supported brands/models — Korenix JetNet industrial Ethernet switches (JetNet 4508 / 5210G / 5310G / 6524G series; enterprise 24062).
  Switch GarretCom SNMP:
    name: GarretCom (Telegraf)
    desc: GarretCom (Belden) industrial Ethernet switch SNMP collection (MAGNUM-MIB, IANA PEN 14778). Beyond standard IF-MIB 64-bit HC interface traffic, it collects GarretCom Magnum private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in KB, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and power-supply state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). GarretCom industrial switches use fanless passive cooling, so fan is N/A. Supported brands/models — GarretCom Magnum industrial managed switches (6K / 10K / DX series; enterprise 14778).
  Switch PLANET SNMP:
    name: PLANET (Telegraf)
    desc: PLANET Technology managed Ethernet switch SNMP collection (PLANET-MIB, IANA PEN 10456). Beyond standard IF-MIB 64-bit HC interface traffic, it collects PLANET private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in bytes, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and power-supply state (normalised by telegraf processors.enum to 1=normal / 2=abnormal). PLANET compact models mostly use fanless passive cooling, so fan is N/A. Supported brands/models — PLANET Technology managed switches (GS- / SGS- / WGS- series; enterprise 10456).
  Switch Edgecore SNMP:
    name: Edgecore (Telegraf)
    desc: Edgecore Networks (Accton) open / white-box managed Ethernet switch SNMP collection (ECS-series private MIB, IANA PEN 259). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Edgecore private OIDs for device health — CPU utilisation (reported directly as a percentage), main memory (used + free in bytes, usage derived as used/(used+free)), chassis temperature (℃) and power-supply state (normalised via telegraf processors.enum to 1=normal/2=abnormal). Edgecore compact access models are typically fanless passively-cooled designs, so fan is N/A. Supported brands/models — Edgecore Networks managed switches (ECS2000 / ECS4000 series, Accton platform; enterprise 259).
  Switch Pluribus SNMP:
    name: Pluribus (Telegraf)
    desc: Pluribus Networks Netvisor ONE white-box / open-networking switch SNMP collection (Netvisor ONE is a Linux-based NOS exposing standard NET-SNMP via an AgentX subagent — HOST-RESOURCES-MIB / UCD-SNMP-MIB / LM-SENSORS-MIB, IANA PEN 47269). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Netvisor ONE health metrics — CPU utilisation (HOST-RESOURCES hrProcessorLoad averaged across cores), main memory (total + free in bytes, usage derived as (total-free)/total) and chassis temperature (LM-SENSORS sensor, ℃). Netvisor ONE runs as a software NOS on white-box switch hardware and standard NET-SNMP does not expose fan/power state as row-filter-free scalars, so fan/power are N/A. Supported brands/models — Pluribus Networks white-box switches (Netvisor ONE NOS / Adaptive Cloud Fabric; enterprise 47269).
  Router Yamaha SNMP:
    name: Yamaha (Telegraf)
    desc: Yamaha RTX-series enterprise router SNMP collection (YAMAHA-RT-MIB, IANA PEN 1182). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Yamaha private OIDs for device health — CPU utilisation (reported directly as a percentage), main memory (used + free in bytes, usage derived as used/(used+free)) and chassis temperature (℃). Yamaha RTX are compact fixed-configuration routers with fanless or single-fixed-power designs whose private MIB does not expose fan/power sensors as row-filter-free scalars, so fan/power are N/A. Supported brands/models — Yamaha RTX-series routers (RTX830 / RTX1210 / RTX1300 etc.; enterprise 1182).
  Switch Cumulus SNMP:
    name: Cumulus (Telegraf)
    desc: NVIDIA Cumulus Linux open-network switch SNMP collection (standard NET-SNMP, including HOST-RESOURCES-MIB / UCD-SNMP-MIB / LM-SENSORS-MIB). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Cumulus Linux health metrics including CPU utilisation (HOST-RESOURCES hrProcessorLoad averaged across cores), main memory (total + free in bytes, usage derived as (total-free)/total) and chassis temperature (LM-SENSORS temperature sensors, in degrees Celsius). Cumulus Linux runs as a software NOS on white-box switch hardware and standard NET-SNMP does not expose dedicated fan or power-supply state OIDs in a row-filter-free scalar form, so fan and power are N/A. Supported brands/models — NVIDIA / Cumulus Linux white-box switches (Cumulus Linux NOS, based on standard NET-SNMP).
  Router Versa SNMP:
    name: Versa (Telegraf)
    desc: Versa Networks SD-WAN router (FlexVNF / VOS) SNMP collection (VERSA-MIB, IANA PEN 42359). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Versa private OIDs for device health including CPU utilisation and memory utilisation (both reported directly as percentages). Versa SD-WAN runs as a software / virtualised network function (VNF) on commodity compute or white-box CPE and its private MIB does not expose temperature/fan/power sensors in a row-filter-free scalar form, so those are N/A. Supported brands/models — Versa Networks SD-WAN (FlexVNF / Versa Operating System; enterprise 42359).
  Switch Enterasys SNMP:
    name: Enterasys (Telegraf)
    desc: Enterasys (now Extreme Networks) enterprise switch SNMP collection (ENTERASYS-MIB, IANA PEN 5624). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Enterasys private OIDs for device health including CPU utilisation (etsysResourceCpuLoad, reported directly as a percentage), main memory (used + free in KB, usage derived as used/(used+free)), chassis temperature (in degrees Celsius) and power-supply state (etsysChassisPowerSupplyState, normalised by telegraf processors.enum to 1=normal / 2=abnormal). Supported brands/models — Enterasys SecureStack / S-Series / Matrix enterprise managed switches (enterprise 5624; legacy devices now part of Extreme).
  Switch Hirschmann SNMP:
    name: Hirschmann (Telegraf)
    desc: Hirschmann industrial switch SNMP collection (HMPRIV-MGMT-SNMP-MIB, IANA PEN 248). Beyond standard IF-MIB interface metrics, it collects Hirschmann private OIDs for device health including CPU utilisation (hmCpuUtilization, reported directly as a percentage), main memory (hmMemoryAllocated used + hmMemoryFree in KB, usage derived as used/(used+free)), chassis temperature (hmTemperature in degrees Celsius) and power-supply state (hmPSState, normalised by telegraf processors.enum to 1=normal / 2=abnormal). No dedicated fan-state OID is exposed, so fan is N/A. Supported brands/models — Hirschmann (Belden) industrial managed switches (RS20 / RS30 / RS40, MACH / MICE / GREYHOUND / EAGLE series; enterprise 248).
  Switch 3Com SNMP:
    name: 3Com (Telegraf)
    desc: 3Com switch SNMP collection (A3COM-HUAWEI-LswDEVM-MIB, IANA PEN 43). Beyond standard IF-MIB interface metrics, it collects 3Com private OIDs for device health including CPU utilisation (hwCpuCostRatePer1Min, 1-minute busy ratio in percent, averaged across the board table) and memory (hwMemoryUsedSize used + hwMemorySize total in bytes, usage derived as used/total). This MIB (enterprise 43.45) differs from the already-supported H3C (enterprise 25506 HH3C-ENTITY-EXT), hence a separate plugin. No dedicated temperature/fan/power OIDs are exposed, so those are N/A. Supported brands/models — 3Com managed switches (Switch 4200 / 4500 / 5500 and other A3COM-HUAWEI platforms; enterprise 43).
  Switch FortiSwitch SNMP:
    name: FortiSwitch (Telegraf)
    desc: Fortinet FortiSwitch SNMP collection (FORTINET-FORTISWITCH-MIB, IANA PEN 12356). Beyond standard IF-MIB interface metrics, it collects FortiSwitch private OIDs for device health including CPU utilisation (fsSysCpuUsage, reported directly as a percentage) and memory (fsSysMemUsage used + fsSysMemCapacity total in KB, usage derived as used/total). Temperature/fan/power are exposed only via the type-mixed ENTITY-SENSOR table, which the SNMP input cannot row-filter, so those are N/A. Supported brands/models — Fortinet FortiSwitch managed switches (FortiSwitch 100 / 200 / 400 / 500 / 1000 series; enterprise 12356).
  Switch FiberHome SNMP:
    name: FiberHome (Telegraf)
    desc: FiberHome switch-specific SNMP collection template (WRI-CPU/MEMORY/TEMPERATURE/POWER MIBs, IANA PEN 3807). In addition to standard IF-MIB interface metrics, it collects FiberHome private OIDs for device health including CPU utilization (cpuUsage, precision-100), system memory (alloc/total bytes), chassis temperature (temperatureValue) and power-supply state (powerState, where 0=Normal). Fan is exposed only as fan speed (RPM) with no fan-state enum, so fan state is not collected (N/A); fan speed and voltage are new-metric candidates for later enrichment. PSU raw codes are normalized via telegraf processors.enum to 1=healthy / 2=fault. Memory utilization is computed from used/total. Supported brands/models — FiberHome switches.
  Switch H3C SNMP:
    name: H3C (Telegraf)
    desc: H3C / HPE Comware switch-specific SNMP collection (HH3C-ENTITY-EXT-MIB, IANA PEN 25506). In addition to standard IF-MIB interface metrics, it collects H3C private OIDs for device health including per-entity CPU utilization (hh3cEntityExtCpuUsage) and memory utilization (hh3cEntityExtMemUsage). Both are reported per physical entity where most entities return 0 and the CPU/memory-bearing board carries the real value, so device-level CPU/memory are taken as the maximum across entities. Temperature is not collected because all entities report 0 for hh3cEntityExtTemperature on Comware; fan and power-supply state live in ENTITY-MIB with per-row entPhysicalClass filtering that telegraf inputs.snmp cannot do, so those are N/A. Supported brands/models — H3C S-series Comware switches (S5100/S5500/S5800, etc.).
  Switch DCN SNMP:
    name: DCN (Telegraf)
    desc: Digital China (DCN) switch-specific SNMP collection (DCN-MIB, IANA PEN 6339). Beyond standard IF-MIB interface metrics, it collects DCN private OIDs for device health including CPU utilisation (switchCpuUsage, direct percentage) and system memory (switchMemorySize total / switchMemoryBusy used, in bytes, usage derived as used/total). The DCN-MIB switchInfo system table exposes only CPU and memory scalars and no temperature/fan/power sensors, so those dimensions are N/A. Supported brands/models — Digital China DCN DCS/DCRS/CS series campus switches (enterprise 6339).
  Switch FS SNMP:
    name: FS.com (Telegraf)
    desc: FS.com switch-specific SNMP collection (FS-PROCESS/MEMORY/SYSTEM-MIB, IANA PEN 52642). Beyond standard IF-MIB interface metrics, it collects the full set of FS private OIDs for device health including CPU utilisation (fsNodeCPUTotal5min), system memory (capacity/used, in KB), chassis temperature (fsSystemMultipleTemperatureCurrent), fan state (fsSystemFanStatus) and power-supply state (fsSystemElectricalInformationStatus). Fan/PSU raw codes are normalized via telegraf processors.enum to 1=healthy / 2=fault; memory utilisation is computed from used/total. Supported brands/models — FS.com S-series data-center/campus switches (e.g. S5810/S5800/N8560 series; enterprise 52642).
  Switch Netonix SNMP:
    name: Netonix (Telegraf)
    desc: Netonix WISP switch-specific SNMP collection (NETONIX-SWITCH-MIB, IANA PEN 46242). Beyond standard IF-MIB interface metrics, it collects the Netonix private OID for chassis temperature (a dedicated temperature table, °C). NETONIX-SWITCH-MIB does not provide CPU/memory OIDs; fan is reported as speed (RPM) rather than a state enum and PoE is per-port status, neither of which is a device-level health state, so this plugin collects temperature only (other dimensions N/A). Supported brands/models — Netonix WISP Switch series PoE switches (enterprise 46242).
  Switch Nokia SNMP:
    name: Nokia (Telegraf)
    desc: Nokia (formerly Alcatel-Lucent Enterprise) OmniSwitch switch-specific SNMP collection (ALCATEL-IND1-HEALTH-MIB / ALCATEL-IND1-CHASSIS-MIB, IANA PEN 6486). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Nokia private OIDs for device health — CPU and memory utilisation (healthModuleTable, both reported directly as percentages), chassis temperature (chasChassisTemp, °C), and fan and power-supply state (chasEntPhysOperStatus) normalised via telegraf processors.enum to 1=normal / 2=abnormal. Supported brands/models — Nokia/ALE OmniSwitch 6/9 series campus and data-center switches (enterprise 6486).
  Switch Flow NetFlow:
    name: Switch Flow Analysis (NetFlow)
    desc: Use NetFlow to collect switch traffic, map exporter data to monitored assets, normalize by reported or fallback sampling rate, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  Switch Flow sFlow:
    name: Switch Flow Analysis (sFlow)
    desc: Use sFlow to collect switch traffic, map exporter data to monitored assets, consume Telegraf-estimated sFlow values directly, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  WebLogic-JMX:
    name: WebLogic(JMX)
    desc: Through the WebLogic-JMX collector, regularly collect key WebLogic metrics, including thread pool, connection pool, memory, EJB, Servlet, JMS performance, and web service response times.
  K8S:
    name: K8s
    desc: Leveraging Kubernetes' active monitoring data reporting capability, collect the status and health of the Kubernetes cluster, including performance metrics for nodes, containers, and pods.
  Consul:
    name: Consul(Telegraf)
    desc: Through the Telegraf collector, regularly collect Consul service health status by gathering status check results and analyzing pass, warning, and critical metrics.
  Website:
    desc: Through the Telegraf collector, regularly perform active checks on the availability and performance of HTTP/HTTPS connections.
    name: HTTP(Telegraf)
  Nginx:
    desc: Through the Telegraf collector, regularly collect metrics from Nginx such as requests, connection status, and processing efficiency, to aid in monitoring and optimizing website performance and stability.
    name: Nginx(Telegraf)
  Loadbalance SNMP General:
    desc: Through the Telegraf collector, utilize the SNMP protocol to regularly collect key IF-MIB metrics from load balancer interfaces, including traffic volume, packet loss, and error counts.
    name: Load Balancer General (Telegraf)
  Loadbalance F5 SNMP:
    name: F5 (Telegraf)
    desc: F5-specific SNMP collection template for F5 BIG-IP load balancers. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects F5-BIGIP-SYSTEM-MIB private OIDs for device health (host CPU utilization, host memory total/used and derived usage) and load-balancer-specific state (current client connections). Memory usage is derived as used / total. Supported brands/models — F5 BIG-IP (LTM/GTM/DNS; iSeries / VIPRION / VE).
  Loadbalance Citrix NetScaler SNMP:
    name: Citrix NetScaler (Telegraf)
    desc: Citrix NetScaler (NetScaler ADC, formerly Citrix ADC) load-balancer SNMP collection (NS-ROOT-MIB, IANA PEN 5951). In addition to standard IF-MIB interface metrics, it collects NetScaler private OIDs for device health including CPU utilization averaged across the management and packet-engine CPUs (resCpuUsage), system memory utilization reported directly as a percentage (resMemUsage), and current client connections (tcpCurClientConn). Temperature/voltage sensors live in the nsSysHealth table keyed by sensor name with per-name row filtering that telegraf inputs.snmp cannot do, so temperature/fan/power are N/A. Supported brands/models — Citrix / NetScaler ADC (MPX / SDX / VPX / CPX, NetScaler OS; enterprise 5951).
  Loadbalance A10 Thunder SNMP:
    name: A10 Thunder (Telegraf)
    desc: A10 Networks Thunder / AX (ACOS) ADC SNMP collection (A10-AX-MIB, IANA PEN 22610). In addition to standard IF-MIB interface metrics, it collects A10 private OIDs for device health including CPU utilization averaged across the control and data-plane CPUs (axSysCpuUsage) and system memory (axSysMemoryTotal / axSysMemoryUsage, in KB, utilization computed as used/total). Current-connection and temperature/fan/power OIDs are not exposed in a row-filter-free form on ACOS, so those are N/A. Supported brands/models — A10 Networks Thunder ADC / AX series (ACOS; physical and vThunder; enterprise 22610).
  Loadbalance FortiADC SNMP:
    name: FortiADC (Telegraf)
    desc: Fortinet FortiADC application delivery controller / load balancer SNMP collection (FORTINET-FORTIADC-MIB, IANA PEN 12356). Beyond standard IF-MIB interface metrics, it collects FortiADC private OIDs for device health and load including system CPU utilization (fadcSysCpuUsage) and memory utilization (fadcSysMemUsage), both reported directly as percentages, plus current concurrent client connections (fadcConcurrentClientConnections). Temperature/fan/power are not exposed via the FortiADC MIB, so they are N/A. Supported brands/models — Fortinet FortiADC hardware and VM appliances (FortiADC D / E / F series; enterprise 12356).
  Loadbalance Kemp LoadMaster SNMP:
    name: Kemp LoadMaster (Telegraf)
    desc: Kemp LoadMaster ADC / load balancer SNMP collection (B-100-MIB / ONE4NET, IANA PEN 12196). Beyond standard IF-MIB interface metrics, it collects Kemp private OIDs for device health and load including overall CPU utilization (cpuTotal) and system memory utilization (memUsedPercent), both reported directly as percentages, plus the current total number of active connections tracked by the LoadMaster (connectionTotal). Temperature/fan/power sensor OIDs are not exposed in a row-filter-free form by the LoadMaster MIB, so those are N/A. Supported brands/models — Kemp LoadMaster ADC (hardware LM-X, Virtual LoadMaster VLM, and cloud editions; enterprise 12196).
  Loadbalance Superiority SNMP:
    name: Superiority (Telegraf)
    desc: Superiority (超数) load balancer SNMP collection (Foundry/Brocade-compatible private MIB, enterprise 1991). Beyond standard IF-MIB interface metrics, it collects the 1991 private OIDs for device health including average CPU utilisation (OID 1.3.6.1.4.1.1991.1.1.2.1.50, snAgGblCpuUtil1SecAvg, reported directly as a percentage) and memory utilisation (OID 1.3.6.1.4.1.1991.1.1.2.1.53, snAgGblDynMemUtil, reported directly as a percentage — no used/free bytes). Current connections / temperature / fan / power are not declared by the 1991 private tree, so they are N/A. Supported brands/models — Superiority load balancers reusing the Foundry/Brocade 1991 MIB tree.
  Loadbalance RELIANOID SNMP:
    name: RELIANOID (Telegraf)
    desc: RELIANOID ADC and load balancer SNMP child template (enterprise 61269). The verified profile is a clean baseline built on standard MIB-II and IF-MIB ifXTable. No stable vendor-specific scalar health gauges are confirmed for CPU, memory, temperature, fan, power state or current connections, so metrics.json declares no vendor-specific metric deltas. System uptime, IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, and aggregate device traffic are supplied by the shared Loadbalance SNMP floor. This template only provides the RELIANOID collect_type, UI form and Telegraf child collection config. Supported brands/models — RELIANOID ADC and load-balancing appliances.
  Loadbalance Radware Alteon SNMP:
    name: Radware Alteon (Telegraf)
    desc: Radware Alteon application switch / load balancer SNMP collection (ALTEON-CHEETAH-SWITCH-MIB, IANA PEN 1872). Beyond standard IF-MIB interface metrics, it collects Alteon private OIDs for device health including management-processor CPU utilization (mpCpuStatsUtil1Second, reported directly as a percentage) and main memory (mpMemStatsTotal/mpMemStatsFree in bytes, usage derived as (total-free)/total). The CHEETAH MIB does not expose a scalar connection/session count or temperature/fan/power, so those are N/A. Supported brands/models — Radware Alteon ADC / application switches running AlteonOS (Alteon 4408 / 5208 / 6420 / 8420 / 9800 and VA virtual appliances; enterprise 1872).
  Loadbalance Flow NetFlow:
    name: Load Balancer Flow Analysis (NetFlow)
    desc: Use NetFlow to collect load balancer traffic, map exporter data to monitored assets, normalize by reported or fallback sampling rate, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  Loadbalance Flow sFlow:
    name: Load Balancer Flow Analysis (sFlow)
    desc: Use sFlow to collect load balancer traffic, map exporter data to monitored assets, consume Telegraf-estimated sFlow values directly, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  Bastion Host SNMP General:
    desc: The SNMP universal plugin is designed to monitor and manage bastion hosts via SNMP. It enables administrators to retrieve critical device information such as interface traffic, error statistics, and status data, thereby optimizing network performance and improving operational efficiency.
    name: Bastion Host General (SNMP)
  Jetty-JMX:
    desc: Through the Jetty JMX collector, regularly collect key performance metrics from Jetty, including task processing, thread pools, network connections, HTTP configuration, and JMX self-monitoring data.
    name: Jetty(JMX)
  ElasticSearch:
    desc: Through the Telegraf collector, regularly collect metrics from Elasticsearch related to the filesystem, HTTP requests, I/O statistics, document statistics, query cache, and index flush operations, helping users monitor cluster health and performance.
    name: ElasticSearch(Telegraf)
  Zookeeper:
    name: Zookeeper(Telegraf)
    desc: Through the Telegraf collector, regularly collect runtime performance data and stability metrics of Zookeeper, such as uptime, average latency, read/write ratio, etc.
  Firewall SNMP General:
    desc: Through the Telegraf collector, utilize the SNMP protocol to regularly collect key IF-MIB metrics from firewall interfaces, including traffic volume, packet loss, and error counts.
    name: Firewall General (Telegraf)
  Firewall Fortinet SNMP:
    name: Fortinet (Telegraf)
    desc: Fortinet-specific SNMP collection template for FortiGate firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects FORTINET-FORTIGATE-MIB private OIDs for device health (CPU and memory utilization, total memory) and firewall-specific state (IPv4 active sessions, active IPsec VPN tunnels and HA mode). Memory is reported directly as a utilization percentage. Supported brands/models — Fortinet FortiGate firewalls (FortiOS).
  Firewall Hillstone SNMP:
    name: Hillstone (Telegraf)
    desc: Hillstone Networks (StoneOS) firewall SNMP collection (HILLSTONE-SYSTEM/TEMPERATURE/POWER-MIB, IANA PEN 28557). In addition to standard IF-MIB interface metrics, it collects Hillstone private OIDs for device health including CPU utilization (sysCPU), system memory (sysMemTotal/sysMemUsed in KB, utilization computed as used/total), chassis temperature (dedicated per-sensor table) and power-supply state. Power codes (fine/absent/warning/fail/unsupport) are normalized to 1=healthy / 2=fault. Fan and session-count OIDs have no confirmed numeric form, so those are N/A. Supported brands/models — Hillstone Networks SG-6000 / E-series / A-series next-gen firewalls (StoneOS; enterprise 28557).
  Firewall Sophos XG SNMP:
    name: Sophos XG (Telegraf)
    desc: Sophos XG / SFOS firewall SNMP collection (SFOS-FIREWALL-MIB, IANA PEN 21067). In addition to standard IF-MIB interface metrics, it collects Sophos private OIDs for device health including CPU utilization (cpuPercentUsage) and main-memory utilization (memoryPercentUsage), both reported directly as percentages. Sophos exposes live (authenticated) users and disk usage rather than a standard session/connection table, so session count and temperature/fan/power are N/A. Supported brands/models — Sophos XG / XGS Firewall and SFOS-based appliances (Sophos Firewall OS; enterprise 21067), plus Cyberoam UTM appliances (CYBEROAM-MIB, same enterprise 21067 with identical health OIDs — Sophos acquired Cyberoam and SFOS forked its MIB).
  Firewall Forcepoint SNMP:
    name: Forcepoint (Telegraf)
    desc: Forcepoint NGFW (formerly Stonesoft / McAfee NGFW) SNMP collection (STONESOFT-FIREWALL-MIB, IANA PEN 1369). Beyond standard IF-MIB interface metrics, it collects Forcepoint private OIDs for device health including per-core CPU utilisation (fwCpuTotal, averaged) and memory (fwMemBytesTotal/fwMemBytesUsed in bytes, usage derived as used/total). The Stonesoft MIB does not expose a scalar session count or temperature/fan/power, so those are N/A. Supported brands/models — Forcepoint NGFW / Stonesoft / McAfee NGFW appliances and virtual engines (enterprise 1369).
  Firewall ScreenOS SNMP:
    name: Juniper ScreenOS (Telegraf)
    desc: Juniper ScreenOS (NetScreen) firewall SNMP collection (NETSCREEN-RESOURCE-MIB, IANA PEN 3224). Beyond standard IF-MIB interface metrics, it collects ScreenOS private OIDs for device health including CPU utilisation over the last 5 minutes (nsResCpuLast5Min) and memory (nsResMemAllocate used + nsResMemLeft free, usage derived as used/(used+free)). Session counters and temperature/fan/power are not collected here, so they are N/A. Supported brands/models — Juniper NetScreen / SSG firewalls running ScreenOS (enterprise 3224).
  Firewall Neteye SNMP:
    name: Neteye (Telegraf)
    desc: Neteye (网御星云 / Leadsec) firewall SNMP collection (enterprise 3224 resource MIB). Beyond standard IF-MIB interface metrics, it collects Neteye private OIDs for device health including average CPU utilisation (nsResCpuAvg) and memory (nsResMemAllocate used + nsResMemLeft free, usage derived as used/(used+free)). Session counters and temperature/fan/power are not collected here, so they are N/A. Supported brands/models — Beijing Neteye (Leadsec) NGFW / UTM firewalls (enterprise 3224).
  Firewall Bluedon SNMP:
    name: Bluedon (Telegraf)
    desc: Bluedon (蓝盾) firewall SNMP collection (enterprise 36889 private MIB). Beyond standard IF-MIB interface metrics, it collects Bluedon private OIDs for device health including average CPU utilisation (snAgGblCpuUtil1SecAvg, reported directly as a percentage) and memory utilisation (snAgGblDynMemUtil, reported directly as a percentage — no used/free bytes). Temperature/fan/power and session counters are not collected here, so they are N/A. Supported brands/models — Bluedon Information Security firewalls / network-security appliances (enterprise 36889).
  Firewall Pulse Secure SNMP:
    name: Pulse Secure (Telegraf)
    desc: Pulse Secure / Ivanti Connect Secure (IVE) SSL VPN gateway SNMP collection (PULSESECURE-PSG-MIB, enterprise PEN 12532). Beyond standard IF-MIB interface metrics, it collects the IVE system health scalars — CPU utilization (iveCpuUtil), memory utilization (iveMemoryUtil), swap utilization (iveSwapUtil), disk utilization (diskFullPercent) all reported directly as 0-100 percentages, chassis temperature (iveTemperature, degrees Celsius read directly — only MAG blades return a real value, other platforms return 0) and the number of signed-in web users (signedInWebUsers). Fan and power-supply objects are not exposed by the MIB, so they are N/A. Supported brands/models — Pulse Connect Secure / Ivanti Connect Secure, MAG / PSA series SSL VPN and ZTNA gateways (enterprise PEN 12532).
  Firewall DPtech SNMP:
    name: DPtech (Telegraf)
    desc: DPtech (迪普科技) firewall SNMP collection (enterprise PEN 31648 private MIB). Beyond standard IF-MIB interface metrics, it collects DPtech private OIDs for device health including average CPU utilization (OID 31648.3.15.1, reported directly as a percentage) and memory utilization (OID 31648.3.15.5, reported directly as a percentage — no used/free bytes). Temperature/fan/power and session counters are not collected here, so they are N/A. Supported brands/models — DPtech NGFW / UTM / network-security appliances (FW1000 and the like, enterprise PEN 31648).
  Firewall Barracuda SNMP:
    name: Barracuda (Telegraf)
    desc: Barracuda CloudGen Firewall / Web Filter SNMP child template for devices under enterprise PEN 20632. The shared Firewall SNMP floor supplies MIB-II uptime and IF-MIB 64-bit HC interface traffic; this template adds CPU/system temperature and firmware/log storage utilization from the bspyware system leaves, taking the highest value per device. CPU, memory, fan state and power-supply state are N/A because stable shared state leaves are not confirmed. Fan RPM and trap-only alarms are not promoted into shared device-health metrics.
  Firewall Westone SNMP:
    name: Westone (Telegraf)
    desc: Westone (卫士通) firewall SNMP collection (enterprise 31648 private MIB). Beyond standard IF-MIB interface metrics, it collects Westone private OIDs for device health including average CPU utilisation (OID 31648.3.15.1, reported directly as a percentage) and memory utilisation (OID 31648.3.15.5, reported directly as a percentage — no used/free bytes). Temperature/fan/power and session counters are not collected here, so they are N/A. Supported brands/models — Westone Information Security firewalls / network-security appliances (enterprise 31648).
  Firewall Amaranten SNMP:
    name: Amaranten (Telegraf)
    desc: Amaranten (安然) firewall SNMP collection (Foundry/Brocade-compatible private MIB, enterprise 1991). Beyond standard IF-MIB interface metrics, it collects the 1991 private OIDs for device health including average CPU utilisation (OID 1.3.6.1.4.1.1991.1.1.2.1.50, snAgGblCpuUtil1SecAvg, reported directly as a percentage) and memory utilisation (OID 1.3.6.1.4.1.1991.1.1.2.1.53, snAgGblDynMemUtil, reported directly as a percentage — no used/free bytes). Temperature/fan/power and session counters are not collected here, so they are N/A. Supported brands/models — Amaranten firewalls / network-security appliances reusing the Foundry/Brocade 1991 MIB tree.
  Firewall Secworld SNMP:
    name: Secworld (Telegraf)
    desc: Secworld (安世) firewall SNMP collection (Foundry/Brocade-compatible private MIB, enterprise 1991). Beyond standard IF-MIB interface metrics, it collects the 1991 private OIDs for device health including average CPU utilisation (OID 1.3.6.1.4.1.1991.1.1.2.1.50, snAgGblCpuUtil1SecAvg, reported directly as a percentage) and memory utilisation (OID 1.3.6.1.4.1.1991.1.1.2.1.53, snAgGblDynMemUtil, reported directly as a percentage — no used/free bytes). Temperature/fan/power and session counters are not collected here, so they are N/A. Supported brands/models — Secworld firewalls / network-security appliances reusing the Foundry/Brocade 1991 MIB tree.
  Firewall Westone SNMP:
    name: Westone (Telegraf)
    desc: Westone (卫士通) firewall SNMP collection (enterprise 31648 private MIB). Beyond standard IF-MIB interface metrics, it collects Westone private OIDs for device health including average CPU utilisation (OID 31648.3.15.1, reported directly as a percentage) and memory utilisation (OID 31648.3.15.5, reported directly as a percentage — no used/free bytes). Temperature/fan/power and session counters are not collected here, so they are N/A. Supported brands/models — Westone Information Security firewalls / network-security appliances (enterprise 31648).
  Firewall Check Point SNMP:
    name: Check Point (Telegraf)
    desc: Check Point-specific SNMP collection template for Quantum NGFW (Gaia) firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects CHECKPOINT-MIB private OIDs for device health (CPU utilization, real memory total/free/used and derived usage) and firewall-specific VPN throughput (encrypted and decrypted packets per second). Memory usage is derived as (total - free) / total. Supported brands/models — Check Point Security Gateways (GAiA OS).
  Firewall Stormshield SNMP:
    name: Stormshield (Telegraf)
    desc: Stormshield SNS-specific SNMP collection template for Stormshield Network Security firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects HOST-RESOURCES CPU load (averaged across cores), UCD-SNMP real memory (total/free, used and derived usage) and STORMSHIELD-SNS-MIB private OIDs for firewall-specific state (ASQ active TCP/UDP connections and mature VPN tunnels). Memory usage is derived as (total - free) / total. Supported brands/models — Stormshield SNS-series firewalls.
  Firewall Palo Alto SNMP:
    name: Palo Alto (Telegraf)
    desc: Palo Alto Networks-specific SNMP collection template for PAN-OS firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects HOST-RESOURCES CPU load (averaged across cores) and PAN-COMMON-MIB private OIDs for firewall-specific session health (session-table utilization, active sessions total/TCP/UDP/ICMP and maximum supported sessions). Memory and temperature/fan/psu are not collected because PAN-OS exposes them only via row-filtered hrStorage / entity-sensor tables that telegraf inputs.snmp cannot filter. Supported brands/models — Palo Alto Networks PA-series firewalls (PAN-OS).
  Firewall SonicWall SNMP:
    name: SonicWall (Telegraf)
    desc: SonicWall-specific SNMP collection template for SonicOS firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects SONICWALL-FIREWALL-IP-STATISTICS-MIB private OIDs for device health (CPU and RAM utilization, both reported directly as percentages) and firewall-specific state (current and maximum connection-cache entries and NAT translation count). Supported brands/models — SonicWall TZ/NSa-series firewalls (SonicOS).
  Firewall Sangfor SNMP:
    name: Sangfor NGAF (Telegraf)
    desc: Sangfor-specific SNMP collection template for Sangfor NGAF next-generation firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects Sangfor private MIB OIDs (IANA PEN 35047) for device health (overall CPU and memory utilization, both reported directly as percentages) and firewall load (current concurrent sessions). Temperature/fan/power sensor OIDs are not exposed in a row-filter-free scalar form by the Sangfor MIB, so those are N/A. Supported brands/models — Sangfor NGAF next-generation application firewall (enterprise 35047).
  Firewall Kerio Control SNMP:
    name: Kerio Control (Telegraf)
    desc: Kerio Control-specific SNMP collection template for GFI Kerio Control UTM firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects the Kerio Control private MIB OID (KERIO-CONTROL-SNMP-MIB, IANA PEN 17028) for the current number of active connections. CPU/memory and temperature/fan/power sensors are not exposed in a row-filter-free scalar form by the Kerio Control MIB (software UTM appliance), so those are N/A. Supported brands/models — GFI Kerio Control UTM firewall / VPN gateway (enterprise 17028).
  Firewall Blockbit SNMP:
    name: Blockbit (Telegraf)
    desc: Baseline SNMP collection template for Blockbit UTM / NGFW security appliances. Based on standard MIB-II / IF-MIB, it collects device uptime, 64-bit HC interface traffic, per-interface incoming/outgoing error and discard rates, interface admin/oper status and bandwidth, plus device-aggregated total incoming/outgoing traffic rates. Blockbit appliances run a hardened Unix-like OS whose CPU/memory/disk are exposed only via row-indexed standard host-resource tables that telegraf inputs.snmp cannot filter row-wise, and no vendor private health scalar is publicly documented, so CPU, memory, temperature, fan and power are N/A and not faked. Supported brands/models — Blockbit UTM / NGFW security gateways managed over SNMP.
  Firewall Clavister SNMP:
    name: Clavister (Telegraf)
    desc: Clavister next-generation firewall SNMP collection (CLAVISTER-MIB, IANA PEN 5089). Beyond standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects Clavister private OIDs for device health (overall CPU utilisation and memory utilisation, both reported directly as percentages) and firewall load (current active connections). Clavister NGFWs are commonly deployed as software / virtual appliances and the private MIB does not expose temperature/fan/power sensors in a row-filter-free scalar form, so those are N/A. Supported brands/models — Clavister NetWall / cOS Core next-generation firewalls (Sweden; enterprise 5089).
  Firewall Zorp SNMP:
    name: Zorp (Telegraf)
    desc: Zorp (Balasys) application-layer proxy firewall SNMP collection (ZORP-MIB / BALASYS-MIB, IANA PEN 18928). Beyond standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects Zorp private OIDs for device health (overall CPU utilisation and memory utilisation, both reported directly as percentages) and firewall load (current active sessions). Zorp is a software proxy firewall running on a general-purpose Linux host and its private MIB does not expose temperature/fan/power sensors in a row-filter-free scalar form, so those are N/A. Supported brands/models — Balasys Zorp Gateway / Proxedo application-layer proxy firewalls (Hungary; enterprise 18928).
  Firewall genua SNMP:
    name: genua (Telegraf)
    desc: genua (genua GmbH, Germany) high-security application-layer firewall SNMP collection (GENUA-MIB, IANA PEN 3717). Beyond standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects genua private OIDs for device health (overall CPU utilisation and memory utilisation, both reported directly as percentages) and firewall load (current active connections, corresponding to pf state-table entries). genua is a software high-security firewall running on a hardened OpenBSD/Linux base and its private MIB does not expose temperature/fan/power sensors in a row-filter-free scalar form, so those are N/A. Supported brands/models — genua genugate / genuscreen high-security application-layer firewalls (Germany; enterprise 3717).
  Firewall WatchGuard SNMP:
    name: WatchGuard (Telegraf)
    desc: WatchGuard-specific SNMP collection template for Fireware firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects WATCHGUARD-SYSTEM-STATISTICS-MIB private OIDs for device health (CPU utilization) and firewall-specific state (current active connections). Memory and temperature/fan/psu are not collected because Fireware exposes no standard SNMP memory-utilization scalar or sensor table that telegraf inputs.snmp can read without row-level filtering. Supported brands/models — WatchGuard Firebox firewalls (Fireware OS).
  Firewall pfSense SNMP:
    name: pfSense (Telegraf)
    desc: pfSense-specific SNMP collection template for pfSense (FreeBSD/pf) firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects HOST-RESOURCES CPU load (averaged across cores) and the BEGEMOT-PF-MIB pf state-table entry count (equivalent to active connections). Memory and temperature/fan/psu are not collected because pfSense exposes memory only via row-filtered hrStorage and has no standard sensor table. Supported brands/models — pfSense open-source firewall (FreeBSD).
  Firewall OPNsense SNMP:
    name: OPNsense (Telegraf)
    desc: OPNsense-specific SNMP collection template for OPNsense (FreeBSD/pf) firewalls. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects HOST-RESOURCES CPU load (averaged across cores) and the BEGEMOT-PF-MIB pf state-table entry count (equivalent to active connections). Memory and temperature/fan/psu are not collected because OPNsense exposes memory only via row-filtered hrStorage and has no standard sensor table. Supported brands/models — OPNsense open-source firewall (FreeBSD).
  Firewall Flow NetFlow:
    name: Firewall Flow Analysis (NetFlow)
    desc: Use NetFlow to collect firewall traffic, map exporter data to monitored assets, normalize by reported or fallback sampling rate, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  Firewall Flow sFlow:
    name: Firewall Flow Analysis (sFlow)
    desc: Use sFlow to collect firewall traffic, map exporter data to monitored assets, consume Telegraf-estimated sFlow values directly, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  SNMP Trap:
    desc: The SNMP Trap monitoring plugin is designed to receive and process alerts or status notifications (Trap messages) actively pushed by network devices, enabling real-time monitoring and fault alerting.
    name: SNMP Trap
  Router SNMP General:
    desc: Through the Telegraf collector, utilize the SNMP protocol to regularly collect key IF-MIB metrics from router interfaces, including traffic volume, packet loss, and error counts.
    name: Router General(Telegraf)
  Router Juniper MX SNMP:
    name: Juniper MX (Telegraf)
    desc: Juniper MX-specific SNMP collection template for Juniper MX-series routers (Junos). In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects JUNIPER-MIB jnxOperating private OIDs for device health (CPU utilization and memory-buffer utilization, both reported as percentages and averaged across routing-engine/FPC operating entities). Supported brands/models — Juniper MX-series service routers (MX240/480/960, etc., Junos).
  Router Huawei AR SNMP:
    name: Huawei AR (Telegraf)
    desc: Huawei AR-specific SNMP collection template for Huawei AR-series routers (VRP). In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects HUAWEI-ENTITY-EXTENT-MIB private OIDs for device health (CPU and memory utilization, both reported directly as percentages and averaged across entities). Supported brands/models — Huawei AR-series enterprise routers (AR1200/AR2200/AR3200, etc.).
  Router Vyatta SNMP:
    name: Vyatta (Telegraf)
    desc: Vyatta/VyOS-specific SNMP collection template for Vyatta/VyOS (Linux) routers. In addition to standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects HOST-RESOURCES CPU load (averaged across cores) and UCD-SNMP real memory (total/free, used and derived usage). Memory usage is derived as (total - free) / total. Supported brands/models — Vyatta / VyOS software routers.
  Router Adtran SNMP:
    name: Adtran (Telegraf)
    desc: Adtran AOS router SNMP collection (ADTRAN-AOS MIB, IANA PEN 664). Beyond standard IF-MIB interface metrics, it collects Adtran private OIDs for device health including CPU utilisation (adGenAOSCurrentCpuUtil, reported directly as a percentage) and memory (adGenAOSMemPool total + adGenAOSHeapFree free in bytes, usage derived as (total-free)/total). Temperature/fan/power are not exposed, so those are N/A. Supported brands/models — Adtran AOS routers/gateways (NetVanta series and other adtran-aos platforms; enterprise 664).
  Router Cradlepoint SNMP:
    name: Cradlepoint (Telegraf)
    desc: Cradlepoint cellular (4G/5G) router SNMP collection (Cradlepoint private enterprise MIB, IANA PEN 20992). Beyond standard IF-MIB interface metrics and 64-bit HC traffic counters, it collects Cradlepoint private scalar OIDs for device health including overall CPU utilization, memory utilization (both reported directly as percentages) and internal chassis temperature in degrees Celsius. Fan and power-supply sensors are not exposed as row-filter-free scalars by these compact cellular routers, so those are N/A. Supported brands/models — Cradlepoint NetCloud / COR / E-series and IBR-series 4G/5G enterprise routers (enterprise 20992).
  Router Teltonika SNMP:
    name: Teltonika (Telegraf)
    desc: Teltonika industrial cellular router SNMP collection (RutOS is Linux + net-snmp, HOST-RESOURCES / UCD-SNMP-MIB, IANA PEN 48690). Beyond standard IF-MIB 64-bit HC interface traffic, it collects device-health metrics exposed via standard net-snmp on RutOS including CPU utilisation (HOST-RESOURCES hrProcessorLoad, per-core 0-100%, averaged across cores) and physical memory (total + free in KB, used derived as total - free, usage derived as 100*(total-free)/total). Teltonika RUT-series cellular routers are fanless compact industrial designs and do not expose temperature/power sensors as scalars, so temperature/fan/power are N/A. Supported brands/models — Teltonika RUT / TRB / RUTX industrial 4G/5G cellular routers (RutOS; enterprise 48690).
  Router Teldat SNMP:
    name: Teldat (Telegraf)
    desc: Teldat enterprise router / SD-WAN CPE SNMP collection (TELDAT-MIB, IANA PEN 2007). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Teldat private OIDs for device health including CPU utilisation (reported directly as a percentage) and main memory (total + free in bytes, usage derived as (total-free)/total). Teldat compact enterprise routers are fanless fixed-configuration designs whose private MIB does not expose temperature/fan/power sensors as row-filter-free scalars, so temperature/fan/power are N/A. Supported brands/models — Teldat routers / SD-WAN CPE (Atlas / Regesta / iMxx series; enterprise 2007; shares the MIB family with bintec-elmeg).
  Router Avaya SNMP:
    name: Avaya (Telegraf)
    desc: Avaya (including legacy Nortel / Bay Networks assets) enterprise router / layer-3 routing switch SNMP collection (RAPID-CITY/AVAYA private MIB, IANA PEN 6889). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Avaya private OIDs for device health including CPU utilisation (reported directly as a percentage) and main memory (used + free in bytes, usage derived as used/(used+free)). Avaya enterprise routing platforms are fixed-configuration compact units whose private MIB does not expose temperature/fan/power sensors as row-filter-free scalars, so temperature/fan/power are N/A. Supported brands/models — Avaya ERS / VSP series routing platforms (enterprise 6889; includes legacy Nortel / Bay Networks assets).
  Router Viprinet SNMP:
    name: Viprinet (Telegraf)
    desc: Viprinet multi-WAN bonding / SD-WAN router SNMP collection (VIPRINET-MIB, IANA PEN 35424). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Viprinet private OIDs for device health including CPU utilisation (reported directly as a percentage) and main memory (total + free in bytes, usage derived as (total-free)/total). Viprinet compact multi-WAN routers are fanless fixed-configuration designs whose private MIB does not expose temperature/fan/power sensors as row-filter-free scalars, so temperature/fan/power are N/A. Supported brands/models — Viprinet multi-WAN bonding routers (Multichannel VPN Router series; enterprise 35424).
  Router OneAccess SNMP:
    name: OneAccess (Telegraf)
    desc: OneAccess enterprise CPE / SD-WAN router SNMP collection (ONEACCESS-SYS-MIB, IANA PEN 13191). Beyond standard IF-MIB 64-bit HC interface traffic, it collects OneAccess private OIDs for device health including CPU utilisation (reported directly as a percentage) and main memory (total + free in bytes, usage derived as (total-free)/total). OneAccess compact enterprise CPEs are fanless fixed-configuration designs whose private MIB does not expose temperature/fan/power sensors as row-filter-free scalars, so temperature/fan/power are N/A. Supported brands/models — OneAccess enterprise routers / SD-WAN CPE (ONE series; enterprise 13191; now part of Ekinops).
  Router Aethra SNMP:
    name: Aethra Telecommunications (Telegraf)
    desc: Aethra Telecommunications IAD/DSL access router (with VoIP) SNMP collection (AETHRA-MIB, enterprise 7745). Beyond standard IF-MIB interface metrics, it collects Aethra private OIDs for device health including 5-minute average CPU load (cpuLoad5min, reported directly as a percentage) and main memory (total + free in kBytes, usage derived as (total-free)/total). Temperature/fan/power are not collected here, so they are N/A. Supported brands/models — Aethra Telecommunications IAD/DSL routers (AC2036/Dolcevita series, enterprise 7745).
  Router Benu SNMP:
    name: Benu Networks (Telegraf)
    desc: Benu Networks BNG/CGNAT edge router SNMP collection (BENU-CHASSIS-MIB, enterprise 39406). Beyond standard IF-MIB interface metrics, it collects Benu private chassis health metrics for temperature sensors, fan status and power-supply status. CPU and memory objects in BENU-HOST-MIB are software task tables, so they are not promoted to shared device CPU or memory health metrics here and remain N/A. Supported brands/models — Benu Networks MEG/xMEG router platforms.
  Router VeloCloud SNMP:
    name: VeloCloud/VMware SD-WAN (Telegraf)
    desc: VeloCloud/VMware SD-WAN Edge router SNMP collection (enterprise 45346). Beyond standard IF-MIB interface metrics, it collects VeloCloud private health OIDs for 5-minute average CPU utilisation and used memory, both reported directly as percentages. Temperature/fan/power are not collected here, so they are N/A. Supported brands/models — VeloCloud/VMware SD-WAN Edge routers.
  Router Harbour SNMP:
    name: Harbour Networks (Telegraf)
    desc: Harbour Networks (港湾网络) router SNMP collection (enterprise 8212 private MIB). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Harbour Networks private OIDs for device health including average CPU utilisation (snAgGblCpuUtil1SecAvg, reported directly as a percentage) and main memory (total + free in bytes, usage derived as (total-free)/total). Temperature/fan/power are not collected here, so they are N/A. Supported brands/models — Harbour Networks routers (enterprise 8212).
  Router Bintec SNMP:
    name: Bintec (Telegraf)
    desc: Bintec SMB router / VPN-gateway SNMP collection (BINTEC-MIB, IANA PEN 272). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Bintec private OIDs for device health including CPU utilisation (reported directly as a percentage) and main memory (total + free in bytes, usage derived as (total-free)/total). Bintec compact enterprise routers are fanless fixed-configuration designs whose private MIB does not expose temperature/fan/power sensors as row-filter-free scalars, so temperature/fan/power are N/A. Supported brands/models — Bintec routers / VPN gateways (bintec-elmeg RS / RXL / be.IP series; enterprise 272; shares the MIB family with Teldat).
  Router Digi SNMP:
    name: Digi (Telegraf)
    desc: Digi International industrial cellular/IoT router SNMP collection (DIGI-MIB, IANA PEN 332). Beyond standard IF-MIB 64-bit HC interface traffic, it collects Digi private OIDs for device health including CPU utilisation (reported directly as a percentage), main memory (used + free in KB, usage derived as used/(used+free)) and chassis temperature (in degrees Celsius). Digi TransPort/IX/Connect series are fanless compact industrial designs and do not expose power sensors as scalars, so fan/power are N/A. Supported brands/models — Digi International TransPort WR / IX / Connect EZ industrial cellular/IoT routers (enterprise 332).
  Router LANCOM SNMP:
    name: LANCOM (Telegraf)
    desc: LANCOM LCOS router/VPN-gateway SNMP collection (LCOS-MIB, IANA PEN 2356). Beyond standard IF-MIB interface metrics, it collects the LANCOM private hardware temperature sensor (lcsStatusHardwareInfoTemperatureDegrees, degrees Celsius). LCOS os_discovery does not expose CPU/memory utilisation or fan/power-supply state OIDs, so those are N/A. Supported brands/models — LANCOM LCOS routers and VPN gateways (1xxx / ic- / ISG series and other LCOS platforms; enterprise 2356).
  Router NetModule SNMP:
    name: NetModule (Telegraf)
    desc: NetModule industrial 4G/5G LTE router-specific SNMP collection template (NB-MIB, IANA PEN 31496). In addition to standard IF-MIB interface metrics, it collects the NetModule private system temperature object (systemTemperature), whose raw value carries a tenths-of-a-degree display hint and is divided by 10 to obtain degrees Celsius. The NB-MIB exposes no CPU, memory, fan or power objects (NB/NG-series are fanless industrial routers); these devices run embedded Linux with net-snmp, but whether HOST-RESOURCES / UCD CPU and memory OIDs are enabled is firmware-dependent and unverified, so CPU, memory, fan and power are not collected (N/A) and only system temperature plus standard IF-MIB interface metrics are gathered. Supported brands/models — NetModule NB/NG-series industrial 4G/5G LTE routers (IANA PEN 31496).
  Router Unisphere SNMP:
    name: Unisphere (Telegraf)
    desc: Unisphere Networks edge router SNMP collection template (E-series, acquired by Juniper, IANA PEN 4064 / Juniper-Unisphere 4874). This is a clean baseline template — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic. CPU, memory, temperature, fan and power-supply state are not collected (N/A) because the Unisphere private MIBs do not publish stable row-filter-free scalar device-health gauges that can be reliably polled across these legacy edge-router firmware revisions. Supported brands/models — Unisphere Networks / Juniper E-series (ERX) edge routers (enterprise 4064 / 4874).
  Router Avici SNMP:
    name: Avici (Telegraf)
    desc: Avici Systems core router SNMP collection template (TSR / SSR series, IANA PEN 2474). This is a clean baseline template — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic. CPU, memory, temperature, fan and power-supply state are not collected (N/A) because the Avici private MIB (enterprise 2474) does not publish stable row-filter-free scalar device-health gauges that can be reliably polled on these legacy high-speed core routers. Supported brands/models — Avici Systems TSR / SSR core routers (enterprise 2474).
  Router 6WIND VSR SNMP:
    name: 6WIND VSR (Telegraf)
    desc: 6WIND VSR router SNMP collection template (enterprise 7336). This is a clean baseline template — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic. CPU, memory, temperature, fan and power-supply state are not collected (N/A) because no cross-version stable row-filter-free vendor scalar device-health gauges are currently confirmed. Supported brands/models — 6WIND Virtual Service Router.
  Router Robustel SNMP:
    name: Robustel (Telegraf)
    desc: Robustel industrial cellular router / gateway SNMP collection template (enterprise 39699). This is a clean baseline template — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic. CPU, memory, temperature, fan and power-supply state are not collected (N/A) because no cross-version stable row-filter-free vendor scalar device-health gauges are currently confirmed. Cellular, WAN, VPN, SMS and trap-event tables are also not promoted to shared device-health metrics. Supported brands/models — Robustel R3000 industrial cellular routers and gateways.
  Router Milesight SNMP:
    name: Milesight (Telegraf)
    desc: Milesight UR32/UR35/UR75 industrial cellular router SNMP collection template. The official manuals confirm SNMPv1/v2c/v3, SNMP Trap, MIB View, VACM and an LTE-ROUTER-MIB.txt download path. This remains a clean baseline template because no cross-model stable row-filter-free vendor scalar CPU, memory, temperature, fan or power-supply gauges are currently confirmed — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic.
  Router MikroTik SNMP:
    name: MikroTik (Telegraf)
    desc: MikroTik RouterOS Ethernet router SNMP collection template. The official RouterOS SNMP documentation publishes the MikroTik RouterOS MIB, MIKROTIK-MIB, HOST-RESOURCES-MIB and IF-MIB, and documents the mtxrHlTemperature private temperature OID. Beyond the shared Router SNMP floor, this template collects per-core CPU utilization, system memory used/total, memory utilization and board temperature. MikroTik exposes fan as raw RPM and has no cross-model standardized power-supply state OID, so fan and power health are not collected.
  Router MultiTech SNMP:
    name: MultiTech (Telegraf)
    desc: MultiTech Systems cellular router / IoT gateway SNMP collection template (MultiConnect rCell series, IANA PEN 995). The rCell platform's SNMP agent is RFC1213-compatible (standard MIB-II + IF-MIB), so this is a clean baseline template — it collects system uptime and IF-MIB interface metrics including 64-bit ifHCInOctets/ifHCOutOctets, admin/oper status, speed, error/discard/packet counters and aggregate device traffic. CPU, memory, temperature, fan and power-supply state are not collected (N/A) because the rCell agent does not expose pollable scalar device-health gauges for them, and cellular RSSI/signal objects are not consistently scalar-walkable across firmware and are left for a future increment. Supported brands/models — MultiTech MultiConnect rCell 100/300/500 series cellular routers and IoT gateways.
  Router Sierra Wireless SNMP:
    name: Sierra Wireless (Telegraf)
    desc: Sierra Wireless AirLink (ALEOS) cellular LTE router / gateway SNMP collection template (SIERRA-MIB, IANA PEN 20542). In addition to standard IF-MIB interface metrics, it collects the ALEOS board/radio temperature scalar (gpsStatus temperature group, .20542.9.1.1.1.267), reported directly in degrees Celsius. The SIERRA-MIB exposes no aggregate CPU or memory scalar; cellular RSSI (.261, dBm) and power-in (.266) are available but are signed/contextual values left for a future increment, and there is no fan or power-supply state object (AirLink gateways are fanless), so CPU, memory, fan and PSU are not collected (N/A). Supported brands/models — Sierra Wireless AirLink ALEOS routers/gateways (RV/MP/LX/ ES/GX series, IANA PEN 20542).
  Router NEC SNMP:
    name: NEC (Telegraf)
    desc: NEC UNIVERGE IX-series router SNMP collection (NEC private enterprise MIB, IANA PEN 119). Beyond standard IF-MIB interface metrics, it collects NEC private scalar OIDs for device health including 1-minute CPU utilization, memory utilization and chassis temperature, all reported directly. Fan and power-supply states are exposed only as per-unit LLD status rows with vendor-specific codes the SNMP input cannot normalize, so those are N/A. Supported brands/models — NEC UNIVERGE IX series routers (IX2000 / IX3000 and other UNIVERGE IX platforms; enterprise 119).
  Router DrayTek SNMP:
    name: DrayTek (Telegraf)
    desc: DrayTek Vigor router / firewall SNMP collection (DrayTek private MIB, IANA PEN 7367). Beyond standard IF-MIB interface metrics, it collects device memory utilisation from the DrayTek private OID (1.3.6.1.4.1.7367.3.7.0, reported directly as a percentage) and CPU utilisation via HOST-RESOURCES hrProcessorLoad. Temperature/fan/power are not exposed by the Vigor MIB, so they are N/A. Supported brands/models — DrayTek Vigor series routers / firewalls (Vigor 2xxx / 3xxx, e.g. Vigor2962 / Vigor3900; enterprise 7367). CPU requires firmware exposing HOST-RESOURCES.
  Router Flow NetFlow:
    name: Router Flow Analysis (NetFlow)
    desc: Use NetFlow to collect router traffic, map exporter data to monitored assets, normalize by reported or fallback sampling rate, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  Router Flow sFlow:
    name: Router Flow Analysis (sFlow)
    desc: Use sFlow to collect router traffic, map exporter data to monitored assets, consume Telegraf-estimated sFlow values directly, and provide overview, interface, protocol, port, endpoint, and conversation metrics.
  ActiveMQ-JMX:
    name: ActiveMQ-JMX
    desc: The ActiveMQ plugin, based on JMX collection, acquires key performance metrics such as message queues, connection pools, and message throughput. It enables real-time monitoring of message processing efficiency and resource utilization, helping optimize system performance and ensure service stability.
  Tomcat:
    name: Tomcat(Telegraf)
    desc: Through the Telegraf collector, regularly collect key performance metrics from Tomcat's connectors and JVM memory.
  RabbitMQ:
    name: RabbitMQ(Telegraf)
    desc: Through the Telegraf collector, regularly collect operational status, resource utilization, message flow, and queue health metrics from RabbitMQ.
  ClickHouse:
    desc: Collect runtime metrics from ClickHouse instances, such as memory, disk, and query events, for performance monitoring, resource tracking, and fault diagnosis to ensure stable database operation.
    name: ClickHouse
  Apache:
    name: Apache(Telegraf)
    desc: Through the Telegraf collector, regularly collect Apache metrics including uptime, resource utilization, request processing efficiency, and bandwidth usage.
  Haproxy:
    name: Haproxy(Telegraf)
    desc: Based on the Telegraf haproxy input, periodically collects HAProxy frontend, backend, and server runtime data including sessions, queues, traffic, HTTP responses, errors, server health, and latency.
  Hardware Server IPMI:
    name: Physical Server IPMI General(Telegraf)
    desc: Through the Telegraf collector, utilize the IPMI protocol to regularly collect key metrics from hardware servers, including power status, fan speed, and temperature.
  Mysql:
    name: Mysql(Telegraf)
    desc: Through the Telegraf collector, regularly collect key metrics regarding the health status and performance of MySQL databases.
  Minio:
    name: MinIO(Telegraf)
    desc: Through the Telegraf collector, regularly invoke the MinIO metrics API to collect key indicators including the operational status, storage capacity, utilization, replication, internode communication, and S3 requests of the object storage system.
  Hardware Server SNMP General:
    name: Physical Server SNMP General(Telegraf)
    desc: Through the Telegraf collector, utilize the SNMP protocol to regularly collect key IF-MIB metrics from hardware server interfaces, including traffic volume, packet loss, and error counts.
  Host:
    desc: Through the Telegraf collector, gather and analyze host performance data, including CPU, memory, disk, and network utilization.
    name: Host(Telegraf)
  Host Remote:
    name: Host Remote(Telegraf)
    desc: Through Telegraf combined with Stargazer remote capabilities, collect host CPU, memory, disk, and network metrics over SSH/WinRM without installing an agent.
  Ping:
    desc: Through the Telegraf collector, regularly send ICMP Echo Requests (ECHO_REQUEST) to check the connectivity and response time of target hosts or network devices.
    name: Ping(Telegraf)
  TCPPort:
    name: TCP(Telegraf)
    desc: Probe TCP port reachability of a target host through the Telegraf net_response plugin, supporting IPv4 and IPv6, with optional send payload and expected response matching.
  MongoDB:
    name: MongoDB(Telegraf)
    desc: Through the Telegraf collector, regularly collect MongoDB metrics including basic information, performance indicators, operation statistics, and resource usage to help optimize performance and ensure efficient and stable database operation.
  JVM:
    name: JVM(JMX)
    desc: Through the JVM JMX collector, regularly collect performance metrics from the JVM (Java Virtual Machine), including runtime status, memory usage, thread activity, garbage collection statistics, and system resource utilization.
  Storage SNMP General:
    desc: Through the Telegraf collector, utilize the SNMP protocol to regularly collect key IF-MIB metrics from storage device interfaces, including traffic volume, packet loss, and error counts.
    name: Storage SNMP General (Telegraf)
  Storage Synology SNMP:
    name: Synology (Telegraf)
    desc: Synology NAS storage SNMP collection (enterprise PEN 6574). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — chassis temperature (synologyTemperature, read directly in degrees Celsius with no scaling), system fan and power-supply operational state (synologySystemFanStatus / synologyPowerStatus, natively 1=normal / 2=fault), and RAID/volume array state (synologyRaidStatus, normalized by the worst array to 1=healthy / 2=fault). The private tree exposes only a coarse normal/failed system-status code with no pollable system-level CPU or memory gauge, so CPU and memory are N/A and not faked. Supported brands/models — Synology DiskStation / RackStation NAS running DSM (DS / RS / FS / SA series).
  Storage MacroSAN SNMP:
    name: MacroSAN (Telegraf)
    desc: MacroSAN storage-array SNMP collection (enterprise PEN 35904). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects full vendor private health — controller CPU utilization (cpuRate, direct percent), controller memory utilization (vmRate, direct percent usage with no used/free split), and fan, power-supply and disk health state (fanState / powerState / diskHealthState, normalized to 1=normal / 2=fault, worst row per instance). Temperature is N/A. Supported brands/models — MacroSAN MS series SAN/NAS storage arrays (enterprise PEN 35904).
  Storage Sugon SNMP:
    name: Sugon (Telegraf)
    desc: Sugon ParaStor storage SNMP collection (enterprise PEN 35904; ParaStor reuses the MacroSAN private tree). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private hardware health — fan, power-supply and disk operational state (fanState / powerState / diskState, normalized to 1=normal / 2=fault, worst row per instance). This profile exposes no controller-level CPU or memory gauge, so CPU, memory and temperature are N/A and not faked. Supported brands/models — Sugon ParaStor distributed storage arrays (enterprise PEN 35904).
  Storage NetApp SNMP:
    name: NetApp (Telegraf)
    desc: NetApp storage SNMP collection (enterprise PEN 789). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — controller CPU busy time (cpuBusyTimePerCent, direct percent) and RAID disk-drive state (raidStatus, active=normal normalized to 1=healthy / 2=fault, worst disk per instance). The environment scalars (failed fan / power-supply counts, over-temperature) are count/boolean types not mapped into the shared-disk enum semantics, so temperature, fan and power are N/A and not faked pending field verification. Supported brands/models — NetApp FAS / AFF storage systems running Data ONTAP (enterprise PEN 789).
  Storage Fujitsu SNMP:
    name: Fujitsu (Telegraf)
    desc: Fujitsu ETERNUS storage-array SNMP collection (enterprise PEN 211, fjdary-MIB). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — chassis temperature sensors (fjdaryMachineTempInfo, read directly in degrees Celsius with no scaling), RAID group state (fjdaryMgtRaidGrpStatus), and logical volume state (fjdaryMgtOpVolumeStatus). The raw RAID and volume enum ok(2) is normalized to 1=healthy while unknown/degraded/error/dormant are normalized to 2=fault, with the worst array or volume taken per instance. This MIB does not publish pollable controller CPU or memory utilization, the power object is a wattage reading rather than a state enum, and no fan-state object is available, so CPU, memory, fan, and power are N/A and not faked. Supported brands/models — Fujitsu ETERNUS DX storage arrays.
  Storage Dell SC8000 SNMP:
    name: Dell SC8000 (Telegraf)
    desc: Dell SC8000 / Compellent storage SNMP collection (Dell EMC enterprise PEN 674). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — physical disk status and healthy flag (scDiskStatus / scDiskHealthy), controller fan status (scCtlrFanStatus), and controller power-supply status (scCtlrPowerStatus), normalized to 1=healthy / 2=fault with the worst component taken per instance. This profile exposes no pollable controller CPU, memory, or temperature gauge, so CPU, memory, and temperature are N/A and not faked. Supported brands/models — Dell SC8000 / Compellent SC Series storage arrays.
  Storage Dell PowerVault SNMP:
    name: Dell PowerVault (Telegraf)
    desc: Dell PowerVault / EqualLogic storage SNMP collection (EqualLogic enterprise PEN 12740). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — controller CPU utilization (cpmCPUTotal5min, direct percent), controller processor and chipset temperatures, physical disk status (eqlDiskStatus), and iSCSI volume administrative status (eqliscsiVolumeAdminStatus), normalized to 1=healthy / 2=fault with the worst component taken per instance. Capacity, disk RPM, CPU frequency and physical RAM are specification/capacity values, so they are not collected as health metrics. Supported brands/models — Dell PowerVault / EqualLogic PS and MD-family storage arrays.
  Storage Inspur SNMP:
    name: Inspur (Telegraf)
    desc: Inspur AS5500 storage SNMP collection (enterprise PEN 48512). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private hardware health — managed-disk status, physical-drive availability and power-supply state. Raw value 1 is conservatively normalized to healthy while every other value is treated as fault, with the worst component taken per instance. Controller CPU, memory, temperature and fan health gauges are not exposed by the current profile, so they are N/A and not faked.
  Storage CeresData SNMP:
    name: CeresData (Telegraf)
    desc: CeresData all-flash storage SNMP collection (enterprise PEN 25359). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — system-disk status, physical-disk status and storage-pool health. Raw value 1 is conservatively normalized to healthy while every other value is treated as fault, with the worst disk or storage pool taken per instance. Controller CPU, memory, temperature, fan and power-supply health gauges are not exposed by the current profile, so they are N/A and not faked.
  Storage Hikvision SNMP:
    name: Hikvision (Telegraf)
    desc: Hikvision Brainware storage SNMP collection (local private MIB tree PEN 99999). Beyond standard MIB-II / IF-MIB device uptime and 64-bit HC interface traffic, it collects vendor private health — CPU, memory, CPU temperature, disk, RAID, power-supply and CPU fan status. Raw status value 1 is normalized to healthy and every other value is treated as fault, with the worst component taken per instance. Capacity and IO-rate metrics are not collected as shared health metrics.
  Oracle:
    desc: The Oracle Exporter collector regularly gathers metrics from Oracle, including uptime, operation counts, transaction commits and rollbacks, as well as various wait times.
    name: Oracle(Exporter)
  Scanning Device SNMP General:
    name: Scanning Device General (SNMP)
    desc: The SNMP universal plugin is used to monitor and manage scanned devices via SNMP. Administrators can retrieve critical device information such as interface traffic, error statistics, and status information, thereby optimizing network performance and enhancing management efficiency.
  Docker:
    name: Docker(Telegraf)
    desc: Through the Telegraf collector, regularly collect Docker container status, resource utilization (CPU, memory, network, I/O), and performance metrics.
  VMWare:
    desc: Through the Telegraf collector, utilize Stargazer's capability to regularly gather key metrics from VMware vCenter, ESXi, virtual machines, and datastores.
    name: VMWare
  MSSQL:
    desc: Through the Telegraf collector regularly gathers key MSSQL metrics, including basic information, performance indicators, storage status, and more.
    name: MSSQL(Telegraf)
  Kafka:
    name: Kafka(Exporter)
    desc: Through the Kafka Exporter collector, regularly gather metrics from Kafka clusters, including topic statistics, partition counts, consumer group status, and more, to help monitor the health and performance of Kafka clusters.
  Transmission Ifotec SNMP:
    name: Transmission Ifotec SNMP
    desc: Baseline SNMP child template for Ifotec industrial fiber-optic transceiver and optical transmission devices (enterprise PEN 21362). The shared Transmission SNMP floor supplies MIB-II uptime and IF-MIB 64-bit HC interface traffic. The Ifotec enterprise root and the ifotecProductList / ifotecGeneral / ifotecModules sub-trees are publicly documented, but no stable, row-filter-free CPU, memory, temperature, fan or power health scalars are proven for this vendor in the current MIB facts, so they are not promoted into shared device-health metrics. Applicable to Ifotec industrial fiber-optic transceivers and optical transmission devices and other IF-MIB compliant transmission devices.
  Switch IP Infusion SNMP:
    name: Switch IP Infusion SNMP
    desc: IP Infusion OcNOS white-box switch SNMP child template (enterprise PEN 36673). The shared Switch SNMP floor supplies MIB-II uptime and IF-MIB 64-bit HC interface traffic, while the IPI-CMM-CHASSIS-MIB cmm subtree contributes one chassis-level PSU temperature scalar (cmmSysPSTemperature1). Per-row objects in cmmFanTable, cmmIpmiDeviceSensorTable and cmmTransTemperature, as well as the additional chassis scalars cmmSysPSTemperature2 and cmmSysPSTemperature3, are intentionally not collected -- telegraf inputs.snmp cannot reliably aggregate per-row indices or arithmetic-merge chassis scalars into a single bk-lite metric, so those leaves are kept as N/A to honor the no-fabricated-health-metrics rule. Applicable to IP Infusion OcNOS white-box switches (Edgecore/Accton, UfiSpace, Delta, Celestica and similar white-box hardware platforms).
  Switch Omnitron SNMP:
    name: Switch Omnitron SNMP
    desc: Baseline SNMP child template for Omnitron Systems Technology iConverter management modules and industrial Ethernet media converters / fiber transceiver modules (enterprise PEN 7342). The shared Switch SNMP floor supplies MIB-II uptime and IF-MIB 64-bit HC interface traffic. The private OMNITRON-MIB / OMNITRON-POE-MIB / OMNITRON-TC-MIB expose `omnitron OBJECT IDENTIFIER ::= { enterprises 7342 }` plus the `icAgent(1) / prodAgent(2) / omnitronProducts(5) / managementModule(1) / omnitronMIB(3)` subtree and per-port PoE power budget leaves, but every published health-related leaf is per-management-module or per-port, which telegraf inputs.snmp cannot aggregate into a single bk-lite device_* metric, so they are kept as N/A to honor the no-fabricated-health-metrics rule. Applicable to Omnitron iConverter industrial Ethernet media converter and fiber transceiver management modules and other IF-MIB compliant industrial network devices.
  Switch Ubiquoss SNMP:
    name: Switch Ubiquoss SNMP
    desc: Baseline SNMP child template for Ubiquoss GPON / EPON OLT and L2 / L3 industrial Ethernet switches (enterprise PEN 36141). The shared Switch SNMP floor supplies MIB-II uptime and IF-MIB 64-bit HC interface traffic. The private UBIQUOSS-SMI / UBQS-SMI / UBQS-PRODUCTS-MIB / UBQS-ENVMON-MIB / UBQS-CPU-STATS-MIB / UBQS-ENTITY-MIB / UBQS-ENTITY-ALARM-MIB / UBQS-INTERFACE-MIB / UBQS-SYSTEM-MIB / UBQS-SYSINFO-MIB and the EPON / 10GEPON families expose the `ubiquoss OBJECT IDENTIFIER ::= { enterprises 36141 }` enterprise root plus per-stack-unit, per-fan, per-PSU, per-port, per-card and per-ONU leaves, which telegraf inputs.snmp cannot aggregate into a single bk-lite device_* metric, so they are kept as N/A to honor the no-fabricated-health-metrics rule. Applicable to Ubiquoss e3xxx / e5xxx / e6xxx / e7xxx / cs3400 series Ethernet switches and GPON / EPON OLT / ONU products.
