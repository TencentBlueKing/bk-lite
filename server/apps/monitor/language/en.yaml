  Tomcat-JMX:
    tomcat_threadpool_running_gauge:
      name: Running Threads
      desc: Number of actively running threads in the thread pool, reflecting actual workload. A high value may indicate heavy thread pool load, suggesting optimization of thread pool configuration.
    tomcat_threadpool_currentthreadsbusy_gauge:
      desc: Number of busy threads, determining processing capacity bottlenecks. A high value may indicate insufficient processing capacity, suggesting optimization of thread pool configuration.
      name: Busy Threads
    tomcat_session_expiredsessions_total_counter:
      name: Total Expired Sessions
      desc: Total number of expired sessions for a specific host, detecting session timeouts. A high value may indicate frequent session timeouts, requiring a review of session configuration or resource limits.
    tomcat_errorcount_increase:
      desc: Increase in errors over the past 5 minutes, reflecting changes in error frequency. A high value may indicate numerous system issues that need prompt investigation.
      name: Error Count Growth
    tomcat_threadpool_utilization:
      name: Threadpool Utilization
      desc: Utilization of the thread pool, reflecting its usage. A high value may indicate the thread pool is nearing saturation, suggesting the need to increase thread pool capacity or optimize application performance.
    tomcat_session_rejectionrate:
      name: Session Rejection Rate
      desc: Session rejection rate, reflecting the proportion of session creation failures. A high value may indicate issues with session management, requiring a review of session configuration or resource limits.
    tomcat_bytessent_increase:
      desc: Increase in sent bytes over the past 5 minutes (in kibibytes), reflecting network output rate. A high value may indicate significant network output traffic, requiring attention to network bandwidth.
      name: Increase in Sent Bytes(5-min interval)
    jmx_scrape_error_gauge:
      desc: 'JMX scrape status: 0 for success, 1 for failure.'
      name: JMX Scrape Status
    tomcat_bytesreceived_increase:
      name: Increase in Received Bytes(5-min interval)
      desc: Increase in received bytes over the past 5 minutes (in kibibytes), reflecting network input rate. A continuous increase may indicate higher network input traffic, requiring attention to network bandwidth.
    tomcat_threadpool_currentthreadcount_gauge:
      name: Current Threads
      desc: Current number of threads in the thread pool, monitoring concurrent load. A high value may indicate heavy thread pool load, suggesting optimization of thread pool configuration.
    tomcat_session_sessioncounter_total_counter:
      name: Total Sessions
      desc: Total number of active sessions for a specific host, used to monitor session resource usage. A high value may indicate excessive resource consumption, suggesting optimization of session management.
    tomcat_maxtime_total_counter:
      name: Maximum Processing Time
      desc: Maximum request processing time (in seconds) for a specific port and protocol, locating slow requests. A high value may indicate a performance bottleneck, suggesting optimization of application performance.
    tomcat_processingtime_increase:
      name: Total Processing Time Increase
      desc: Increase in total time (in seconds) taken to process requests over the past 5 minutes, evaluating changes in overall processing efficiency. A continuous increase may indicate growing request processing time, suggesting further analysis for potential performance bottlenecks.
    tomcat_session_processingtime_avg:
      desc: Over the past 5 minutes, the average session processing time per second (in milliseconds). This metric reflects the average efficiency of the system in processing sessions. A lower value indicates that the system processes sessions quickly and efficiently; a higher value may indicate performance bottlenecks in the system when processing sessions.
      name: Average Processing Time per Session
    tomcat_requestcount_increase:
      name: Request Growth
      desc: Increase in requests over the past 5 minutes, reflecting traffic trends. A continuous increase may indicate higher traffic, requiring attention to system load.
  Detection Device:
    iftotalOutOctets:
      desc: This metric represents the average rate of total bytes sent by the entire device over the past 5 minutes, measured in megabytes per second (MB/s). By summing the outgoing byte counts from multiple interfaces, this metric allows administrators to comprehensively assess the sending performance of the entire system, enabling more effective traffic management and optimization.
      name: Device Total Outgoing Traffic Rate
    ifInDiscards:
      desc: This metric represents the average rate of incoming discarded packets over the past 5 minutes, measured in packets per second. Packet discards may indicate network congestion or resource shortages, and monitoring this metric can help administrators optimize network performance.
      name: Incoming Discard Packets Rate
    sysUpTime:
      name: System Uptime
      desc: This metric indicates the uptime of the device since the last restart, measured in days. By monitoring the uptime, network administrators can understand the stability and reliability of the device and identify potential reboot or failure issues.
    ifInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, converted to megabytes per second (MB/s) Monitoring byte traffic helps evaluate the load on the interface and bandwidth usage.
    ifAdminStatus:
      name: Interface Administrative Status
      desc: This metric indicates the administrative status of the network switch interface. It serves to indicate whether the interface is enabled (up) or disabled (down) by an administrator, along with other states such as testing or not present. This information is vital for network management and troubleshooting.
    ifOperStatus:
      desc: This metric reflects the actual operational status of the network switch interface, indicating whether the interface is operational. Unlike the administrative status, the operational status shows whether the interface can successfully receive and send traffic, which is crucial for monitoring network health.
      name: Interface Operational Status
    ifInErrors:
      desc: This metric calculates the average rate of incoming error packets over the past 5 minutes, measured in packets per second. Monitoring incoming errors allows administrators to detect potential issues, such as physical connection faults or configuration errors, in a timely manner.
      name: Incoming Error Packets Rate
    ifInUcastPkts:
      desc: This metric indicates the average rate of incoming unicast packets over the past 5 minutes, measured in packets per second. Monitoring unicast packets is crucial for assessing interface utilization and traffic load.
      name: Incoming Unicast Packet Rate
    ifOutOctets:
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, measured in megabytes per second (MB/s). Monitoring outgoing traffic is crucial for ensuring data transmission quality and optimizing network performance.
      name: Interface Outgoing Traffic Rate
    ifOutUcastPkts:
      desc: This metric calculates the average rate of outgoing unicast packets over the past 5 minutes, measured in packets per second. By monitoring the number of unicast packets, administrators can assess the transmission performance of the interface and the usage of traffic.
      name: Outgoing Unicast Packet Rate
    iftotalInOctets:
      name: Device Total Incoming Traffic Rate
      desc: This metric indicates the average rate of total bytes received by the entire device over the past 5 minutes, measured in megabytes per second (MB/s). By summing the incoming byte counts from multiple interfaces, this metric helps administrators obtain an overview of the device's incoming traffic, supporting overall traffic monitoring and capacity planning.
    ifOutDiscards:
      name: Outgoing Discard Packets Rate
      desc: This metric calculates the average rate of outgoing discarded packets over the past 5 minutes, measured in packets per second. Monitoring outgoing discards can help identify network transmission issues and misconfigurations.
    ifOutErrors:
      name: Outgoing Error Packets Rate
      desc: This metric calculates the average rate of outgoing error packets over the past 5 minutes, measured in packets per second. Monitoring outgoing errors is essential for identifying transmission issues and ensuring data integrity.
    ifHighSpeed:
      name: Interface Bandwidth
      desc: This metric indicates the maximum data transmission speed supported by the network interface, usually measured in Kbps. Understanding the maximum speed of the interface helps administrators optimize traffic and utilize network resources effectively.
  Switch:
    device_voltage_volts:
      name: Input Voltage
      desc: Device input voltage reading in volts. Values outside the rated range may indicate unstable power and hardware risk.
    device_optical_rx_power:
      name: SFP RX Power
      desc: Optical receive power reading of the SFP/SFP+ module. Abnormally low Rx power may indicate link attenuation, dirty fiber, or a faulty peer transmitter.
    device_optical_tx_power:
      name: SFP TX Power
      desc: Optical transmit power reading of the SFP/SFP+ module. Abnormal Tx power may indicate an aging or failing optical module.
    snmp_uptime:
      name: System Uptime
      desc: This metric indicates the uptime of the device since the last restart. By monitoring the uptime, network administrators can understand the stability and reliability of the device and identify potential reboot or failure issues.
    interface_ifAdminStatus:
      name: Interface Admin Status
      desc: This metric indicates the administrative status of the network switch interface. It serves to indicate whether the interface is enabled (up) or disabled (down) by an administrator, along with other states such as testing or not present. This information is vital for network management and troubleshooting.
    interface_ifOperStatus:
      name: Interface Oper Status
      desc: This metric reflects the actual operational status of the network switch interface, indicating whether the interface is operational. Unlike the administrative status, the operational status shows whether the interface can successfully receive and send traffic, which is crucial for monitoring network health.
    interface_ifSpeed:
      name: Interface Bandwidth
      desc: This metric indicates the maximum data transmission speed supported by the network interface, measured in bits per second. Understanding the maximum speed of the interface helps administrators optimize traffic and utilize network resources effectively.
    interface_ifInErrors:
      name: Incoming Errors Rate
      desc: This metric calculates the average rate of incoming error packets over the past 5 minutes, measured in packets per second. Monitoring incoming errors allows administrators to detect potential issues, such as physical connection faults or configuration errors, in a timely manner.
    interface_ifOutErrors:
      name: Outgoing Errors Rate
      desc: This metric calculates the average rate of outgoing error packets over the past 5 minutes, measured in packets per second. Monitoring outgoing errors is essential for identifying transmission issues and ensuring data integrity.
    interface_ifInDiscards:
      name: Incoming Discards Rate
      desc: This metric represents the average rate of incoming discarded packets over the past 5 minutes, measured in packets per second. Packet discards may indicate network congestion or resource shortages, and monitoring this metric can help administrators optimize network performance.
    interface_ifOutDiscards:
      name: Outgoing Discards Rate
      desc: This metric calculates the average rate of outgoing discarded packets over the past 5 minutes, measured in packets per second. Monitoring outgoing discards can help identify network transmission issues and misconfigurations.
    interface_ifInUcastPkts:
      name: Incoming Unicast Packets Rate
      desc: This metric indicates the average rate of incoming unicast packets over the past 5 minutes, measured in packets per second. Monitoring unicast packets is crucial for assessing interface utilization and traffic load.
    interface_ifOutUcastPkts:
      name: Outgoing Unicast Packets Rate
      desc: This metric calculates the average rate of outgoing unicast packets over the past 5 minutes, measured in packets per second. By monitoring the number of unicast packets, administrators can assess the transmission performance of the interface and the usage of traffic.
    interface_ifInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, measured in bytes per second. Monitoring byte traffic helps evaluate the load on the interface and bandwidth usage.
    interface_ifOutOctets:
      name: Interface Outgoing Traffic Rate
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, measured in bytes per second. Monitoring outgoing traffic is crucial for ensuring data transmission quality and optimizing network performance.
    interface_ifHCInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, measured in bytes per second, from the 64-bit IF-MIB ifHCInOctets counter. The 64-bit counter avoids the rapid wrap of the 32-bit ifInOctets on high-speed switch ports, keeping the rate accurate.
    interface_ifHCOutOctets:
      name: Interface Outgoing Traffic Rate
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, measured in bytes per second, from the 64-bit IF-MIB ifHCOutOctets counter. The 64-bit counter avoids the rapid wrap of the 32-bit ifOutOctets on high-speed switch ports, keeping the rate accurate.
    device_total_incoming_traffic:
      name: Device Total Incoming Traffic Rate
      desc: This metric indicates the average rate of total bytes received by the entire device over the past 5 minutes, measured in bytes per second. By summing the incoming byte counts from multiple interfaces, this metric helps administrators obtain an overview of the device's incoming traffic, supporting overall traffic monitoring and capacity planning.
    device_total_outgoing_traffic:
      name: Device Total Outgoing Traffic Rate
      desc: This metric represents the average rate of total bytes sent by the entire device over the past 5 minutes, measured in bytes per second. By summing the outgoing byte counts from multiple interfaces, this metric allows administrators to comprehensively assess the sending performance of the entire system, enabling more effective traffic management and optimization.
    device_cpu_usage:
      name: CPU Utilization
      desc: This metric reports the CPU utilization of the device control plane (typically the 5-minute average), as a percentage. Sustained high CPU usage can indicate control-plane overload, routing instability, or attack traffic, and may lead to slow management response or packet processing delays. Sourced from vendor-specific SNMP OIDs and normalized to a 0-100 percentage.
    device_memory_usage:
      name: Memory Utilization
      desc: This metric reports overall memory utilization of the device, computed as used / (used + free) * 100 across all memory pools. High memory usage may indicate memory leaks, oversized routing/MAC/ARP tables, or insufficient capacity, and can cause instability or failed allocations.
    device_memory_used:
      name: Memory Used
      desc: This metric reports the number of bytes currently in use for each memory pool of the device. It helps administrators understand the absolute memory consumption per pool (for example Processor or I/O pools) and identify which pool is under pressure.
    device_memory_free:
      name: Memory Free
      desc: This metric reports the number of free bytes available in each memory pool of the device. Together with the used bytes it determines overall memory utilization; a persistently low free value indicates memory pressure on that pool.
    device_memory_total:
      name: Memory Total
      desc: This metric reports the total memory capacity of the device. It is the denominator for memory utilization (some vendors compute (total - free) / total) and, together with free memory, reflects overall memory pressure.
    device_temperature_celsius:
      name: Temperature
      desc: This metric reports the temperature reading of each hardware sensor on the device, in degrees Celsius. Abnormally high temperatures may indicate fan failure, blocked airflow, or excessive ambient heat, and can trigger thermal protection or hardware damage if left unaddressed.
    device_fan_state:
      name: Fan Status
      desc: This metric reports the operational state of each cooling fan on the device. A non-normal state (warning, critical, shutdown, or notFunctioning) indicates a cooling fault that can quickly lead to overheating and should be investigated immediately.
    device_psu_state:
      name: Power Supply Status
      desc: This metric reports the operational state of each power supply unit on the device. A non-normal state signals a power redundancy or hardware fault; on devices with redundant PSUs a single failure may not cause an outage but removes redundancy and must be remediated promptly.
    device_fan_speed:
      name: Fan Speed
      desc: This metric reports the fan rotation speed (RPM) of the device, taken as the maximum across fans. Abnormally low or zero RPM indicates a stalled or failed fan and a risk of overheating; abnormally high RPM may indicate the device is compensating for high temperature. For devices that expose only fan speed without a fan-state enum, speed is the only signal of fan health.
    device_flow_bytes_rate:
      name: Device Flow Traffic Rate
      desc: Total device traffic rate estimated from Flow records according to the active protocol metric contract, used for bandwidth trend and capacity monitoring.
    device_flow_packets_rate:
      name: Device Flow Packet Rate
      desc: Total device packet rate estimated from Flow records according to the active protocol metric contract, used to observe packet-level load and bursts.
    device_flow_in_bytes_rate:
      name: Device Flow Inbound Traffic Rate
      desc: Flow traffic rate estimated from records attributed to input-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_out_bytes_rate:
      name: Device Flow Outbound Traffic Rate
      desc: Flow traffic rate estimated from records attributed to output-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_in_packets_rate:
      name: Device Flow Inbound Packet Rate
      desc: Flow packet rate estimated from records attributed to input-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_out_packets_rate:
      name: Device Flow Outbound Packet Rate
      desc: Flow packet rate estimated from records attributed to output-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_avg_packet_size:
      name: Device Flow Average Packet Size
      desc: Average packet or sampled frame size from Flow records, useful for identifying small-packet bursts or large-packet transfer patterns.
    device_flow_effective_sampling_rate:
      name: Device Flow Effective Sampling Rate
      desc: Effective sampling rate used for Flow calculation. Device-reported fields are preferred; the asset fallback sampling rate is used when missing.
    device_flow_interface_bytes_rate:
      name: Interface Flow Traffic Rate
      desc: Flow traffic rate grouped by interface and direction, used to locate interface-level traffic hotspots.
    device_flow_interface_packets_rate:
      name: Interface Flow Packet Rate
      desc: Flow packet rate grouped by interface and direction, used to locate interface-level packet hotspots.
    device_flow_top_interfaces_by_bytes:
      name: Top Interfaces by Flow Traffic Rate
      desc: Interfaces ranked by Flow traffic rate, used to quickly identify high-traffic interfaces.
    device_flow_protocol_bytes_rate:
      name: Protocol Flow Traffic Rate
      desc: Flow traffic rate grouped by protocol, used to identify TCP, UDP, ICMP, and other protocol traffic distribution.
    device_flow_protocol_packets_rate:
      name: Protocol Flow Packet Rate
      desc: Flow packet rate grouped by protocol, used to identify protocol-level packet anomalies.
    device_flow_dst_port_bytes_rate:
      name: Destination Port Flow Traffic Rate
      desc: Flow traffic rate grouped by destination port, used to analyze application or service port hotspots.
    device_flow_dst_port_packets_rate:
      name: Destination Port Flow Packet Rate
      desc: Flow packet rate grouped by destination port, used to analyze application or service port packet hotspots.
    device_flow_src_port_bytes_rate:
      name: Source Port Flow Traffic Rate
      desc: Flow traffic rate grouped by source port, used to analyze client-side port traffic distribution.
    device_flow_top_src_bytes_rate:
      name: Top Source Flow Traffic Rate
      desc: Flow traffic rate ranked by source address, used to discover major traffic sources.
    device_flow_top_dst_bytes_rate:
      name: Top Destination Flow Traffic Rate
      desc: Flow traffic rate ranked by destination address, used to discover major traffic destinations.
    device_flow_top_src_packets_rate:
      name: Top Source Flow Packet Rate
      desc: Flow packet rate ranked by source address, used to discover packet-heavy sources.
    device_flow_top_dst_packets_rate:
      name: Top Destination Flow Packet Rate
      desc: Flow packet rate ranked by destination address, used to discover packet-heavy destinations.
    device_flow_top_conversation_bytes_rate:
      name: Top Conversation Flow Traffic Rate
      desc: Conversation traffic ranked by source, destination, protocol, and destination port, used to locate dominant communication pairs.
    device_psu_temperature_celsius:
      name: PSU Temperature
      desc: Chassis-level PSU 1 temperature reading from IP Infusion (OcNOS) device (IPI-CMM-CHASSIS-MIB cmmSysPSTemperature1), in degrees Celsius. Used to monitor power module operating temperature; abnormally high values may indicate blocked airflow, failing fans or excessive ambient heat, which can trigger thermal protection or hardware damage if left unaddressed.
  Router:
    device_temperature_celsius:
      name: Device Temperature
      desc: Device hardware temperature sensor reading in degrees Celsius. Abnormally high values may indicate fan failure, poor airflow, or high ambient temperature.
    device_fan_state:
      name: Fan Status
      desc: Operational state of each cooling fan (enum). A non-normal state indicates a cooling fault that can quickly lead to overheating.
    device_psu_state:
      name: Power Supply Status
      desc: Operational state of each power supply unit (enum). A non-normal state indicates a power redundancy or hardware fault and should be remediated promptly.
    device_memory_total:
      name: Total Memory
      desc: This metric reports the total physical memory capacity of the router (UCD-SNMP-MIB memTotalReal, reported in KB and converted to bytes).
    device_memory_free:
      name: Free Memory
      desc: This metric reports the amount of free physical memory in bytes on the router (UCD-SNMP-MIB memAvailReal, reported in KB and converted to bytes). Persistently low free memory can indicate rising memory pressure.
    device_memory_used:
      name: Used Memory
      desc: This metric reports the amount of used physical memory in bytes on the router, derived as total memory minus free memory. It helps gauge absolute memory consumption and pressure.
    device_cpu_usage:
      name: CPU Usage
      desc: This metric reports the average CPU utilization across the operating entities of the Juniper MX router (JUNIPER-MIB jnxOperatingCPU, aggregated per instance_id). Sustained high usage indicates heavy forwarding or control-plane load.
    device_memory_usage:
      name: Memory Usage
      desc: This metric reports the average memory utilization across the operating entities of the Juniper MX router (JUNIPER-MIB jnxOperatingBuffer, reported directly as a percentage). Sustained high usage may be caused by oversized routing tables or memory leaks.
    interface_ifHCInOctets:
      name: Interface Incoming Traffic Rate (HC)
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, based on the 64-bit ifHCInOctets counter which does not wrap on high-speed interfaces.
    interface_ifHCOutOctets:
      name: Interface Outgoing Traffic Rate (HC)
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, based on the 64-bit ifHCOutOctets counter which does not wrap on high-speed interfaces.
    snmp_uptime:
      name: System Uptime
      desc: This metric indicates the uptime of the device since the last restart. By monitoring the uptime, network administrators can understand the stability and reliability of the device and identify potential reboot or failure issues.
    interface_ifAdminStatus:
      name: Interface Admin Status
      desc: This metric indicates the administrative status of the network switch interface. It serves to indicate whether the interface is enabled (up) or disabled (down) by an administrator, along with other states such as testing or not present. This information is vital for network management and troubleshooting.
    interface_ifOperStatus:
      name: Interface Oper Status
      desc: This metric reflects the actual operational status of the network switch interface, indicating whether the interface is operational. Unlike the administrative status, the operational status shows whether the interface can successfully receive and send traffic, which is crucial for monitoring network health.
    interface_ifSpeed:
      name: Interface Bandwidth
      desc: This metric indicates the maximum data transmission speed supported by the network interface, measured in bits per second. Understanding the maximum speed of the interface helps administrators optimize traffic and utilize network resources effectively.
    interface_ifInErrors:
      name: Incoming Errors Rate
      desc: This metric calculates the average rate of incoming error packets over the past 5 minutes, measured in packets per second. Monitoring incoming errors allows administrators to detect potential issues, such as physical connection faults or configuration errors, in a timely manner.
    interface_ifOutErrors:
      name: Outgoing Errors Rate
      desc: This metric calculates the average rate of outgoing error packets over the past 5 minutes, measured in packets per second. Monitoring outgoing errors is essential for identifying transmission issues and ensuring data integrity.
    interface_ifInDiscards:
      name: Incoming Discards Rate
      desc: This metric represents the average rate of incoming discarded packets over the past 5 minutes, measured in packets per second. Packet discards may indicate network congestion or resource shortages, and monitoring this metric can help administrators optimize network performance.
    interface_ifOutDiscards:
      name: Outgoing Discards Rate
      desc: This metric calculates the average rate of outgoing discarded packets over the past 5 minutes, measured in packets per second. Monitoring outgoing discards can help identify network transmission issues and misconfigurations.
    interface_ifInUcastPkts:
      name: Incoming Unicast Packets Rate
      desc: This metric indicates the average rate of incoming unicast packets over the past 5 minutes, measured in packets per second. Monitoring unicast packets is crucial for assessing interface utilization and traffic load.
    interface_ifOutUcastPkts:
      name: Outgoing Unicast Packets Rate
      desc: This metric calculates the average rate of outgoing unicast packets over the past 5 minutes, measured in packets per second. By monitoring the number of unicast packets, administrators can assess the transmission performance of the interface and the usage of traffic.
    interface_ifInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, measured in bytes per second. Monitoring byte traffic helps evaluate the load on the interface and bandwidth usage.
    interface_ifOutOctets:
      name: Interface Outgoing Traffic Rate
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, measured in bytes per second. Monitoring outgoing traffic is crucial for ensuring data transmission quality and optimizing network performance.
    device_total_incoming_traffic:
      name: Device Total Incoming Traffic Rate
      desc: This metric indicates the average rate of total bytes received by the entire device over the past 5 minutes, measured in bytes per second. By summing the incoming byte counts from multiple interfaces, this metric helps administrators obtain an overview of the device's incoming traffic, supporting overall traffic monitoring and capacity planning.
    device_total_outgoing_traffic:
      name: Device Total Outgoing Traffic Rate
      desc: This metric represents the average rate of total bytes sent by the entire device over the past 5 minutes, measured in bytes per second. By summing the outgoing byte counts from multiple interfaces, this metric allows administrators to comprehensively assess the sending performance of the entire system, enabling more effective traffic management and optimization.
    device_flow_bytes_rate:
      name: Device Flow Traffic Rate
      desc: Total device traffic rate estimated from Flow records according to the active protocol metric contract, used for bandwidth trend and capacity monitoring.
    device_flow_packets_rate:
      name: Device Flow Packet Rate
      desc: Total device packet rate estimated from Flow records according to the active protocol metric contract, used to observe packet-level load and bursts.
    device_flow_in_bytes_rate:
      name: Device Flow Inbound Traffic Rate
      desc: Flow traffic rate estimated from records attributed to input-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_out_bytes_rate:
      name: Device Flow Outbound Traffic Rate
      desc: Flow traffic rate estimated from records attributed to output-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_in_packets_rate:
      name: Device Flow Inbound Packet Rate
      desc: Flow packet rate estimated from records attributed to input-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_out_packets_rate:
      name: Device Flow Outbound Packet Rate
      desc: Flow packet rate estimated from records attributed to output-side flow data; protocol-specific interface direction is shown in interface metrics.
    device_flow_avg_packet_size:
      name: Device Flow Average Packet Size
      desc: Average packet or sampled frame size from Flow records, useful for identifying small-packet bursts or large-packet transfer patterns.
    device_flow_effective_sampling_rate:
      name: Device Flow Effective Sampling Rate
      desc: Effective sampling rate used for Flow calculation. Device-reported fields are preferred; the asset fallback sampling rate is used when missing.
    device_flow_interface_bytes_rate:
      name: Interface Flow Traffic Rate
      desc: Flow traffic rate grouped by interface and direction, used to locate interface-level traffic hotspots.
    device_flow_interface_packets_rate:
