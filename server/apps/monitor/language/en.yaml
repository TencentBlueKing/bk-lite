    ipmi_chassis_power_state:
      name: Power State
      desc: The power state indicator is used to monitor if the device is powered on. Its value can indicate whether the power is on or off. It is mainly used for remote management and monitoring of the device's power state.
    ipmi_fan_speed_rpm:
      name: Fan Speed
      desc: The fan speed, measured in revolutions per minute (RPM), monitors the operational status of the device fans. Efficient fan operation is key to maintaining device temperature. It helps prevent overheating and ensures the device's stable long-term operation.
    ipmi_temperature_celsius:
      name: Temperature
      desc: The temperature indicator measured in degrees Celsius monitors the internal temperature of the device. Monitoring temperature prevents heat accumulation and avoids device overheating. It is crucial for maintaining system stability and longevity.
    ipmi_voltage_volts:
      name: Voltage
      desc: The voltage indicator measured in volts monitors the voltage levels of different power rails within the device. Stable voltage supply is crucial for the reliability of the device. This indicator helps quickly identify electrical issues, ensuring normal operation.
    ipmi_power_watts:
      name: Power Consumption
      desc: The power indicator is measured in watts and reflects the current power consumption of the device. This indicator helps evaluate the device's energy efficiency and power consumption trends. It facilitates the implementation of energy-saving policies and resource optimization.
  Loadbalance:
    device_temperature_celsius:
      name: Device Temperature
      desc: Device hardware temperature sensor reading in degrees Celsius. Abnormally high values may indicate fan failure, poor airflow, or high ambient temperature.
    device_fan_state:
      name: Fan Status
      desc: Operational state of each cooling fan (enum). A non-normal state indicates a cooling fault that can quickly lead to overheating.
    device_psu_state:
      name: Power Supply Status
      desc: Operational state of each power supply unit (enum). A non-normal state indicates a power redundancy or hardware fault and should be remediated promptly.
    device_memory_free:
      name: Memory Free
      desc: Number of free physical memory bytes currently available on the device. A persistently low value indicates memory pressure.
    device_cpu_usage:
      name: CPU Usage
      desc: This metric reports the overall CPU utilization of the F5 BIG-IP load balancer (F5-BIGIP-SYSTEM-MIB sysGlobalHostCpuUsageRatio5s, 5-second sample). Sustained high usage indicates heavy traffic-processing or SSL-offload load.
    device_memory_total:
      name: Total Memory
      desc: This metric reports the total physical memory capacity of the F5 BIG-IP (F5-BIGIP-SYSTEM-MIB sysStatMemoryTotal) in bytes.
    device_memory_used:
      name: Used Memory
      desc: This metric reports the amount of memory currently used by the F5 BIG-IP (F5-BIGIP-SYSTEM-MIB sysStatMemoryUsed) in bytes.
    device_memory_usage:
      name: Memory Usage
      desc: This metric reports the overall memory utilization of the F5 BIG-IP, computed as used/total (100*used/total). Sustained high usage may be caused by oversized connection tables or memory leaks.
    lb_current_connections:
      name: Current Connections
      desc: This metric reports the number of active client connections currently tracked by the F5 BIG-IP (F5-BIGIP-SYSTEM-MIB sysStatClientCurConns). A rapidly rising count can indicate a traffic flood or connection-table pressure.
    interface_ifHCInOctets:
      name: Interface Incoming Traffic Rate (HC)
      desc: This metric indicates the average rate of bytes received over the past 5 minutes, based on the 64-bit ifHCInOctets counter which does not wrap on high-speed interfaces.
    interface_ifHCOutOctets:
      name: Interface Outgoing Traffic Rate (HC)
      desc: This metric calculates the average rate of bytes sent over the past 5 minutes, based on the 64-bit ifHCOutOctets counter which does not wrap on high-speed interfaces.
