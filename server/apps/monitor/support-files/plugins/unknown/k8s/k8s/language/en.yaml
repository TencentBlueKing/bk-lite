K8S:
  name: K8s
  desc: Leveraging Kubernetes' active monitoring data reporting capability, collect
    the status and health of the Kubernetes cluster, including performance metrics
    for nodes, containers, and pods.
monitor_object:
  Cluster: Cluster
  Pod: Pod
  Node: Node
monitor_object_type:
  K8S: K8S
monitor_object_metric_group:
  Cluster:
    Counts: Counts
    Utilization: Utilization
  Pod:
    Status: Status
    CPU: CPU
    Memory: Memory
    Disk: Disk
    Network: Network
  Node:
    Status: Status
    CPU: CPU
    Memory: Memory
    Disk: Disk
    Disk IO: Disk I/O
monitor_object_metric:
  Cluster:
    cluster_pod_count:
      name: Pod Count
      desc: Total number of Pods in the Kubernetes cluster.
    cluster_node_count:
      name: Node Count
      desc: Total number of nodes in the Kubernetes cluster.
    cluster_memory_utilization:
      name: Memory Utilization
      desc: Percentage of used memory across all nodes in the Kubernetes cluster.
    cluster_disk_utilization:
      name: Disk Utilization
      desc: Overall disk utilization of the Kubernetes cluster.
  Pod:
    pod_status_phase:
      name: Pod Phase
      desc: Current lifecycle phase of the Pod.
    pod_container_restarts_total:
      name: Container Restart Count
      desc: Total number of container restarts in the Pod since startup.
    pod_cpu_utilization:
      name: CPU Utilization
      desc: Percentage of the configured CPU limit used by the Pod.
    pod_memory_utilization:
      name: Memory Utilization
      desc: Percentage of the configured memory limit used by the Pod.
    pod_io_writes_rate:
      name: Disk Write Operations
      desc: Disk write operations per second generated by the Pod.
    pod_io_reads_rate:
      name: Disk Read Operations
      desc: Disk read operations per second generated by the Pod.
    pod_network_in_rate:
      name: Network Inbound Traffic
      desc: Inbound network traffic rate received by the Pod.
    pod_network_out_rate:
      name: Network Outbound Traffic
      desc: Outbound network traffic rate sent by the Pod.
  Node:
    node_status_condition:
      name: Node Status
      desc: Current operational condition of the node.
    node_cpu_utilization:
      name: CPU Utilization
      desc: Percentage of available CPU resources used by the node.
    node_cpu_iowait_rate:
      name: CPU I/O Wait
      desc: Percentage of CPU time spent waiting for I/O operations.
    node_cpu_system_rate:
      name: CPU System Usage
      desc: Percentage of CPU resources consumed by kernel processes.
    node_cpu_user_rate:
      name: CPU User Usage
      desc: Percentage of CPU resources consumed by user processes.
    node_memory_utilization:
      name: Memory Utilization
      desc: Percentage of memory used by applications on the node.
    node_memory_available:
      name: Available Memory
      desc: Memory available to applications without material performance degradation.
    node_memory_swap_free:
      name: Free Swap Space
      desc: Free swap space available on the node.
    node_memory_cached:
      name: Cached Memory
      desc: Memory used for file caching that can be reclaimed when needed.
    node_memory_shared:
      name: Shared Memory
      desc: Memory shared among multiple processes.
    node_memory_buffered:
      name: Buffered Memory
      desc: Memory used to buffer block-device I/O operations.
    node_disk_usage_rate:
      name: Disk Usage
      desc: Percentage of disk space in use.
    node_disk_free:
      name: Free Disk Space
      desc: Free space available on the disk or filesystem.
    node_disk_inodes_used_percent:
      name: Inode Usage
      desc: Percentage of filesystem inodes in use.
    node_diskio_io_util:
      name: Disk I/O Utilization
      desc: Proportion of time the disk device is busy processing I/O.
    node_diskio_writes_rate:
      name: Disk Write Operations
      desc: Number of disk write operations completed per second.
    node_diskio_write_bytes_rate:
      name: Disk Write Throughput
      desc: Amount of data written to disk per unit time.
    node_disk_write_latency:
      name: Disk Write Latency
      desc: Average latency of disk write operations.
    node_diskio_reads_rate:
      name: Disk Read Operations
      desc: Number of disk read operations completed per second.
    node_diskio_read_bytes_rate:
      name: Disk Read Throughput
      desc: Amount of data read from disk per unit time.
    node_disk_read_latency:
      name: Disk Read Latency
      desc: Average latency of disk read operations.
