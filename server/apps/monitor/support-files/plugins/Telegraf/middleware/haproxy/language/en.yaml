Haproxy:
  name: Haproxy(Telegraf)
  desc: Based on the Telegraf haproxy input, periodically collects HAProxy frontend,
    backend, and server runtime data including sessions, queues, traffic, HTTP responses,
    errors, server health, and latency.
monitor_object:
  Haproxy: Haproxy
monitor_object_type:
  Middleware: Middleware
monitor_object_metric:
  Haproxy:
    haproxy_scur:
      name: Current Sessions
      desc: Number of active sessions currently being processed by this frontend/backend/server,
        reflecting real-time concurrency
    haproxy_smax:
      name: Max Sessions
      desc: Maximum number of concurrent sessions observed since startup, useful for
        capacity planning
    haproxy_slim:
      name: Session Limit
      desc: Configured session limit; current sessions approaching this value indicates
        risk of new connections being rejected
    haproxy_stot:
      name: Total Sessions
      desc: Cumulative number of sessions handled since startup, a monotonically increasing
        counter measuring overall workload
    haproxy_rate:
      name: Session Rate
      desc: Number of new sessions established per second over the last second, reflecting
        real-time connection pressure
    haproxy_rate_max:
      name: Max Session Rate
      desc: Highest per-second session establishment rate observed since startup,
        indicating peak load
    haproxy_qcur:
      name: Current Queued Requests
      desc: Number of requests currently queued waiting for an available backend server;
        sustained high values indicate backend saturation
    haproxy_qmax:
      name: Max Queued Requests
      desc: Maximum number of queued requests observed since startup, reflecting peak
        backend pressure
    haproxy_bin:
      name: Bytes In
      desc: Cumulative number of bytes received from clients since startup, measuring
        inbound traffic volume
    haproxy_bout:
      name: Bytes Out
      desc: Cumulative number of bytes sent to clients since startup, measuring outbound
        traffic volume
    haproxy_req_rate:
      name: HTTP Request Rate
      desc: Number of HTTP requests received per second over the last second, reflecting
        real-time request throughput
    haproxy_req_rate_max:
      name: Max HTTP Request Rate
      desc: Highest per-second HTTP request rate observed since startup, indicating
        peak request pressure
    haproxy_req_tot:
      name: Total HTTP Requests
      desc: Cumulative number of HTTP requests received since startup, a counter measuring
        overall request workload
    haproxy_hrsp_2xx:
      name: 2xx Responses
      desc: Cumulative number of HTTP 2xx (success) responses returned, reflecting
        normally served requests
    haproxy_hrsp_3xx:
      name: 3xx Responses
      desc: Cumulative number of HTTP 3xx (redirect) responses returned
    haproxy_hrsp_4xx:
      name: 4xx Responses
      desc: Cumulative number of HTTP 4xx (client error) responses returned; sustained
        growth may indicate client or auth issues
    haproxy_hrsp_5xx:
      name: 5xx Responses
      desc: Cumulative number of HTTP 5xx (server error) responses returned; growth
        usually indicates backend service faults
    haproxy_ereq:
      name: Request Errors
      desc: Cumulative number of request errors (e.g. invalid requests, client timeouts
        before request) since startup
    haproxy_econ:
      name: Connection Errors
      desc: Cumulative number of errors connecting to backend servers since startup;
        growth indicates backend connectivity problems
    haproxy_eresp:
      name: Response Errors
      desc: Cumulative number of response errors from backend servers since startup,
        including aborts and bad responses
    haproxy_dreq:
      name: Denied Requests
      desc: Cumulative number of requests denied by security ACL rules since startup
    haproxy_dresp:
      name: Denied Responses
      desc: Cumulative number of responses denied by security ACL rules since startup
    haproxy_wretr:
      name: Connection Retries
      desc: Cumulative number of times a connection to a backend server was retried
        since startup; high values indicate backend instability
    haproxy_wredis:
      name: Request Redispatches
      desc: Cumulative number of times a request was redispatched to another backend
        server since startup
    haproxy_act:
      name: Active Servers
      desc: Number of active (non-backup) servers currently up in this backend, reflecting
        available serving capacity
    haproxy_bck:
      name: Backup Servers
      desc: Number of backup servers currently up in this backend, available for failover
    haproxy_chkfail:
      name: Failed Health Checks
      desc: Cumulative number of failed health checks since startup; growth indicates
        an unstable or failing server
    haproxy_chkdown:
      name: Down Transitions
      desc: Cumulative number of UP-to-DOWN transitions since startup, reflecting
        how often the server became unavailable
    haproxy_downtime:
      name: Total Downtime
      desc: Cumulative total downtime in seconds since startup, reflecting accumulated
        unavailability of the server
    haproxy_qtime:
      name: Average Queue Time
      desc: Average time in milliseconds spent in the queue waiting for a free server,
        computed over the last 1024 requests
    haproxy_ctime:
      name: Average Connect Time
      desc: Average time in milliseconds to establish a connection to the backend
        server, computed over the last 1024 requests
    haproxy_rtime:
      name: Average Response Time
      desc: Average backend response time in milliseconds, computed over the last
        1024 requests; high values indicate slow backends
    haproxy_ttime:
      name: Average Total Time
      desc: Average total session time in milliseconds end to end, computed over the
        last 1024 requests
monitor_object_metric_group:
  Haproxy:
    Session: Session
    Queue: Queue
    Traffic: Traffic
    Request: Request
    Response: Response
    Error: Error
    Server: Server
    Latency: Latency
