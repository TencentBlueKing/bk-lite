RabbitMQ:
  name: RabbitMQ（Telegraf）
  desc: 通过Telegraf采集器定期收集RabbitMQ的运行状态、资源使用、消息流量和队列健康状况。
monitor_object:
  RabbitMQ: RabbitMQ
monitor_object_type:
  Middleware: 中间件
monitor_object_metric:
  RabbitMQ:
    rabbitmq_node_uptime:
      name: 节点运行时间
      desc: RabbitMQ 节点自启动以来的运行时间，反映节点稳定性
    rabbitmq_node_running:
      name: 节点运行状态
      desc: RabbitMQ 节点是否处于运行状态，1 表示运行中，0 表示已停止
    rabbitmq_overview_connections:
      name: 连接数
      desc: 活动的客户端连接数量，反映系统负载
    rabbitmq_overview_channels:
      name: 通道数
      desc: 打开的通道数量，反映消息流控制能力
    rabbitmq_overview_consumers:
      name: 消费者数量
      desc: 活动的消费者数量，反映消息消费能力
    rabbitmq_overview_queues:
      name: 队列数量
      desc: 已定义的队列数量，反映消息存储结构
    rabbitmq_overview_messages:
      name: 总消息数
      desc: 所有队列中的总消息数，反映消息积压情况
    rabbitmq_overview_messages_ready:
      name: 就绪消息数
      desc: 队列中待投递的就绪消息数量，反映待处理消息
    rabbitmq_overview_messages_unacked:
      name: 未确认消息数
      desc: 已投递但未确认的消息数量，反映消息处理延迟
    rabbitmq_overview_messages_published_rate:
      name: 消息发布速率
      desc: 向 RabbitMQ 发布消息的速率，反映消息生产量
    rabbitmq_node_run_queue:
      name: 运行队列长度
      desc: Erlang 运行队列长度，反映系统 CPU 负载和调度延迟
    rabbitmq_node_mnesia_disk_tx_count_rate:
      name: Mnesia 磁盘事务速率
      desc: Mnesia 数据库磁盘事务速率，反映数据持久化活动强度
    rabbitmq_node_mem_used:
      name: 已用内存
      desc: RabbitMQ 节点当前使用的内存，反映内存资源消耗
    rabbitmq_node_mem_limit:
      name: 内存限制
      desc: RabbitMQ 节点的内存限制，用于计算内存使用率
    rabbitmq_node_mem_alarm:
      name: 内存告警
      desc: 内存使用是否触发告警，1 表示告警，0 表示正常
    rabbitmq_node_disk_free:
      name: 可用磁盘空间
      desc: RabbitMQ 节点的可用磁盘剩余空间，反映存储容量
    rabbitmq_node_disk_free_alarm:
      name: 磁盘空间告警
      desc: 磁盘空间使用是否触发告警，1 表示告警，0 表示正常
    rabbitmq_node_fd_used:
      name: 已用文件描述符
      desc: RabbitMQ 节点当前使用的文件描述符数量，反映系统资源使用
    rabbitmq_node_sockets_used:
      name: 已用套接字数
      desc: RabbitMQ 节点当前使用的套接字数量，反映网络连接状况
    rabbitmq_node_proc_used:
      name: 已用进程数
      desc: RabbitMQ 节点当前使用的 Erlang 进程数量，反映系统进程负载
monitor_object_metric_group:
  RabbitMQ:
    Base: 基础信息
    Performance: 性能
    Resource: 资源
