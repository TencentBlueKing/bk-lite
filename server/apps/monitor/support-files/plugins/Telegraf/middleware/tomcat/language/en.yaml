Tomcat:
  name: Tomcat(Telegraf)
  desc: Through the Telegraf collector, regularly collect key performance metrics
    from Tomcat's connectors and JVM memory.
monitor_object:
  Tomcat: Tomcat
monitor_object_type:
  Middleware: Middleware
monitor_object_metric:
  Tomcat:
    tomcat_connector_request_count:
      name: Total Requests Processed
      desc: Total number of HTTP requests processed by connector, reflecting overall
        workload
    tomcat_connector_error_count:
      name: Total Error Requests
      desc: Total number of error requests during processing, indicating service reliability
        issues
    tomcat_connector_bytes_received:
      name: Total Bytes Received
      desc: Total bytes received from clients by connector, reflecting network input
        traffic
    tomcat_connector_bytes_sent:
      name: Total Bytes Sent
      desc: Total bytes sent to clients by connector, reflecting network output traffic
    tomcat_connector_processing_time:
      name: Total Processing Time
      desc: Total time spent processing all requests by connector, reflecting processing
        performance
    tomcat_connector_max_time:
      name: Maximum Request Processing Time
      desc: Maximum time taken to process a single request by connector, indicating
        extreme performance cases
    tomcat_connector_current_thread_count:
      name: Current Thread Count
      desc: Total number of threads currently managed in connector thread pool, indicating
        resource allocation
    tomcat_connector_current_threads_busy:
      name: Busy Threads Count
      desc: Number of threads currently busy processing requests, indicating real-time
        load
    tomcat_connector_max_threads:
      name: Maximum Threads
      desc: Maximum number of threads allowed in connector thread pool, indicating
        concurrency capacity limit
    tomcat_jvm_memory_free:
      name: Free Memory Size
      desc: Current free space in JVM heap memory, indicating available memory capacity
    tomcat_jvm_memory_total:
      name: Total Allocated Memory
      desc: Total allocated space in JVM heap memory, indicating memory usage scale
    tomcat_jvm_memory_max:
      name: Maximum Available Memory
      desc: Maximum available space configured for JVM heap memory, indicating memory
        capacity limit
    tomcat_jvm_memorypool_used:
      name: Memory Pool Used
      desc: Current used memory size in specific JVM memory pool, indicating detailed
        memory allocation
    tomcat_jvm_memorypool_committed:
      name: Memory Pool Committed
      desc: Memory size committed to OS for specific JVM memory pool, indicating memory
        reservation
    tomcat_jvm_memorypool_max:
      name: Memory Pool Maximum
      desc: Maximum memory size allowed for specific JVM memory pool, indicating capacity
        limit
    tomcat_jvm_memorypool_init:
      name: Memory Pool Initial
      desc: Initial memory size allocated for specific JVM memory pool, indicating
        startup configuration
    tomcat_connector_request_count_rate:
      name: Request Processing Rate
      desc: Request processing rate per second calculated over 5-minute window, indicating
        real-time throughput
    tomcat_connector_error_count_rate:
      name: Error Request Rate
      desc: Error request rate per second calculated over 5-minute window, indicating
        service stability trend
    tomcat_connector_bytes_sent_rate:
      name: Data Sending Rate
      desc: Data sending rate per second calculated over 5-minute window, indicating
        network output traffic trend
    tomcat_connector_current_thread_utilization:
      name: Thread Pool Utilization
      desc: Percentage of busy threads relative to maximum threads, indicating thread
        resource utilization efficiency
monitor_object_metric_group:
  Tomcat:
    Connector: Connector
    JVM Memory: JVM Memory
    Memory Pool: Memory Pool
    Performance: Performance
