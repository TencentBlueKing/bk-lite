Transmission Alcoma SNMP:
  name: Alcoma（Telegraf）
  desc: 面向 Alcoma 传输设备的 SNMP 监控模板,可采集 每端口入向流量速率、每端口出向流量速率和运行时长。
monitor_object:
  Transmission: 传输设备
monitor_object_type:
  Network Device: 网络设备
monitor_object_metric:
  Transmission:
    snmp_uptime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间（来自 sysUpTime）。通过监测设备运行时间，网络管理员可以了解设备的稳定性与可靠性，识别潜在的重启或故障问题。
    interface_ifHCInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率（来自 64 位 IF-MIB ifHCInOctets 计数器，ifXTable），单位为字节每秒。64
        位计数器可避免 32 位 ifInOctets 在高速口上快速回绕，使流量速率更准确。
    interface_ifHCOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率（来自 64 位 IF-MIB ifHCOutOctets 计数器，ifXTable），单位为字节每秒。64
        位计数器可避免 32 位 ifOutOctets 在高速口上快速回绕，使流量速率更准确。
    device_total_incoming_traffic:
      name: 设备接收总流量速率
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率（按所有接口的 64 位 ifHCInOctets 汇总），单位为字节每秒。帮助管理员获取整个设备的接收流量情况，支持总体流量监控与容量规划。
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率（按所有接口的 64 位 ifHCOutOctets 汇总），单位为字节每秒。帮助管理员评估整个系统的发送性能，进行更有效的流量管理与优化。
    device_cpu_usage:
      name: CPU 使用率
      desc: 传输设备的整体 CPU 使用率，以 0-100 百分比直接上报。持续偏高可能表示无线回传业务压力、控制平面负载或异常流量。
    device_memory_usage:
      name: 内存使用率
      desc: 传输设备的整体内存使用率，以 0-100 百分比直接上报。持续偏高可能表示控制面资源压力或设备服务不稳定。
    device_temperature_celsius:
      name: 温度
      desc: 传输设备的 CPU 或机箱温度，单位为摄氏度。温度偏高可能表示散热异常、环境温度过高或硬件过载。
    device_fan_state:
      name: 风扇状态
      desc: 传输设备各散热风扇或风扇控制器的运行状态。非正常状态表示散热模块异常、离线或通信故障，可能导致设备过热。
    device_psu_state:
      name: 电源状态
      desc: 传输设备各电源模块的运行状态。非正常状态表示电源离线、无输入、过温、硬件故障或告警，需及时排查。
monitor_object_metric_group:
  Transmission:
    Base: 基础
    Traffic: 流量
    CPU: CPU
    Memory: 内存
    Temperature: 温度
    Hardware Status: 硬件状态
