NetworkService EfficientIP SNMP:
  name: EfficientIP（Telegraf）
  desc: 面向 EfficientIP 网络服务设备的 SNMP 监控模板,可采集 每端口入向流量速率、每端口出向流量速率和运行时长。
monitor_object:
  NetworkService: 网络服务
monitor_object_type:
  Network Device: 网络设备
monitor_object_metric:
  NetworkService:
    snmp_uptime:
      name: 系统运行时间
      desc: 该指标表示设备自上次启动以来的运行时间（来自 sysUpTime）。通过监测设备运行时间，网络管理员可以了解设备的稳定性与可靠性，识别潜在的重启或故障问题。
    interface_ifHCInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率（来自 64 位 IF-MIB ifHCInOctets 计数器，ifXTable），单位为字节每秒。64
        位计数器可避免 32 位 ifInOctets 在高速口上快速回绕，使流量速率更准确。
    interface_ifHCOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率（来自 64 位 IF-MIB ifHCOutOctets 计数器，ifXTable），单位为字节每秒。64
        位计数器可避免 32 位 ifOutOctets 在高速口上快速回绕，使流量速率更准确。
    device_total_incoming_traffic:
      name: 设备接收总流量速率
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率（按所有接口的 64 位 ifHCInOctets 汇总），单位为字节每秒。帮助管理员获取整个设备的接收流量情况，支持总体流量监控与容量规划。
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率（按所有接口的 64 位 ifHCOutOctets 汇总），单位为字节每秒。帮助管理员评估整个系统的发送性能，进行更有效的流量管理与优化。
    device_cpu_usage:
      name: CPU 使用率
      desc: 网络服务设备的整机 CPU 使用率（设备直接上报的百分比）。持续偏高表示节点的流量转发与过滤处理已接近处理能力上限。
    device_memory_usage:
      name: 内存使用率
      desc: 网络服务设备的系统内存使用率（设备直接上报的百分比）。持续偏高可能表示设备上的映射/流表存在内存压力。
    device_temperature_celsius:
      name: 温度
      desc: 网络服务设备的温度读数，单位为摄氏度。温度偏高可能表示散热或环境温度风险。
    network_service_dns_service_state:
      name: DNS 服务状态
      desc: DNS 服务运行状态，统一归一为 1=正常、2=异常。
    network_service_dhcp_service_state:
      name: DHCP 服务状态
      desc: DHCP 服务运行状态，统一归一为 1=正常、2=异常。
    network_service_ntp_service_state:
      name: NTP 服务状态
      desc: NTP 服务运行状态，统一归一为 1=正常、2=异常。
    network_service_zwp_service_state:
      name: ZWP 服务状态
      desc: ZWP 服务运行状态，统一归一为 1=正常、2=异常。
    network_service_tftp_service_state:
      name: TFTP 服务状态
      desc: TFTP 服务运行状态，统一归一为 1=正常、2=异常。
    network_service_virtual_server_state:
      name: 虚拟服务状态
      desc: 虚拟服务可用性状态，统一归一为 1=正常、2=异常。
    network_service_node_state:
      name: 节点状态
      desc: 服务节点可用性状态，统一归一为 1=正常、2=异常。
    network_service_pool_state:
      name: 池状态
      desc: 服务池可用性状态，统一归一为 1=正常、2=异常。
    network_service_pool_member_state:
      name: 池成员状态
      desc: 服务池成员可用性状态，统一归一为 1=正常、2=异常。
    network_service_spectracom_sync_state:
      name: Spectracom 同步状态
      desc: Spectracom xSync 系统同步状态，统一归一为 1=正常、2=异常。
    network_service_spectracom_dc_power_state:
      name: Spectracom DC 电源状态
      desc: Spectracom DC 电源输入状态，统一归一为 1=正常、2=异常。
    network_service_spectracom_minor_alarm_state:
      name: Spectracom 次告警状态
      desc: Spectracom 次告警状态，统一归一为 1=正常、2=异常。
    network_service_spectracom_major_alarm_state:
      name: Spectracom 主告警状态
      desc: Spectracom 主告警状态，统一归一为 1=正常、2=异常。
    network_service_spectracom_ntp_state:
      name: Spectracom NTP 状态
      desc: Spectracom NTP 当前模式，统一归一为 1=正常、2=异常。
    network_service_spectracom_ntp_stratum:
      name: Spectracom NTP 层级
      desc: Spectracom NTP 当前 stratum 层级。
monitor_object_metric_group:
  NetworkService:
    Base: 基础
    Traffic: 流量
    NetworkService: 网络服务
