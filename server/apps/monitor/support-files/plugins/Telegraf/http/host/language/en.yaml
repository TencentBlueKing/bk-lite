Host Remote:
  name: Host Remote(Telegraf)
  desc: Through Telegraf combined with Stargazer remote capabilities, collect host
    CPU, memory, disk, and network metrics over SSH/WinRM without installing an agent.
monitor_object:
  Host: Host
monitor_object_type:
  OS: Host Resource
monitor_object_metric:
  Host:
    cpu_usage_total:
      name: CPU Usage
      desc: Reflects the overall CPU utilization of the host, representing the proportion
        of non-idle CPU time. Sustained high values usually indicate CPU resource
        pressure or bottlenecks.
    cpu_usage_core:
      name: CPU Core Usage
      desc: Describes the utilization of individual CPU cores, enabling analysis of
        load distribution and identification of imbalanced or hot cores.
    cpu_usage_iowait_total:
      name: CPU IOWait Rate
      desc: Indicates the proportion of CPU time spent waiting for I/O operations
        to complete, commonly used to identify disk or I/O performance constraints.
    cpu_usage_system_total:
      name: CPU System Usage
      desc: Represents the percentage of CPU time spent executing kernel-level tasks.
        Abnormally high values may indicate increased system overhead or frequent
        system calls.
    cpu_usage_user_total:
      name: CPU User Usage
      desc: Indicates the percentage of CPU time spent executing user-space application
        logic, commonly used to evaluate application CPU consumption.
    cpu_usage_irq_total:
      name: CPU IRQ Usage
      desc: Represents the percentage of CPU time spent handling hardware interrupts,
        helpful for diagnosing hardware or driver-related performance issues.
    cpu_usage_steal_total:
      name: CPU Steal Rate
      desc: Indicates the proportion of CPU time stolen by the hypervisor in virtualized
        environments, used to assess CPU contention.
    system_load1:
      name: 1 Minute Average Load
      desc: Represents the average system load over the last 1 minute, primarily used
        to observe short-term load fluctuations.
    system_load5:
      name: 5 Minute Average Load
      desc: Represents the average system load over the last 5 minutes, useful for
        analyzing short-term load trends.
    system_load15:
      name: 15 Minute Average Load
      desc: Represents the average system load over the last 15 minutes, commonly
        used to evaluate long-term load stability.
    system_uptime:
      name: System Uptime
      desc: Represents how long the host has been running since the last boot, in
        seconds, useful for observing stability and detecting unexpected restarts.
    host_cpu_core_count:
      name: CPU Core Count
      desc: Represents the number of logical CPU cores available on the host, used
        to evaluate compute capacity and resource baseline.
    host_cpu_load_1m:
      name: 1 Minute Average Load
      desc: Represents the host's average system load over the last 1 minute, used
        to observe instantaneous runtime pressure.
    host_cpu_load_5m:
      name: 5 Minute Average Load
      desc: Represents the host's average system load over the last 5 minutes, used
        to evaluate short-term load trends.
    host_cpu_load_15m:
      name: 15 Minute Average Load
      desc: Represents the host's average system load over the last 15 minutes, used
        to determine whether the system remains under sustained load.
    diskio_io_util:
      name: Disk I/O Usage
      desc: Indicates the proportion of time a disk device is busy handling I/O operations.
        Sustained high values usually suggest disk I/O saturation.
    diskio_writes_rate:
      name: Disk Write IOPS
      desc: Represents the number of disk write operations completed per second, measuring
        write I/O intensity and concurrency.
    diskio_writes_total:
      name: Disk Writes
      desc: Represents the cumulative number of write operations completed by the
        disk device, useful for analyzing total write load and trends.
    diskio_write_bytes_rate:
      name: Disk Write Rate
      desc: Indicates the amount of data written to disk per unit time, used to evaluate
        disk write throughput.
    diskio_write_bytes_total:
      name: Disk Written Bytes
      desc: Represents the cumulative number of bytes written by the disk device,
        useful for analyzing write traffic volume.
    disk_write_latency:
      name: Disk Write Latency
      desc: Represents the average latency of disk write operations, used to analyze
        disk write performance and responsiveness.
    diskio_reads_rate:
      name: Disk Read IOPS
      desc: Represents the number of disk read operations completed per second, measuring
        read I/O concurrency and intensity.
    diskio_reads_total:
      name: Disk Reads
      desc: Represents the cumulative number of read operations completed by the disk
        device, useful for analyzing total read load and trends.
    diskio_read_bytes_rate:
      name: Disk Read Rate
      desc: Indicates the amount of data read from disk per unit time, used to evaluate
        disk read throughput.
    diskio_read_bytes_total:
      name: Disk Read Bytes
      desc: Represents the cumulative number of bytes read by the disk device, useful
        for analyzing read traffic volume.
    disk_read_latency:
      name: Disk Read Latency
      desc: Represents the average latency of disk read operations, used to analyze
        disk read performance and access delay.
    disk_total:
      name: Disk Total
      desc: Represents the total capacity of a disk or filesystem, used for capacity
        planning and resource management.
    host_disk_total_bytes:
      name: Filesystem Total Capacity
      desc: Represents the total capacity of the filesystem for a specific mount point,
        used to evaluate per-mount capacity baselines.
    disk_free:
      name: Disk Free
      desc: Represents the currently available free space of a disk or filesystem,
        used to monitor capacity risks.
    host_disk_used_bytes:
      name: Filesystem Used Capacity
      desc: Represents the amount of disk space currently consumed on a specific mount
        point, used to analyze filesystem space usage.
    disk_used_percent:
      name: Disk Usage
      desc: Represents the percentage of disk space that has been consumed, a core
        metric for disk capacity monitoring.
    disk_inodes_used_percent:
      name: Inode Usage
      desc: Represents the percentage of inode usage in a filesystem, helping prevent
        failures caused by inode exhaustion.
    processes_running:
      name: Running Process
      desc: Represents the number of processes currently in a running state, reflecting
        system concurrency.
    processes_blocked:
      name: Blocked Process
      desc: Represents the number of processes blocked due to I/O or resource contention,
        helping identify system bottlenecks.
    processes_zombies:
      name: Zombie Process
      desc: Represents the number of zombie processes that have exited but remain
        unreaped, potentially indicating process management issues.
    processes_sleeping:
      name: Sleeping Process
      desc: Represents the number of processes currently in a sleeping or waiting
        state.
    mem_total:
      name: Total Memory
      desc: Represents the total amount of physical memory available on the system,
        serving as a baseline for memory evaluation.
    host_mem_total_bytes:
      name: Total Physical Memory
      desc: Represents the total physical memory capacity of the host, used to evaluate
        the upper bound of available memory resources.
    host_mem_used_bytes:
      name: Used Physical Memory
      desc: Represents the amount of physical memory currently consumed on the host,
        used to measure actual memory usage.
    mem_available:
      name: Available Memory
      desc: Represents the amount of memory available for applications without causing
        significant performance degradation.
    host_mem_available_bytes:
      name: Available Physical Memory
      desc: Represents the amount of physical memory currently available for workloads
        or the operating system, used to judge remaining memory headroom.
    mem_used_percent:
      name: Memory Usage
      desc: Represents the percentage of memory currently in use, indicating overall
        memory pressure.
    host_mem_swap_total_bytes:
      name: Total Swap Space
      desc: Represents the total swap capacity available on the host, used to evaluate
        buffering capacity under memory pressure.
    host_mem_swap_used_bytes:
      name: Used Swap Space
      desc: Represents the amount of swap space currently in use on the host, used
        to observe paging and memory reclamation pressure.
    mem_swap_free:
      name: Swap Free Memory
      desc: Represents the amount of free swap space available, used to monitor buffering
        capacity under memory pressure.
    mem_cached:
      name: Cached Memory
      desc: Represents the amount of memory used for file caching, which can be reclaimed
        when necessary.
    mem_shared:
      name: Shared Memory
      desc: Represents the amount of memory shared among multiple processes.
    mem_buffered:
      name: Buffered Memory
      desc: Represents the amount of memory used for buffering block device I/O operations.
    net_packets_recv_rate:
      name: Network Receive Packet Rate
      desc: Represents the number of packets received per unit time on a network interface,
        reflecting packet-level traffic.
    net_packets_recv_total:
      name: Network Received Packets
      desc: Represents the cumulative number of packets received on a network interface,
        useful for analyzing inbound traffic volume.
    net_packets_sent_rate:
      name: Network Send Packet Rate
      desc: Represents the number of packets sent per unit time on a network interface.
    net_packets_sent_total:
      name: Network Sent Packets
      desc: Represents the cumulative number of packets sent on a network interface,
        useful for analyzing outbound traffic volume.
    net_bytes_recv_rate:
      name: Network Receive Throughput Rate
      desc: Represents the amount of data received per unit time on a network interface,
        used to evaluate inbound bandwidth utilization.
    host_net_rx_bytes:
      name: Network Received Bytes
      desc: Represents the cumulative number of bytes received on a specific network
        interface, used to analyze inbound traffic volume.
    net_bytes_sent_rate:
      name: Network Send Throughput Rate
      desc: Represents the amount of data sent per unit time on a network interface,
        used to evaluate outbound bandwidth utilization.
    host_net_tx_bytes:
      name: Network Transmitted Bytes
      desc: Represents the cumulative number of bytes transmitted on a specific network
        interface, used to analyze outbound traffic volume.
    net_err_in_rate:
      name: Network Receive Error Rate
      desc: Represents the number of errored packets received per unit time, used
        to monitor network quality.
    host_net_rx_errors:
      name: Network Receive Errors
      desc: Represents the cumulative receive error count on a specific network interface,
        useful for identifying link quality or driver issues.
    net_err_out_rate:
      name: Network Send Error Rate
      desc: Represents the number of errored packets sent per unit time on a network
        interface.
    host_net_tx_errors:
      name: Network Transmit Errors
      desc: Represents the cumulative transmit error count on a specific network interface,
        useful for troubleshooting outbound network anomalies or device faults.
    net_drop_in_rate:
      name: Network Receive Drop Rate
      desc: Represents the number of incoming packets dropped per unit time, indicating
        congestion or abnormal conditions.
    net_drop_in_total:
      name: Network Receive Drops
      desc: Represents the cumulative number of incoming packets dropped on a network
        interface, useful for locating congestion, buffer pressure, or driver anomalies.
    net_drop_out_rate:
      name: Network Send Drop Rate
      desc: Represents the number of outgoing packets dropped per unit time on a network
        interface.
    net_drop_out_total:
      name: Network Send Drops
      desc: Represents the cumulative number of outgoing packets dropped on a network
        interface, useful for troubleshooting outbound network issues.
    nvidia_smi_memory_total:
      name: GPU Memory Total
      desc: Represents the total available memory capacity of the GPU, serving as
        a baseline GPU resource metric.
    nvidia_smi_memory_free:
      name: GPU Memory Free
      desc: Represents the amount of free GPU memory currently available for allocation.
    nvidia_smi_utilization_memory:
      name: GPU Memory Utilization
      desc: Represents the percentage of GPU memory currently in use, indicating GPU
        memory pressure.
    nvidia_smi_power_draw:
      name: GPU Power Draw
      desc: Represents the current power consumption of the GPU, used to monitor energy
        usage and operating status.
    nvidia_smi_temperature_gpu:
      name: GPU Core Temperature
      desc: Represents the current core temperature of the GPU, used to monitor thermal
        conditions and cooling health.
    nvidia_smi_fan_speed_avg:
      name: GPU Fan Speed
      desc: Represents the average GPU fan speed as a percentage, used to assess cooling
        behavior and hardware status.
monitor_object_metric_group:
  Host:
    CPU: CPU
    System: System
    Disk IO: Disk I/O
    Disk: Disk
    Process: Process
    Processes: Processes
    Memory: Memory
    Net: Net
    Network: Network
    Nvidia GPU: Nvidia GPU
