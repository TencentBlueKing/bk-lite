Hardware Server IPMI:
  name: Physical Server IPMI General(Telegraf)
  desc: Generic IPMI monitoring for chassis, PSU, CPU, memory, disk, RAID, and fan
    components in physical servers.
monitor_object:
  Hardware Server: Hardware Server
monitor_object_type:
  Hardware Device: Hardware Device
monitor_object_metric:
  Hardware Server:
    snmp_uptime:
      name: System Uptime
      desc: This metric indicates the uptime of the device since the last restart.
        By monitoring the uptime, network administrators can understand the stability
        and reliability of the device and identify potential reboot or failure issues.
    interface_ifAdminStatus:
      name: Interface Admin Status
      desc: This metric indicates the administrative status of the network switch
        interface. It serves to indicate whether the interface is enabled (up) or
        disabled (down) by an administrator, along with other states such as testing
        or not present. This information is vital for network management and troubleshooting.
    interface_ifOperStatus:
      name: Interface Oper Status
      desc: This metric reflects the actual operational status of the network switch
        interface, indicating whether the interface is operational. Unlike the administrative
        status, the operational status shows whether the interface can successfully
        receive and send traffic, which is crucial for monitoring network health.
    interface_ifSpeed:
      name: Interface Bandwidth
      desc: This metric indicates the maximum data transmission speed supported by
        the network interface, measured in bits per second. Understanding the maximum
        speed of the interface helps administrators optimize traffic and utilize network
        resources effectively.
    interface_ifInErrors:
      name: Incoming Errors Rate
      desc: This metric calculates the average rate of incoming error packets over
        the past 5 minutes, measured in packets per second. Monitoring incoming errors
        allows administrators to detect potential issues, such as physical connection
        faults or configuration errors, in a timely manner.
    interface_ifOutErrors:
      name: Outgoing Errors Rate
      desc: This metric calculates the average rate of outgoing error packets over
        the past 5 minutes, measured in packets per second. Monitoring outgoing errors
        is essential for identifying transmission issues and ensuring data integrity.
    interface_ifInDiscards:
      name: Incoming Discards Rate
      desc: This metric represents the average rate of incoming discarded packets
        over the past 5 minutes, measured in packets per second. Packet discards may
        indicate network congestion or resource shortages, and monitoring this metric
        can help administrators optimize network performance.
    interface_ifOutDiscards:
      name: Outgoing Discards Rate
      desc: This metric calculates the average rate of outgoing discarded packets
        over the past 5 minutes, measured in packets per second. Monitoring outgoing
        discards can help identify network transmission issues and misconfigurations.
    interface_ifInUcastPkts:
      name: Incoming Unicast Packets Rate
      desc: This metric indicates the average rate of incoming unicast packets over
        the past 5 minutes, measured in packets per second. Monitoring unicast packets
        is crucial for assessing interface utilization and traffic load.
    interface_ifOutUcastPkts:
      name: Outgoing Unicast Packets Rate
      desc: This metric calculates the average rate of outgoing unicast packets over
        the past 5 minutes, measured in packets per second. By monitoring the number
        of unicast packets, administrators can assess the transmission performance
        of the interface and the usage of traffic.
    interface_ifInOctets:
      name: Interface Incoming Traffic Rate
      desc: This metric indicates the average rate of bytes received over the past
        5 minutes, measured in bytes per second. Monitoring byte traffic helps evaluate
        the load on the interface and bandwidth usage.
    interface_ifOutOctets:
      name: Interface Outgoing Traffic Rate
      desc: This metric calculates the average rate of bytes sent over the past 5
        minutes, measured in bytes per second. Monitoring outgoing traffic is crucial
        for ensuring data transmission quality and optimizing network performance.
    device_total_incoming_traffic:
      name: Device Total Incoming Traffic Rate
      desc: This metric indicates the average rate of total bytes received by the
        entire device over the past 5 minutes, measured in bytes per second. By summing
        the incoming byte counts from multiple interfaces, this metric helps administrators
        obtain an overview of the device's incoming traffic, supporting overall traffic
        monitoring and capacity planning.
    device_total_outgoing_traffic:
      name: Device Total Outgoing Traffic Rate
      desc: This metric represents the average rate of total bytes sent by the entire
        device over the past 5 minutes, measured in bytes per second. By summing the
        outgoing byte counts from multiple interfaces, this metric allows administrators
        to comprehensively assess the sending performance of the entire system, enabling
        more effective traffic management and optimization.
    ipmi_chassis_power_state:
      name: Power State
      desc: The power state indicator is used to monitor if the device is powered
        on. Its value can indicate whether the power is on or off. It is mainly used
        for remote management and monitoring of the device's power state.
    ipmi_fan_speed_rpm:
      name: Fan Speed
      desc: The fan speed, measured in revolutions per minute (RPM), monitors the
        operational status of the device fans. Efficient fan operation is key to maintaining
        device temperature. It helps prevent overheating and ensures the device's
        stable long-term operation.
    ipmi_temperature_celsius:
      name: Temperature
      desc: The temperature indicator measured in degrees Celsius monitors the internal
        temperature of the device. Monitoring temperature prevents heat accumulation
        and avoids device overheating. It is crucial for maintaining system stability
        and longevity.
    ipmi_voltage_volts:
      name: Voltage
      desc: The voltage indicator measured in volts monitors the voltage levels of
        different power rails within the device. Stable voltage supply is crucial
        for the reliability of the device. This indicator helps quickly identify electrical
        issues, ensuring normal operation.
    ipmi_power_watts:
      name: Power Consumption
      desc: The power indicator is measured in watts and reflects the current power
        consumption of the device. This indicator helps evaluate the device's energy
        efficiency and power consumption trends. It facilitates the implementation
        of energy-saving policies and resource optimization.
    ipmi_chassis_power_watts: {name: Chassis Power, desc: Current chassis power consumption.}
    ipmi_chassis_temperature_celsius: {name: Chassis Temperature, desc: Chassis inlet, exhaust, or ambient temperature.}
    ipmi_chassis_airflow_cfm: {name: Chassis Airflow, desc: Chassis airflow in CFM.}
    ipmi_psu_status: {name: PSU Status, desc: Health of each independently identified power supply.}
    ipmi_psu_state: {name: PSU State, desc: Normalized operating state of each power supply.}
    ipmi_psu_raw_state_code: {name: PSU Raw State Code, desc: Original PSU state code retained for troubleshooting.}
    ipmi_psu_temperature_celsius: {name: PSU Temperature, desc: Temperature sensors associated with each power supply.}
    ipmi_psu_power_watts: {name: PSU Power, desc: Input or output power of each power supply.}
    ipmi_psu_voltage_volts: {name: PSU Voltage, desc: Input or output voltage of each power supply.}
    ipmi_psu_fan_speed_rpm: {name: PSU Fan Speed, desc: Rotational speed of each power supply fan.}
    ipmi_cpu_status: {name: CPU Status, desc: Health of each CPU socket.}
    ipmi_cpu_state: {name: CPU State, desc: Normalized operating state of each CPU socket.}
    ipmi_cpu_raw_state_code: {name: CPU Raw State Code, desc: Original CPU state code retained for troubleshooting.}
    ipmi_cpu_temperature_celsius: {name: CPU Temperature, desc: CPU package or voltage-regulator temperature.}
    ipmi_cpu_power_watts: {name: CPU Power, desc: CPU power consumption.}
    ipmi_cpu_voltage_volts: {name: CPU Voltage, desc: Voltage rails associated with each CPU.}
    ipmi_cpu_utilization_percent: {name: CPU Utilization, desc: CPU utilization exposed by the BMC.}
    ipmi_memory_status: {name: Memory Status, desc: Health of each identifiable memory module or channel.}
    ipmi_memory_state: {name: Memory State, desc: Normalized presence state of each memory module or channel.}
    ipmi_memory_raw_state_code: {name: Memory Raw State Code, desc: Original memory state code retained for troubleshooting.}
    ipmi_memory_temperature_celsius: {name: Memory Temperature, desc: Temperature of each memory module or channel.}
    ipmi_memory_power_watts: {name: Memory Power, desc: Aggregate memory power exposed by the BMC.}
    ipmi_disk_status: {name: Disk Status, desc: Health of each disk slot.}
    ipmi_disk_state: {name: Disk State, desc: Normalized operating state of each disk slot.}
    ipmi_disk_raw_state_code: {name: Disk Raw State Code, desc: Original vendor disk state code retained for troubleshooting.}
    ipmi_disk_power_watts: {name: Disk Power, desc: Front, rear, or aggregate disk power consumption.}
    ipmi_raid_status: {name: RAID Controller Status, desc: Health of each RAID controller.}
    ipmi_raid_state: {name: RAID Controller State, desc: Normalized operating state of each RAID controller.}
    ipmi_raid_raw_state_code: {name: RAID Raw State Code, desc: Original RAID controller state code retained for troubleshooting.}
    ipmi_raid_temperature_celsius: {name: RAID Controller Temperature, desc: Temperature of each RAID controller.}
    ipmi_raid_battery_temperature_celsius: {name: RAID Battery Temperature, desc: Temperature of a RAID battery or BBU.}
    ipmi_fan_status: {name: Fan Status, desc: Health of each individually identified fan.}
    ipmi_fan_state: {name: Fan State, desc: Normalized presence state of each fan.}
    ipmi_fan_raw_state_code: {name: Fan Raw State Code, desc: Original fan state code retained for troubleshooting.}
    ipmi_fan_component_speed_rpm: {name: Component Fan Speed, desc: Normalized rotational speed of each individual fan component.}
    ipmi_fan_power_watts: {name: Fan Power, desc: Aggregate fan power exposed by the BMC.}
monitor_object_metric_group:
  Hardware Server:
    Chassis: Chassis
    PSU: PSU
    CPU: CPU
    Memory: Memory
    Disk: Disk
    RAID: RAID
    Fan: Fan
    Power: Power
    Status: Status
    Base: Base
    Packet Loss: Packet Loss
    Packet Error: Packet Error
    Packet: Packet
    Bandwidth: Bandwidth
    Environment: Environment
    Traffic: Traffic
