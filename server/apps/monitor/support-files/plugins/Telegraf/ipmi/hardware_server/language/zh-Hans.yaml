Hardware Server IPMI:
  name: 硬件服务器IPMI通用（Telegraf）
  desc: 面向物理服务器的通用 IPMI 监控模板，可按机箱、电源、CPU、内存、硬盘、RAID 和风扇采集部件指标。
monitor_object:
  Hardware Server: 硬件服务器
monitor_object_type:
  Hardware Device: 硬件设备
monitor_object_metric:
  Hardware Server:
    interface_ifInDiscards:
      name: 接收丢包速率
      desc: 此指标表示过去5分钟内接收到的丢弃包的平均速率，单位为每秒。丢包可能表示网络堵塞或资源不足，监控此指标可以帮助管理员优化网络性能。
    interface_ifAdminStatus:
      desc: 此指标表示网络交换机接口的管理状态。它用于指示接口是否被管理人员启用（up）或禁用（down），以及其他状态如测试或已删除等。这个信息对网络管理和故障排查非常重要。
      name: 接口管理状态
    interface_ifInUcastPkts:
      name: 接收单播数据包速率
      desc: 该指标表示过去5分钟内接收到的单播包的平均速率，单位为每秒。单播包的监测对于评估接口的使用情况及流量负载非常重要。
    interface_ifOutOctets:
      name: 接口发送流量速率
      desc: 该指标计算过去5分钟内发送的字节数的平均速率，单位为兆字节（MB）。监测发送流量对于确保数据传输质量和优化网络性能非常重要。
    device_total_incoming_traffic:
      desc: 此指标表示整个设备在过去5分钟内接收到的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的接收字节进行汇总计算，帮助管理员获取整个设备的接收流量情况，从而支持总体流量监控以及容量规划。
      name: 设备接收总流量速率
    interface_ifOutUcastPkts:
      desc: 此指标计算过去5分钟内发送的单播包的平均速率，单位为每秒。通过监测单播包的数量，管理员可以评估接口的传输性能以及流量的使用情况。
      name: 发送单播数据包速率
    interface_ifInOctets:
      name: 接口接收流量速率
      desc: 此指标表示过去5分钟内接收到的字节数的平均速率，转换为兆字节（MB）单位。监测字节流量有助于评估接口的负载及带宽使用情况。
    interface_ifInErrors:
      name: 接收错误数据包速率
      desc: 此指标计算过去5分钟内接收到的错误包的平均速率，单位为每秒。通过监测接收错误，管理员可以及时发现潜在的问题，例如物理连接故障或配置错误。
    ipmi_chassis_power_state:
      name: 电源状态
      desc: 电源状态指标，用于监测设备是否处于开机状态。其值可以表示电源开启或关闭状态。主要用于远程管理和监控设备的电源情况。
    ipmi_fan_speed_rpm:
      desc: 风扇转速指标以每分钟转数 (rpm) 表示，监测设备内风扇的工作状态。高效的风扇运作是维护设备温度的关键。有助于防止过热，确保设备长时间稳定运行。
      name: 风扇转速
    ipmi_temperature_celsius:
      desc: 温度指标以摄氏度 (Celsius) 为单位，监控设备内部温度。通过监测温度可以预防热量累积，防止设备过热。对于维持系统的稳定性和寿命非常关键。
      name: 温度
    interface_ifOperStatus:
      desc: 此指标反映网络交换机接口的实际运行状态，表明接口是否正在工作。与管理状态不同，运行状态指示接口是否能够成功接收和发送流量。这对监测网络健康至关重要。
      name: 接口操作状态
    device_total_outgoing_traffic:
      name: 设备发送总流量速率
      desc: 此指标表示整个设备在过去5分钟内发送的总字节流量的平均速率，单位为兆字节每秒（MB/s）。通过对多个接口的发送字节进行汇总，管理员可以全面评估整个系统的发送性能，从而进行更有效的流量管理和优化。
    interface_ifOutErrors:
      name: 发送错误数据包速率
      desc: 该指标计算过去5分钟内发送错误包的平均速率，单位为每秒。监测发送错误对于识别传输问题和确保数据完整性至关重要。
    snmp_uptime:
      desc: 该指标表示设备自上次启动以来的运行时间。通过监测设备的运行时间，网络管理员可以了解到设备的稳定性及可靠性，识别潜在的重启或故障问题。
      name: 系统运行时间
    ipmi_voltage_volts:
      name: 电压
      desc: 电压指标以伏特 (volts) 为单位，监测设备内部不同电源轨的电压情况。稳定的电压供应对于设备的可靠性至关重要。通过该指标可以快速识别电气问题，保障正常运行。
    ipmi_power_watts:
      desc: 功率指标以瓦特 (watts) 为单位，反映设备当前功耗。通过此指标可以评估设备能效和功耗趋势。便于设置节能政策和资源优化。
      name: 功率
    interface_ifSpeed:
      name: 接口带宽
      desc: 该指标表示网络接口支持的最高数据传输速度，单位通常为MB每秒。了解接口的最高速度能够帮助管理员优化流量和利用网络资源。
    interface_ifOutDiscards:
      name: 发送丢包速率
      desc: 本指标计算过去5分钟内发送的丢弃包的平均速率，单位为每秒。关注发送丢包情况能够帮助识别网络传输问题和配置不当的情况。
    ipmi_chassis_power_watts: {name: 机箱功率, desc: 机箱当前功耗。}
    ipmi_chassis_temperature_celsius: {name: 机箱温度, desc: 机箱进风、出风或环境温度。}
    ipmi_chassis_airflow_cfm: {name: 机箱风量, desc: 机箱风量，单位为 CFM。}
    ipmi_psu_status: {name: PSU 状态, desc: 每个独立电源模块的健康状态。}
    ipmi_psu_state: {name: PSU 运行状态, desc: 每个独立电源模块的标准化运行状态。}
    ipmi_psu_raw_state_code: {name: PSU 原始状态码, desc: 用于排障的 PSU 原始状态码。}
    ipmi_psu_temperature_celsius: {name: PSU 温度, desc: 每个电源模块内部传感器的温度。}
    ipmi_psu_power_watts: {name: PSU 功率, desc: 每个电源模块的输入或输出功率。}
    ipmi_psu_voltage_volts: {name: PSU 电压, desc: 每个电源模块的输入或输出电压。}
    ipmi_psu_fan_speed_rpm: {name: PSU 风扇转速, desc: 每个电源模块风扇的转速。}
    ipmi_cpu_status: {name: CPU 状态, desc: 每个 CPU 插槽的健康状态。}
    ipmi_cpu_state: {name: CPU 运行状态, desc: 每个 CPU 插槽的标准化运行状态。}
    ipmi_cpu_raw_state_code: {name: CPU 原始状态码, desc: 用于排障的 CPU 原始状态码。}
    ipmi_cpu_temperature_celsius: {name: CPU 温度, desc: CPU 封装或供电模块温度。}
    ipmi_cpu_power_watts: {name: CPU 功率, desc: CPU 功耗。}
    ipmi_cpu_voltage_volts: {name: CPU 电压, desc: CPU 相关电压轨电压。}
    ipmi_cpu_utilization_percent: {name: CPU 使用率, desc: BMC 提供的 CPU 使用率。}
    ipmi_memory_status: {name: 内存状态, desc: 每个可识别内存条或通道的健康状态。}
    ipmi_memory_state: {name: 内存在位状态, desc: 每个内存条或通道的标准化在位状态。}
    ipmi_memory_raw_state_code: {name: 内存原始状态码, desc: 用于排障的内存原始状态码。}
    ipmi_memory_temperature_celsius: {name: 内存温度, desc: 每个内存条或通道的温度。}
    ipmi_memory_power_watts: {name: 内存功率, desc: BMC 提供的内存总功耗。}
    ipmi_disk_status: {name: 硬盘状态, desc: 每个硬盘槽位的健康状态。}
    ipmi_disk_state: {name: 硬盘运行状态, desc: 每个硬盘槽位的标准化运行状态。}
    ipmi_disk_raw_state_code: {name: 硬盘原始状态码, desc: 用于排障的厂商原始硬盘状态码。}
    ipmi_disk_power_watts: {name: 硬盘功率, desc: 前部、后部或全部硬盘的功耗。}
    ipmi_raid_status: {name: RAID 控制器状态, desc: 每个 RAID 控制器的健康状态。}
    ipmi_raid_state: {name: RAID 控制器运行状态, desc: 每个 RAID 控制器的标准化运行状态。}
    ipmi_raid_raw_state_code: {name: RAID 原始状态码, desc: 用于排障的 RAID 控制器原始状态码。}
    ipmi_raid_temperature_celsius: {name: RAID 控制器温度, desc: 每个 RAID 控制器的温度。}
    ipmi_raid_battery_temperature_celsius: {name: RAID 电池温度, desc: RAID 备份电池或 BBU 的温度。}
    ipmi_fan_status: {name: 风扇状态, desc: 每个独立风扇的健康状态。}
    ipmi_fan_state: {name: 风扇在位状态, desc: 每个独立风扇的标准化在位状态。}
    ipmi_fan_raw_state_code: {name: 风扇原始状态码, desc: 用于排障的风扇原始状态码。}
    ipmi_fan_component_speed_rpm: {name: 部件风扇转速, desc: 按独立风扇部件标准化的转速。}
    ipmi_fan_power_watts: {name: 风扇功率, desc: BMC 提供的风扇总功耗。}
monitor_object_metric_group:
  Hardware Server:
    Chassis: 机箱
