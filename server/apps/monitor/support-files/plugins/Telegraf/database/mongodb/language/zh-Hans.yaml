MongoDB:
  name: MongoDB（Telegraf）
  desc: 通过Telegraf采集器定期收集MongoDB的基础信息、性能指标、操作统计和资源使用情况，帮助优化性能，保障数据库高效稳定运行。
monitor_object:
  MongoDB: MongoDB
monitor_object_type:
  Database: 数据库
monitor_object_metric:
  MongoDB:
    mongodb_uptime_ns:
      name: 运行时长
      desc: MongoDB实例已连续运行的时间长度，反映服务稳定性
    mongodb_connections_current:
      name: 当前连接数
      desc: 当前活动的客户端连接数量，反映数据库并发访问负载
    mongodb_connections_available:
      name: 可用连接数
      desc: 可用的连接槽位数量，反映连接池资源余量
    mongodb_open_connections:
      name: 打开连接数
      desc: 当前打开的连接总数，包括活动和空闲连接
    mongodb_active_reads:
      name: 活跃读操作数
      desc: 当前正在执行的读取操作数量，反映实时读取负载
    mongodb_active_writes:
      name: 活跃写操作数
      desc: 当前正在执行的写入操作数量，反映实时写入负载
    mongodb_queued_reads:
      name: 排队读操作数
      desc: 等待执行的读取操作数量，反映读取队列积压情况
    mongodb_queued_writes:
      name: 排队写操作数
      desc: 等待执行的写入操作数量，反映写入队列积压情况
    mongodb_page_faults_rate:
      name: 缺页中断频率
      desc: 缺页中断发生的频率，反映内存压力和工作集大小是否合适
    mongodb_latency_commands_avg:
      name: 平均命令延迟
      desc: 命令操作的平均延迟时间，反映数据库响应性能
    mongodb_latency_reads_avg:
      name: 平均读取延迟
      desc: 读取操作的平均延迟时间，反映数据库读取性能
    mongodb_commands_rate:
      name: 命令操作频率
      desc: 命令类型操作执行的频率，反映数据库整体处理负载
    mongodb_queries_rate:
      name: 查询操作频率
      desc: 查询类型操作执行的频率，反映数据库查询处理负载
    mongodb_inserts_rate:
      name: 插入操作频率
      desc: 插入类型操作执行的频率，反映数据写入负载
    mongodb_updates_rate:
      name: 更新操作频率
      desc: 更新类型操作执行的频率，反映数据更新负载
    mongodb_deletes_rate:
      name: 删除操作频率
      desc: 删除类型操作执行的频率，反映数据删除负载
    mongodb_document_inserted_rate:
      name: 文档插入频率
      desc: 文档插入操作的频率，反映数据增长速率
    mongodb_document_updated_rate:
      name: 文档更新频率
      desc: 文档更新操作的频率，反映数据变更活跃度
    mongodb_document_deleted_rate:
      name: 文档删除频率
      desc: 文档删除操作的频率，反映数据清理活跃度
    mongodb_assert_user:
      name: 用户断言次数
      desc: 用户断言的累计触发次数，反映应用程序逻辑或数据异常
    mongodb_cursor_timed_out_count:
      name: 超时游标数
      desc: 超时的游标累计数量，反映查询执行时间过长或资源管理问题
    mongodb_resident_megabytes:
      name: 常驻内存大小
      desc: MongoDB进程使用的物理内存大小，反映内存资源使用情况
    mongodb_vsize_megabytes:
      name: 虚拟内存大小
      desc: MongoDB进程使用的虚拟内存大小，反映内存资源分配情况
    mongodb_tcmalloc_current_allocated_bytes:
      name: 当前分配内存
      desc: 通过tcmalloc内存分配器当前分配的内存大小，反映内存使用效率
    mongodb_wtcache_current_bytes:
      name: WiredTiger缓存大小
      desc: WiredTiger存储引擎缓存当前使用的大小，反映缓存利用率
    mongodb_wtcache_max_bytes_configured:
      name: WiredTiger缓存最大配置
      desc: WiredTiger存储引擎缓存的最大配置大小，反映缓存容量上限
    mongodb_wtcache_tracked_dirty_bytes:
      name: 跟踪的脏数据大小
      desc: WiredTiger缓存中已修改但未写入磁盘的数据大小，反映数据持久化延迟
    mongodb_net_in_bytes_count_rate:
      name: 网络输入频率
      desc: 网络数据接收的频率，反映数据库输入流量负载
    mongodb_net_out_bytes_count_rate:
      name: 网络输出频率
      desc: 网络数据发送的频率，反映数据库输出流量负载
monitor_object_metric_group:
  MongoDB:
    Base: 基础信息
    Performance: 性能
    Operations: 操作
    Resources: 资源
