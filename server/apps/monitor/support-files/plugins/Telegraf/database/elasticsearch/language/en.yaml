ElasticSearch:
  desc: Through the Telegraf collector, regularly collect metrics from Elasticsearch
    related to the filesystem, HTTP requests, I/O statistics, document statistics,
    query cache, and index flush operations, helping users monitor cluster health
    and performance.
  name: ElasticSearch(Telegraf)
monitor_object:
  ElasticSearch: Elasticsearch
monitor_object_type:
  Database: Database
monitor_object_metric:
  ElasticSearch:
    elasticsearch_cluster_health_status_code:
      name: Cluster Health Status
      desc: 'Core cluster health metric, reflects cluster health via status values:
        1=normal (green), 2=replica missing, 3=primary missing (failure); red status
        impacts data availability'
    elasticsearch_cluster_health_active_primary_shards:
      name: Active Primary Shards
      desc: Core data availability metric, represents the count of active primary
        shards; missing primary shards block data read/write; ensure consistency with
        expected count
    elasticsearch_cluster_health_unassigned_shards:
      name: Unassigned Shards
      desc: Core cluster anomaly indicator, represents the count of unassigned shards;
        investigate if >0; long-term existence reduces data redundancy and availability
    elasticsearch_jvm_mem_heap_used_percent:
      name: JVM Heap Usage
      desc: Core JVM memory pressure metric, reflects JVM memory usage; high usage
        triggers Full GC and cluster lag
    elasticsearch_jvm_gc_collectors_young_collection_time_in_millis_rate:
      name: Young Gen GC Time Per Second
      desc: GC efficiency monitoring metric, reflects GC operation latency; sustained
        high values indicate high CPU usage by GC, affecting business performance
    elasticsearch_fs_data_0_available_in_bytes:
      name: Node Available Disk Space
      desc: Node storage availability metric, reflects remaining disk space on nodes;
        disk exhaustion causes node offline
    elasticsearch_process_cpu_percent:
      name: Process CPU Usage
      desc: Process compute load metric, reflects CPU load of the process; high load
        degrades cluster read/write performance
    elasticsearch_process_open_file_descriptors:
      name: Open File Descriptors
      desc: File resource monitoring metric, reflects file descriptor usage; approaching
        system limits affects shard availability
    elasticsearch_breakers_fielddata_tripped_rate:
      name: Fielddata Memory Breaker Trigger Rate
      desc: Memory protection mechanism monitoring, reflects triggers of the memory
        protection breaker; >0 indicates recent memory shortage
    elasticsearch_breakers_request_tripped_rate:
      name: Rate of HTTP Request Circuit Breaker Triggering
      desc: Request-level memory protection monitoring, reflects triggers of the request-level
        memory protection breaker; >0 indicates recent request memory overload
    elasticsearch_http_current_open:
      name: HTTP Current Connections
      desc: HTTP service availability metric, reflects connection usage of the HTTP
        service; approaching connection limits affects new request acceptance
    elasticsearch_http_total_opened_rate:
      name: HTTP New Connections Per Second
      desc: HTTP service traffic metric, reflects recent business request traffic
        changes; aids in troubleshooting traffic peak issues
    elasticsearch_thread_pool_write_queue:
      name: Write Thread Pool Queue Length
      desc: Bulk write performance warning metric, reflects the queue length for bulk
        write requests; growing queue length indicates insufficient bulk data processing
        capacity, affecting data ingestion throughput and causing data synchronization
        delays
    elasticsearch_thread_pool_search_queue:
      name: Search Thread Pool Queue Length
      desc: Query performance warning metric, reflects the length of the query request
        queue; growing queue length indicates insufficient query capacity, affecting
        business experience
monitor_object_metric_group:
  ElasticSearch:
    Base: Base
    Node: Node
    Breaker: Breaker
    HTTP: HTTP
    ThreadPool: ThreadPool
