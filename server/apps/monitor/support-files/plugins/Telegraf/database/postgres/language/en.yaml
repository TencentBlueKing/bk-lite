Postgres:
  name: Postgres(Telegraf)
  desc: Through the Telegraf collector, regularly collect session management data,
    transaction metrics, and I/O performance data from PostgreSQL.
monitor_object:
  Postgres: Postgres
monitor_object_type:
  Database: Database
monitor_object_metric:
  Postgres:
    postgresql_numbackends:
      name: Active DB Connections
      desc: Monitors active database sessions to assess concurrency load and connection
        pool usage
    postgresql_xact_commit_rate:
      name: Transaction Commit Rate
      desc: Indicates frequency of committed transactions, reflecting business activity
    postgresql_xact_rollback_rate:
      name: Transaction Rollback Rate
      desc: Tracks rollback frequency caused by failures or conflicts
    postgresql_tup_returned_rate:
      name: Query Rows Returned Rate
      desc: Counts rows returned in query result sets
    postgresql_tup_fetched_rate:
      name: Query Rows Fetched Rate
      desc: Monitors rows fetched from storage during queries
    postgresql_tup_inserted_rate:
      name: Rows Inserted Rate
      desc: Tracks row insertion frequency
    postgresql_tup_updated_rate:
      name: Rows Updated Rate
      desc: Reflects data modification activity
    postgresql_tup_deleted_rate:
      name: Rows Deleted Rate
      desc: Monitors data deletion activity
    postgresql_blks_hit_rate:
      name: Buffer Cache Hit Rate
      desc: Reflects shared buffer cache efficiency
    postgresql_blks_read_rate:
      name: Disk Block Read Rate
      desc: Evaluates disk I/O load and cache misses
    postgresql_deadlocks_rate:
      name: Deadlock Rate
      desc: Detects transaction deadlock frequency
    postgresql_conflicts_rate:
      name: Concurrency Conflict Rate
      desc: Tracks conflicts caused by concurrent operations
    postgresql_temp_files_rate:
      name: Temporary Files Creation Rate
      desc: Reflects temporary file usage by complex queries
    postgresql_temp_bytes_rate:
      name: Temporary File Write Throughput
      desc: Measures disk usage by temp files
    postgresql_checkpoints_timed_rate:
      name: Timed Checkpoint Rate
      desc: Monitors system-triggered checkpoints
    postgresql_checkpoints_req_rate:
      name: Requested Checkpoint Rate
      desc: Reflects WAL pressure and checkpoint tuning
    postgresql_buffers_alloc_rate:
      name: Buffer Allocation Rate
      desc: Tracks shared buffer allocation
    postgresql_buffers_backend_rate:
      name: Backend Buffer Write Rate
      desc: Represents backend-driven writes
    postgresql_buffers_checkpoint_rate:
      name: Checkpoint Buffer Write Rate
      desc: Reflects checkpoint I/O impact
    postgresql_maxwritten_clean_rate:
      name: Background Clean Page Write Rate
      desc: Indicates high write pressure
    postgresql_blk_write_time:
      name: Disk Block Write Time Rate
      desc: Rate of cumulative block write time (pg_stat_database.blk_write_time),
        in milliseconds of write time per second. High values indicate disk I/O write
        pressure or a storage bottleneck.
    postgresql_active_time:
      name: SQL Active Execution Time Rate
      desc: Rate of cumulative SQL execution time (pg_stat_database.active_time),
        in milliseconds of active execution per second. Sustained high values indicate
        long-running or heavily concurrent statements.
    postgresql_sessions_killed:
      name: Abnormally Terminated Sessions Rate
      desc: Rate of sessions terminated by fatal errors such as administrator commands,
        idle-session timeout, or deadlock resolution (pg_stat_database.sessions_killed),
        in sessions per second. A rising rate signals connection instability.
monitor_object_metric_group:
  Postgres:
    Connection: Connection
    Query: Query
    DataOperation: Data Operation
    Cache: Cache
    Concurrency: Concurrency
    TempFiles: Temporary Files
    Checkpoint: Checkpoint
    Buffer: Buffer
    WriteActivity: Write Activity
