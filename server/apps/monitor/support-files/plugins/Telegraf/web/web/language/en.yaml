Website:
  desc: Through the Telegraf collector, regularly perform active checks on the availability
    and performance of HTTP/HTTPS connections.
  name: HTTP(Telegraf)
monitor_object:
  Website: Website
monitor_object_type:
  Web: Web
monitor_object_metric:
  Website:
    http_response_result_code:
      name: Probe Result
      desc: Identifies the probe result from the Telegraf http_response result_code
        field. 0 means success, while non-zero values represent response string mismatch,
        body read error, connection failure, timeout, DNS error, or response status
        code mismatch.
    http_node_success_rate:
      name: Node Success Rate
      desc: Calculate the 5-minute probe success rate for each probing node, reflecting
        the access experience in a specific region or network environment.
    http_response_response_time:
      name: Response Time
      desc: Represents the total time taken from initiating an HTTP request to receiving
        the HTTP response. It is used to assess the performance of web services, especially
        when handling user requests.
    http_response_http_response_code:
      name: HTTP Code
      desc: This metric represents the HTTP response status code for an HTTP request.
        It captures the value of the HTTP response status codes, such as 200 (OK),
        404 (Not Found), 500 (Internal Server Error), etc.
    http_response_content_length:
      name: HTTP Content Length
      desc: This metric indicates the length of the HTTP. Larger content lengths can
        result in extended data transfer times and consume more bandwidth.
monitor_object_metric_group:
  Website:
    HTTP: HTTP
