user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
  }

  server {
    listen 80;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # 支持最多 9 个 10 MB 文件经 Base64 编码后提交，并留出 JSON 开销。
    client_max_body_size 128m;

    location = /healthz {
      access_log off;
      default_type text/plain;
      return 200 'ok';
    }

    location = / {
      return 302 /mobile/h5/;
    }

    location = /mobile/h5 {
      return 301 /mobile/h5/;
    }

    location ^~ /mobile/h5/_next/static/ {
      try_files $uri =404;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /mobile/h5/ {
      rewrite ^(/mobile/h5/.+)/$ $1 permanent;
      try_files $uri $uri.html /mobile/h5/index.html;
      add_header Cache-Control "no-store" always;
    }

    location = /api/proxy {
      return 308 /api/proxy/;
    }

    location = /api/auth {
      return 308 /api/auth/;
    }

    # Mobile H5 复用 bklite-web 的 NextAuth 服务端会话。
    location /api/auth/ {
      proxy_pass http://bklite-web:3000/api/auth/;
      proxy_http_version 1.1;

      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
      proxy_set_header Cookie $http_cookie;
      proxy_set_header Connection "";

      proxy_request_buffering off;
      proxy_buffering off;
      proxy_cache off;

      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # Mobile H5 与 bklite-server 需处于可解析该 Service 名称的同一网络中。
    location /api/proxy/ {
      proxy_pass http://bklite-server:8000/api/v1/;
      proxy_http_version 1.1;

      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
      proxy_set_header Connection "";

      proxy_request_buffering off;
      proxy_buffering off;
      proxy_cache off;
      gzip off;

      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }
  }
}
