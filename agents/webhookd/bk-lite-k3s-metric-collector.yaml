apiVersion: v1
kind: Namespace
metadata:
  name: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k3s-vmagent
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bk-lite-k3s-vmagent
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bk-lite-k3s-vmagent
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bk-lite-k3s-vmagent
subjects:
  - kind: ServiceAccount
    name: k3s-vmagent
    namespace: bk-lite-k3s-collector
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k3s-vmagent-config
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 60s
    scrape_configs:
      - job_name: k3s-kubelet-cadvisor
        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          server_name: kubernetes.default.svc
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          - target_label: instance_id
            replacement: "%{CLUSTER_NAME}"
          - target_label: instance_name
            replacement: "%{CLUSTER_NAME}"
          - target_label: instance_type
            replacement: k3s
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_fs_reads_total|container_fs_writes_total|container_network_receive_bytes_total|container_network_transmit_bytes_total
          - source_labels: [pod]
            regex: ""
            action: drop
          - regex: id|image|name
            action: labeldrop
      - job_name: k3s-kube-state-metrics
        static_configs:
          - targets: [k3s-kube-state-metrics:8080]
        relabel_configs:
          - target_label: instance_id
            replacement: "%{CLUSTER_NAME}"
          - target_label: instance_name
            replacement: "%{CLUSTER_NAME}"
          - target_label: instance_type
            replacement: k3s
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: kube_daemonset_status_desired_number_scheduled|kube_daemonset_status_number_available|kube_daemonset_status_number_unavailable|kube_deployment_spec_replicas|kube_deployment_status_replicas_available|kube_deployment_status_replicas_unavailable|kube_node_info|kube_node_status_allocatable|kube_node_status_condition|kube_pod_container_resource_limits|kube_pod_container_resource_requests|kube_pod_container_status_restarts_total|kube_pod_container_status_waiting_reason|kube_pod_info|kube_pod_status_phase|kube_statefulset_replicas|kube_statefulset_status_replicas_ready
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-vmagent
  namespace: bk-lite-k3s-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-vmagent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-vmagent
        app.kubernetes.io/managed-by: bk-lite
        app.kubernetes.io/part-of: bk-lite-k3s-monitoring
    spec:
      serviceAccountName: k3s-vmagent
      containers:
        - name: vmagent
          image: bk-lite.tencentcloudcr.com/bklite/vmagent:latest
          imagePullPolicy: IfNotPresent
          args:
            - --promscrape.config=/etc/prometheus/prometheus.yml
            - --remoteWrite.url=http://k3s-metric-telegraf:9090/receive
            - --remoteWrite.tmpDataPath=/tmp/vmagent-remotewrite-data
          envFrom:
            - secretRef:
                name: k3s-monitor-config-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: k3s-vmagent-config
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k3s-kube-state-metrics
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bk-lite-k3s-kube-state-metrics
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "statefulsets"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bk-lite-k3s-kube-state-metrics
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bk-lite-k3s-kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: k3s-kube-state-metrics
    namespace: bk-lite-k3s-collector
---
apiVersion: v1
kind: Service
metadata:
  name: k3s-kube-state-metrics
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: k3s-kube-state-metrics
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
    - name: telemetry
      port: 8081
      targetPort: telemetry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-kube-state-metrics
  namespace: bk-lite-k3s-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-kube-state-metrics
        app.kubernetes.io/managed-by: bk-lite
        app.kubernetes.io/part-of: bk-lite-k3s-monitoring
    spec:
      serviceAccountName: k3s-kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: bk-lite.tencentcloudcr.com/bklite/kube-state-metrics:2.13.0
          imagePullPolicy: IfNotPresent
          args:
            - --resources=daemonsets,deployments,nodes,pods,statefulsets
            - --metric-allowlist=kube_daemonset_status_desired_number_scheduled,kube_daemonset_status_number_available,kube_daemonset_status_number_unavailable,kube_deployment_spec_replicas,kube_deployment_status_replicas_available,kube_deployment_status_replicas_unavailable,kube_node_info,kube_node_status_allocatable,kube_node_status_condition,kube_pod_container_resource_limits,kube_pod_container_resource_requests,kube_pod_container_status_restarts_total,kube_pod_container_status_waiting_reason,kube_pod_info,kube_pod_status_phase,kube_statefulset_replicas,kube_statefulset_status_replicas_ready
          ports:
            - name: metrics
              containerPort: 8080
            - name: telemetry
              containerPort: 8081
          resources:
            requests:
              cpu: 25m
              memory: 48Mi
            limits:
              cpu: 200m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: k3s-metric-telegraf
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
spec:
  selector:
    app.kubernetes.io/name: k3s-metric-telegraf
  ports:
    - name: remote-write
      port: 9090
      targetPort: remote-write
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k3s-metric-telegraf-config
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
data:
  telegraf.conf: |
    [agent]
      interval = "60s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 100000
      flush_interval = "5s"
      hostname = "${CLUSTER_NAME}"

    [[inputs.http_listener_v2]]
      service_address = ":9090"
      paths = ["/receive"]
      data_format = "prometheusremotewrite"

    [[outputs.nats]]
      servers = ["${NATS_URL}"]
      username = "${NATS_USERNAME}"
      password = "${NATS_PASSWORD}"
      subject = "metrics.cloud"
      data_format = "influx"
      secure = true
      insecure_skip_verify = false
      tls_ca = "/etc/nats/ca.crt"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-metric-telegraf
  namespace: bk-lite-k3s-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-metric-telegraf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-metric-telegraf
        app.kubernetes.io/managed-by: bk-lite
        app.kubernetes.io/part-of: bk-lite-k3s-monitoring
    spec:
      automountServiceAccountToken: false
      containers:
        - name: telegraf
          image: bk-lite.tencentcloudcr.com/bklite/telegraf:1.29.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: remote-write
              containerPort: 9090
          envFrom:
            - secretRef:
                name: k3s-monitor-config-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
            - name: nats-ca
              mountPath: /etc/nats/ca.crt
              subPath: ca.crt
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: k3s-metric-telegraf-config
        - name: nats-ca
          secret:
            secretName: k3s-monitor-config-secret
            items:
              - key: ca.crt
                path: ca.crt
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k3s-node-telegraf-config
  namespace: bk-lite-k3s-collector
  labels:
    app.kubernetes.io/managed-by: bk-lite
    app.kubernetes.io/part-of: bk-lite-k3s-monitoring
data:
  telegraf.conf: |
    [global_tags]
      instance_id = "${CLUSTER_NAME}"
      instance_name = "${HOST_NODE_NAME}"
      instance_type = "k3s"
      node = "${HOST_NODE_NAME}"

    [agent]
      interval = "60s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      flush_interval = "30s"
      hostname = "${HOST_NODE_NAME}"
      omit_hostname = false

    [[inputs.cpu]]
      percpu = true
      totalcpu = true
      collect_cpu_time = false
      report_active = false
      core_tags = false

    [[inputs.disk]]
      ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

    [[inputs.diskio]]

    [[inputs.mem]]

    [[inputs.net]]

    [[inputs.system]]

    [[outputs.nats]]
      servers = ["${NATS_URL}"]
      username = "${NATS_USERNAME}"
      password = "${NATS_PASSWORD}"
      subject = "metrics.cloud"
      data_format = "influx"
      secure = true
      insecure_skip_verify = false
      tls_ca = "/etc/nats/ca.crt"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k3s-node-telegraf
  namespace: bk-lite-k3s-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-node-telegraf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-node-telegraf
        app.kubernetes.io/managed-by: bk-lite
        app.kubernetes.io/part-of: bk-lite-k3s-monitoring
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: telegraf
          image: bk-lite.tencentcloudcr.com/bklite/telegraf:1.29.5
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: k3s-monitor-config-secret
          env:
            - name: HOST_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_PROC
              value: /hostfs/proc
            - name: HOST_SYS
              value: /hostfs/sys
            - name: HOST_ETC
              value: /hostfs/etc
            - name: HOST_MOUNT_PREFIX
              value: /hostfs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
            - name: nats-ca
              mountPath: /etc/nats/ca.crt
              subPath: ca.crt
              readOnly: true
            - name: host-root
              mountPath: /hostfs
              readOnly: true
            - name: tmp
              mountPath: /tmp
      tolerations:
        - operator: Exists
          effect: NoSchedule
      volumes:
        - name: config
          configMap:
            name: k3s-node-telegraf-config
        - name: nats-ca
          secret:
            secretName: k3s-monitor-config-secret
            items:
              - key: ca.crt
                path: ca.crt
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: tmp
          emptyDir: {}
