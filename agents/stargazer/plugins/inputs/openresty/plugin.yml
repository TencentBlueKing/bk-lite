name: openresty
version: "2.0.0"
category: middleware

metadata:
  display_name: "OpenResty Web 服务"
  description: "OpenResty 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, openresty, nginx]
  cloud_protocol: false
  model_id: openresty

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/openresty/openresty_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
