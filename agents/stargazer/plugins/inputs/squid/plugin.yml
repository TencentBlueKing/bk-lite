name: squid
version: "2.0.0"
category: middleware

metadata:
  display_name: "Squid 代理服务"
  description: "Squid 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, squid]
  cloud_protocol: false
  model_id: squid

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/squid/squid_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
