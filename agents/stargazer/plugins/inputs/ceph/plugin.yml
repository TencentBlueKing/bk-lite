name: ceph
version: "2.0.0"
category: middleware

metadata:
  display_name: "Ceph 存储服务"
  description: "Ceph 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, ceph]
  cloud_protocol: false
  model_id: ceph

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/ceph/ceph_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
