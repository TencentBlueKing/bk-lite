name: openstack
version: "1.0.0"
category: cloud

metadata:
  display_name: "OpenStack平台"
  description: "OpenStack 平台资源采集插件（平台 + 宿主机/虚拟机/卷/存储池）"
  author: "WeOps"
  tags: [cloud, openstack]
  cloud_protocol: true
  model_id: openstack

# ============================================================================
# 执行器配置
# ============================================================================
executors:
  # Protocol 类型（协议采集）
  protocol:
    type: protocol
    timeout: 120

    # Python 采集器
    collector:
      module: plugins.inputs.openstack.openstack_info
      class: OpenStackManager

# 默认执行器
default_executor: protocol
