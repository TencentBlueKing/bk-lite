name: memcached
version: "2.0.0"
category: middleware

metadata:
  display_name: "Memcached 缓存服务"
  description: "Memcached 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, memcached]
  cloud_protocol: false
  model_id: memcached

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/memcached/memcached_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
