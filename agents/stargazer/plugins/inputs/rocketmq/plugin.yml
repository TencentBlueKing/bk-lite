name: rocketmq
version: "2.0.0"
category: middleware

metadata:
  display_name: "RocketMQ 消息队列"
  description: "RocketMQ 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, rocketmq]
  cloud_protocol: false
  model_id: rocketmq

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/rocketmq/rocketmq_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
