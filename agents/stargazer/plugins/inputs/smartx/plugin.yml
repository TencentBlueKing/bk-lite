name: smartx
version: "1.0.0"
category: cloud

metadata:
  display_name: "SmartX平台"
  description: "SmartX 平台资源采集插件（平台 + 集群/主机/虚拟机/虚拟卷）"
  author: "WeOps"
  tags: [cloud, smartx]
  cloud_protocol: true
  model_id: smartx

# ============================================================================
# 执行器配置
# ============================================================================
executors:
  # Protocol 类型（协议采集）
  protocol:
    type: protocol
    timeout: 120

    # Python 采集器
    collector:
      module: plugins.inputs.smartx.smartx_info
      class: SmartXManager

# 默认执行器
default_executor: protocol
