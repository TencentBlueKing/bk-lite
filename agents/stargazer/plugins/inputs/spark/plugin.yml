name: spark
version: "2.0.0"
category: middleware

metadata:
  display_name: "Spark 计算服务"
  description: "Spark 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, spark]
  cloud_protocol: false
  model_id: spark

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/spark/spark_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
