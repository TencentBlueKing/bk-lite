name: tuxedo
version: "2.0.0"
category: middleware

metadata:
  display_name: "Tuxedo 中间件"
  description: "Tuxedo 中间件采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, tuxedo]
  cloud_protocol: false
  model_id: tuxedo

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/tuxedo/tuxedo_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
