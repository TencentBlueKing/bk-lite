name: iis
version: "2.0.0"
category: middleware

metadata:
  display_name: "IIS Web 服务器"
  description: "IIS Web 服务器采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, iis, windows]
  cloud_protocol: false
  model_id: iis

executors:
  job:
    type: job
    timeout: 60
    scripts:
      windows: plugins/inputs/iis/iis_default_discover.ps1
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: windows

default_executor: job
