name: jboss
version: "2.0.0"
category: middleware

metadata:
  display_name: "JBoss 应用服务器"
  description: "JBoss 采集插件，支持脚本方式采集"
  author: "WeOps"
  tags: [middleware, jboss, java]
  cloud_protocol: false
  model_id: jboss

executors:
  job:
    type: job
    timeout: 60
    scripts:
      linux: plugins/inputs/jboss/jboss_default_discover.sh
    collector:
      module: plugins.script_executor
      class: SSHPlugin
    default_script: linux

default_executor: job
