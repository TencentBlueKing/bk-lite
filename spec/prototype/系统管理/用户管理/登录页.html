<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>用户管理 - 登录页</title>
    <style>
      :root {
        --bg-left: #eef0fb;
        --bg-right: #f4f9ff;
        --grid: rgba(129, 142, 186, 0.16);
        --text-1: #1f2937;
        --text-2: #8ea0bb;
        --text-3: #6b7a90;
        --line: #d8e1ef;
        --primary: #3458ed;
        --primary-shadow: rgba(52, 88, 237, 0.24);
        --wechat: #32ae3c;
        --wechat-shadow: rgba(50, 174, 60, 0.18);
        --chip: #edf3ff;
        --chip-border: #d9e5ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "PingFang SC", "SF Pro Display", "Microsoft YaHei", sans-serif;
        background: #edf4fc;
        color: var(--text-1);
      }

      body {
        min-height: 100vh;
      }

      .login-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(640px, 1.5fr) minmax(500px, 1fr);
        background: linear-gradient(90deg, var(--bg-left) 0%, var(--bg-left) 60%, var(--bg-right) 60%, var(--bg-right) 100%);
      }

      .hero-panel {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 28% 48%, rgba(255, 255, 255, 0.5), transparent 28%),
          radial-gradient(circle at 72% 78%, rgba(114, 168, 255, 0.12), transparent 14%),
          linear-gradient(180deg, #eef0fb 0%, #f6f7ff 100%);
      }

      .hero-panel::before {
        content: "";
        position: absolute;
        inset: -12% -8% 10% -8%;
        background-image:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 110px 110px;
        transform: perspective(1400px) rotateX(74deg) scale(1.16);
        transform-origin: top center;
        opacity: 0.9;
      }

      .scene {
        position: absolute;
        inset: 0;
      }

      .tile {
        position: absolute;
        border-radius: 26px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(241, 245, 255, 0.86));
        box-shadow: 0 28px 42px rgba(157, 167, 206, 0.2);
      }

      .tile::after {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 18px;
        box-shadow: inset 0 0 0 1px rgba(174, 191, 229, 0.22);
      }

      .tile.ring::before {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: 999px;
        border: 10px solid rgba(245, 248, 255, 0.98);
        box-shadow: 0 0 18px rgba(125, 181, 255, 0.18), inset 0 0 0 2px rgba(173, 198, 255, 0.14);
      }

      .tile.gem::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 30px;
        height: 30px;
        transform: translate(-50%, -50%) rotate(45deg);
        border-radius: 7px;
        background: linear-gradient(135deg, #5da0ff 0%, #9ac9ff 100%);
        box-shadow: 0 0 18px rgba(114, 179, 255, 0.28);
      }

      .tile-a {
        width: 164px;
        height: 102px;
        left: -18px;
        top: 276px;
      }

      .tile-b {
        width: 212px;
        height: 126px;
        left: 114px;
        top: 176px;
      }

      .tile-c {
        width: 168px;
        height: 112px;
        right: 116px;
        top: 230px;
      }

      .tile-d {
        width: 148px;
        height: 96px;
        left: 8px;
        bottom: 52px;
      }

      .stage {
        position: absolute;
        left: 17%;
        top: 34%;
        width: 620px;
        height: 450px;
      }

      .platform {
        position: absolute;
        left: 78px;
        bottom: 44px;
        width: 410px;
        height: 212px;
        clip-path: polygon(12% 12%, 80% 0, 100% 32%, 86% 92%, 22% 100%, 0 58%);
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.97), rgba(232, 239, 255, 0.84));
        box-shadow: 0 28px 42px rgba(142, 154, 198, 0.24);
      }

      .platform::before {
        content: "";
        position: absolute;
        inset: 16px 18px 18px;
        clip-path: inherit;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.98), rgba(241, 245, 255, 0.9));
        box-shadow: inset 0 0 34px rgba(125, 167, 255, 0.18);
      }

      .platform::after {
        content: "";
        position: absolute;
        left: 24px;
        right: 32px;
        bottom: 20px;
        height: 24px;
        border-radius: 999px;
        background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(100, 149, 255, 0.92), rgba(255, 255, 255, 0));
        filter: blur(10px);
      }

      .panel-card {
        position: absolute;
        left: 182px;
        top: 72px;
        width: 254px;
        height: 164px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(238, 243, 255, 0.76));
        border: 1px solid rgba(255, 255, 255, 0.88);
        box-shadow: 0 26px 38px rgba(127, 141, 185, 0.24);
        transform: perspective(1000px) rotateY(-18deg);
      }

      .panel-card::before {
        content: "";
        position: absolute;
        right: -32px;
        top: 12px;
        width: 28px;
        height: 140px;
        border-radius: 10px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(209, 220, 255, 0.72));
      }

      .panel-card::after {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 16px;
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.84), inset 0 0 32px rgba(94, 147, 255, 0.08);
      }

      .panel-dots {
        position: absolute;
        left: 36px;
        top: 20px;
        display: flex;
        gap: 6px;
      }

      .panel-dots span {
        width: 9px;
        height: 9px;
        border-radius: 999px;
      }

      .panel-dots span:nth-child(1) {
        background: #7bd34d;
      }

      .panel-dots span:nth-child(2) {
        background: #ef625e;
      }

      .panel-dots span:nth-child(3) {
        background: #ffcc55;
      }

      .panel-title {
        position: absolute;
        left: 44px;
        top: 66px;
        font-size: 20px;
        font-weight: 700;
        color: #26305e;
        letter-spacing: -0.03em;
      }

      .side-arc {
        position: absolute;
        left: 98px;
        top: 102px;
        width: 100px;
        height: 194px;
        border-radius: 46px;
        border: 4px solid rgba(59, 174, 255, 0.54);
        border-right-width: 5px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.08));
        transform: rotate(5deg);
        box-shadow: inset 0 0 24px rgba(77, 177, 255, 0.1), 0 14px 26px rgba(91, 169, 255, 0.1);
      }

      .side-arc::before,
      .side-arc::after {
        content: "";
        position: absolute;
        left: 20px;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: rgba(94, 183, 255, 0.38);
      }

      .side-arc::before {
        top: 28px;
      }

      .side-arc::after {
        top: 54px;
      }

      .arrow-path {
        position: absolute;
        left: 120px;
        top: 182px;
        width: 314px;
        height: 162px;
      }

      .arrow-path::before {
        content: "";
        position: absolute;
        left: 0;
        top: 12px;
        width: 170px;
        height: 128px;
        border: 4px solid rgba(75, 175, 255, 0.72);
        border-right: 0;
        border-radius: 84px 0 0 84px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.06));
        box-shadow: inset 0 0 20px rgba(119, 194, 255, 0.12);
      }

      .arrow-path::after {
        content: "";
        position: absolute;
        right: 18px;
        bottom: 8px;
        width: 88px;
        height: 88px;
        border-right: 4px solid rgba(84, 123, 255, 0.74);
        border-top: 4px solid rgba(84, 123, 255, 0.74);
        transform: rotate(45deg);
        border-radius: 16px;
      }

      .blue-rail {
        position: absolute;
        right: 32px;
        bottom: 58px;
        width: 214px;
        height: 122px;
        clip-path: polygon(0 34%, 74% 0, 100% 20%, 34% 100%, 0 82%);
        background: linear-gradient(140deg, #3d79ff 0%, #2350e0 100%);
        box-shadow: 0 18px 30px rgba(67, 102, 235, 0.24);
      }

      .cube-stack {
        position: absolute;
        right: -6px;
        bottom: 12px;
        width: 110px;
        height: 126px;
      }

      .cube {
        position: absolute;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(127, 190, 255, 0.5));
        border: 1px solid rgba(255, 255, 255, 0.84);
        box-shadow: 0 16px 26px rgba(120, 164, 221, 0.2);
      }

      .cube::after {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 8px;
        box-shadow: inset 0 0 0 2px rgba(144, 201, 255, 0.22);
      }

      .cube.big {
        width: 60px;
        height: 60px;
        right: 18px;
        bottom: 0;
      }

      .cube.small {
        width: 42px;
        height: 42px;
        right: 44px;
        bottom: 46px;
      }

      .form-panel {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 72px;
        background:
          radial-gradient(circle at top right, rgba(173, 210, 255, 0.26), transparent 30%),
          linear-gradient(180deg, #f3f8fd 0%, #f7fbff 100%);
      }

      .signin-block {
        width: 100%;
        max-width: 372px;
      }

      .signin-mark {
        width: 44px;
        height: 44px;
        margin: 0 auto 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .signin-mark svg {
        width: 28px;
        height: 28px;
        fill: none;
        stroke: #4785ff;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .signin-title {
        margin: 0;
        text-align: center;
        font-size: 27px;
        font-weight: 700;
      }

      .signin-subtitle {
        margin: 8px 0 34px;
        text-align: center;
        color: var(--text-2);
        font-size: 14px;
      }

      .field-hint {
        margin: -8px 0 22px;
        color: var(--text-2);
        font-size: 12px;
        line-height: 18px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #374252;
      }

      .field-wrap {
        position: relative;
      }

      .field select,
      .field input {
        width: 100%;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.94);
        color: var(--text-1);
        padding: 0 12px;
        font-size: 14px;
        outline: none;
        appearance: none;
      }

      .field select:focus,
      .field input:focus {
        border-color: #9fb7ff;
        box-shadow: 0 0 0 3px rgba(58, 98, 246, 0.08);
      }

      .field input::placeholder {
        color: #b0bccd;
      }

      .field-wrap.select::after {
        content: "⌄";
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #aab6c7;
        font-size: 14px;
        pointer-events: none;
      }

      .password-toggle {
        position: absolute;
        right: 8px;
        top: 50%;
        width: 28px;
        height: 28px;
        transform: translateY(-50%);
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #a3afc1;
        cursor: pointer;
      }

      .password-toggle svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .auth-runtime {
        min-height: 300px;
      }

      .auth-panel {
        border: 1px solid rgba(216, 225, 239, 0.76);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.74);
        padding: 18px;
        box-shadow: 0 18px 34px rgba(165, 184, 220, 0.12);
      }

      .auth-panel-head {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .auth-panel-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        background: linear-gradient(180deg, #f2f6ff 0%, #e9f1ff 100%);
      }

      .auth-panel-icon svg {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .auth-panel-title {
        font-size: 16px;
        font-weight: 700;
      }

      .submit-btn,
      .wechat-btn,
      .sso-btn {
        width: 100%;
        height: 36px;
        border: 0;
        border-radius: 6px;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .submit-btn {
        margin-top: 8px;
        background: linear-gradient(180deg, #3b63f1 0%, #3158ec 100%);
        box-shadow: 0 10px 18px var(--primary-shadow);
      }

      .wechat-btn {
        background: linear-gradient(180deg, #34b33f 0%, #2ca436 100%);
        box-shadow: 0 10px 18px var(--wechat-shadow);
      }

      .sso-btn {
        background: linear-gradient(180deg, #4e72ff 0%, #3558e7 100%);
        box-shadow: 0 10px 18px rgba(76, 110, 235, 0.2);
      }

      .qr-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .qr-card {
        width: 210px;
        height: 210px;
        padding: 14px;
        border-radius: 16px;
        background: #fff;
        border: 1px solid rgba(216, 225, 239, 0.88);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.72);
      }

      .qr-grid {
        width: 100%;
        height: 100%;
        border-radius: 10px;
        background:
          linear-gradient(90deg, transparent 45%, rgba(0, 0, 0, 0.86) 45%, rgba(0, 0, 0, 0.86) 55%, transparent 55%),
          linear-gradient(transparent 45%, rgba(0, 0, 0, 0.86) 45%, rgba(0, 0, 0, 0.86) 55%, transparent 55%),
          radial-gradient(circle at 22% 22%, rgba(0, 0, 0, 0.88) 0 16%, transparent 17%),
          radial-gradient(circle at 78% 22%, rgba(0, 0, 0, 0.88) 0 16%, transparent 17%),
          radial-gradient(circle at 22% 78%, rgba(0, 0, 0, 0.88) 0 16%, transparent 17%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.88) 8%, transparent 8% 16%, rgba(0, 0, 0, 0.88) 16% 24%, transparent 24% 32%, rgba(0, 0, 0, 0.88) 32% 40%, transparent 40% 48%, rgba(0, 0, 0, 0.88) 48% 56%, transparent 56% 64%, rgba(0, 0, 0, 0.88) 64% 72%, transparent 72% 80%, rgba(0, 0, 0, 0.88) 80% 88%, transparent 88%),
          linear-gradient(rgba(0, 0, 0, 0.88) 8%, transparent 8% 16%, rgba(0, 0, 0, 0.88) 16% 24%, transparent 24% 32%, rgba(0, 0, 0, 0.88) 32% 40%, transparent 40% 48%, rgba(0, 0, 0, 0.88) 48% 56%, transparent 56% 64%, rgba(0, 0, 0, 0.88) 64% 72%, transparent 72% 80%, rgba(0, 0, 0, 0.88) 80% 88%, transparent 88%),
          #fff;
        background-size: auto, auto, auto, auto, auto, 24px 24px, 24px 24px, auto;
        background-position: center, center, center, center, center, center, center, center;
      }

      .auth-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--text-3);
        font-size: 13px;
      }

      .auth-status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #39b56a;
        box-shadow: 0 0 0 4px rgba(57, 181, 106, 0.12);
      }

      .wait-card {
        border: 1px dashed #c8d7f3;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(244, 248, 255, 0.92), rgba(238, 244, 255, 0.84));
        padding: 18px;
        margin-top: 14px;
      }

      .wait-state {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-3);
        font-size: 13px;
        line-height: 20px;
      }

      .wait-spinner {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #d7e2fb;
        border-top-color: #5a7cf5;
        animation: spin 0.9s linear infinite;
        flex-shrink: 0;
      }

      .source-switcher {
        margin-top: 18px;
      }

      .source-switcher-label {
        margin-bottom: 10px;
        color: var(--text-3);
        font-size: 12px;
      }

      .source-switcher-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .source-switcher-item {
        border: 1px solid var(--chip-border);
        background: var(--chip);
        border-radius: 12px;
        padding: 10px 8px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      }

      .source-switcher-item.active {
        border-color: #9bb7ff;
        background: #f7faff;
        box-shadow: 0 10px 20px rgba(116, 147, 224, 0.12);
      }

      .source-switcher-item:hover {
        transform: translateY(-1px);
      }

      .source-switcher-icon {
        width: 34px;
        height: 34px;
        margin: 0 auto 8px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
        background: #fff;
      }

      .source-switcher-icon svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .source-switcher-name {
        color: #41506a;
        font-size: 12px;
        font-weight: 600;
        line-height: 16px;
      }

      .divider {
        position: relative;
        margin: 22px 0 18px;
        text-align: center;
        color: #6f7e93;
        font-size: 13px;
      }

      .divider::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 1px;
        background: #d6dfec;
      }

      .divider span {
        position: relative;
        padding: 0 10px;
        background: #f6fbff;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 1180px) {
        .login-shell {
          grid-template-columns: 1fr;
        }

        .hero-panel {
          min-height: 520px;
        }

        .stage {
          left: 50%;
          transform: translateX(-50%) scale(0.92);
          transform-origin: top center;
        }

        .form-panel {
          padding: 40px 28px 52px;
        }

        .auth-runtime {
          min-height: 0;
        }
      }

      @media (max-width: 720px) {
        .hero-panel {
          min-height: 360px;
        }

        .tile-a,
        .tile-c,
        .tile-d {
          display: none;
        }

        .tile-b {
          left: 24px;
          top: 40px;
          width: 160px;
          height: 98px;
        }

        .stage {
          top: 86px;
          width: 420px;
          height: 300px;
          transform: translateX(-50%) scale(0.66);
        }

        .form-panel {
          padding: 34px 20px 42px;
        }

        .source-switcher-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="hero-panel">
        <div class="scene">
          <div class="tile gem tile-a"></div>
          <div class="tile gem tile-b"></div>
          <div class="tile ring tile-c"></div>
          <div class="tile ring tile-d"></div>

          <div class="stage">
            <div class="platform"></div>
            <div class="side-arc"></div>
            <div class="arrow-path"></div>
            <div class="panel-card">
              <div class="panel-dots"><span></span><span></span><span></span></div>
              <div class="panel-title">BlueKing Lite</div>
            </div>
            <div class="blue-rail"></div>
            <div class="cube-stack">
              <div class="cube big"></div>
              <div class="cube small"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="form-panel">
        <div class="signin-block">
          <div class="signin-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6 18c2.5-5.2 6.2-8.8 12-11"></path>
              <path d="M7.5 7.5c1.2 1 2 2.5 2.1 4.1"></path>
              <path d="M14.2 14.5c1.6.1 3 .8 4.3 2"></path>
              <path d="M5 13c2 .1 3.7 1.7 3.8 3.8"></path>
            </svg>
          </div>
          <h1 class="signin-title">Sign In</h1>
          <div class="signin-subtitle">Enter your credentials to continue</div>

          <div id="authRuntime" class="auth-runtime"></div>

          <div class="source-switcher">
            <div id="sourceSwitcherList" class="source-switcher-list"></div>
          </div>

          <template id="passwordPanelTemplate">
            <div class="auth-panel">
              <div class="auth-panel-head">
                <div class="auth-panel-icon" data-auth-icon></div>
                <div>
                  <div class="auth-panel-title" data-auth-title></div>
                </div>
              </div>

              <form>
                <div class="field">
                  <label for="usernameInput">Username</label>
                  <div class="field-wrap">
                    <input id="usernameInput" name="username" type="text" placeholder="Enter your username" />
                  </div>
                </div>

                <div class="field">
                  <label for="passwordInput">Password</label>
                  <div class="field-wrap">
                    <input id="passwordInput" name="password" type="password" placeholder="Enter your password" />
                    <button id="togglePasswordButton" class="password-toggle" type="button" aria-label="显示或隐藏密码">
                      <svg viewBox="0 0 24 24">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                        <circle cx="12" cy="12" r="2.8"></circle>
                      </svg>
                    </button>
                  </div>
                </div>

                <button class="submit-btn" type="button" data-submit-label></button>
              </form>
            </div>
          </template>

          <template id="qrPanelTemplate">
            <div class="auth-panel">
              <div class="auth-panel-head">
                <div class="auth-panel-icon" data-auth-icon></div>
                <div>
                  <div class="auth-panel-title" data-auth-title></div>
                </div>
              </div>

              <div class="qr-shell">
                <div class="qr-card">
                  <div class="qr-grid"></div>
                </div>
                <div class="auth-status">二维码已刷新，请使用移动端扫码登录</div>
                <button class="wechat-btn" type="button" data-refresh-qr>刷新二维码</button>
              </div>
            </div>
          </template>

          <template id="ssoPanelTemplate">
            <div class="auth-panel">
              <div class="auth-panel-head">
                <div class="auth-panel-icon" data-auth-icon></div>
                <div>
                  <div class="auth-panel-title" data-auth-title></div>
                </div>
              </div>

              <button class="sso-btn" type="button" data-sso-button></button>

              <div class="wait-card">
                <div class="wait-state">
                  <span class="wait-spinner"></span>
                  <span data-wait-copy>点击按钮后将跳转到外部认证系统，当前页面保持等待回调状态。</span>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>
    </main>

    <script>
      const authRuntime = document.getElementById("authRuntime");
      const sourceSwitcherList = document.getElementById("sourceSwitcherList");
      const passwordPanelTemplate = document.getElementById("passwordPanelTemplate");
      const qrPanelTemplate = document.getElementById("qrPanelTemplate");
      const ssoPanelTemplate = document.getElementById("ssoPanelTemplate");

      const iconMap = {
        "platform-local": `
          <svg viewBox="0 0 24 24">
            <path d="M12 3.5 5 7.5 12 11.5 19 7.5 12 3.5Z"></path>
            <path d="M5 7.5V15.5L12 19.5V11.5L5 7.5Z"></path>
            <path d="M19 7.5V15.5L12 19.5V11.5L19 7.5Z"></path>
          </svg>
        `,
        "wechat-org": `
          <svg viewBox="0 0 24 24">
            <path d="M7.8 13.8c-3 0-5.3-2-5.3-4.8S4.9 4.2 8.3 4.2s5.7 2.1 5.7 4.9c0 .5-.1 1-.3 1.5"></path>
            <path d="M8 14.2 5.7 16l.5-2.3"></path>
            <path d="M16.2 19.1c2.9 0 5.3-1.9 5.3-4.4s-2.4-4.4-5.3-4.4-5.3 2-5.3 4.4 2.3 4.4 5.3 4.4Z"></path>
            <path d="M16 19.2 18 21l-.3-2"></path>
            <path d="M6.7 8.8h.01"></path>
            <path d="M10 8.8h.01"></path>
            <path d="M14.8 13.9h.01"></path>
            <path d="M18 13.9h.01"></path>
          </svg>
        `,
        "group-sso": `
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <ellipse cx="12" cy="12" rx="8" ry="3.8"></ellipse>
            <path d="M8.5 5.8C10 5 11.7 4.6 13.6 4.6 17.1 4.6 20 6.1 20 8"></path>
          </svg>
        `,
        "bk-trust": `
          <svg viewBox="0 0 24 24">
            <path d="M12 3.5 5 7.5 12 11.5 19 7.5 12 3.5Z"></path>
            <path d="M5 7.5V15.5L12 19.5V11.5L5 7.5Z"></path>
            <path d="M19 7.5V15.5L12 19.5V11.5L19 7.5Z"></path>
            <path d="M14.5 8.9 17.1 7.6C18 7.1 19.1 7.5 19.5 8.3 20 9.1 19.7 10.2 18.8 10.7L16.2 12"></path>
          </svg>
        `
      };

      const authSourceCatalog = [
        {
          id: "platform-local",
          name: "平台账号密码登录",
          type: "password",
          submitLabel: "Sign In",
          iconKey: "platform-local"
        },
        {
          id: "wechat-org",
          name: "企业微信登录",
          type: "qr",
          buttonLabel: "刷新二维码",
          iconKey: "wechat-org"
        },
        {
          id: "group-sso",
          name: "集团 SSO",
          type: "sso",
          buttonLabel: "前往集团 SSO 登录",
          waitCopy: "点击按钮后跳转到集团统一身份系统，当前页面等待认证完成后自动返回。",
          iconKey: "group-sso"
        },
        {
          id: "bk-trust",
          name: "蓝鲸平台互信登录",
          type: "sso",
          buttonLabel: "前往互信系统登录",
          waitCopy: "点击按钮后进入蓝鲸平台互信登录，当前页保持等待回调状态。",
          iconKey: "bk-trust"
        }
      ];

      let currentSourceId = "platform-local";

      function getCurrentSource() {
        return authSourceCatalog.find((source) => source.id === currentSourceId) || authSourceCatalog[0];
      }

      function createAuthHeader(panel, source) {
        panel.querySelector("[data-auth-icon]").innerHTML = iconMap[source.iconKey] || "";
        panel.querySelector("[data-auth-title]").textContent = source.name;
      }

      function bindPasswordToggle(container) {
        const passwordInput = container.querySelector("#passwordInput");
        const toggleButton = container.querySelector("#togglePasswordButton");

        if (!passwordInput || !toggleButton) {
          return;
        }

        toggleButton.addEventListener("click", () => {
          const isPassword = passwordInput.type === "password";
          passwordInput.type = isPassword ? "text" : "password";
          toggleButton.setAttribute("aria-label", isPassword ? "隐藏密码" : "显示或隐藏密码");
        });
      }

      function renderPasswordPanel(source) {
        const fragment = passwordPanelTemplate.content.cloneNode(true);
        const panel = fragment.querySelector(".auth-panel");
        createAuthHeader(panel, source);
        panel.querySelector("[data-submit-label]").textContent = source.submitLabel;
        bindPasswordToggle(panel);
        authRuntime.replaceChildren(fragment);
      }

      function renderQrPanel(source) {
        const fragment = qrPanelTemplate.content.cloneNode(true);
        const panel = fragment.querySelector(".auth-panel");
        createAuthHeader(panel, source);
        const refreshButton = panel.querySelector("[data-refresh-qr]");
        refreshButton.textContent = source.buttonLabel;
        refreshButton.addEventListener("click", () => {
          const status = panel.querySelector(".auth-status");
          status.lastChild.textContent = "二维码已刷新，请在 60 秒内完成扫码认证";
        });
        authRuntime.replaceChildren(fragment);
      }

      function renderSsoPanel(source) {
        const fragment = ssoPanelTemplate.content.cloneNode(true);
        const panel = fragment.querySelector(".auth-panel");
        createAuthHeader(panel, source);
        panel.querySelector("[data-sso-button]").textContent = source.buttonLabel;
        panel.querySelector("[data-wait-copy]").textContent = source.waitCopy;
        authRuntime.replaceChildren(fragment);
      }

      function renderAuthRuntime() {
        const source = getCurrentSource();

        if (source.type === "password") {
          renderPasswordPanel(source);
          return;
        }

        if (source.type === "qr") {
          renderQrPanel(source);
          return;
        }

        renderSsoPanel(source);
      }

      function renderSourceSwitcher() {
        sourceSwitcherList.innerHTML = authSourceCatalog.map((source) => `
          <button class="source-switcher-item ${source.id === currentSourceId ? "active" : ""}" type="button" data-source-id="${source.id}">
            <span class="source-switcher-icon">${iconMap[source.iconKey] || ""}</span>
            <div class="source-switcher-name">${source.name}</div>
          </button>
        `).join("");
      }

      function renderAll() {
        renderSourceSwitcher();
        renderAuthRuntime();
      }

      sourceSwitcherList.addEventListener("click", (event) => {
        const button = event.target.closest("[data-source-id]");
        if (!button) {
          return;
        }

        currentSourceId = button.dataset.sourceId;
        renderSourceSwitcher();
        renderAuthRuntime();
      });

      renderAll();
    </script>
  </body>
</html>
