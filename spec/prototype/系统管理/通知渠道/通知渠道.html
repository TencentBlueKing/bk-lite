<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>通知渠道</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --panel: rgba(255, 255, 255, 0.94);
        --line: #d9e2ef;
        --line-soft: #eaf0f7;
        --text-1: #313238;
        --text-2: #5f6b7c;
        --text-3: #8d98aa;
        --primary: #3a84ff;
        --primary-strong: #2265e6;
        --shadow: 0 10px 26px rgba(33, 59, 99, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text-1);
        background: var(--bg);
      }

      body {
        background: linear-gradient(180deg, #dbeeff 0%, #eef5fb 108px, #f5f7fa 260px);
      }

      .topbar {
        height: 54px;
        border-bottom: 1px solid rgba(234, 240, 247, 0.88);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        position: relative;
        backdrop-filter: blur(10px);
      }

      .brand,
      .user-box {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-mark {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        background: linear-gradient(135deg, #0052d9 0%, #3a84ff 60%, #74a7ff 100%);
      }

      .brand-name {
        color: #5d6679;
        font-weight: 600;
      }

      .main-nav {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        gap: 8px;
      }

      .main-nav a {
        text-decoration: none;
        color: #5e6679;
        border-radius: 10px;
        padding: 6px 12px;
        font-size: 14px;
      }

      .main-nav a.active {
        color: var(--primary);
        background: rgba(58, 132, 255, 0.12);
      }

      .user-box {
        color: #5e6679;
        font-size: 13px;
      }

      .container {
        padding: 16px 14px 28px;
      }

      .page {
        min-height: calc(100vh - 86px);
        border: 1px solid rgba(234, 240, 247, 0.92);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.84) 0%, rgba(255, 255, 255, 0.96) 48%, #ffffff 100%);
        box-shadow: var(--shadow);
        padding: 18px 18px 26px;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 0;
        margin-bottom: 18px;
      }

      .searchbar {
        width: min(100%, 240px);
        display: flex;
        align-items: stretch;
      }

      .search-input {
        flex: 1;
        height: 32px;
        border: 1px solid var(--line);
        border-right: 0;
        border-radius: 4px 0 0 4px;
        padding: 0 12px;
        background: rgba(255, 255, 255, 0.96);
        color: var(--text-1);
        outline: none;
        font-size: 13px;
      }

      .search-input::placeholder {
        color: #b0b8c6;
      }

      .search-button {
        width: 40px;
        height: 32px;
        border: 0;
        border-radius: 0 4px 4px 0;
        background: linear-gradient(180deg, var(--primary) 0%, var(--primary-strong) 100%);
        color: #fff;
        font-size: 15px;
        cursor: pointer;
      }

      .channel-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 22px;
      }

      .channel-card {
        min-height: 118px;
        border: 1px solid rgba(226, 234, 244, 0.95);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: 0 8px 18px rgba(24, 40, 72, 0.08);
        padding: 22px 18px;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        text-decoration: none;
        color: inherit;
        transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      }

      .channel-card:hover {
        transform: translateY(-2px);
        border-color: #c7dafb;
        box-shadow: 0 14px 26px rgba(58, 132, 255, 0.14);
      }

      .channel-card.hidden {
        display: none;
      }

      .channel-icon {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 17px;
        font-weight: 700;
        flex-shrink: 0;
      }

      .channel-icon.email {
        background: linear-gradient(135deg, #ffb400 0%, #f39a00 100%);
      }

      .channel-icon.bot {
        background: linear-gradient(135deg, #4b7cff 0%, #2f61ea 100%);
      }

      .channel-icon.im-app {
        background: linear-gradient(135deg, #19b39b 0%, #0f8f83 100%);
      }

      .channel-icon.nats {
        background: linear-gradient(135deg, #4b8ceb 0%, #276fd8 100%);
      }

      .channel-copy {
        min-width: 0;
        padding-top: 2px;
      }

      .channel-title {
        margin: 0;
        font-size: 16px;
        line-height: 22px;
        font-weight: 700;
        color: #3d4a5d;
      }

      .channel-desc {
        margin: 16px 0 0;
        font-size: 13px;
        line-height: 22px;
        color: #66758b;
      }

      .empty-state {
        display: none;
        align-items: center;
        justify-content: center;
        min-height: 220px;
        border: 1px dashed var(--line);
        border-radius: 16px;
        color: var(--text-3);
        font-size: 14px;
        background: rgba(255, 255, 255, 0.68);
      }

      .empty-state.show {
        display: flex;
      }

      @media (max-width: 1100px) {
        .main-nav {
          position: static;
          transform: none;
          order: 3;
          width: 100%;
          justify-content: center;
          padding-bottom: 10px;
          flex-wrap: wrap;
        }

        .topbar {
          height: auto;
          padding-top: 12px;
          padding-bottom: 0;
          flex-wrap: wrap;
          gap: 12px;
        }
      }

      @media (max-width: 1200px) {
        .channel-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 900px) {
        .channel-grid {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: stretch;
        }

        .searchbar {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">BK</span>
        <span class="brand-name">BlueKing Lite</span>
      </div>
      <nav class="main-nav">
        <a href="../用户管理/组织架构.html">◉ 用户管理</a>
        <a href="javascript:void(0)">◉ 应用管理</a>
        <a class="active" href="./通知渠道.html">◉ 通知渠道</a>
        <a href="../集成中心/集成中心.html">◉ 集成中心</a>
        <a href="../平台设置/门户设置.html">◉ 平台设置</a>
      </nav>
      <div class="user-box">admin ▼</div>
    </header>

    <main class="container">
      <section class="page">
        <div class="toolbar">
          <div class="searchbar">
            <input id="channelSearchInput" class="search-input" type="search" placeholder="搜索......" />
            <button id="channelSearchButton" class="search-button" type="button" aria-label="搜索">⌕</button>
          </div>
        </div>

        <section id="channelGrid" class="channel-grid">
          <a class="channel-card" href="javascript:void(0)" data-keywords="NATS 通道 消息队列 通知推送">
            <span class="channel-icon nats">◈</span>
            <div class="channel-copy">
              <h3 class="channel-title">NATS通道</h3>
              <p class="channel-desc">NATS通道支持通过NATS消息队列进行通知推送。</p>
            </div>
          </a>

          <a class="channel-card" href="javascript:void(0)" data-keywords="电子邮件 邮件 email smtp 通知">
            <span class="channel-icon email">✉</span>
            <div class="channel-copy">
              <h3 class="channel-title">电子邮件</h3>
              <p class="channel-desc">电子邮件渠道支持通过SMTP服务发送邮件通知。</p>
            </div>
          </a>

          <a class="channel-card" href="javascript:void(0)" data-keywords="群聊小助手 webhook 企业微信 飞书 钉钉 群聊 机器人">
            <span class="channel-icon bot">◌</span>
            <div class="channel-copy">
              <h3 class="channel-title">群聊小助手</h3>
              <p class="channel-desc">群聊小助手渠道支持通过Webhook向企业微信、飞书、钉钉等平台群聊发送通知。</p>
            </div>
          </a>

          <a class="channel-card" href="./IM应用通知/IM应用通知.html" data-keywords="IM应用通知 企业微信 钉钉 飞书 应用消息 即时通讯">
            <span class="channel-icon im-app">◎</span>
            <div class="channel-copy">
              <h3 class="channel-title">IM应用通知</h3>
              <p class="channel-desc">IM应用通知渠道支持通过企业微信、钉钉、飞书等IM平台的应用消息能力向成员发送通知。</p>
            </div>
          </a>
        </section>

        <div id="emptyState" class="empty-state">未找到匹配的通知渠道</div>
      </section>
    </main>

    <script>
      const searchInput = document.getElementById("channelSearchInput");
      const searchButton = document.getElementById("channelSearchButton");
      const cards = Array.from(document.querySelectorAll(".channel-card"));
      const emptyState = document.getElementById("emptyState");

      function filterChannels() {
        const keyword = searchInput.value.trim().toLowerCase();
        let visibleCount = 0;

        cards.forEach((card) => {
          const title = card.querySelector(".channel-title").textContent.toLowerCase();
          const desc = card.querySelector(".channel-desc").textContent.toLowerCase();
          const keywords = (card.dataset.keywords || "").toLowerCase();
          const matched = !keyword || title.includes(keyword) || desc.includes(keyword) || keywords.includes(keyword);

          card.classList.toggle("hidden", !matched);
          if (matched) {
            visibleCount += 1;
          }
        });

        emptyState.classList.toggle("show", visibleCount === 0);
      }

      searchInput.addEventListener("input", filterChannels);
      searchButton.addEventListener("click", filterChannels);
    </script>
  </body>
</html>
