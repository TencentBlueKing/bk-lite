<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueKing Lite - 资产管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f6f8fb 0%, #f0f2f7 100%);
            color: #1f2329;
        }

        /* 顶部导航栏 */
        .top-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            height: 60px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: -0.3px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 50%, #699eff 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(58, 132, 255, 0.25);
        }

        .header-nav {
            display: flex;
            gap: 8px;
            margin-left: 48px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #646a73;
            cursor: pointer;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .nav-item:hover {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.06);
        }

        .nav-item.active {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.1);
        }

        .nav-icon {
            font-size: 16px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #646a73;
            font-size: 14px;
        }

        .header-right > span {
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .header-right > span:hover {
            background: rgba(0, 0, 0, 0.04);
            color: #0052d9;
        }

        /* 二级导航 */
        .sub-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            height: 52px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            padding: 0 32px;
        }

        .sub-nav {
            display: flex;
            gap: 4px;
        }

        .sub-nav-item {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            color: #646a73;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .sub-nav-item:hover {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.06);
        }

        .sub-nav-item.active {
            color: #0052d9;
            background: rgba(0, 82, 217, 0.12);
        }

        /* 主内容区 */
        .main-container {
            display: flex;
            height: calc(100vh - 112px);
            gap: 20px;
            padding: 20px;
        }

        /* 左侧导航 */
        .left-sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        /* 搜索框 */
        .search-box {
            padding: 16px;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8f959e;
            font-size: 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 42px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.02);
        }

        .search-input:hover {
            border-color: rgba(0, 82, 217, 0.3);
            background: #fff;
        }

        .search-input:focus {
            border-color: #0052d9;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.08);
        }

        /* 树形菜单 */
        .tree-menu {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px 16px;
        }

        .tree-node {
            user-select: none;
            margin-bottom: 4px;
        }

        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tree-node-content:hover {
            background: rgba(0, 82, 217, 0.06);
        }

        .tree-node-content.active {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.12) 0%, rgba(58, 132, 255, 0.08) 100%);
            color: #0052d9;
            box-shadow: 0 2px 8px rgba(0, 82, 217, 0.12);
        }

        .tree-node-icon {
            width: 20px;
            margin-right: 8px;
            color: #8f959e;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 12px;
        }

        .tree-node-icon.expanded {
            transform: rotate(90deg);
            color: #0052d9;
        }

        .tree-node-label {
            flex: 1;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .category-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.1) 0%, rgba(58, 132, 255, 0.06) 100%);
            color: #0052d9;
            transition: all 0.3s;
        }

        .tree-node-content:hover .category-icon {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 82, 217, 0.15);
        }

        .tree-children {
            display: none;
            padding-left: 28px;
            margin-top: 4px;
        }

        .tree-children.expanded {
            display: block;
        }

        .all-items {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin: 0 0 12px 0;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.08) 0%, rgba(58, 132, 255, 0.05) 100%);
        }

        .all-items:hover {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.15) 0%, rgba(58, 132, 255, 0.08) 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.15);
        }

        .all-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.3);
        }

        /* 右侧内容区域 */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        /* 内容标题块 */
        .content-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .content-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2329;
            margin-bottom: 6px;
        }

        .content-subtitle {
            font-size: 13px;
            color: #8f959e;
            line-height: 1.5;
        }

        /* 内容主体块 */
        .content-body {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
        }

        /* 表格容器 */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.08) 0%, rgba(58, 132, 255, 0.05) 100%);
        }

        .data-table th {
            padding: 16px 20px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #1f2329;
            border-bottom: 2px solid rgba(0, 82, 217, 0.15);
        }

        .data-table tbody tr {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .data-table tbody tr:hover {
            background: rgba(0, 82, 217, 0.04);
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table td {
            padding: 16px 20px;
            font-size: 14px;
            color: #1f2329;
        }

        /* 标签样式 */
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag-type {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.12) 0%, rgba(115, 209, 61, 0.08) 100%);
            color: #389e0d;
        }

        .tag-org {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.12) 0%, rgba(115, 209, 61, 0.08) 100%);
            color: #389e0d;
        }

        .tag-success {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.12) 0%, rgba(115, 209, 61, 0.08) 100%);
            color: #389e0d;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tag-success:hover {
            background: linear-gradient(135deg, rgba(82, 196, 26, 0.2) 0%, rgba(115, 209, 61, 0.12) 100%);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(82, 196, 26, 0.2);
        }

        .tag-error {
            background: linear-gradient(135deg, rgba(245, 34, 45, 0.12) 0%, rgba(255, 77, 79, 0.08) 100%);
            color: #f5222d;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tag-error:hover {
            background: linear-gradient(135deg, rgba(245, 34, 45, 0.2) 0%, rgba(255, 77, 79, 0.12) 100%);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(245, 34, 45, 0.2);
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(0, 0, 0, 0.04);
            color: #646a73;
        }

        .btn-action:hover {
            background: rgba(0, 82, 217, 0.1);
            color: #0052d9;
            transform: translateY(-1px);
        }

        .btn-edit:hover {
            background: rgba(0, 82, 217, 0.1);
            color: #0052d9;
        }

        .btn-delete:hover {
            background: rgba(245, 34, 45, 0.1);
            color: #f5222d;
        }

        /* 滚动条样式 */
        .tree-menu::-webkit-scrollbar,
        .content-area::-webkit-scrollbar {
            width: 6px;
        }

        .tree-menu::-webkit-scrollbar-track,
        .content-area::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 0;
        }

        .tree-menu::-webkit-scrollbar-thumb,
        .content-area::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.12);
            border-radius: 10px;
            border: 1px solid transparent;
            background-clip: content-box;
        }

        .tree-menu::-webkit-scrollbar-thumb:hover,
        .content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 82, 217, 0.3);
            background-clip: content-box;
        }

        /* 操作栏样式 */
        .toolbar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-left {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .toolbar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 搜索组件 */
        .search-group {
            display: flex;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            overflow: hidden;
            background: white;
            transition: all 0.3s;
        }

        .search-group:hover {
            border-color: rgba(0, 82, 217, 0.3);
        }

        .search-group:focus-within {
            border-color: #0052d9;
            box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.08);
        }

        .search-select {
            padding: 8px 12px;
            border: none;
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            font-size: 14px;
            outline: none;
            background: rgba(0, 0, 0, 0.02);
            cursor: pointer;
            min-width: 120px;
        }

        .search-select:hover {
            background: rgba(0, 0, 0, 0.04);
        }

        .search-input-field {
            padding: 8px 16px;
            border: none;
            font-size: 14px;
            outline: none;
            width: 300px;
            background: white;
        }

        .toolbar-select {
            padding: 8px 12px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toolbar-select:hover {
            border-color: rgba(0, 82, 217, 0.3);
        }

        .toolbar-select:focus {
            border-color: #0052d9;
            box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.08);
        }

        .toolbar-input {
            padding: 8px 16px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            width: 300px;
            transition: all 0.3s;
        }

        .toolbar-input:hover {
            border-color: rgba(0, 82, 217, 0.3);
        }

        .toolbar-input:focus {
            border-color: #0052d9;
            box-shadow: 0 0 0 3px rgba(0, 82, 217, 0.08);
        }

        .btn-primary {
            padding: 8px 20px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 82, 217, 0.25);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.35);
        }

        .btn-secondary {
            padding: 8px 16px;
            background: white;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            border-color: #0052d9;
            color: #0052d9;
        }

        .btn-icon {
            padding: 8px 12px;
            background: white;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-icon:hover {
            background: rgba(0, 82, 217, 0.06);
            border-color: #0052d9;
        }

        /* 状态标签 */
        .status-normal {
            color: #52c41a;
            font-weight: 500;
        }

        .status-error {
            color: #f5222d;
            font-weight: 500;
            margin-left: 12px;
        }

        /* 左侧菜单项样式 */
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:hover {
            background: rgba(0, 82, 217, 0.06);
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(0, 82, 217, 0.12) 0%, rgba(58, 132, 255, 0.08) 100%);
        }

        .menu-item.active .menu-label {
            color: #0052d9;
            font-weight: 600;
        }

        .menu-icon {
            font-size: 18px;
        }

        .menu-label {
            font-weight: 500;
            font-size: 14px;
            color: #646a73;
        }

        .menu-section {
            padding: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .menu-section:last-child {
            border-bottom: none;
        }

        .sidebar-logo {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-badge {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #0052d9 0%, #3a84ff 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(0, 82, 217, 0.3);
        }

        .logo-text {
            font-weight: 600;
            font-size: 16px;
            color: #1f2329;
        }

    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">BK</div>
                <span>BlueKing Lite</span>
            </div>
            <nav class="header-nav">
                <div class="nav-item active" onclick="window.location.href='首页.html'">
                    <span class="nav-icon">☁️</span>
                    <span>云区域</span>
                </div>
                <div class="nav-item" onclick="window.location.href='../组件库/首页.html'">
                    <span class="nav-icon">⚙️</span>
                    <span>组件库</span>
                </div>
                <div class="nav-item" onclick="window.location.href='../控制器/首页.html'">
                    <span class="nav-icon">🎛️</span>
                    <span>控制器</span>
                </div>
            </nav>
        </div>
        <div class="header-right">
            <span>� 官方文档</span>
            <span>👤 admin</span>
        </div>
    </div>

    <!-- 二级导航 -->
    <div class="sub-header">
        <nav class="sub-nav">
        </nav>
    </div>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 左侧导航 -->
        <div class="left-sidebar">
            <!-- Logo区域 -->
            <div class="sidebar-logo">
                <div class="logo-container">
                    <div class="logo-badge">☁️</div>
                    <div class="logo-text">default</div>
                </div>
            </div>

            <!-- 树形菜单 -->
            <div class="tree-menu">
                <!-- 节点菜单项 -->
                <div class="menu-section">
                    <div class="menu-item active" onclick="window.location.href='节点.html'">
                        <span class="menu-icon">🏠</span>
                        <span class="menu-label" style="color: #0052d9; font-weight: 600;">节点</span>
                    </div>
                </div>

                <!-- 交量菜单项 -->
                <div class="menu-section">
                    <div class="menu-item">
                        <span class="menu-icon">⚙️</span>
                        <span class="menu-label">变量</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧内容区域 -->
        <div class="content-area" id="contentArea">

            <!-- 内容主体块 -->
            <div class="content-body" style="display: flex; flex-direction: column; padding: 0; flex: 1; overflow: hidden;">
                <!-- 步骤条 -->
                <div style="padding: 20px 24px 16px 24px; background: linear-gradient(135deg, rgba(0, 82, 217, 0.02) 0%, rgba(58, 132, 255, 0.01) 100%); border-bottom: 1px solid rgba(0, 0, 0, 0.06); flex-shrink: 0;">
                    <div style="display: flex; align-items: flex-start; justify-content: center; max-width: 600px; margin: 0 auto; gap: 80px;">
                        <!-- 步骤1: 安装配置 -->
                        <div style="display: flex; flex-direction: column; align-items: center; position: relative;">
                            <!-- 右侧连接线 -->
                            <div style="position: absolute; top: 14px; left: calc(50% + 16px); width: 80px; height: 2px; background: #e8e8e8; z-index: 0;"></div>

                    <button class="btn-primary" id="installBtn" style="padding: 10px 32px;">

    <script>
        // 左侧菜单项点击
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.menu-item').forEach(i => {
                    i.classList.remove('active');
                    const label = i.querySelector('.menu-label');
                    if (label) {
                        label.style.color = '#646a73';
                        label.style.fontWeight = '500';
                    }
                });
                this.classList.add('active');
                const label = this.querySelector('.menu-label');
                if (label) {
                    label.style.color = '#0052d9';
                    label.style.fontWeight = '600';
                }
            });
        });

        // 操作系统切换
        const osBtns = document.querySelectorAll('.os-btn');
        const remoteInstallBtn = document.getElementById('remoteInstallBtn');
        const manualInstallBtn = document.getElementById('manualInstallBtn');
        let currentOS = 'linux'; // 默认是Linux

        osBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const os = this.getAttribute('data-os');
                currentOS = os;

                // 更新操作系统按钮样式
                osBtns.forEach(b => {
                    b.style.background = '';
                    b.style.color = '';
                    b.style.borderColor = '';
                });
                this.style.background = 'linear-gradient(135deg, rgba(0, 82, 217, 0.12) 0%, rgba(58, 132, 255, 0.08) 100%)';
                this.style.color = '#0052d9';
                this.style.borderColor = '#0052d9';

                // Windows只支持手动安装
                if (os === 'windows') {
                    // 隐藏远程安装按钮
                    remoteInstallBtn.style.display = 'none';
                    // 自动选中手动安装
                    manualInstallBtn.click();
                } else {
                    // Linux显示所有安装方式
                    remoteInstallBtn.style.display = '';
                }
            });
        });

        // 安装方式切换
        const installMethodBtns = document.querySelectorAll('.install-method-btn');
        const installMethodTip = document.getElementById('installMethodTip');
        let currentInstallMethod = 'remote'; // 默认是远程安装

        function toggleSSHColumns(method) {
            const sshColumns = document.querySelectorAll('.ssh-column');
            sshColumns.forEach(col => {
                col.style.display = method === 'manual' ? 'none' : '';
            });
        }

        function updateInstallMethodTip(method) {
            if (installMethodTip) {
                if (method === 'remote') {
                    installMethodTip.textContent = '远程安装请确保主机已开启SSH服务，并能与云区域的部署节点正常通信。';
                } else {
                    installMethodTip.textContent = '手动安装请按照操作指引在主机上进行操作。';
                }
            }
        }

        installMethodBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const method = this.getAttribute('data-method');
                currentInstallMethod = method;

                // 更新按钮样式
                installMethodBtns.forEach(b => {
                    b.style.background = '';
                    b.style.color = '';
                    b.style.borderColor = '';
                });
                this.style.background = 'linear-gradient(135deg, rgba(0, 82, 217, 0.12) 0%, rgba(58, 132, 255, 0.08) 100%)';
                this.style.color = '#0052d9';
                this.style.borderColor = '#0052d9';

                // 切换SSH相关列的显示/隐藏
                toggleSSHColumns(method);
                
                // 更新提示文案
                updateInstallMethodTip(method);
            });
        });

        // 批量操作菜单显示/隐藏
        const batchActionBtn = document.getElementById('batchActionBtn');
        const batchActionMenu = document.getElementById('batchActionMenu');

        if (batchActionBtn && batchActionMenu) {
            batchActionBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const isVisible = batchActionMenu.style.display === 'block';
                batchActionMenu.style.display = isVisible ? 'none' : 'block';
            });

            // 点击页面其他地方关闭菜单
            document.addEventListener('click', function() {
                batchActionMenu.style.display = 'none';
            });

            batchActionMenu.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        // 批量操作菜单项悬停效果
        document.querySelectorAll('.batch-menu-item').forEach(item => {
            item.addEventListener('mouseenter', function() {
                const action = this.getAttribute('data-action');
                if (action === 'delete') {
                    this.style.background = 'rgba(245, 34, 45, 0.08)';
                } else {
                    this.style.background = 'rgba(0, 82, 217, 0.06)';
                }
            });

            item.addEventListener('mouseleave', function() {
                this.style.background = 'transparent';
            });

            item.addEventListener('click', function() {
                const action = this.getAttribute('data-action');
                const selectedCount = document.querySelectorAll('.row-checkbox:checked').length;
                
                if (selectedCount === 0) {
                    alert('请至少选择一条记录');
                    return;
                }

                if (action === 'edit') {
                    alert(`批量修改 ${selectedCount} 条记录`);
                } else if (action === 'delete') {
                    if (confirm(`确定要删除选中的 ${selectedCount} 条记录吗？`)) {
                        alert(`已删除 ${selectedCount} 条记录`);
                        // 这里添加实际的删除逻辑
                    }
                }
                
                batchActionMenu.style.display = 'none';
            });
        });

        // 全选/取消全选
        const selectAllCheckbox = document.getElementById('selectAll');
        const rowCheckboxes = document.querySelectorAll('.row-checkbox');

        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', function() {
                rowCheckboxes.forEach(checkbox => {
                    checkbox.checked = this.checked;
                });
                updateInstallButtonCount();
            });
        }

        // 单个复选框变化时检查是否需要更新全选状态
        rowCheckboxes.forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                if (selectAllCheckbox) {
                    const allChecked = Array.from(rowCheckboxes).every(cb => cb.checked);
                    const someChecked = Array.from(rowCheckboxes).some(cb => cb.checked);
                    selectAllCheckbox.checked = allChecked;
                    selectAllCheckbox.indeterminate = someChecked && !allChecked;
                }
                updateInstallButtonCount();
            });
        });

        // 更新安装按钮的计数 - 显示总行数
        function updateInstallButtonCount() {
            const tbody = document.getElementById('hostTableBody');
            const totalRows = tbody ? tbody.children.length : 0;
            const installBtn = document.getElementById('installBtn');
            if (installBtn) {
                installBtn.textContent = `安装 (${totalRows})`;
            }
        }

        // 初始化计数
        updateInstallButtonCount();

        const installActionButton = document.getElementById('installBtn');
        if (installActionButton) {
            installActionButton.addEventListener('click', function() {
                let targetPage = '安装控制器-远程安装中.html';

                if (currentInstallMethod === 'manual' && currentOS === 'windows') {
                    targetPage = '安装控制器-手动安装中（win）.html';
                } else if (currentInstallMethod === 'manual') {
                    targetPage = '安装控制器-手动安装中.html';
                }

                window.location.href = targetPage;
            });
        }

        // 导入按钮点击事件
        const importBtn = document.getElementById('importBtn');
        if (importBtn) {
            importBtn.addEventListener('click', function() {
                // 创建隐藏的文件选择器
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '.csv,.xlsx,.xls';
                fileInput.style.display = 'none';
                
                fileInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        alert(`已选择文件: ${file.name}\n\n这里将处理文件导入逻辑`);
                        // 这里添加实际的文件导入处理逻辑
                    }
                });
                
                document.body.appendChild(fileInput);
                fileInput.click();
                document.body.removeChild(fileInput);
            });
        }

        // 添加行功能
        function addNewRow() {
            const tbody = document.getElementById('hostTableBody');
            const currentInstallMethod = document.querySelector('.install-method-btn[style*="0052d9"]')?.getAttribute('data-method') || 'remote';
            
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td style="text-align: center;">
                    <input type="checkbox" class="row-checkbox" style="cursor: pointer; width: 16px; height: 16px;">
                </td>
                <td>
                    <input type="text" placeholder="请输入" class="toolbar-input" style="width: 100%; min-width: 120px;">
                </td>
                <td>
                    <input type="text" placeholder="请输入" class="toolbar-input" style="width: 100%; min-width: 120px;">
                </td>
                <td>
                    <select class="toolbar-select" style="width: 100%; min-width: 150px;">
                        <option>Default ×</option>
                    </select>
                </td>
                <td class="ssh-column" style="${currentInstallMethod === 'manual' ? 'display: none;' : ''}">
                    <input type="text" value="22" class="toolbar-input" style="width: 100%; min-width: 80px;">
                </td>
                <td class="ssh-column" style="${currentInstallMethod === 'manual' ? 'display: none;' : ''}">
                    <input type="text" value="root" class="toolbar-input" style="width: 100%; min-width: 80px;">
                </td>
                <td class="ssh-column" style="${currentInstallMethod === 'manual' ? 'display: none;' : ''}">
                    <select class="toolbar-select auth-method-select" style="width: 100%; min-width: 100px;">
                        <option value="password" selected>密码</option>
                        <option value="key">秘钥</option>
                    </select>
                </td>
                <td class="ssh-column password-key-cell" style="${currentInstallMethod === 'manual' ? 'display: none;' : ''}">
                    <div class="password-input-wrapper" style="position: relative; width: 100%; min-width: 120px;">
                        <input type="password" placeholder="请输入" class="toolbar-input" style="width: 100%; padding-right: 36px;">
                        <span class="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #8f959e;">👁️</span>
                    </div>
                    <div class="key-upload-wrapper" style="display: none; width: 100%; min-width: 120px;">
                        <input type="file" accept=".pem,.key,.pub" style="display: none;" class="key-file-input">
                        <button class="toolbar-input" style="width: 100%; text-align: left; cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: white; border-color: rgba(0, 0, 0, 0.08);">
                            <span class="file-name" style="color: #1f2329;">上传秘钥</span>
                        </button>
                    </div>
                </td>
                <td>
                    <div style="display: flex; gap: 4px; align-items: center;">
                        <button class="btn-icon add-row-btn" style="color: #0052d9; border: none; background: transparent; font-size: 18px; padding: 4px; cursor: pointer;">
                            ⊕
                        </button>
                        <button class="btn-icon delete-row-btn" style="color: #f5222d; border: none; background: transparent; font-size: 18px; padding: 4px; cursor: pointer;">
                            ⊖
                        </button>
                    </div>
                </td>
            `;
            
            tbody.appendChild(newRow);
            
            // 为新行的复选框添加事件监听
            const newCheckbox = newRow.querySelector('.row-checkbox');
            newCheckbox.addEventListener('change', function() {
                updateCheckboxStates();
                updateInstallButtonCount();
            });
            
            // 为删除按钮添加事件监听
            const deleteBtn = newRow.querySelector('.delete-row-btn');
            deleteBtn.addEventListener('click', function() {
                deleteRow(newRow);
            });
            
            // 为密码显示/隐藏按钮添加事件监听
            const togglePasswordBtn = newRow.querySelector('.toggle-password');
            if (togglePasswordBtn) {
                togglePasswordBtn.addEventListener('click', function() {
                    const passwordInput = this.previousElementSibling;
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        this.textContent = '🙈';
                    } else {
                        passwordInput.type = 'password';
                        this.textContent = '👁️';
                    }
                });
            }
            
            // 为认证方式下拉框添加事件监听
            const authMethodSelect = newRow.querySelector('.auth-method-select');
            if (authMethodSelect) {
                authMethodSelect.addEventListener('change', function() {
                    handleAuthMethodChange(this);
                });
            }
            
            // 为秘钥上传按钮添加文件选择事件
            const keyFileInput = newRow.querySelector('.key-file-input');
            if (keyFileInput) {
                keyFileInput.addEventListener('change', function() {
                    const button = this.nextElementSibling;
                    const fileNameSpan = button.querySelector('.file-name');
                    
                    if (this.files.length > 0) {
                        fileNameSpan.textContent = this.files[0].name;
                        fileNameSpan.style.color = '#1f2329';
                        button.style.background = 'white';
                        button.style.borderColor = 'rgba(0, 0, 0, 0.08)';
                    } else {
                        fileNameSpan.textContent = '上传秘钥';
                        fileNameSpan.style.color = '#1f2329';
                        button.style.background = 'white';
                        button.style.borderColor = 'rgba(0, 0, 0, 0.08)';
                    }
                });
            }
            
            updateRowCount();
            updateCheckboxStates();
            updateInstallButtonCount();
        }

        // 删除行功能
        function deleteRow(row) {
            const tbody = document.getElementById('hostTableBody');
            if (tbody.children.length > 1) {
                row.remove();
                updateRowCount();
                updateCheckboxStates();
                updateInstallButtonCount();
            } else {
                alert('至少需要保留一行数据');
            }
        }

        // 更新行数显示
        function updateRowCount() {
            const tbody = document.getElementById('hostTableBody');
            const totalRows = tbody.children.length;
            const totalRowsSpan = document.getElementById('totalRows');
            if (totalRowsSpan) {
                totalRowsSpan.textContent = totalRows;
            }
        }

        // 更新复选框状态
        function updateCheckboxStates() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            
            if (selectAllCheckbox && rowCheckboxes.length > 0) {
                const allChecked = Array.from(rowCheckboxes).every(cb => cb.checked);
                const someChecked = Array.from(rowCheckboxes).some(cb => cb.checked);
                selectAllCheckbox.checked = allChecked;
                selectAllCheckbox.indeterminate = someChecked && !allChecked;
            }
        }

        // 为所有添加按钮绑定事件
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('add-row-btn')) {
                addNewRow();
            }
        });

        // 为第一行的密码显示/隐藏按钮添加事件
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const passwordInput = this.previousElementSibling;
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    this.textContent = '🙈';
                } else {
                    passwordInput.type = 'password';
                    this.textContent = '👁️';
                }
            });
        });

        // 认证方式切换逻辑
        function handleAuthMethodChange(selectElement) {
            const row = selectElement.closest('tr');
            const passwordKeyCell = row.querySelector('.password-key-cell');
            const passwordWrapper = passwordKeyCell.querySelector('.password-input-wrapper');
            const keyUploadWrapper = passwordKeyCell.querySelector('.key-upload-wrapper');
            
            if (selectElement.value === 'key') {
                // 切换到秘钥模式
                passwordWrapper.style.display = 'none';
                keyUploadWrapper.style.display = 'block';
            } else {
                // 切换到密码模式
                passwordWrapper.style.display = 'block';
                keyUploadWrapper.style.display = 'none';
            }
        }

        // 为认证方式下拉框添加事件
        document.querySelectorAll('.auth-method-select').forEach(select => {
            select.addEventListener('change', function() {
                handleAuthMethodChange(this);
            });
        });

        // 为上传按钮添加点击事件
        document.addEventListener('click', function(e) {
            if (e.target.closest('.key-upload-wrapper button')) {
                const button = e.target.closest('button');
                const fileInput = button.parentElement.querySelector('.key-file-input');
                fileInput.click();
            }
        });

        // 处理文件选择
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('key-file-input')) {
                const fileInput = e.target;
                const button = fileInput.nextElementSibling;
                const fileNameSpan = button.querySelector('.file-name');
                
                if (fileInput.files.length > 0) {
                    fileNameSpan.textContent = fileInput.files[0].name;
                    fileNameSpan.style.color = '#1f2329';
                    button.style.background = 'white';
                    button.style.borderColor = 'rgba(0, 0, 0, 0.08)';
                } else {
                    fileNameSpan.textContent = '上传秘钥';
                    fileNameSpan.style.color = '#1f2329';
                    button.style.background = 'white';
                    button.style.borderColor = 'rgba(0, 0, 0, 0.08)';
                }
            }
        });

        // 初始化行数显示
        updateRowCount();
    </script>
</body>
</html>
